.typing span:nth-child(2){animation-delay:.15s}.typing span:nth-child(3){animation-delay:.3s}
@keyframes tb{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-3px)}}

.wfcard .wfbtns button:disabled{opacity:.3;cursor:not-allowed}

 fr:{lede:"Chaque outil de chat IA fonctionne de la même façon simple — vous écrivez ce que vous voulez, il répond, et mieux vous décrivez ce que vous voulez, meilleure est la réponse.",
   secs:[["Comment fonctionne un outil de chat IA","Vous écrivez un message (un « prompt »), l'IA répond en se basant sur des modèles dans une énorme quantité de texte qu'elle a appris ; elle ne « connaît » pas votre entreprise ou ne se souvient pas des conversations précédentes sauf si vous le dites dans le même chat — pensez-y comme un assistant très cultivé qui a besoin que vous expliquiez la situation à chaque fois."],
    ["Ce pour quoi l'IA est douée","Rédiger une première version rapidement (un email, une légende, une liste d'idées), résumer ou réorganiser des informations que vous lui donnez, générer des idées quand vous êtes bloqué."],

 en:{lede:"Every AI chat tool works the same simple way — you type what you want, it responds, and the better you describe what you want, the better the response.",
   secs:[["How an AI chat tool works","You type a message (a 'prompt'), the AI responds based on patterns in a huge amount of text it learned from; it doesn't 'know' your business or remember previous conversations unless you tell it in the same chat — think of it as a very well-read assistant who needs you to explain the situation each time."],
    ["What AI is good at","Drafting a first version fast (an email, a caption, a list of ideas), summarizing or reorganizing information you give it, brainstorming options when you're stuck."],
    ["What AI is not","It's not always accurate (it can state wrong things confidently — 'hallucinate'); it's not a replacement for your own judgment or real customer knowledge; it's a drafting/thinking partner, not a final decision-maker."]],
   ex:"Send a message to the AI chat about a real task in your business and read the reply critically.",
   quiz:[
    {q:"How does an AI chat tool generate its response?",opts:["It searches a live database of your business","Based on patterns learned from a huge amount of text, not knowledge of your specific business","It always gives the exact same answer to everyone","It requires special training first"],ans:1,fb:"Based on patterns in text, not specific knowledge."},
    {q:"What is AI genuinely good at?",opts:["Perfectly accurate facts always","Drafting fast, summarizing, and brainstorming options","Replacing all human judgment","Knowing your customers personally"],ans:1,fb:"Drafting fast, summarizing, and brainstorming are its strengths."},
    {q:"What does 'hallucinate' mean in AI?",opts:["The AI becomes creative in a good way","The AI states something wrong confidently, as if it were true","A bug that never happens","A feature only in image AI"],ans:1,fb:"It's when AI states wrong things confidently."}],
   close:{learned:"An AI chat tool responds based on patterns in text, not real knowledge of your business — it's a fast drafting/brainstorming partner, not a final decision-maker.",
    mistake:"Trusting an AI's confident-sounding answer as automatically accurate, without checking it against what you actually know.",
    tip:"Always give context in your message (your business, audience, situation) since the AI doesn't remember unless you tell it.",
    assign:"Send one message to the AI chat about a real task in your business and read the reply critically.",
    dl:"Reference: What AI Is (and Isn't) Good For",
    checklist:["Message sent?","Response read critically, not blindly trusted?","Context included?"],
    ai:"Explain in simple words what an AI chat tool can do well and what it can't, for a [type of business]."}}},

    ["Sa ki toujou bezwen yon verifikasyon imen","Fè espesifik, nimewo, dat, oswa evènman aktyèl (done fòmasyon IA gen yon dat limit e ka demode oswa senpleman fo); nenpòt bagay ou pral deklare piblikman kòm fè ta dwe verifye nan yon vrè sous anvan, menm règ debaz pou rès kou sa a."],
    ["Bon pwonp rechèch","Mande yon lis/kad kòmansman olye vrè fè final ('ki kategori komen X yo' olye 'ki egzat pri aktyèl X kounye a'), mande IA a note kote ou ta dwe verifye endepandan, mande plizyè angle/pèspektiv sou yon sijè olye yon sèl repons."]],
   ex:"Ekri yon pwonp rechèch 3-pati (sijè/kontèks/fòma) pou yon bagay ou reyèlman bezwen fè rechèch sou li.",
   quiz:[
    {q:"Ki sa rechèch IA reyèlman bon pou fè?",opts:["Fè ak pri pafètman aktyèl","Rezime enfòmasyon ak jenere lide kòmansman","Ranplase tout verifikasyon fè","Konsèy legal"],ans:1,fb:"Rezime ak jenere lide kòmansman se pwen fò l."},
    {q:"Kisa ki toujou bezwen yon verifikasyon imen?",opts:["Bwenstòmin laj","Fè espesifik, nimewo, dat, ak evènman aktyèl","Eksplikasyon senp konsèp","Kad kòmansman jeneral"],ans:1,fb:"Fè espesifik ak evènman aktyèl bezwen verifikasyon."},
    {q:"Ki yon bon apwòch pwonp rechèch?",opts:["Mande sèl vrè fè aktyèl la","Mande yon lis/kad kòmansman epi note kisa pou verifye endepandan","Pa janm mande IA anyen espesifik","Sèlman mande kesyon wi/non"],ans:1,fb:"Lis kòmansman + nòt verifikasyon se bon apwòch."}],
   close:{learned:"IA akselere rechèch pou rezime ak lide kòmansman — men fè espesifik, nimewo, ak evènman aktyèl toujou bezwen yon verifikasyon imen.",
    mistake:"Pibliye yon fè oswa nimewo espesifik ki soti nan IA san verifye l nan yon vrè sous anvan.",
    tip:"Mande IA yon kad kòmansman oswa yon lis angle, apre verifye e ranpli detay yo ou menm.",
    assign:"Ekri yon pwonp rechèch 3-pati (sijè/kontèks/fòma) pou yon bagay ou reyèlman bezwen fè rechèch sou li.",
    dl:"Lis Verifikasyon: Fyabilite Rechèch IA",
    checklist:["Itilize pou rezime/lide kòmansman, pa fè final?","Deklarasyon espesifik make pou verifikasyon?","Plizyè angle mande?"],
    ai:"Mwen bezwen fè rechèch sou [sijè] pou biznis mwen. Sijere yon pwonp rechèch ki mande yon kad kòmansman e ki make sa m ta dwe verifye mwen menm."}},
 fr:{lede:"L'IA peut accélérer la recherche de façon spectaculaire — mais seulement si vous savez pour quoi elle est réellement fiable, et ce qui a encore besoin d'une vérification humaine.",
   secs:[["Ce pour quoi la recherche IA est douée","Résumer rapidement une grande quantité d'informations, générer une liste de départ d'idées/questions/angles auxquels vous n'aviez pas pensé, expliquer un concept en langage simple."],
    ["Ce qui a encore besoin d'une vérification humaine","Des faits spécifiques, nombres, dates, ou événements actuels (les données d'entraînement de l'IA ont une date limite et peuvent être dépassées ou simplement fausses) ; tout ce que vous allez déclarer publiquement comme un fait devrait être vérifié auprès d'une vraie source d'abord, même règle standard que le reste de ce cours."],
    ["Bons prompts de recherche","Demandez une liste/un cadre de départ plutôt que des faits finaux (« quelles sont les catégories courantes de X » plutôt que « quel est le prix exact actuel de X »), demandez à l'IA de noter où vous devriez vérifier indépendamment, demandez plusieurs angles/perspectives sur un sujet plutôt qu'une seule réponse."]],
   ex:"Écrivez un prompt de recherche en 3 parties (sujet/contexte/format) pour quelque chose que vous devez vraiment rechercher.",
   quiz:[
    {q:"Pour quoi la recherche IA est-elle réellement douée ?",opts:["Des prix parfaitement actuels","Résumer des informations et générer des idées de départ","Remplacer toute vérification de faits","Des conseils juridiques"],ans:1,fb:"Résumer et générer des idées de départ sont ses points forts."},
    {q:"Qu'est-ce qui a encore besoin d'une vérification humaine ?",opts:["Le brainstorming large","Des faits spécifiques, nombres, dates, et événements actuels","De simples explications de concepts","Des cadres de départ généraux"],ans:1,fb:"Les faits spécifiques et événements actuels ont besoin de vérification."},
    {q:"Quelle est une bonne approche de prompt de recherche ?",opts:["Demander le seul vrai fait actuel","Demander une liste/un cadre de départ et noter quoi vérifier indépendamment","Ne jamais rien demander de spécifique à l'IA","Ne poser que des questions oui/non"],ans:1,fb:"Une liste de départ + une note de vérification est une bonne approche."}],
   close:{learned:"L'IA accélère la recherche pour les résumés et idées de départ — mais les faits spécifiques, nombres, et événements actuels ont toujours besoin d'une vérification humaine.",
    mistake:"Publier un fait ou nombre spécifique venant de l'IA sans le vérifier auprès d'une vraie source d'abord.",
    tip:"Demandez à l'IA un cadre de départ ou une liste d'angles, puis vérifiez et remplissez les détails vous-même.",
    assign:"Écrivez un prompt de recherche en 3 parties (sujet/contexte/format) pour quelque chose que vous devez vraiment rechercher.",
    dl:"Liste de Vérification : Fiabilité de la Recherche IA",
    checklist:["Utilisée pour résumés/idées de départ, pas des faits finaux ?","Affirmations spécifiques signalées pour vérification ?","Plusieurs angles demandés ?"],
    ai:"J'ai besoin de rechercher [sujet] pour mon entreprise. Suggère un prompt de recherche qui demande un cadre de départ et signale ce que je devrais vérifier moi-même."}},
 en:{lede:"AI can speed up research dramatically — but only if you know what it's actually reliable for, and what still needs a human check.",
   secs:[["What AI research is good for","Summarizing a large amount of information quickly, generating a starting list of ideas/questions/angles you might not have thought of, explaining a concept in plain language."],
    ["What still needs a human check","Specific facts, numbers, dates, or current events (AI training data has a cutoff and can be outdated or simply wrong); anything you'll state publicly as fact should be verified from a real source first, same standing rule as the rest of this course."],
    ["Good research prompts","Ask for a starting list/framework rather than final facts ('what are common categories of X' rather than 'what is the exact current price of X'), ask the AI to note where you should verify independently, ask for multiple angles/perspectives on a topic rather than one answer."]],
   ex:"Write a 3-part research prompt (topic/context/format) for something you genuinely need to research.",
   quiz:[
    {q:"What is AI research genuinely good for?",opts:["Perfectly current facts and prices","Summarizing information and generating starting ideas/angles","Replacing all fact-checking","Legal advice"],ans:1,fb:"Summarizing and generating starting ideas are its strengths."},
    {q:"What still needs a human check?",opts:["Broad brainstorming","Specific facts, numbers, dates, and current events","Simple explanations of concepts","General starting frameworks"],ans:1,fb:"Specific facts and current events need verification."},
    {q:"What's a good research prompt approach?",opts:["Ask for the one exact current fact","Ask for a starting list/framework and note what to verify independently","Never ask AI anything specific","Only ask yes/no questions"],ans:1,fb:"A starting list plus a verification note is a good approach."}],
   close:{learned:"AI speeds up research for summaries and starting ideas — but specific facts, numbers, and current events still need a human check.",
    mistake:"Publishing a specific fact or number from AI without verifying it from a real source first.",
    tip:"Ask AI for a starting framework or list of angles, then verify and fill in specifics yourself.",
    assign:"Write a 3-part research prompt (topic/context/format) for something you genuinely need to research.",
    dl:"Checklist: AI Research Reliability Check",
    checklist:["Used for summaries/starting ideas, not final facts?","Specific claims flagged for verification?","Multiple angles requested?"],
    ai:"I need to research [topic] for my business. Suggest a research prompt that asks for a starting framework and flags what I should verify myself."}}},

4:{ht:{lede:"Zouti imaj IA tounen yon deskripsyon ekri an yon imaj — pi espesifik deskripsyon an, pi pre rezilta a matche sa ou reyèlman imajine.",
   secs:[["Sa ki fè yon pwonp imaj mache","Sijè (kisa ki ladan imaj la), style (foto-realis, ilistrasyon, design plat, elt.), ak detay (koulè, anbyans, konpozisyon, limyè) — pwonp vag jwenn rezilta jenerik, enprediktib."],
    ["Atant realis","Imaj IA bon pou konsèp, fon, ak vizyèl estilize; yo souvan pa fyab pou tèks egzat anndan imaj la, logo egzat, oswa presizyon pwodwi — pa itilize IA pou jenere vrè foto pwodwi ou."],
    ["Itilize imaj IA responsableman","Pa prezante yon imaj IA kòm yon vrè foto pwodwi/kote ou si li pa ye; verifye règleman platfòm/piblisite sou divilgasyon kontni jenere pa IA kote sa pètinan; itilize l pou konsèp, maket, ak fon olye nenpòt bagay ki reklame se yon vrè foto."]],
   ex:"Ekri yon pwonp imaj 3-pati (sijè/style/detay) pou yon grafik ou ta ka itilize nan maketing.",
   quiz:[
    {q:"Kisa ki fè yon pwonp imaj IA mache byen?",opts:["Vin kout otan posib","Dekri sijè, style, ak detay espesifikman","Sèlman non yon koulè","Kopye egzat pwonp yon lòt moun"],ans:1,fb:"Sijè/style/detay se sa ki fè l mache."},
    {q:"Pou kisa imaj IA souvan pa fyab?",opts:["Anbyans/fon jeneral","Tèks egzat, logo, ak presizyon pwodwi","Konsèp estilize","Ilistrasyon"],ans:1,fb:"Tèks egzat/logo/presizyon pwodwi pa fyab."},
    {q:"Ki yon enkyetid etik ak imaj IA?",opts:["Yo toujou byen pou itilize nenpòt jan","Prezante youn kòm yon vrè foto pwodwi/kote ou si li pa ye","Yo pa ka itilize nan maketing ditou","Yo ilegal toupatou"],ans:1,fb:"Prezante yon konsèp kòm yon vrè foto se yon pwoblèm etik."}],
   close:{learned:"Pwonp imaj IA bezwen sijè, style, ak detay pou mache byen — men yo pa fyab pou tèks/logo egzat, e yo pa ta dwe prezante kòm vrè foto.",
    mistake:"Itilize yon imaj jenere pa IA tankou si li te yon vrè foto pwòp pwodwi oswa kote ou.",
    tip:"Itilize imaj IA pou konsèp, fon, ak maket — sove vrè foto pou nenpòt bagay ki reklame montre vrè pwodwi ou.",
    assign:"Ekri yon pwonp imaj 3-pati (sijè/style/detay) pou yon grafik ou ta ka itilize nan maketing.",
    dl:"Referans: Fòmil Pwonp Imaj IA",
    checklist:["Sijè dekri?","Style spesifye?","Detay (koulè/anbyans) enkli?","Pa prezante kòm yon vrè foto?"],
    ai:"Ekri yon pwonp imaj IA detaye (sijè, style, detay) pou yon [kalite grafik] pou biznis mwen."}},
 fr:{lede:"Les outils d'image IA transforment une description écrite en image — plus la description est spécifique, plus le résultat se rapproche de ce que vous avez réellement imaginé.",
   secs:[["Ce qui fait fonctionner un prompt d'image","Sujet (ce qui est dans l'image), style (photo-réaliste, illustration, design plat, etc.), et détails (couleurs, ambiance, composition, éclairage) — les prompts vagues obtiennent des résultats génériques et imprévisibles."],
    ["Attentes réalistes","Les images IA sont bonnes pour les concepts, arrière-plans, et visuels stylisés ; elles ne sont souvent pas fiables pour du texte exact dans l'image, des logos exacts, ou une précision de produit exacte — n'utilisez pas l'IA pour générer vos vraies photos de produit."],
    ["Utiliser les images IA de façon responsable","Ne présentez pas une image IA comme une vraie photo de votre produit/lieu si ce n'en est pas une ; vérifiez les politiques de plateforme/publicité sur la divulgation de contenu généré par IA quand c'est pertinent ; utilisez-la pour des concepts, maquettes, et arrière-plans plutôt que tout ce qui prétend être une vraie photo."]],
   ex:"Écrivez un prompt d'image en 3 parties (sujet/style/détails) pour un graphique que vous pourriez utiliser en marketing.",
   quiz:[
    {q:"Qu'est-ce qui fait bien fonctionner un prompt d'image IA ?",opts:["Être aussi court que possible","Décrire le sujet, le style, et les détails spécifiquement","Seulement nommer une couleur","Copier exactement le prompt de quelqu'un d'autre"],ans:1,fb:"Sujet/style/détails sont ce qui le fait fonctionner."},
    {q:"Pour quoi les images IA sont-elles souvent peu fiables ?",opts:["Ambiance/arrière-plans généraux","Texte exact, logos, et précision de produit exacte","Concepts stylisés","Illustrations"],ans:1,fb:"Le texte exact/logos/précision de produit ne sont pas fiables."},
    {q:"Quelle est une préoccupation éthique avec les images IA ?",opts:["Elles sont toujours bonnes à utiliser n'importe comment","Présenter l'une comme une vraie photo de votre produit/lieu si ce n'en est pas une","Elles ne peuvent pas du tout être utilisées en marketing","Elles sont illégales partout"],ans:1,fb:"Présenter un concept comme une vraie photo est un problème éthique."}],
   close:{learned:"Les prompts d'image IA ont besoin de sujet, style, et détails pour bien fonctionner — mais ils ne sont pas fiables pour le texte/logo exact, et ne devraient pas être présentés comme de vraies photos.",
    mistake:"Utiliser une image générée par IA comme si c'était une vraie photo de votre propre produit ou lieu.",
    tip:"Utilisez les images IA pour des concepts, arrière-plans, et maquettes — gardez de vraies photos pour tout ce qui prétend montrer votre vrai produit.",
    assign:"Écrivez un prompt d'image en 3 parties (sujet/style/détails) pour un graphique que vous pourriez utiliser en marketing.",
    dl:"Référence : Formule de Prompt d'Image IA",
    checklist:["Sujet décrit ?","Style spécifié ?","Détails (couleur/ambiance) inclus ?","Pas présentée comme une vraie photo ?"],
    ai:"Écris un prompt d'image IA détaillé (sujet, style, détails) pour un(e) [type de graphique] pour mon entreprise."}},
 en:{lede:"AI image tools turn a written description into a picture — the more specific the description, the closer the result matches what you actually pictured.",
   secs:[["What makes an image prompt work","Subject (what's in the image), style (photo-realistic, illustration, flat design, etc.), and details (colors, mood, composition, lighting) — vague prompts get generic, unpredictable results."],
    ["Realistic expectations","AI images are good for concepts, backgrounds, and stylized visuals; they're often not reliable for exact text within the image, exact logos, or precise product accuracy — don't use AI to generate your actual product photos."],
    ["Using AI images responsibly","Don't present an AI image as a real photo of your product/location if it isn't one; check platform/ad policies about AI-generated content disclosure where relevant; use it for concepts, mockups, and backgrounds rather than anything claiming to be a real photo."]],
   ex:"Write a 3-part image prompt (subject/style/details) for a graphic you could use in marketing.",
   quiz:[
    {q:"What makes an AI image prompt work well?",opts:["Being as short as possible","Describing subject, style, and details specifically","Only naming a color","Copying someone else's exact prompt"],ans:1,fb:"Subject/style/details are what make it work."},
    {q:"What are AI images often unreliable for?",opts:["General mood/backgrounds","Exact text, logos, and precise product accuracy","Stylized concepts","Illustrations"],ans:1,fb:"Exact text/logos/product accuracy are unreliable."},
    {q:"What's an ethical concern with AI images?",opts:["They're always fine to use however","Presenting one as a real photo of your product/location when it isn't","They can't be used in marketing at all","They're illegal everywhere"],ans:1,fb:"Presenting a concept as a real photo is an ethical problem."}],
   close:{learned:"AI image prompts need subject, style, and detail to work well — but they're unreliable for exact text/logos/product accuracy, and shouldn't be presented as real photos.",
    mistake:"Using an AI-generated image as if it were a real photo of your actual product or location.",
    tip:"Use AI images for concepts, backgrounds, and mockups — save real photos for anything claiming to show your actual product.",
    assign:"Write a 3-part image prompt (subject/style/details) for a graphic you could use in marketing.",
    dl:"Reference: AI Image Prompt Formula",
    checklist:["Subject described?","Style specified?","Details (color/mood) included?","Not presented as a real photo?"],
    ai:"Write a detailed AI image prompt (subject, style, details) for a [type of graphic] for my business."}}},

5:{ht:{lede:"Zouti videyo IA pi nouvo e pi limite pase tèks oswa imaj IA — konnen sa yo reyèlman fyab pou fè sove w tan ak desepsyon.",
   secs:[["Sa videyo IA ka reyèlman fè jodi a","Jenere ti klip oswa sèn kout soti nan yon deskripsyon tèks, kreye vizyèl anime senp soti nan yon script/imaj, ajoute vwa oswa soutit IA otomatikman sou yon filmaj ki deja egziste."],
    ["Limit aktyèl pou konnen","Sèn pi long, konplèks pi mwens fyab pase kout, senp; karaktè/figi konsistan atravè plizyè klip toujou difisil; pawòl imen realis/senk lèv ap amelyore men souvan toujou artifisyèl vizib."],
    ["Itilizasyon pratik kounye a","Tounen yon pòs ekri an yon senp videyo ak soutit, jenere vizyèl B-roll/fon kout, apèsi rapid yon konsèp videyo anvan angaje nan vrè filmaj."]],
   ex:"Ekri yon pwonp 3-pati (sèn/objektif/fòma) pou yon konsèp videyo IA kout pou biznis ou.",
   quiz:[
    {q:"Kisa videyo IA ka reyèlman fè byen jodi a?",opts:["Sèn long konplèks pafè","Ti klip kout, vizyèl anime senp, ak soutit/vwa otomatik","Ranplase tout filmaj imen nèt","Garanti yon karaktè konsistan atravè anpil klip"],ans:1,fb:"Ti klip, soutit, ak vwa otomatik se pwen fò l."},
    {q:"Ki yon limit videyo IA aktyèl?",opts:["Ajoute soutit otomatikman","Karaktè/figi konsistan atravè plizyè klip","Sèn senp kout","Tounen tèks an yon ti klip debaz"],ans:1,fb:"Karaktè konsistan atravè klip yo se yon limit."},
    {q:"Ki yon itilizasyon pratik pou videyo IA kounye a?",opts:["Ranplase tout filmaj reyèl pou tout tan","Apèsi rapid yon konsèp videyo anvan vrè filmaj","Garanti reyalis pafè","Sèlman pou fim long"],ans:1,fb:"Apèsi rapid anvan vrè filmaj se yon itilizasyon pratik."}],
   close:{learned:"Videyo IA mache byen pou ti klip kout, soutit/vwa, ak apèsi rapid konsèp — men li gen difikilte ak sèn long, konplèks, oswa karaktè konsistan.",
    mistake:"Atann videyo IA fyab pou pwodwi kontni long, konplèks, karaktè-konsistan jodi a.",
    tip:"Itilize videyo IA pou apèsi rapid yon konsèp anvan angaje tan nan vrè filmaj.",
    assign:"Ekri yon pwonp 3-pati (sèn/objektif/fòma) pou yon konsèp videyo IA kout pou biznis ou.",
    dl:"Referans: Itilizasyon Realis Videyo IA",
    checklist:["Sèn/sijè dekri?","Objektif/platfòm bay?","Fòma (rasyo, longè) spesifye?"],
    ai:"Ekri yon pwonp konsèp videyo IA kout (sèn, objektif, fòma) pou yon videyo [platfòm] pou biznis mwen."}},
 fr:{lede:"Les outils de vidéo IA sont plus récents et plus limités que le texte ou l'image IA — savoir pour quoi ils sont réellement fiables vous fait gagner du temps et évite les déceptions.",
   secs:[["Ce que la vidéo IA peut réellement faire aujourd'hui","Générer des clips courts ou des scènes à partir d'une description texte, créer des visuels animés simples à partir d'un script/image, ajouter automatiquement une voix off ou des sous-titres IA à un métrage existant."],
    ["Limitations actuelles à connaître","Les scènes plus longues et complexes sont moins fiables que les courtes et simples ; des personnages/visages cohérents à travers plusieurs clips restent difficiles ; la parole humaine réaliste/synchronisation labiale s'améliore mais reste souvent visiblement artificielle."],
    ["Utilisations pratiques actuelles","Transformer un post écrit en une simple vidéo sous-titrée, générer des visuels B-roll/arrière-plan courts, prévisualiser rapidement un concept vidéo avant de s'engager dans un vrai tournage."]],
   ex:"Écrivez un prompt en 3 parties (scène/objectif/format) pour un court concept vidéo IA pour votre entreprise.",
   quiz:[
    {q:"Que peut bien faire la vidéo IA aujourd'hui ?",opts:["Des scènes longues et complexes parfaites","Des clips courts, des visuels animés simples, et des sous-titres/voix off automatiques","Remplacer complètement tout tournage humain","Garantir un personnage cohérent sur de nombreux clips"],ans:1,fb:"Clips courts, sous-titres, et voix off automatiques sont ses points forts."},
    {q:"Quelle est une limitation actuelle de la vidéo IA ?",opts:["Ajouter des sous-titres automatiquement","Des personnages/visages cohérents à travers plusieurs clips","Des scènes simples et courtes","Transformer du texte en clip basique"],ans:1,fb:"Des personnages cohérents à travers les clips sont une limitation."},
    {q:"Quelle est une utilisation pratique de la vidéo IA en ce moment ?",opts:["Remplacer tout tournage réel pour toujours","Prévisualiser rapidement un concept vidéo avant un vrai tournage","Garantir un réalisme parfait","Seulement pour les longs métrages"],ans:1,fb:"Prévisualiser rapidement avant un vrai tournage est une utilisation pratique."}],
   close:{learned:"La vidéo IA fonctionne bien pour les clips courts, sous-titres/voix off, et aperçus rapides de concept — mais peine avec les scènes longues, complexes, ou à personnages cohérents.",
    mistake:"S'attendre à ce que la vidéo IA produise de façon fiable du contenu long, complexe, à personnages cohérents aujourd'hui.",
    tip:"Utilisez la vidéo IA pour prévisualiser rapidement un concept avant de consacrer du temps à un vrai tournage.",
    assign:"Écrivez un prompt en 3 parties (scène/objectif/format) pour un court concept vidéo IA pour votre entreprise.",
    dl:"Référence : Cas d'Usage Réalistes de la Vidéo IA",
    checklist:["Scène/sujet décrit ?","Objectif/plateforme donné ?","Format (ratio, durée) spécifié ?"],
    ai:"Écris un prompt de concept vidéo IA court (scène, objectif, format) pour une vidéo [plateforme] pour mon entreprise."}},
 en:{lede:"AI video tools are newer and more limited than AI text or images — knowing what they're actually reliable for saves you time and disappointment.",
   secs:[["What AI video can realistically do today","Generate short clips or scenes from a text description, create simple animated visuals from a script/image, add AI voiceover or captions automatically to existing footage."],
    ["Current limitations to know","Longer, complex scenes are less reliable than short simple ones; consistent characters/faces across multiple clips is still difficult; realistic human speech/lip-sync is improving but often still noticeably artificial."],
    ["Practical uses right now","Turning a written post into a simple captioned video, generating short B-roll/background visuals, quickly previewing a video concept before committing to real filming."]],
   ex:"Write a 3-part prompt (scene/purpose/format) for a short AI video concept for your business.",
   quiz:[
    {q:"What can AI video realistically do well today?",opts:["Perfect, long complex scenes","Short clips, simple animated visuals, and automatic captions/voiceover","Fully replace all human filming","Guarantee a consistent character across many clips"],ans:1,fb:"Short clips, captions, and automatic voiceover are its strengths."},
    {q:"What's a current AI video limitation?",opts:["Adding captions automatically","Consistent characters/faces across multiple clips","Short simple scenes","Turning text into a basic clip"],ans:1,fb:"Consistent characters across clips is a limitation."},
    {q:"What's a practical use for AI video right now?",opts:["Replacing all real filming forever","Quickly previewing a video concept before real filming","Guaranteeing perfect realism","Only for feature-length films"],ans:1,fb:"Quickly previewing before real filming is a practical use."}],
   close:{learned:"AI video works well for short clips, captions/voiceover, and quick concept previews — but struggles with long, complex, or character-consistent scenes.",
    mistake:"Expecting AI video to reliably produce long, complex, consistent-character content today.",
    tip:"Use AI video to quickly preview a concept before committing time to real filming.",
    assign:"Write a 3-part prompt (scene/purpose/format) for a short AI video concept for your business.",
    dl:"Reference: AI Video Realistic Use Cases",
    checklist:["Scene/subject described?","Purpose/platform given?","Format (ratio, length) specified?"],
    ai:"Write a short AI video concept prompt (scene, purpose, format) for a [platform] video for my business."}}},

/* ============ state ============ */
const NL=7,KEY="jamezzi:digital-marketing-ai:module8-sim-state";
const PROGRESS_KEY="jamezzi:digital-marketing-ai:completed";
const PROGRESS_EVENT="jamezzi:course-progress-changed";
const MOD8_LESSON_SLUGS=["meet-the-ai-chat-tool","prompt-engineering-writing-prompts-that-work","using-ai-for-research","ai-for-images","ai-for-video","ai-for-voice","building-an-ai-workflow"];
let S={lang:"ht",cur:1,done:Array(NL).fill(false),st:{}};
try{const raw=localStorage.getItem(KEY);if(raw)S=Object.assign(S,JSON.parse(raw));}catch{}
function freshChatSt(){return{exDone:false,exText:"",quizAns:Array(3).fill(null),edDone:false,msgs:[],want:"",context:"",format:""};}
function freshWfSt(){return{exDone:false,exText:"",quizAns:Array(3).fill(null),edDone:false,order:["draft","review","research","image"]};}
for(let i=1;i<=NL;i++){if(!S.st[i])S.st[i]=(i===7)?freshWfSt():freshChatSt();}
function persist(){try{localStorage.setItem(KEY,JSON.stringify(S));}catch{}}
function markModuleComplete(){
 if(!S.done.every(Boolean))return;
 try{
  const raw=localStorage.getItem(PROGRESS_KEY);
  const parsed=raw?JSON.parse(raw):[];
  const list=Array.isArray(parsed)?parsed:[];
  let changed=false;
  MOD8_LESSON_SLUGS.forEach(slug=>{if(!list.includes(slug)){list.push(slug);changed=true;}});
  if(changed){
   localStorage.setItem(PROGRESS_KEY,JSON.stringify(list));
   window.parent.dispatchEvent(new CustomEvent(PROGRESS_EVENT,{detail:{storageKey:PROGRESS_KEY}}));
  }
 }catch{}
}
function $(id){return document.getElementById(id);}

function renderMods(){
 const wrap=$("mods");wrap.innerHTML="";
 const firstLessonBySlug={1:"what-is-digital-marketing",2:"why-people-really-buy",3:"naming-your-business",4:"building-a-customer-avatar",5:"writing-headlines-that-get-read",6:"meet-the-editor",7:"why-video-works"};
 MODULES[S.lang].forEach((title,i)=>{
  const n=i+1,isActive=n===8;
  const mod=document.createElement("div");mod.className="mod"+(isActive?" active":" locked");
  const mh=document.createElement("div");mh.className="mh";
  if(firstLessonBySlug[n]){
   mh.style.cursor="pointer";
   mh.innerHTML='<div class="num">'+n+'</div><div>'+title+'</div>';
   mh.addEventListener("click",()=>{window.top.location.href="/academy/courses/digital-marketing-ai/learn/"+firstLessonBySlug[n];});
  }else{
   mh.innerHTML='<div class="num">'+n+'</div><div>'+title+(isActive?"":" 🔒")+"</div>";
  }
  mod.appendChild(mh);
  if(isActive){
   const les=document.createElement("div");les.className="les";
   M8[S.lang].forEach((lt,li)=>{
    const n2=li+1;
    const item=document.createElement("div");item.className="li"+(n2===S.cur?" cur":"")+(S.done[li]?" done":"");
    item.innerHTML='<div class="dot">✓</div><div>'+n2+". "+lt+"</div>";
    item.addEventListener("click",()=>{S.cur=n2;persist();render();});
    les.appendChild(item);
   });
   mod.appendChild(les);
  }
  wrap.appendChild(mod);
 });
}

function renderRail(){
 const st=S.st[S.cur];
 $("prog").style.width=(Math.round((S.done.filter(Boolean).length/NL)*100))+"%";
 $("progText").textContent=S.done.filter(Boolean).length+" / "+NL;
 $("lblProg").textContent=UI[S.lang].prog;$("lblObj").textContent=UI[S.lang].obj;$("aiName").textContent=UI[S.lang].ai;
 const objs=[[st.edDone,UI[S.lang].objEd],[st.exDone,UI[S.lang].objEx],[st.quizAns.every(a=>a!==null),UI[S.lang].objQuiz]];
 $("objList").innerHTML=objs.map(([done,label])=>'<div class="obj'+(done?" d":"")+'"><div class="bx">✓</div><div class="tx">'+label+"</div></div>").join("");
}

function aiSay(msg){$("aiMsg").textContent=msg;}

/* ============ chat engine (lessons 1-6) ============ */
function bubbleHTML(role,text){
 return '<div class="bub '+role+'"><div class="av2">'+(role==="ai"?"🤖":"🙂")+'</div><div class="txt">'+text+'</div></div>';
}
function renderChatLog(n){
 const st=S.st[n];
 const log=$("chatLog");if(!log)return;
 log.innerHTML=st.msgs.map(m=>bubbleHTML(m.role,m.text)).join("");
 log.scrollTop=log.scrollHeight;
}
function qualityScore(n){
 const st=S.st[n];
 return [st.want,st.context,st.format].filter(v=>v&&v.trim().length>0).length;
}
function renderQuality(n){
 const cfg=CHAT[n],lang=S.lang,score=qualityScore(n);
 const pct=Math.round(score/3*100);
 const color=score<=1?"var(--warn)":score===2?"#3B6FE0":"var(--good)";
 const label=score<=1?UI[lang].vag:score===2?UI[lang].kle:UI[lang].eksel;
 const meter=$("pqMeter");if(meter){meter.style.width=pct+"%";meter.style.background=color;}
 const lbl=$("pqLabel");if(lbl)lbl.textContent=label;
 const sendBtn=$("sendBtn");if(sendBtn)sendBtn.disabled=!(S.st[n].want&&S.st[n].want.trim().length>0);
}
function buildChatUI(n){
 const cfg=CHAT[n],st=S.st[n],lang=S.lang;
 let h='<div class="chatwrap"><div class="chatlog" id="chatLog"></div><div class="pfields">';
 ["want","context","format"].forEach(k=>{
  h+='<div class="pfrow"><label>'+cfg.fields[k][lang]+'</label><input id="pf_'+k+'" placeholder="'+cfg.ph[k][lang]+'" value="'+(st[k]||"").replace(/"/g,"&quot;")+'"></div>';
 });
 h+='<div class="pqrow"><div class="pqmeter"><span id="pqMeter"></span></div><div class="pqlabel" id="pqLabel"></div></div>';
 h+='<div class="sendrow"><button id="sendBtn">'+UI[lang].send+'</button></div>';
 h+='</div></div>';
 return h;
}
function wireChatUI(n){
 const st=S.st[n];
 ["want","context","format"].forEach(k=>{
  const inp=$("pf_"+k);
  if(inp)inp.addEventListener("input",e=>{st[k]=e.target.value;persist();renderQuality(n);});
 });
 renderChatLog(n);
 renderQuality(n);
 const sendBtn=$("sendBtn");
 if(sendBtn)sendBtn.addEventListener("click",()=>sendMessage(n));
}
function sendMessage(n){
 const cfg=CHAT[n],st=S.st[n],lang=S.lang;
 const parts=[st.want,st.context,st.format].filter(Boolean);
 const userText=parts.join(" — ");
 st.msgs.push({role:"user",text:userText});
 renderChatLog(n);
 const log=$("chatLog");
 const typingEl=document.createElement("div");typingEl.className="bub ai";
 typingEl.innerHTML='<div class="av2">🤖</div><div class="txt"><div class="typing"><span></span><span></span><span></span></div></div>';
 log.appendChild(typingEl);log.scrollTop=log.scrollHeight;
 const score=qualityScore(n);
 const reply=(score>=cfg.threshold)?cfg.strong[lang]:cfg.weak[lang];
 setTimeout(()=>{
  st.msgs.push({role:"ai",text:reply});
  if(score>=cfg.threshold&&!st.edDone){st.edDone=true;}
  persist();renderChatLog(n);renderRail();
 },850);
}

/* ============ workflow reorder engine (lesson 7) ============ */
function buildWfUI(){
 const st=S.st[7],lang=S.lang;
 let h='<div class="wfwrap">';
 st.order.forEach((id,i)=>{
  const step=WF_STEPS.find(s=>s.id===id);
  h+='<div class="wfcard"><div class="wfnum">'+(i+1)+'</div><div class="wftxt">'+step[lang]+'</div><div class="wfbtns">'+
   '<button data-dir="-1" data-id="'+id+'"'+(i===0?" disabled":"")+'>↑</button>'+
   '<button data-dir="1" data-id="'+id+'"'+(i===st.order.length-1?" disabled":"")+'>↓</button></div></div>';
 });
 h+="</div>";
 return h;
}
function wireWfUI(){
 const st=S.st[7];
 document.querySelectorAll(".wfbtns button").forEach(btn=>{
  btn.addEventListener("click",()=>{
   const id=btn.dataset.id,dir=+btn.dataset.dir;
   const idx=st.order.indexOf(id),swap=idx+dir;
   if(swap<0||swap>=st.order.length)return;
   [st.order[idx],st.order[swap]]=[st.order[swap],st.order[idx]];
   persist();checkWf();rebuildWf();
  });
 });
}
function checkWf(){
 const st=S.st[7];
 const correct=st.order[0]==="research"&&st.order[1]==="draft"&&st.order[2]==="image"&&st.order[3]==="review";
 if(correct&&!st.edDone){st.edDone=true;persist();}
 else if(!correct&&st.edDone){st.edDone=false;persist();}
 renderRail();
}
function rebuildWf(){
 const root=$("illusRoot");if(!root)return;
 root.innerHTML=buildWfUI();
 wireWfUI();
}

function render(){
 renderMods();
 const lang=S.lang,n=S.cur,d=C[n][lang],ui=UI[lang],st=S.st[n];
 $("cs").textContent=ui.cs;
 $("topTag").textContent="Modil 8 · 8."+n;
 $("topTitle").textContent=M8[lang][n-1];
 document.title="Academy · "+M8[lang][n-1];
 aiSay(d.lede);

 const stage=$("stage");
 let h='<div class="labhead"><span class="labtag">Modil 8 · 8.'+n+'</span><h2 class="labh2">'+M8[lang][n-1]+'</h2><p class="lablead">'+d.lede+"</p></div>";
 h+='<div class="secs">'+d.secs.map(s=>'<div class="sec"><h3>'+s[0]+"</h3><p>"+s[1]+"</p></div>").join("")+"</div>";
 h+='<div class="illus"><div id="illusRoot"></div></div>';
 h+='<div class="exwrap"><div class="extag">'+ui.exTag+'</div><p class="exq">'+d.ex+'</p><textarea id="exArea" placeholder="...">'+(st.exText||"")+'</textarea><div style="margin-top:10px;display:flex;align-items:center;gap:12px"><button class="btn g" id="exSaveBtn">'+ui.exBtn+'</button><span class="exsaved" id="exSaved" style="'+(st.exDone?"display:inline":"")+'">'+ui.exSaved+"</span></div></div>";

 h+='<div class="quiz"><div class="qtag">'+ui.quizTag+'</div>';
 d.quiz.forEach((q,qi)=>{
  h+='<div class="qcard"><div class="qq">'+(qi+1)+". "+q.q+'</div><div class="qopts" id="qopts'+qi+'">';
  q.opts.forEach((o,oi)=>{
   let cls="qopt";const answered=st.quizAns[qi]!==null;
   if(answered){if(oi===q.ans)cls+=" correct";else if(oi===st.quizAns[qi])cls+=" wrong";}
   h+='<button class="'+cls+'" data-qi="'+qi+'" data-oi="'+oi+'"'+(answered?" disabled":"")+">"+o+"</button>";
  });
  h+="</div>";
  if(st.quizAns[qi]!==null)h+='<div class="qfb">'+q.fb+"</div>";
  h+="</div>";
 });
 h+="</div>";

 h+='<div class="close"><div class="ctag">'+ui.closeTag+'</div>'+
  '<div class="crow"><div class="cv"><div class="ck">'+ui.cLearned+'</div>'+d.close.learned+'</div></div>'+
  '<div class="crow"><div class="cv"><div class="ck">'+ui.cMistake+'</div>'+d.close.mistake+'</div></div>'+
  '<div class="crow"><div class="cv"><div class="ck">'+ui.cTip+'</div>'+d.close.tip+'</div></div>'+
  '<div class="crow"><div class="cv"><div class="ck">'+ui.cAssign+'</div>'+d.close.assign+'</div></div>'+
  '<div class="crow"><div class="cv"><div class="ck">'+ui.cDl+'</div>'+d.close.dl+'</div></div>'+
  '<div class="crow"><div class="cv"><div class="ck">'+ui.cChecklist+'</div><ul>'+d.close.checklist.map(c=>"<li>"+c+"</li>").join("")+'</ul></div></div>'+
  '<div class="crow"><div class="cv"><div class="ck">'+ui.cAi+'</div>"'+d.close.ai+'"</div></div>'+
 "</div>";

 const canFinish=st.edDone&&st.exDone&&st.quizAns.every(a=>a!==null);
 h+='<div class="nextwrap">';
 if(!S.done[n-1]){
  h+='<button class="btn p" id="finishBtn"'+(canFinish?"":" disabled")+">"+ui.complete+"</button>";
 }else{
  h+='<span style="color:var(--good);font-weight:700;font-size:14px">'+ui.completed+"</span>";
  if(n<NL)h+='<button class="btn g" id="nextBtn">'+ui.next+"</button>";
  else h+='<button class="btn g" id="finalBtn">'+ui.stampBtn+"</button>";
 }
 h+="</div>";

 stage.innerHTML=h;stage.classList.add("fade");
 stage.scrollTop=0;

 const illusRoot=$("illusRoot");
 if(n===7){illusRoot.innerHTML=buildWfUI();wireWfUI();checkWf();}
 else{illusRoot.innerHTML=buildChatUI(n);wireChatUI(n);}

 $("exArea").addEventListener("input",e=>{st.exText=e.target.value;});
 $("exSaveBtn").addEventListener("click",()=>{
  if(st.exText&&st.exText.trim().length>0){st.exDone=true;$("exSaved").style.display="inline";persist();renderRail();}
 });
 d.quiz.forEach((q,qi)=>{
  if(st.quizAns[qi]!==null)return;
  document.querySelectorAll('#qopts'+qi+' .qopt').forEach(btn=>{
   btn.addEventListener("click",()=>{
    st.quizAns[qi]=+btn.dataset.oi;persist();render();
   });
  });
 });
 const fb=$("finishBtn");
 if(fb)fb.addEventListener("click",()=>{
  S.done[n-1]=true;persist();markModuleComplete();render();
 });
 const nb=$("nextBtn");
 if(nb)nb.addEventListener("click",()=>{S.cur=n+1;persist();render();});
 const flb=$("finalBtn");
 if(flb)flb.addEventListener("click",showStamp);
 renderRail();
}

function showStamp(){
 const ui=UI[S.lang];
 $("stage").innerHTML='<div class="stampscreen fade"><div class="stamp"><div class="si">🎟️</div></div><h2>'+ui.stampTitle+"</h2><p>"+ui.stampBody+'</p><a href="/academy/courses/digital-marketing-ai" target="_top" class="btn p" style="text-decoration:none;display:inline-block">'+ui.stampBtn+"</a></div>";
}

/* ============ chrome wiring ============ */
$("langs").addEventListener("click",e=>{
 const b=e.target.closest("button");if(!b)return;
 S.lang=b.dataset.l;persist();
 document.querySelectorAll("#langs button").forEach(x=>x.classList.toggle("on",x.dataset.l===S.lang));
 render();
});
$("resetBtn").addEventListener("click",()=>{
 if(!confirm(S.lang==="ht"?"Ou vle rekòmanse Modil 8?":S.lang==="fr"?"Voulez-vous recommencer le Module 8 ?":"Restart Module 8?"))return;
 S={lang:S.lang,cur:1,done:Array(NL).fill(false),st:{}};
 for(let i=1;i<=NL;i++)S.st[i]=(i===7)?freshWfSt():freshChatSt();
 persist();render();
});
document.querySelectorAll("#langs button").forEach(x=>x.classList.toggle("on",x.dataset.l===S.lang));
render();
</script>
</body>
</html>
