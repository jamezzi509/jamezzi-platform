.quiz{max-width:700px;margin:26px 0}

 fr:{lede:"Une page bien construite peut faire plus pour votre entreprise que de nombreux posts sur les réseaux sociaux réunis — cet outil vous permet de construire une page avec des blocs, puis de vérifier comment elle apparaît sur ordinateur et sur téléphone.",

2:{ht:{lede:"Paj dakèy (homepage) se souvan premye enpresyon yon moun genyen sou biznis ou — li bezwen di klèman ki sa ou fè, pou kiyès, ak ki pwochen etap pou pran, tout san moun pa oblije chèche.",
   secs:[["Blòk Ero a se kle","Tit prensipal ki di klèman valè ou ofri, yon souti ki ajoute detay, ak yon bouton CTA ki mennen a pwochen etap la — twa pati sa yo tout parèt anvan menm moun eskane pi ba."],

 fr:{lede:"La page d'accueil est souvent la première impression qu'une personne a de votre entreprise — elle doit dire clairement ce que vous faites, pour qui, et quelle prochaine étape prendre, sans que personne n'ait à chercher.",
   secs:[["Le bloc Héros est la clé","Un titre principal qui dit clairement la valeur que vous offrez, un sous-titre qui ajoute des détails, et un bouton CTA qui mène à la prochaine étape — ces 3 parties apparaissent toutes avant même que quelqu'un ne fasse défiler plus bas."],
    ["La clarté bat l'intelligence","Un titre qui essaie d'être très intelligent ou vague confond souvent les visiteurs — un titre clair qui dit exactement ce que vous offrez fonctionne toujours mieux."]],
   ex:"Écrivez un titre héros pour votre entreprise qui dit clairement quelle valeur vous offrez.",
   quiz:[
    {q:"Quel est le bloc le plus important sur une page d'accueil ?",opts:["Le pied de page","Le bloc Héros (titre, sous-titre, CTA)","Une liste de prix","Un calendrier"],ans:1,fb:"Le bloc Héros est le plus important."},
    {q:"Que devrait faire un titre héros ?",opts:["Devenir très intelligent et vague","Dire clairement quelle valeur vous offrez","Cacher l'information","Utiliser seulement du jargon technique"],ans:1,fb:"Un bon titre dit clairement la valeur."},
    {q:"Pourquoi les 3 parties du Héros (titre, sous-titre, CTA) sont-elles importantes ?",opts:["Elles ne sont pas nécessaires","Elles apparaissent avant tout le reste, donc doivent être claires immédiatement","Seul le CTA compte","Le sous-titre n'a aucun rôle"],ans:1,fb:"Elles apparaissent avant tout, doivent être claires immédiatement."}],
   close:{learned:"Le bloc Héros (titre, sous-titre, CTA) est la partie la plus importante d'une page d'accueil — il doit être clair immédiatement, sans que les gens aient à faire défiler pour comprendre ce que vous offrez.",
    mistake:"Écrire un titre héros vague ou « intelligent » qui ne dit pas clairement ce que votre entreprise offre, ce qui confond les visiteurs au lieu de les informer.",
    tip:"Un titre clair qui dit exactement ce que vous offrez bat toujours un titre intelligent mais vague.",
    assign:"Écrivez un titre héros pour votre entreprise qui dit clairement quelle valeur vous offrez.",
    dl:"Fiche de travail : Structure du Bloc Héros",
    checklist:["Titre principal écrit (au moins 10 caractères) ?","Sous-titre écrit (au moins 10 caractères) ?","Texte du bouton écrit ?"],
    ai:"Écris un titre héros, un sous-titre, et un texte de bouton pour un(e) [type d'entreprise]."}},
 en:{lede:"The homepage is often someone's first impression of your business — it needs to clearly say what you do, for whom, and what next step to take, all without anyone having to hunt for it.",
   secs:[["The Hero block is key","A headline that clearly states the value you offer, a subheadline that adds detail, and a CTA button that leads to the next step — all 3 parts appear before someone even scrolls further."],
    ["Clear beats clever","A headline that tries to be very clever or vague often confuses visitors — a clear headline that says exactly what you offer always works better."]],
   ex:"Write a hero headline for your business that clearly states the value you offer.",
   quiz:[
    {q:"What's the most important block on a homepage?",opts:["The footer","The Hero block (headline, subheadline, CTA)","A price list","A calendar"],ans:1,fb:"The Hero block is the most important."},
    {q:"What should a hero headline do?",opts:["Become very clever and vague","Clearly state the value you offer","Hide the information","Only use technical jargon"],ans:1,fb:"A good headline clearly states the value."},
    {q:"Why do the Hero's 3 parts (headline, subheadline, CTA) matter?",opts:["They aren't necessary","They appear before everything else, so must be clear immediately","Only the CTA matters","The subheadline has no role"],ans:1,fb:"They appear before everything else, must be clear immediately."}],
   close:{learned:"The Hero block (headline, subheadline, CTA) is the most important part of a homepage — it must be clear immediately, without people needing to scroll to understand what you offer.",
    mistake:"Writing a vague or \"clever\" hero headline that doesn't clearly state what your business offers, which confuses visitors instead of informing them.",
    tip:"A clear headline that says exactly what you offer always beats a clever but vague one.",
    assign:"Write a hero headline for your business that clearly states the value you offer.",
    dl:"Worksheet: Hero Block Structure",
    checklist:["Headline written (at least 10 characters)?","Subheadline written (at least 10 characters)?","Button text written?"],
    ai:"Write a hero headline, subheadline, and button text for a [type of business]."}}},

3:{ht:{lede:"Yon paj aterisaj (landing page) diferan de yon paj dakèy — li gen yon sèl objektif, e li retire distraksyon (tankou meni navigasyon) ki ta ka fè yon vizitè kite paj la san pran aksyon.",
   secs:[["Yon sèl objektif, pa plizyè","Yon paj aterisaj efikas mennen vizitè a vè yon sèl aksyon (enskri, achte, telechaje) — pa ofri 10 lyen diferan ki ka mennen yo lòt kote."],
    ["Retire meni navigasyon an","Kontrèman ak yon paj dakèy nòmal, yon paj aterisaj souvan retire meni navigasyon an nèt — chak lyen siplemantè se yon fason pou vizitè a chape san fè aksyon prensipal la."]],
   ex:"Ki lyen ou ta tante mete sou yon paj aterisaj ki ta ka detounen atansyon vizitè a?",
   quiz:[
    {q:"Kisa ki diferan yon paj aterisaj de yon paj dakèy?",opts:["Yo idantik","Yon paj aterisaj gen yon sèl objektif e retire distraksyon","Paj aterisaj toujou pi long","Paj aterisaj pa bezwen yon CTA"],ans:1,fb:"Yon paj aterisaj gen yon sèl objektif klè."},
    {q:"Poukisa retire meni navigasyon an sou yon paj aterisaj?",opts:["Li pa fè okenn diferans","Chak lyen siplemantè se yon fason pou vizitè chape san aksyon","Meni navigasyon toujou obligatwa","Sa fè paj la pi bèl sèlman"],ans:1,fb:"Chak lyen se yon fason pou chape san fè aksyon."},
    {q:"Konbyen objektif yon bon paj aterisaj ta dwe genyen?",opts:["Otan posib","Yon sèl objektif klè","Zewo objektif","Yon objektif diferan pou chak vizitè"],ans:1,fb:"Yon sèl objektif klè se pi bon."}],

    mistake:"Ajoute yon meni navigasyon konplè sou yon paj aterisaj 'pou li sanble pwofesyonèl,' san reyalize sa bay vizitè yo plis fason pou chape.",
    tip:"Si yon lyen pa mennen dirèkteman a objektif prensipal paj la, konsidere retire l nèt.",
    assign:"Ki lyen ou ta tante mete sou yon paj aterisaj ki ta ka detounen atansyon vizitè a?",

    checklist:["Blòk Ero prezan?","Blòk Fòm oswa CTA prezan?","Okenn blòk Meni Navigasyon prezan?"],
    ai:"Eksplike poukisa yon paj aterisaj pou yon [kalite biznis] ta dwe retire meni navigasyon an."}},
 fr:{lede:"Une page d'atterrissage (landing page) diffère d'une page d'accueil — elle a un seul objectif, et elle retire les distractions (comme un menu de navigation) qui pourraient faire quitter un visiteur sans agir.",
   secs:[["Un seul objectif, pas plusieurs","Une page d'atterrissage efficace mène le visiteur vers une seule action (s'inscrire, acheter, télécharger) — pas offrir 10 liens différents qui pourraient le mener ailleurs."],
    ["Retirer le menu de navigation","Contrairement à une page d'accueil normale, une page d'atterrissage retire souvent entièrement le menu de navigation — chaque lien supplémentaire est une façon pour le visiteur de s'échapper sans faire l'action principale."]],
   ex:"Quel lien seriez-vous tenté de mettre sur une page d'atterrissage qui pourrait détourner l'attention du visiteur ?",
   quiz:[
    {q:"Qu'est-ce qui différencie une page d'atterrissage d'une page d'accueil ?",opts:["Elles sont identiques","Une page d'atterrissage a un seul objectif et retire les distractions","Les pages d'atterrissage sont toujours plus longues","Les pages d'atterrissage n'ont pas besoin de CTA"],ans:1,fb:"Une page d'atterrissage a un seul objectif clair."},
    {q:"Pourquoi retirer le menu de navigation sur une page d'atterrissage ?",opts:["Ça ne fait aucune différence","Chaque lien supplémentaire est une façon de s'échapper sans agir","Le menu de navigation est toujours obligatoire","Ça rend juste la page plus belle"],ans:1,fb:"Chaque lien est une façon de s'échapper sans agir."},
    {q:"Combien d'objectifs une bonne page d'atterrissage devrait-elle avoir ?",opts:["Autant que possible","Un seul objectif clair","Zéro objectif","Un objectif différent pour chaque visiteur"],ans:1,fb:"Un seul objectif clair est le meilleur."}],
   close:{learned:"Une page d'atterrissage a un seul objectif et retire les distractions (comme un menu de navigation) qui pourraient faire quitter les visiteurs sans faire l'action principale.",
    mistake:"Ajouter un menu de navigation complet sur une page d'atterrissage « pour qu'elle paraisse professionnelle », sans réaliser que ça donne aux visiteurs plus de façons de s'échapper.",
    tip:"Si un lien ne mène pas directement à l'objectif principal de la page, envisagez de le retirer entièrement.",
    assign:"Quel lien seriez-vous tenté de mettre sur une page d'atterrissage qui pourrait détourner l'attention du visiteur ?",
    dl:"Liste de Vérification : Conception de Page d'Atterrissage",
    checklist:["Bloc Héros présent ?","Bloc Formulaire ou CTA présent ?","Aucun bloc Menu de Navigation présent ?"],
    ai:"Explique pourquoi une page d'atterrissage pour un(e) [type d'entreprise] devrait retirer le menu de navigation."}},
 en:{lede:"A landing page differs from a homepage — it has one single goal, and it removes distractions (like a navigation menu) that could make a visitor leave without taking action.",
   secs:[["One goal, not several","An effective landing page leads the visitor toward one single action (sign up, buy, download) — not offering 10 different links that could lead them elsewhere."],
    ["Removing the nav menu","Unlike a normal homepage, a landing page often removes the navigation menu entirely — every extra link is a way for the visitor to escape without taking the main action."]],
   ex:"What link would you be tempted to put on a landing page that could distract the visitor's attention?",
   quiz:[
    {q:"What makes a landing page different from a homepage?",opts:["They're identical","A landing page has one goal and removes distractions","Landing pages are always longer","Landing pages don't need a CTA"],ans:1,fb:"A landing page has one clear goal."},
    {q:"Why remove the nav menu on a landing page?",opts:["It makes no difference","Every extra link is a way to escape without acting","The nav menu is always required","It just makes the page prettier"],ans:1,fb:"Every link is a way to escape without acting."},
    {q:"How many goals should a good landing page have?",opts:["As many as possible","One clear goal","Zero goals","A different goal for each visitor"],ans:1,fb:"One clear goal is best."}],
   close:{learned:"A landing page has one single goal and removes distractions (like a nav menu) that could make visitors leave without taking the main action.",
    mistake:"Adding a full navigation menu to a landing page \"to make it look professional,\" without realizing it gives visitors more ways to escape.",
    tip:"If a link doesn't lead directly to the page's main goal, consider removing it entirely.",
    assign:"What link would you be tempted to put on a landing page that could distract the visitor's attention?",
    dl:"Checklist: Landing Page Design",
    checklist:["Hero block present?","Form or CTA block present?","No Nav Menu block present?"],
    ai:"Explain why a landing page for a [type of business] should remove the navigation menu."}}},

4:{ht:{lede:"Menm bèl konsepsyon paj pa konvèti san yon bouton CTA ki klè e ki fè aksyon parèt evidan — konbine yon apèl a aksyon espesifik ak prèv sosyal (temwayaj) bati konfyans anvan yon moun aji.",
   secs:[["Yon CTA espesifik, pa jenerik","Yon bouton ki di 'Voye' oswa 'Klike Isit' pa di anyen sou sa k ap pase apre — yon bouton ki di 'Kòmanse Esè Gratis Ou' oswa 'Rezève Plas Ou' klè sou pwochen etap la (sonje Modil 5)."],
    ["Prèv sosyal bati konfyans","Yon temwayaj vrè kliyan bò kote CTA a bay yon vizitè rezon pou fè konfyans anvan yo aji — sa se sikoloji vant (Modil 2) aplike dirèkteman sou paj la."]],
   ex:"Ekri 2 tèks CTA — youn jenerik ('Voye'), youn espesifik. Ki diferans lan fè pou yon vizitè?",
   quiz:[
    {q:"Poukisa yon bouton 'Klike Isit' pa efikas?",opts:["Li toujou pi efikas","Li pa di anyen sou sa k ap pase apre klike a","Tout bouton dwe di 'Klike Isit'","Bouton pa afekte konvèsyon"],ans:1,fb:"Li pa klè sou pwochen etap la."},
    {q:"Kisa yon temwayaj fè sou yon paj?",opts:["Anyen espesyal","Bay yon vizitè rezon pou fè konfyans anvan yo aji","Ranplase bezwen pou yon CTA","Fè paj la pi long san rezon"],ans:1,fb:"Li bati konfyans anvan aksyon."},
    {q:"Ki modil ki kouvri sikoloji dèyè prèv sosyal?",opts:["Modil 1","Modil 2","Modil 6","Modil 9"],ans:1,fb:"Modil 2 kouvri sikoloji vant, ki gen ladan prèv sosyal."}],
   close:{learned:"Yon CTA espesifik (pa jenerik) ansanm ak yon temwayaj vrè kliyan konbine yon pwochen etap klè ak konfyans, ki ansanm ede konvèsyon.",
    mistake:"Kite bouton yo di sèlman 'Submit' oswa 'Click Here,' ki pa bay vizitè a okenn rezon espesifik pou klike kounye a.",
    tip:"Yon bon CTA souvan mansyone benefis la dirèkteman (tankou 'Kòmanse Ekonomize Kounye a' olye 'Voye').",
    assign:"Ekri 2 tèks CTA — youn jenerik ('Voye'), youn espesifik. Ki diferans lan fè pou yon vizitè?",
    dl:"Fèy Travay: CTA Espesifik kont Jenerik",
    checklist:["Tèks bouton Ero a espesifik (pa 'Submit'/'Click Here')?","Blòk Temwayaj ajoute?"],
    ai:"Ekri 3 tèks CTA espesifik (pa jenerik) pou yon paj [pwodwi/sèvis]."}},
 fr:{lede:"Même une belle conception de page ne convertit pas sans un bouton CTA clair qui rend l'action évidente — combiner un appel à l'action spécifique avec une preuve sociale (témoignage) bâtit la confiance avant qu'une personne n'agisse.",
   secs:[["Un CTA spécifique, pas générique","Un bouton qui dit « Envoyer » ou « Cliquez Ici » ne dit rien sur ce qui se passe après — un bouton qui dit « Commencer Votre Essai Gratuit » ou « Réserver Votre Place » est clair sur la prochaine étape (souvenez-vous du Module 5)."],
    ["La preuve sociale bâtit la confiance","Un témoignage d'un vrai client à côté du CTA donne au visiteur une raison de faire confiance avant d'agir — c'est la psychologie de la vente (Module 2) appliquée directement sur la page."]],
   ex:"Écrivez 2 textes de CTA — un générique (« Envoyer »), un spécifique. Quelle différence ça fait pour un visiteur ?",
   quiz:[
    {q:"Pourquoi un bouton « Cliquez Ici » n'est-il pas efficace ?",opts:["Il est toujour plus efficace","Il ne dit rien sur ce qui se passe après avoir cliqué","Tous les boutons devraient dire « Cliquez Ici »","Les boutons n'affectent pas la conversion"],ans:1,fb:"Il n'est pas clair sur la prochaine étape."},
    {q:"Que fait un témoignage sur une page ?",opts:["Rien de spécial","Donne au visiteur une raison de faire confiance avant d'agir","Remplace le besoin d'un CTA","Rend la page plus longue sans raison"],ans:1,fb:"Il bâtit la confiance avant l'action."},
    {q:"Quel module couvre la psychologie derrière la preuve sociale ?",opts:["Module 1","Module 2","Module 6","Module 9"],ans:1,fb:"Le Module 2 couvre la psychologie de la vente, incluant la preuve sociale."}],
   close:{learned:"Un CTA spécifique (pas générique) associé à un témoignage d'un vrai client combine une prochaine étape claire avec de la confiance, ce qui aide ensemble la conversion.",
    mistake:"Laisser les boutons dire seulement « Envoyer » ou « Cliquez Ici », ce qui ne donne au visiteur aucune raison spécifique de cliquer maintenant.",
    tip:"Un bon CTA mentionne souvent le bénéfice directement (comme « Commencez à Économiser Maintenant » plutôt que « Envoyer »).",
    assign:"Écrivez 2 textes de CTA — un générique (« Envoyer »), un spécifique. Quelle différence ça fait pour un visiteur ?",
    dl:"Fiche de travail : CTA Spécifique vs. Générique",

const NL=7,KEY="jamezzi:digital-marketing-ai:module14-sim-state";
const PROGRESS_KEY="jamezzi:digital-marketing-ai:completed";
const PROGRESS_EVENT="jamezzi:course-progress-changed";
const MOD14_LESSON_SLUGS=["meet-the-page-builder","homepage-essentials","landing-pages","writing-for-conversion","forms-that-convert","page-speed-basics","mobile-optimization"];
const BLOCK_FIELDS={
 hero:["headline","subheadline","button"],
 section:["heading","text"],
 image:["alt"],
 form:["headline","button"],
 testimonial:["quote","author"],
 cta:["button"],
 nav:[]};
function newBlock(type){
 const b={id:"b"+Date.now()+Math.random().toString(36).slice(2,6),type};
 BLOCK_FIELDS[type].forEach(f=>{b[f]="";});
 return b;
}
function freshPage(){
 return {blocks:[],previewMode:"desktop",previewVisited:{desktop:true,mobile:false},mobileChecked:false};
}
let S={lang:"ht",cur:1,done:Array(NL).fill(false),st:{},page:freshPage()};
try{const raw=localStorage.getItem(KEY);if(raw)S=Object.assign(S,JSON.parse(raw));}catch{}
if(!S.page)S.page=freshPage();
for(let i=1;i<=NL;i++){if(!S.st[i])S.st[i]={exDone:false,exText:"",quizAns:Array(3).fill(null),edDone:false};}
function persist(){try{localStorage.setItem(KEY,JSON.stringify(S));}catch{}}
function markModuleComplete(){
 if(!S.done.every(Boolean))return;
 try{
  const raw=localStorage.getItem(PROGRESS_KEY);
  const parsed=raw?JSON.parse(raw):[];
  const list=Array.isArray(parsed)?parsed:[];
  let changed=false;
  MOD14_LESSON_SLUGS.forEach(slug=>{if(!list.includes(slug)){list.push(slug);changed=true;}});
  if(changed){
   localStorage.setItem(PROGRESS_KEY,JSON.stringify(list));
   window.parent.dispatchEvent(new CustomEvent(PROGRESS_EVENT,{detail:{storageKey:PROGRESS_KEY}}));
  }
 }catch{}
}

function renderMods(){
 const wrap=$("mods");wrap.innerHTML="";
 const firstLessonBySlug={1:"what-is-digital-marketing",2:"why-people-really-buy",3:"naming-your-business",4:"building-a-customer-avatar",5:"writing-headlines-that-get-read",6:"meet-the-editor",7:"why-video-works",8:"meet-the-ai-chat-tool",9:"facebook-strategy",10:"what-are-content-pillars",11:"how-google-search-actually-works",12:"meet-your-business-profile",13:"meet-the-email-marketing-tool",15:"meet-the-ads-manager"};
 MODULES[S.lang].forEach((title,i)=>{
  const n=i+1,isActive=n===14;
  const mod=document.createElement("div");mod.className="mod"+(isActive?" active":" locked");
  const mh=document.createElement("div");mh.className="mh";
  if(firstLessonBySlug[n]){
   mh.style.cursor="pointer";
   mh.innerHTML='<div class="num">'+n+'</div><div>'+title+'</div>';
   mh.addEventListener("click",()=>{window.top.location.href="/academy/courses/digital-marketing-ai/learn/"+firstLessonBySlug[n];});
  }else{
   mh.innerHTML='<div class="num">'+n+'</div><div>'+title+(isActive?"":" 🔒")+"</div>";
  }
  mod.appendChild(mh);
  if(isActive){
   const les=document.createElement("div");les.className="les";
   M14[S.lang].forEach((lt,li)=>{
    const n2=li+1;
    const item=document.createElement("div");item.className="li"+(n2===S.cur?" cur":"")+(S.done[li]?" done":"");
    item.innerHTML='<div class="dot">✓</div><div>'+n2+". "+lt+"</div>";
    item.addEventListener("click",()=>{S.cur=n2;persist();render();});
    les.appendChild(item);
   });
   mod.appendChild(les);
  }
  wrap.appendChild(mod);
 });
}

function renderRail(){
 const st=S.st[S.cur];
 $("prog").style.width=(Math.round((S.done.filter(Boolean).length/NL)*100))+"%";
 $("progText").textContent=S.done.filter(Boolean).length+" / "+NL;
 $("lblProg").textContent=UI[S.lang].prog;$("lblObj").textContent=UI[S.lang].obj;$("aiName").textContent=UI[S.lang].ai;
 const objs=[[st.edDone,UI[S.lang].objEd],[st.exDone,UI[S.lang].objEx],[st.quizAns.every(a=>a!==null),UI[S.lang].objQuiz]];
 $("objList").innerHTML=objs.map(([done,label])=>'<div class="obj'+(done?" d":"")+'"><div class="bx">✓</div><div class="tx">'+label+"</div></div>").join("");
}

function aiSay(msg){$("aiMsg").textContent=msg;}

/* ============ page builder engine ============ */
function checkTask(n){
 const st=S.st[n];
 const done=C[n].check(S.page);
 if(done&&!st.edDone){st.edDone=true;persist();}
 else if(!done&&st.edDone){st.edDone=false;persist();}
 return done;
}
function speedScore(p){
 const imgCount=p.blocks.filter(b=>b.type==="image").length;
 return Math.max(0,100-imgCount*20);
}
function renderToolPanel(){
 const lang=S.lang,ui=UI[lang],p=S.page;
 let h='<div class="pgwrap"><div class="pgtoolbar"><div class="pgdevice">'+
  '<button data-dev="desktop" class="'+(p.previewMode==="desktop"?"on":"")+'">'+ui.devDesktop+'</button>'+
  '<button data-dev="mobile" class="'+(p.previewMode==="mobile"?"on":"")+'">'+ui.devMobile+"</button></div>";
 if(p.previewMode==="mobile"){
  h+='<button class="pgverify'+(p.mobileChecked?" done":"")+'" id="pgVerify"'+(p.mobileChecked?" disabled":"")+'>'+(p.mobileChecked?ui.verified:ui.verifyMobile)+"</button>";
 }
 h+='</div><div class="pgcanvaswrap"><div class="pgcanvas" style="max-width:'+(p.previewMode==="mobile"?"340px":"100%")+'" id="pgCanvas">';
 p.blocks.forEach((b,i)=>{
  const typeLbl=ui["blk"+b.type.charAt(0).toUpperCase()+b.type.slice(1)];
  h+='<div class="pgblock"><div class="pgblockhead"><span class="pgblocktype">'+typeLbl+'</span><div class="pgblockbtns">'+
   '<button data-mv="up" data-i="'+i+'"'+(i===0?" disabled":"")+">↑</button>"+
   '<button data-mv="down" data-i="'+i+'"'+(i===p.blocks.length-1?" disabled":"")+">↓</button>"+
   '<button data-rmv="'+i+'">'+ui.remove+"</button></div></div>";
  if(b.type==="nav"){
   h+='<div class="pgnavlabel">'+ui.navPlaceholder+"</div>";
  }else{
   BLOCK_FIELDS[b.type].forEach(f=>{
    const lblKey="f"+f.charAt(0).toUpperCase()+f.slice(1);
    const isLong=f==="text"||f==="quote";
    h+='<div style="font-size:10.5px;color:#9ca3af;margin-bottom:2px">'+ui[lblKey]+"</div>";
    h+=isLong?'<textarea class="pgfield" data-i="'+i+'" data-f="'+f+'" rows="2">'+(b[f]||"")+"</textarea>":
     '<input class="pgfield" data-i="'+i+'" data-f="'+f+'" value="'+(b[f]||"").replace(/"/g,"&quot;")+'"/>';
   });
  }
  h+="</div>";
 });
 h+="</div></div>";
 h+='<div class="pgpalette">'+
  '<button data-add="hero">'+ui.addHero+"</button>"+
  '<button data-add="section">'+ui.addSection+"</button>"+
  '<button data-add="image">'+ui.addImage+"</button>"+
  '<button data-add="form">'+ui.addForm+"</button>"+
  '<button data-add="testimonial">'+ui.addTestimonial+"</button>"+
  '<button data-add="cta">'+ui.addCta+"</button>"+
  '<button data-add="nav">'+ui.addNav+"</button></div>";
 const score=speedScore(p);
 const color=score>=60?"var(--good)":score>=30?"var(--warn)":"var(--danger)";
 h+='<div class="pgspeed"><span class="pgspeedtext">'+ui.speedLbl+"</span><div class=\"pgspeedbar\"><span style=\"width:"+score+"%;background:"+color+'"></span></div><span class="pgspeedtext">'+score+"/100</span></div>";
 h+="</div>";
 return h;
}
function wireToolPanel(){
 const box=$("pgRoot");if(!box)return;
 document.querySelectorAll("[data-dev]").forEach(bt=>bt.addEventListener("click",()=>{
  S.page.previewMode=bt.dataset.dev;S.page.previewVisited[bt.dataset.dev]=true;persist();checkTask(S.cur);renderRail();refreshTool();
 }));
 const vb=$("pgVerify");
 if(vb)vb.addEventListener("click",()=>{
  S.page.mobileChecked=true;persist();checkTask(S.cur);renderRail();refreshTool();
 });
 document.querySelectorAll(".pgfield").forEach(el=>el.addEventListener("input",e=>{
  const i=+e.target.dataset.i,f=e.target.dataset.f;
  S.page.blocks[i][f]=e.target.value;persist();checkTask(S.cur);renderRail();
 }));
 document.querySelectorAll("[data-mv]").forEach(bt=>bt.addEventListener("click",()=>{
  const i=+bt.dataset.i,dir=bt.dataset.mv,blocks=S.page.blocks;
  const j=dir==="up"?i-1:i+1;
  if(j<0||j>=blocks.length)return;
  [blocks[i],blocks[j]]=[blocks[j],blocks[i]];
  persist();checkTask(S.cur);renderRail();refreshTool();
 }));
 document.querySelectorAll("[data-rmv]").forEach(bt=>bt.addEventListener("click",()=>{
  S.page.blocks.splice(+bt.dataset.rmv,1);persist();checkTask(S.cur);renderRail();refreshTool();
 }));
 document.querySelectorAll("[data-add]").forEach(bt=>bt.addEventListener("click",()=>{
  S.page.blocks.push(newBlock(bt.dataset.add));persist();checkTask(S.cur);renderRail();refreshTool();
 }));
}
function refreshTool(){
 const root=$("pgRoot");if(!root)return;
 root.innerHTML=renderToolPanel();
 wireToolPanel();
}

function render(){
 renderMods();
 const lang=S.lang,n=S.cur,d=C[n][lang],ui=UI[lang],st=S.st[n];
 $("cs").textContent=ui.cs;
 $("topTag").textContent="Modil 14 · 14."+n;
 $("topTitle").textContent=M14[lang][n-1];
 document.title="Academy · "+M14[lang][n-1];
 aiSay(d.lede);

 const stage=$("stage");
 let h='<div class="labhead"><span class="labtag">Modil 14 · 14.'+n+'</span><h2 class="labh2">'+M14[lang][n-1]+'</h2><p class="lablead">'+d.lede+"</p></div>";
 h+='<div class="secs">'+d.secs.map(s=>'<div class="sec"><h3>'+s[0]+"</h3><p>"+s[1]+"</p></div>").join("")+"</div>";
 h+='<div class="illus"><div id="pgRoot"></div><div class="pgtask"><b>'+ui.objEd+':</b> '+C[n].task[lang]+"</div></div>";
 h+='<div class="exwrap"><div class="extag">'+ui.exTag+'</div><p class="exq">'+d.ex+'</p><textarea id="exArea" placeholder="...">'+(st.exText||"")+'</textarea><div style="margin-top:10px;display:flex;align-items:center;gap:12px"><button class="btn g" id="exSaveBtn">'+ui.exBtn+'</button><span class="exsaved" id="exSaved" style="'+(st.exDone?"display:inline":"")+'">'+ui.exSaved+"</span></div></div>";

 h+='<div class="quiz"><div class="qtag">'+ui.quizTag+'</div>';
 d.quiz.forEach((q,qi)=>{
  h+='<div class="qcard"><div class="qq">'+(qi+1)+". "+q.q+'</div><div class="qopts" id="qopts'+qi+'">';
  q.opts.forEach((o,oi)=>{
   let cls="qopt";const answered=st.quizAns[qi]!==null;
   if(answered){if(oi===q.ans)cls+=" correct";else if(oi===st.quizAns[qi])cls+=" wrong";}
   h+='<button class="'+cls+'" data-qi="'+qi+'" data-oi="'+oi+'"'+(answered?" disabled":"")+">"+o+"</button>";
  });
  h+="</div>";
  if(st.quizAns[qi]!==null)h+='<div class="qfb">'+q.fb+"</div>";
  h+="</div>";
 });
 h+="</div>";

 h+='<div class="close"><div class="ctag">'+ui.closeTag+'</div>'+
  '<div class="crow"><div class="cv"><div class="ck">'+ui.cLearned+'</div>'+d.close.learned+'</div></div>'+
  '<div class="crow"><div class="cv"><div class="ck">'+ui.cMistake+'</div>'+d.close.mistake+'</div></div>'+
  '<div class="crow"><div class="cv"><div class="ck">'+ui.cTip+'</div>'+d.close.tip+'</div></div>'+
  '<div class="crow"><div class="cv"><div class="ck">'+ui.cAssign+'</div>'+d.close.assign+'</div></div>'+
  '<div class="crow"><div class="cv"><div class="ck">'+ui.cDl+'</div>'+d.close.dl+'</div></div>'+
  '<div class="crow"><div class="cv"><div class="ck">'+ui.cChecklist+'</div><ul>'+d.close.checklist.map(c=>"<li>"+c+"</li>").join("")+'</ul></div></div>'+
  '<div class="crow"><div class="cv"><div class="ck">'+ui.cAi+'</div>"'+d.close.ai+'"</div></div>'+
 "</div>";

 checkTask(n);
 const canFinish=st.edDone&&st.exDone&&st.quizAns.every(a=>a!==null);
 h+='<div class="nextwrap">';
 if(!S.done[n-1]){
  h+='<button class="btn p" id="finishBtn"'+(canFinish?"":" disabled")+">"+ui.complete+"</button>";
 }else{
  h+='<span style="color:var(--good);font-weight:700;font-size:14px">'+ui.completed+"</span>";
  if(n<NL)h+='<button class="btn g" id="nextBtn">'+ui.next+"</button>";
  else h+='<button class="btn g" id="finalBtn">'+ui.stampBtn+"</button>";
 }
 h+="</div>";

 stage.innerHTML=h;stage.classList.add("fade");
 stage.scrollTop=0;

 const root=$("pgRoot");
 root.innerHTML=renderToolPanel();wireToolPanel();

 $("exArea").addEventListener("input",e=>{st.exText=e.target.value;});
 $("exSaveBtn").addEventListener("click",()=>{
  if(st.exText&&st.exText.trim().length>0){st.exDone=true;$("exSaved").style.display="inline";persist();renderRail();updateFinishBtn();}
 });
 d.quiz.forEach((q,qi)=>{
  if(st.quizAns[qi]!==null)return;
  document.querySelectorAll('#qopts'+qi+' .qopt').forEach(btn=>{
   btn.addEventListener("click",()=>{
    st.quizAns[qi]=+btn.dataset.oi;persist();render();
   });
  });
 });
 const fb=$("finishBtn");
 if(fb)fb.addEventListener("click",()=>{
  S.done[n-1]=true;persist();markModuleComplete();render();
 });
 const nb=$("nextBtn");
 if(nb)nb.addEventListener("click",()=>{S.cur=n+1;persist();render();});
 const flb=$("finalBtn");
 if(flb)flb.addEventListener("click",showStamp);
 renderRail();
}
function updateFinishBtn(){
 const st=S.st[S.cur];
 const fb=$("finishBtn");
 if(fb)fb.disabled=!(st.edDone&&st.exDone&&st.quizAns.every(a=>a!==null));
}

function showStamp(){
 const ui=UI[S.lang];
 $("stage").innerHTML='<div class="stampscreen fade"><div class="stamp"><div class="si">🎟️</div></div><h2>'+ui.stampTitle+"</h2><p>"+ui.stampBody+'</p><a href="/academy/courses/digital-marketing-ai/learn/meet-the-ads-manager" target="_top" class="btn p" style="text-decoration:none;display:inline-block">'+ui.stampBtn+"</a></div>";
}

/* ============ per-lesson tasks & checks ============ */
const GENERIC_BTN=["submit","click here","voye","klike isit","envoyer","cliquez ici"];
C[1].task={ht:"Ajoute omwen 1 blòk epi verifye tou de apèsi yo (Òdinatè ak Mobil).",fr:"Ajoutez au moins 1 bloc et vérifiez les deux aperçus (Bureau et Mobile).",en:"Add at least 1 block and check both previews (Desktop and Mobile)."};
C[1].check=p=>p.blocks.length>=1&&p.previewVisited.desktop&&p.previewVisited.mobile;
C[2].task={ht:"Bati blòk Ero ou ak yon tit (omwen 10 karaktè), yon souti (omwen 10 karaktè), ak yon tèks bouton.",fr:"Construisez votre bloc Héros avec un titre (au moins 10 caractères), un sous-titre (au moins 10 caractères), et un texte de bouton.",en:"Build your Hero block with a headline (at least 10 characters), a subheadline (at least 10 characters), and button text."};
C[2].check=p=>{const h=p.blocks.find(b=>b.type==="hero");return !!(h&&h.headline.trim().length>=10&&h.subheadline.trim().length>=10&&h.button.trim());};
C[3].task={ht:"Bati yon paj ak yon blòk Ero ak omwen yon blòk Fòm oswa CTA — men SAN okenn blòk Meni Navigasyon.",fr:"Construisez une page avec un bloc Héros et au moins un bloc Formulaire ou CTA — mais SANS aucun bloc Menu de Navigation.",en:"Build a page with a Hero block and at least a Form or CTA block — but with NO Nav Menu block."};
C[3].check=p=>p.blocks.some(b=>b.type==="hero")&&p.blocks.some(b=>b.type==="form"||b.type==="cta")&&!p.blocks.some(b=>b.type==="nav");
C[4].task={ht:"Chanje tèks bouton Ero a pou li espesifik (pa 'Submit' oswa 'Click Here'), epi ajoute yon blòk Temwayaj.",fr:"Changez le texte du bouton Héros pour qu'il soit spécifique (pas « Envoyer » ou « Cliquez Ici »), et ajoutez un bloc Témoignage.",en:"Change the Hero button text to be specific (not \"Submit\" or \"Click Here\"), and add a Testimonial block."};
C[4].check=p=>{const h=p.blocks.find(b=>b.type==="hero");if(!h)return false;const bt=h.button.trim().toLowerCase();return !!(h.button.trim()&&!GENERIC_BTN.includes(bt))&&p.blocks.some(b=>b.type==="testimonial");};
C[5].task={ht:"Asire yon blòk Fòm oswa CTA parèt nan 3 premye blòk paj la (deplase l si nesesè).",fr:"Assurez-vous qu'un bloc Formulaire ou CTA apparaît dans les 3 premiers blocs de la page (déplacez-le si nécessaire).",en:"Make sure a Form or CTA block appears in the first 3 blocks of the page (move it if needed)."};
C[5].check=p=>{const idx=p.blocks.findIndex(b=>b.type==="form"||b.type==="cta");return idx>=0&&idx<=2;};
C[6].task={ht:"Kenbe nòt vitès la nan zòn vèt la (pa plis pase 2 blòk imaj).",fr:"Gardez le score de vitesse dans la zone verte (pas plus de 2 blocs image).",en:"Keep the speed score in the green zone (no more than 2 image blocks)."};
C[6].check=p=>speedScore(p)>=60;
C[7].task={ht:"Chanje a apèsi Mobil epi klike 'Verifye sou Mobil' pou konfime paj la fasil pou itilize.",fr:"Basculez vers l'aperçu Mobile et cliquez sur « Vérifier sur Mobile » pour confirmer que la page est facile à utiliser.",en:"Switch to Mobile preview and click \"Verify on Mobile\" to confirm the page is easy to use."};
C[7].check=p=>p.mobileChecked===true;

/* ============ chrome wiring ============ */
$("langs").addEventListener("click",e=>{
 const b=e.target.closest("button");if(!b)return;
 S.lang=b.dataset.l;persist();
 document.querySelectorAll("#langs button").forEach(x=>x.classList.toggle("on",x.dataset.l===S.lang));
 render();
});
$("resetBtn").addEventListener("click",()=>{
 if(!confirm(S.lang==="ht"?"Ou vle rekòmanse Modil 14?":S.lang==="fr"?"Voulez-vous recommencer le Module 14 ?":"Restart Module 14?"))return;
 S={lang:S.lang,cur:1,done:Array(NL).fill(false),st:{},page:freshPage()};
 for(let i=1;i<=NL;i++)S.st[i]={exDone:false,exText:"",quizAns:Array(3).fill(null),edDone:false};
 persist();render();
});
document.querySelectorAll("#langs button").forEach(x=>x.classList.toggle("on",x.dataset.l===S.lang));
render();
</script>
