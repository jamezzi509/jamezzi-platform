  const list=Array.isArray(parsed)?parsed:[];
  let changed=false;
  MOD17_LESSON_SLUGS.forEach(slug=>{if(!list.includes(slug)){list.push(slug);changed=true;}});
  if(changed){
   localStorage.setItem(PROGRESS_KEY,JSON.stringify(list));
   window.parent.dispatchEvent(new CustomEvent(PROGRESS_EVENT,{detail:{storageKey:PROGRESS_KEY}}));
  }
 }catch{}
}
function $(id){return document.getElementById(id);}

function renderMods(){
 const wrap=$("mods");wrap.innerHTML="";
 const firstLessonBySlug={1:"what-is-digital-marketing",2:"why-people-really-buy",3:"naming-your-business",4:"building-a-customer-avatar",5:"writing-headlines-that-get-read",6:"meet-the-editor",7:"why-video-works",8:"meet-the-ai-chat-tool",9:"facebook-strategy",10:"what-are-content-pillars",11:"how-google-search-actually-works",12:"meet-your-business-profile",13:"meet-the-email-marketing-tool",14:"meet-the-page-builder",15:"meet-the-ads-manager",16:"meet-the-analytics-dashboard",18:"freelancing-vs-starting-an-agency"};
 MODULES[S.lang].forEach((title,i)=>{
  const n=i+1,isActive=n===17;
  const mod=document.createElement("div");mod.className="mod"+(isActive?" active":" locked");
  const mh=document.createElement("div");mh.className="mh";
  if(firstLessonBySlug[n]){
   mh.style.cursor="pointer";
   mh.innerHTML='<div class="num">'+n+'</div><div>'+title+'</div>';
   mh.addEventListener("click",()=>{window.top.location.href="/academy/courses/digital-marketing-ai/learn/"+firstLessonBySlug[n];});
  }else{
   mh.innerHTML='<div class="num">'+n+'</div><div>'+title+(isActive?"":" 🔒")+"</div>";
  }
  mod.appendChild(mh);
  if(isActive){
   const les=document.createElement("div");les.className="les";
   M17[S.lang].forEach((lt,li)=>{
    const n2=li+1;
    const item=document.createElement("div");item.className="li"+(n2===S.cur?" cur":"")+(S.done[li]?" done":"");
    item.innerHTML='<div class="dot">✓</div><div>'+n2+". "+lt+"</div>";
    item.addEventListener("click",()=>{S.cur=n2;persist();render();});
    les.appendChild(item);
   });
   mod.appendChild(les);
  }
  wrap.appendChild(mod);
 });
}

function renderRail(){
 const st=S.st[S.cur];
 $("prog").style.width=(Math.round((S.done.filter(Boolean).length/NL)*100))+"%";
 $("progText").textContent=S.done.filter(Boolean).length+" / "+NL;
 $("lblProg").textContent=UI[S.lang].prog;$("lblObj").textContent=UI[S.lang].obj;$("aiName").textContent=UI[S.lang].ai;
 const objs=[[st.edDone,UI[S.lang].objEd],[st.exDone,UI[S.lang].objEx],[st.quizAns.every(a=>a!==null),UI[S.lang].objQuiz]];
 $("objList").innerHTML=objs.map(([done,label])=>'<div class="obj'+(done?" d":"")+'"><div class="bx">✓</div><div class="tx">'+label+"</div></div>").join("");
}

function aiSay(msg){$("aiMsg").textContent=msg;}

/* ============ automation tool engine ============ */
function checkTask(n){
 const st=S.st[n];
 const done=C[n].check(S.am);
 if(done&&!st.edDone){st.edDone=true;persist();}
 else if(!done&&st.edDone){st.edDone=false;persist();}
 return done;
}
function renderToolPanel(){
 const lang=S.lang,ui=UI[lang],a=S.am;
 let h='<div class="amwrap"><div class="amtabs">';
 [["crm",ui.tabCrm],["chatbot",ui.tabChatbot],["workflow",ui.tabWorkflow]].forEach(([id,lbl])=>{
  h+='<button class="amtab'+(S.tab===id?" on":"")+'" data-tab="'+id+'">'+lbl+"</button>";
 });
 h+='</div><div class="ambody" id="amBody">';

 if(S.tab==="crm"){
  h+='<div class="amlbl">'+ui.tabCrm+'</div>';
  CONTACTS.forEach(c=>{
   const score=contactScore(c);
   h+='<div class="amcontact'+(a.selContact===c.id?" sel":"")+'" data-contact="'+c.id+'"><div class="amavatar">'+c.initials+'</div><div><div class="amcname">'+c.name+'</div><div class="amcmeta">'+c.opens+" "+ui.opens+" · "+c.pages+" "+ui.pages+" · "+(c.form?ui.formYes:ui.formNo)+'</div></div><div class="amscore">'+score+'</div><select class="amselect" data-stagesel="'+c.id+'"><option value="">'+ui.stage+"</option>"+
    ["lead","prospect","customer"].map(s=>'<option value="'+s+'"'+(a.stages[c.id]===s?" selected":"")+">"+ui[s]+"</option>").join("")+
    "</select></div>";
  });
 } else if(S.tab==="chatbot"){
  h+='<div class="amrow"><div class="amlbl">'+ui.greeting+'</div><input class="aminput" id="amGreeting" value="'+(a.chatbot.greeting||"").replace(/"/g,"&quot;")+'"/></div>';
  h+='<div class="amlbl">'+ui.question+'</div><input class="aminput" id="amQuestion" value="'+(a.chatbot.question||"").replace(/"/g,"&quot;")+'"/>';
  h+='<div class="amlbl">'+ui.replyA+'</div><input class="aminput" id="amReplyA" value="'+(a.chatbot.replyA||"").replace(/"/g,"&quot;")+'"/>';
  h+='<div class="amlbl">'+ui.replyB+'</div><input class="aminput" id="amReplyB" value="'+(a.chatbot.replyB||"").replace(/"/g,"&quot;")+'"/>';
  if(a.chatbot.greeting||a.chatbot.question){
   h+='<div class="amchatpreview">';
   if(a.chatbot.greeting)h+='<div class="ambubble">'+a.chatbot.greeting+"</div>";
   if(a.chatbot.question)h+='<div class="ambubble">'+a.chatbot.question+"</div>";
   if(a.chatbot.replyA)h+='<div class="amreplybtn">'+a.chatbot.replyA+"</div>";
   if(a.chatbot.replyB)h+='<div class="amreplybtn">'+a.chatbot.replyB+"</div>";
   h+="</div>";
  }
 } else if(S.tab==="workflow"){
  h+='<div id="amSeq">'+a.sequence.map((sid,i)=>{
   const step=STEPS.find(s=>s.id===sid);
   const tagLbl=step.type==="trigger"?ui.tagTrigger:step.type==="email"?ui.tagEmail:step.type==="wait"?ui.tagWait:step.type==="condition"?ui.tagCondition:ui.tagAction;
   return '<div class="amseqcard'+(step.type==="trigger"?" trig":"")+(step.type==="condition"?" cond":"")+'"><span class="amseqtag">'+tagLbl+'</span><span class="amseqlbl">'+step[lang]+'</span><div class="amseqbtns">'+
    '<button data-mv="up" data-i="'+i+'"'+(i===0?" disabled":"")+">"+ui.seqUp+"</button>"+
    '<button data-mv="down" data-i="'+i+'"'+(i===a.sequence.length-1?" disabled":"")+">"+ui.seqDown+"</button>"+
    '<button data-rmvseq="'+i+'">'+ui.remove+"</button></div></div>";
  }).join("")+"</div>";
  h+='<div class="amaddseq"><select class="amselect" id="amSeqPick">'+STEPS.map(s=>'<option value="'+s.id+'">'+s[lang]+"</option>").join("")+'</select><button class="btn g" id="amSeqAdd">'+ui.seqAdd+"</button></div>";
 }
 h+="</div></div>";
 return h;
}
function wireToolPanel(){
 const box=$("amBody");if(!box)return;
 document.querySelectorAll(".amtab").forEach(bt=>bt.addEventListener("click",()=>{
  S.tab=bt.dataset.tab;S.am.visited[S.tab]=true;persist();checkTask(S.cur);renderRail();refreshTool();
 }));
 if(S.tab==="crm"){
  document.querySelectorAll("[data-contact]").forEach(el=>el.addEventListener("click",e=>{
   if(e.target.tagName==="SELECT")return;
   S.am.selContact=el.dataset.contact;persist();checkTask(S.cur);renderRail();refreshTool();
  }));
  document.querySelectorAll("[data-stagesel]").forEach(sel=>sel.addEventListener("change",e=>{
   S.am.stages[sel.dataset.stagesel]=e.target.value;persist();checkTask(S.cur);renderRail();refreshTool();
  }));
 } else if(S.tab==="chatbot"){
  const g=$("amGreeting"),q=$("amQuestion"),ra=$("amReplyA"),rb=$("amReplyB");
  if(g)g.addEventListener("input",e=>{S.am.chatbot.greeting=e.target.value;persist();checkTask(S.cur);renderRail();refreshTool();});
  if(q)q.addEventListener("input",e=>{S.am.chatbot.question=e.target.value;persist();checkTask(S.cur);renderRail();refreshTool();});
  if(ra)ra.addEventListener("input",e=>{S.am.chatbot.replyA=e.target.value;persist();checkTask(S.cur);renderRail();refreshTool();});
  if(rb)rb.addEventListener("input",e=>{S.am.chatbot.replyB=e.target.value;persist();checkTask(S.cur);renderRail();refreshTool();});
 } else if(S.tab==="workflow"){
  document.querySelectorAll("[data-mv]").forEach(bt=>bt.addEventListener("click",()=>{
   const i=+bt.dataset.i,dir=bt.dataset.mv,seq=S.am.sequence;
   const j=dir==="up"?i-1:i+1;
   if(j<0||j>=seq.length)return;
   [seq[i],seq[j]]=[seq[j],seq[i]];
   persist();checkTask(S.cur);renderRail();refreshTool();
  }));
  document.querySelectorAll("[data-rmvseq]").forEach(bt=>bt.addEventListener("click",()=>{
   S.am.sequence.splice(+bt.dataset.rmvseq,1);persist();checkTask(S.cur);renderRail();refreshTool();
  }));
  const addBtn=$("amSeqAdd");
  if(addBtn)addBtn.addEventListener("click",()=>{
   const pick=$("amSeqPick").value;
   S.am.sequence.push(pick);persist();checkTask(S.cur);renderRail();refreshTool();
  });
 }
}
function refreshTool(){
 const root=$("amRoot");if(!root)return;
 root.innerHTML=renderToolPanel();
 wireToolPanel();
}

function render(){
 renderMods();
 const lang=S.lang,n=S.cur,d=C[n][lang],ui=UI[lang],st=S.st[n];
 $("cs").textContent=ui.cs;
 $("topTag").textContent="Modil 17 · 17."+n;
 $("topTitle").textContent=M17[lang][n-1];
 document.title="Academy · "+M17[lang][n-1];
 aiSay(d.lede);

 const stage=$("stage");
 let h='<div class="labhead"><span class="labtag">Modil 17 · 17.'+n+'</span><h2 class="labh2">'+M17[lang][n-1]+'</h2><p class="lablead">'+d.lede+"</p></div>";
 h+='<div class="secs">'+d.secs.map(s=>'<div class="sec"><h3>'+s[0]+"</h3><p>"+s[1]+"</p></div>").join("")+"</div>";
 h+='<div class="illus"><div id="amRoot"></div><div class="amtask"><b>'+ui.objEd+':</b> '+C[n].task[lang]+"</div></div>";
 h+='<div class="exwrap"><div class="extag">'+ui.exTag+'</div><p class="exq">'+d.ex+'</p><textarea id="exArea" placeholder="...">'+(st.exText||"")+'</textarea><div style="margin-top:10px;display:flex;align-items:center;gap:12px"><button class="btn g" id="exSaveBtn">'+ui.exBtn+'</button><span class="exsaved" id="exSaved" style="'+(st.exDone?"display:inline":"")+'">'+ui.exSaved+"</span></div></div>";

 h+='<div class="quiz"><div class="qtag">'+ui.quizTag+'</div>';
 d.quiz.forEach((q,qi)=>{
  h+='<div class="qcard"><div class="qq">'+(qi+1)+". "+q.q+'</div><div class="qopts" id="qopts'+qi+'">';
  q.opts.forEach((o,oi)=>{
   let cls="qopt";const answered=st.quizAns[qi]!==null;
   if(answered){if(oi===q.ans)cls+=" correct";else if(oi===st.quizAns[qi])cls+=" wrong";}
   h+='<button class="'+cls+'" data-qi="'+qi+'" data-oi="'+oi+'"'+(answered?" disabled":"")+">"+o+"</button>";
  });
  h+="</div>";
  if(st.quizAns[qi]!==null)h+='<div class="qfb">'+q.fb+"</div>";
  h+="</div>";
 });
 h+="</div>";

 h+='<div class="close"><div class="ctag">'+ui.closeTag+'</div>'+
  '<div class="crow"><div class="cv"><div class="ck">'+ui.cLearned+'</div>'+d.close.learned+'</div></div>'+
  '<div class="crow"><div class="cv"><div class="ck">'+ui.cMistake+'</div>'+d.close.mistake+'</div></div>'+
  '<div class="crow"><div class="cv"><div class="ck">'+ui.cTip+'</div>'+d.close.tip+'</div></div>'+
  '<div class="crow"><div class="cv"><div class="ck">'+ui.cAssign+'</div>'+d.close.assign+'</div></div>'+
  '<div class="crow"><div class="cv"><div class="ck">'+ui.cDl+'</div>'+d.close.dl+'</div></div>'+
  '<div class="crow"><div class="cv"><div class="ck">'+ui.cChecklist+'</div><ul>'+d.close.checklist.map(c=>"<li>"+c+"</li>").join("")+'</ul></div></div>'+
  '<div class="crow"><div class="cv"><div class="ck">'+ui.cAi+'</div>"'+d.close.ai+'"</div></div>'+
 "</div>";

 checkTask(n);
 const canFinish=st.edDone&&st.exDone&&st.quizAns.every(a=>a!==null);
 h+='<div class="nextwrap">';
 if(!S.done[n-1]){
  h+='<button class="btn p" id="finishBtn"'+(canFinish?"":" disabled")+">"+ui.complete+"</button>";
 }else{
  h+='<span style="color:var(--good);font-weight:700;font-size:14px">'+ui.completed+"</span>";
  if(n<NL)h+='<button class="btn g" id="nextBtn">'+ui.next+"</button>";
  else h+='<button class="btn g" id="finalBtn">'+ui.stampBtn+"</button>";
 }
 h+="</div>";

 stage.innerHTML=h;stage.classList.add("fade");
 stage.scrollTop=0;

 const root=$("amRoot");
 root.innerHTML=renderToolPanel();wireToolPanel();

 $("exArea").addEventListener("input",e=>{st.exText=e.target.value;});
 $("exSaveBtn").addEventListener("click",()=>{
  if(st.exText&&st.exText.trim().length>0){st.exDone=true;$("exSaved").style.display="inline";persist();renderRail();updateFinishBtn();}
 });
 d.quiz.forEach((q,qi)=>{
  if(st.quizAns[qi]!==null)return;
  document.querySelectorAll('#qopts'+qi+' .qopt').forEach(btn=>{
   btn.addEventListener("click",()=>{
    st.quizAns[qi]=+btn.dataset.oi;persist();render();
   });
  });
 });
 const fb=$("finishBtn");
 if(fb)fb.addEventListener("click",()=>{
  S.done[n-1]=true;persist();markModuleComplete();render();
 });
 const nb=$("nextBtn");
 if(nb)nb.addEventListener("click",()=>{S.cur=n+1;persist();render();});
 const flb=$("finalBtn");
 if(flb)flb.addEventListener("click",showStamp);
 renderRail();
}
function updateFinishBtn(){
 const st=S.st[S.cur];
 const fb=$("finishBtn");
 if(fb)fb.disabled=!(st.edDone&&st.exDone&&st.quizAns.every(a=>a!==null));
}

function showStamp(){
 const ui=UI[S.lang];
 $("stage").innerHTML='<div class="stampscreen fade"><div class="stamp"><div class="si">🎟️</div></div><h2>'+ui.stampTitle+"</h2><p>"+ui.stampBody+'</p><a href="/academy/courses/digital-marketing-ai/learn/freelancing-vs-starting-an-agency" target="_top" class="btn p" style="text-decoration:none;display:inline-block">'+ui.stampBtn+"</a></div>";
}

/* ============ per-lesson tasks & checks ============ */
C[1].task={ht:"Vizite chak nan 3 pati yo (CRM, Chatbot, Workflow) omwen yon fwa.",fr:"Visitez chacune des 3 parties (CRM, Chatbot, Workflow) au moins une fois.",en:"Visit each of the 3 parts (CRM, Chatbot, Workflow) at least once."};
C[1].check=a=>Object.values(a.visited).every(Boolean);
C[2].task={ht:"Etikèt chak kontak: Prospect si nòt li ≥20, Lead si nòt li <20.",fr:"Étiquetez chaque contact : Prospect si son score est ≥20, Lead si son score est <20.",en:"Tag each contact: Prospect if their score is ≥20, Lead if their score is <20."};
C[2].check=a=>CONTACTS.every(c=>{const s=contactScore(c);const expected=s>=20?"prospect":"lead";return a.stages[c.id]===expected;});
C[3].task={ht:"Klike sou kontak ki gen nòt ki pi wo a.",fr:"Cliquez sur le contact qui a le score le plus élevé.",en:"Click on the contact with the highest score."};
C[3].check=a=>{const top=CONTACTS.slice().sort((x,y)=>contactScore(y)-contactScore(x))[0].id;return a.selContact===top;};
C[4].task={ht:"Ranpli mesaj byenveni (omwen 10 karaktè), kesyon an, ak tou de repons yo pou chwa yo.",fr:"Remplissez le message de bienvenue (au moins 10 caractères), la question, et les deux réponses.",en:"Fill in the welcome message (at least 10 characters), the question, and both reply options."};
C[4].check=a=>a.chatbot.greeting.trim().length>=10&&!!a.chatbot.question.trim()&&!!a.chatbot.replyA.trim()&&!!a.chatbot.replyB.trim();
C[5].task={ht:"Bati yon sekans ki kòmanse ak yon deklanchè, gen omwen 2 imèl, ak omwen 1 tan datant ant yo.",fr:"Construisez une séquence qui commence par un déclencheur, a au moins 2 emails, et au moins 1 délai d'attente entre eux.",en:"Build a sequence that starts with a trigger, has at least 2 emails, and at least 1 wait time between them."};
C[5].check=a=>{const seq=a.sequence;if(seq[0]!=="trigger")return false;const emailCount=seq.filter(id=>STEPS.find(s=>s.id===id).type==="email").length;const waitCount=seq.filter(id=>STEPS.find(s=>s.id===id).type==="wait").length;return emailCount>=2&&waitCount>=1;};
C[6].task={ht:"Ajoute yon etap kondisyon epi mete l jis apre yon etap imèl nan sekans ou an.",fr:"Ajoutez une étape de condition et placez-la juste après une étape email dans votre séquence.",en:"Add a condition step and place it right after an email step in your sequence."};
C[6].check=a=>{const seq=a.sequence;const idx=seq.findIndex(id=>STEPS.find(s=>s.id===id).type==="condition");if(idx<=0)return false;return STEPS.find(s=>s.id===seq[idx-1]).type==="email";};
C[7].task={ht:"Fini otomatizasyon ou an: asire gen omwen yon etap apre kondisyon an (yon aksyon final).",fr:"Terminez votre automatisation : assurez-vous qu'il y a au moins une étape après la condition (une action finale).",en:"Finish your automation: make sure there's at least one step after the condition (a final action)."};
C[7].check=a=>{const seq=a.sequence;const idx=seq.findIndex(id=>STEPS.find(s=>s.id===id).type==="condition");if(idx<=0)return false;const condOk=STEPS.find(s=>s.id===seq[idx-1]).type==="email";return condOk&&idx<seq.length-1&&seq.length>=5;};

/* ============ chrome wiring ============ */
$("langs").addEventListener("click",e=>{
 const b=e.target.closest("button");if(!b)return;
 S.lang=b.dataset.l;persist();
 document.querySelectorAll("#langs button").forEach(x=>x.classList.toggle("on",x.dataset.l===S.lang));
 render();
});
$("resetBtn").addEventListener("click",()=>{
 if(!confirm(S.lang==="ht"?"Ou vle rekòmanse Modil 17?":S.lang==="fr"?"Voulez-vous recommencer le Module 17 ?":"Restart Module 17?"))return;
 S={lang:S.lang,cur:1,done:Array(NL).fill(false),st:{},tab:"crm",am:freshAutomation()};
 for(let i=1;i<=NL;i++)S.st[i]={exDone:false,exText:"",quizAns:Array(3).fill(null),edDone:false};
 persist();render();
});
document.querySelectorAll("#langs button").forEach(x=>x.classList.toggle("on",x.dataset.l===S.lang));
render();
</script>
