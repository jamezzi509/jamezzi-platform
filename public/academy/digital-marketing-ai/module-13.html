.brand svg{width:25px;height:25px}.brand b{font-size:16px;font-weight:800}.brand .cs{font-size:10.5px;color:var(--mute);text-transform:uppercase;letter-spacing:.04em}
.mods{flex:1;overflow:auto;padding:8px}.mods::-webkit-scrollbar{width:8px}.mods::-webkit-scrollbar-thumb{background:#26304a;border-radius:10px}

.mod .mh:hover{background:var(--ink-600)}.mod.active .mh{background:var(--ink-600);color:#fff;font-weight:600}
.mod.locked .mh{cursor:default;opacity:.45}.mod.locked .mh:hover{background:none}
.mod .num{width:20px;height:20px;border-radius:6px;background:var(--ink-500);color:var(--dim);display:grid;place-items:center;font-size:10.5px;font-weight:700;flex:none}
.mod.active .num{background:var(--brand);color:#fff}.mod .les{display:none;padding:2px 0 6px 8px}.mod.active .les{display:block}
.li{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;font-size:14px;color:var(--mute);cursor:pointer}
.li:hover{background:var(--ink-600);color:var(--dim)}.li.cur{background:rgba(var(--brand-rgb),.14);color:#fff}
.li .dot{width:16px;height:16px;border-radius:50%;border:1.5px solid #46506a;flex:none;display:grid;place-items:center;font-size:9px;color:transparent}
.li.done .dot{background:var(--good);border-color:var(--good);color:#fff}.li .lx{margin-left:auto;font-size:10.5px;color:var(--mute)}
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.top{height:58px;flex:none;display:flex;align-items:center;gap:14px;padding:0 20px;border-bottom:1px solid #1a2231}
.top .mt{font-size:11.5px;color:var(--brand);font-weight:700;text-transform:uppercase;letter-spacing:.05em}.top h1{font-size:18px;font-weight:700}
.langs{margin-left:auto;display:flex;background:var(--ink-700);border:1px solid var(--edge2);border-radius:9px;padding:3px}
.langs button{border:none;background:none;color:var(--dim);font-weight:700;font-size:12.5px;padding:6px 13px;border-radius:6px;cursor:pointer}
.langs button.on{background:var(--brand);color:#fff}
.reset{margin-left:6px;width:32px;height:32px;border-radius:8px;border:1px solid var(--edge2);background:var(--ink-700);color:var(--dim);cursor:pointer}
.wsp{flex:1;min-height:0;display:flex}
.stagewrap{flex:1;min-width:0;padding:16px}
.stage{position:relative;height:100%;width:100%;border-radius:12px;overflow:auto;box-shadow:0 20px 50px -12px rgba(0,0,0,.5);background:var(--ink-800);border:1px solid var(--edge);padding:28px 34px}
.rail{width:312px;flex:none;border-left:1px solid #1a2231;display:flex;flex-direction:column}
.rs{padding:17px 18px;border-bottom:1px solid #1a2231}
.lbl{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--mute);margin-bottom:9px}
.pr{height:7px;border-radius:6px;background:var(--edge);overflow:hidden;margin-top:12px}.pr>span{display:block;height:100%;width:0;background:var(--good);transition:width .5s}
.prtext{font-size:11.5px;color:var(--mute);margin-top:8px}
.obj{display:flex;gap:10px;font-size:13.5px;margin:10px 0;color:var(--mute)}.obj.d{color:var(--text)}
.obj .bx{width:18px;height:18px;border-radius:50%;border:1px solid #566078;display:grid;place-items:center;font-size:11px;color:transparent;flex:none;margin-top:1px}
.obj.d .bx{background:var(--good);border-color:var(--good);color:#fff}.obj.d .tx{text-decoration:line-through;text-decoration-color:rgba(120,130,150,.55)}
.assist{margin-top:auto;padding:17px}.abox{background:var(--ink-700);border:1px solid var(--edge);border-radius:14px;padding:15px}
.ah{display:flex;align-items:center;gap:9px;margin-bottom:8px}.av{width:30px;height:30px;border-radius:50%;background:rgba(var(--brand-rgb),.18);display:grid;place-items:center;font-size:16px}
.an{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--mute)}.am{font-size:14px;line-height:1.6;color:#dbe2ee;min-height:60px}
.labhead{max-width:700px}.labtag{display:inline-block;font-size:11.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--brand);background:rgba(var(--brand-rgb),.12);border-radius:999px;padding:5px 12px}
.labh2{font-size:25px;font-weight:800;letter-spacing:-.02em;margin:12px 0 8px}.lablead{color:var(--dim);font-size:15.5px;line-height:1.65;max-width:660px;font-style:italic}
.btn{border:none;border-radius:10px;padding:11px 20px;font-weight:700;font-size:14px;cursor:pointer}
.btn.p{background:var(--brand);color:#fff}.btn.p:hover{background:var(--brand2)}.btn.p:disabled{opacity:.4;cursor:not-allowed}
.btn.g{background:var(--ink-700);border:1px solid var(--edge2);color:var(--text)}
.nextwrap{margin-top:26px;display:flex;gap:12px;align-items:center}
.secs{max-width:700px;margin-top:24px}
.sec{margin-bottom:20px}.sec h3{font-size:16.5px;font-weight:700;margin-bottom:7px}.sec p{font-size:14.5px;line-height:1.7;color:#c9d1e0}
.illus{max-width:700px;margin:26px 0}
.exwrap{max-width:700px;margin:26px 0;border:1px solid var(--edge2);background:var(--ink-700);border-radius:14px;padding:18px 20px}
.exwrap .extag{font-size:11.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--warn)}
.exwrap p.exq{font-size:14.5px;margin:8px 0 12px;color:var(--text);line-height:1.6}
.exwrap textarea{width:100%;min-height:80px;border-radius:10px;border:1px solid var(--edge2);background:var(--ink-800);color:var(--text);font-family:var(--font);font-size:14px;padding:12px;resize:vertical}
.exwrap textarea:focus{outline:2px solid var(--brand)}
.exsaved{font-size:12.5px;color:var(--good);margin-top:8px;display:none}
.quiz{max-width:700px;margin:26px 0}
.qtag{font-size:11.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--brand);margin-bottom:14px}
.qcard{border:1px solid var(--edge2);background:var(--ink-700);border-radius:14px;padding:16px 18px;margin-bottom:14px}
.qcard .qq{font-size:14.5px;font-weight:600;margin-bottom:12px;line-height:1.55}
.qopts{display:flex;flex-direction:column;gap:8px}
.qopt{text-align:left;border:1px solid var(--edge2);background:var(--ink-600);color:var(--text);border-radius:9px;padding:10px 13px;font-size:13.5px;cursor:pointer;font-family:var(--font)}
.qopt:hover:not(:disabled){border-color:var(--brand)}
.qopt:disabled{cursor:default}
.qopt.correct{background:rgba(34,197,94,.16);border-color:var(--good);color:#c9f5d8}
.qopt.wrong{background:rgba(196,43,28,.16);border-color:var(--danger);color:#ffd7d2}
.qfb{font-size:13px;color:var(--dim);margin-top:10px;line-height:1.55}
.close{max-width:700px;margin:26px 0 6px}
.close .ctag{font-size:11.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--brand);margin-bottom:14px}
.crow{display:flex;gap:12px;padding:13px 0;border-bottom:1px solid var(--edge2)}
.crow:last-child{border-bottom:none}
.crow .ck{font-weight:700;font-size:13.5px;margin-bottom:3px}
.crow .cv{font-size:13.5px;color:#c9d1e0;line-height:1.6}
.crow ul{margin:4px 0 0 18px;padding:0}
.crow li{font-size:13.5px;color:#c9d1e0;line-height:1.6}
.stampscreen{max-width:560px;margin:40px auto;text-align:center}
.stamp{width:118px;height:118px;border-radius:50%;border:4px double var(--brand);display:grid;place-items:center;margin:0 auto 22px;background:rgba(var(--brand-rgb),.1);transform:rotate(-8deg)}

.stampscreen p{font-size:14.5px;color:var(--dim);line-height:1.65;margin-bottom:22px}
.fade{animation:fd .3s ease}@keyframes fd{from{opacity:0;transform:translateY(6px)}to{opacity:1}}

.emlseqcard{display:flex;align-items:center;gap:10px;border:1px solid #e5e7eb;border-radius:10px;padding:10px 12px;margin-bottom:8px;background:#f9fafb}

.emlseqlbl{flex:1;font-size:13px;font-weight:600}
.emlseqtag{font-size:9.5px;font-weight:700;text-transform:uppercase;color:#6b7280;margin-right:8px}

.emladdseq{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.emltask{max-width:700px;margin-top:14px;font-size:13px;color:var(--dim);background:rgba(var(--brand-rgb),.08);border:1px solid rgba(var(--brand-rgb),.3);border-radius:10px;padding:11px 14px}

   close:{learned:"Un cadeau numérique efficace résout un petit problème spécifique vraiment vite et correspond au vrai avatar client (Module 4), pas une promesse générique vague.",

   ex:"What's one specific problem a lead magnet for your business could solve quickly?",

    {q:"What makes a good lead magnet?",opts:["A big vague promise that takes a long time","Solving one specific problem really fast","No real value at all","A price list"],ans:1,fb:"A good magnet solves a small problem fast."},

    checklist:["Magnet title written?","Format chosen?","Short benefit written (at least 15 characters)?"],
    ai:"Suggest 4 lead magnet ideas for a [type of business] that solve one specific problem quickly."}}},

 fr:{lede:"Un formulaire d'inscription est la porte d'entrée de votre liste d'emails — chaque champ supplémentaire que vous demandez diminue la chance qu'une personne le remplisse entièrement, donc plus il est court, mieux il fonctionne.",
   secs:[["Principe de base : demander moins","Chaque champ supplémentaire (téléphone, nom d'entreprise) ajoute de la friction ; sauf si vous avez vraiment besoin de cette info maintenant, laissez le champ de côté et demandez-le plus tard si nécessaire."],
    ["Ce qu'un bon formulaire contient","Un titre clair qui explique ce que la personne va recevoir, un bouton avec un texte d'action (pas juste « Envoyer »), et seulement les champs vraiment essentiels (l'adresse email toujours obligatoire)."]],
   ex:"Quel champ supplémentaire seriez-vous tenté d'ajouter à votre formulaire, et est-il vraiment nécessaire maintenant ?",
   quiz:[
    {q:"Pourquoi chaque champ supplémentaire dans un formulaire compte-t-il ?",opts:["Ils n'ont aucun effet","Chaque champ ajoute de la friction et diminue la chance que les gens remplissent le formulaire","Plus de champs signifie toujours plus d'inscriptions","Les champs n'affectent pas du tout la conversion"],ans:1,fb:"Chaque champ supplémentaire ajoute de la friction."},
    {q:"Quel champ est toujours obligatoire dans un formulaire d'inscription email ?",opts:["Téléphone","Adresse email","Nom d'entreprise","Adresse postale"],ans:1,fb:"L'adresse email est toujours obligatoire."},
    {q:"Que devrait contenir un bon formulaire ?",opts:["Titre vague, bouton « Envoyer » simple, tous les champs possibles","Titre clair, texte de bouton avec action, seulement les champs essentiels","Aucun titre du tout","Plus de champs pour paraître plus professionnel"],ans:1,fb:"Titre clair, bouton d'action, seulement les champs essentiels."}],
   close:{learned:"Chaque champ supplémentaire dans un formulaire ajoute de la friction — un bon formulaire a un titre clair, un bouton avec action, et seulement les champs vraiment essentiels (l'email toujours obligatoire).",
    mistake:"Ajouter des champs supplémentaires (téléphone, entreprise) « juste pour avoir l'info » sans une vraie raison immédiate, ce qui fait que les gens abandonnent le formulaire sans le remplir.",
    tip:"Si vous n'avez pas vraiment besoin d'une info maintenant, laissez le champ de côté — vous pouvez toujours le demander plus tard dans un autre email.",
    assign:"Quel champ supplémentaire seriez-vous tenté d'ajouter à votre formulaire, et est-il vraiment nécessaire maintenant ?",

 en:{lede:"A signup form is the front door to your email list — every extra field you ask for decreases the chance someone fills it out completely, so the shorter it is, the better it works.",
   secs:[["The core principle: ask for less","Every extra field (phone, company name) adds friction; unless you truly need that info right now, leave the field out and ask for it later if needed."],
    ["What a good form has","A clear headline explaining what the person will get, a button with action text (not just \"Submit\"), and only truly essential fields (email is always required)."]],
   ex:"What extra field would you be tempted to add to your form, and is it really necessary right now?",
   quiz:[
    {q:"Why does every extra field in a form matter?",opts:["They have no effect","Every extra field adds friction and lowers the chance people complete the form","More fields always means more signups","Fields don't affect conversion at all"],ans:1,fb:"Every extra field adds friction."},
    {q:"What field is always required on an email signup form?",opts:["Phone","Email address","Company name","Mailing address"],ans:1,fb:"Email address is always required."},
    {q:"What should a good form have?",opts:["A vague headline, a plain \"Submit\" button, every possible field","A clear headline, action button text, only essential fields","No headline at all","More fields to look more professional"],ans:1,fb:"Clear headline, action button, only essential fields."}],
   close:{learned:"Every extra field on a form adds friction — a good form has a clear headline, an action button, and only truly essential fields (email always required).",
    mistake:"Adding extra fields (phone, company) \"just to have the info\" without a real immediate reason, which makes people abandon the form without completing it.",
    tip:"If you don't truly need a piece of info right now, leave the field out — you can always ask for it later in another email.",
    assign:"What extra field would you be tempted to add to your form, and is it really necessary right now?",
    dl:"Checklist: Signup Form Design",
    checklist:["Form headline written (at least 10 characters)?","Button text written?","All extra fields turned off?"],
    ai:"Write a form headline and button text for a [type of business] that captures emails."}}},

 fr:{lede:"Une séquence de bienvenue est une série de petits emails qui arrivent automatiquement l'un après l'autre quand quelqu'un vient de s'inscrire — elle vous présente, livre ce que vous avez promis, et bâtit la confiance avant même de demander une vente.",
   secs:[["Un ordre qui a du sens","Le premier email est toujours une bienvenue qui livre le cadeau immédiatement (ce pour quoi la personne s'est inscrite) ; après ça, les emails suivants devraient bâtir la confiance (meilleur contenu) avant toute offre."],
    ["Pourquoi l'automatiser","Une séquence automatique travaille pour vous 24/7 sans que vous ayez besoin d'envoyer chaque email manuellement — chaque nouvel abonné reçoit la même bonne expérience sans que vous fassiez quoi que ce soit après la configuration initiale."]],
   ex:"Quel 4e email ajouteriez-vous après les 3 premiers, et pourquoi ?",
   quiz:[
    {q:"Quel devrait être le premier email d'une séquence de bienvenue ?",opts:["Une offre de vente","Un email de bienvenue qui livre le cadeau immédiatement","Un avis client","Un événement"],ans:1,fb:"Le premier est la bienvenue qui livre le cadeau."},
    {q:"Pourquoi l'ordre de la séquence compte-t-il ?",opts:["L'ordre n'a aucune importance","Bâtir la confiance avant de demander une vente a plus de sens que de demander la vente immédiatement","Tous les emails devraient être identiques","L'offre de vente devrait toujours être en premier"],ans:1,fb:"Bâtir la confiance avant de demander la vente a plus de sens."},
    {q:"Quel avantage a une séquence automatique ?",opts:["Elle vous demande d'envoyer chaque email manuellement","Elle travaille 24/7 sans que vous ayez besoin d'agir à chaque inscription","Elle n'a aucun avantage","Elle ne fonctionne qu'une seule fois"],ans:1,fb:"Elle travaille 24/7 automatiquement."}],
   close:{learned:"Une séquence de bienvenue commence par un email qui livre le cadeau immédiatement, puis bâtit la confiance avant toute offre — l'automatiser la fait fonctionner pour chaque nouvel abonné sans que vous fassiez rien.",
    mistake:"Mettre une offre de vente comme premier email, avant même de livrer ce pour quoi la personne s'est inscrite — ça donne l'impression d'un piège.",
    tip:"Une séquence de bienvenue bien construite travaille 24/7 — pendant que vous dormez, chaque nouvel abonné reçoit toujours la même bonne expérience.",
    assign:"Quel 4e email ajouteriez-vous après les 3 premiers, et pourquoi ?",
    dl:"Modèle : Structure de Séquence de Bienvenue de Base",
    checklist:["La séquence a-t-elle 3 étapes ?","L'ordre est-il : Bienvenue, Livrer le Cadeau, Partager du Contenu ?"],
    ai:"Suggère une séquence de bienvenue en 4 étapes pour un(e) [type d'entreprise] après qu'une personne s'inscrive pour [cadeau numérique]."}},
 en:{lede:"A welcome sequence is a series of small emails that automatically arrive one after another when someone just signed up — it introduces you, delivers what you promised, and builds trust before you even ask for a sale.",
   secs:[["An order that makes sense","The first email is always a welcome that delivers the magnet immediately (what the person signed up for); after that, the following emails should build trust (best content) before any offer."],
    ["Why automate it","An automatic sequence works for you 24/7 without you needing to send each email manually — every new subscriber gets the same good experience without you doing anything after the initial setup."]],
   ex:"What 4th email would you add after the first 3, and why?",
   quiz:[
    {q:"What should the first email in a welcome sequence be?",opts:["A sales offer","A welcome email that delivers the magnet immediately","A customer review","An event"],ans:1,fb:"The first is a welcome that delivers the magnet."},
    {q:"Why does the sequence order matter?",opts:["Order doesn't matter at all","Building trust before asking for a sale makes more sense than asking immediately","All emails should be the same","The sales offer should always be first"],ans:1,fb:"Building trust before asking for a sale makes more sense."},
    {q:"What advantage does an automatic sequence have?",opts:["It requires you to send each email manually","It works 24/7 without you needing to act every time someone signs up","It has no advantage","It only works once"],ans:1,fb:"It works 24/7 automatically."}],
   close:{learned:"A welcome sequence starts with an email that delivers the magnet immediately, then builds trust before any offer — automating it makes it work for every new subscriber without you doing anything.",
    mistake:"Putting a sales offer as the first email, before even delivering what the person signed up for — it feels like a bait-and-switch.",
    tip:"A well-built welcome sequence works 24/7 — while you sleep, every new subscriber still gets the same good experience.",
    assign:"What 4th email would you add after the first 3, and why?",
    dl:"Template: Basic Welcome Sequence Structure",
    checklist:["Does the sequence have 3 steps?","Is the order: Welcome, Deliver the Magnet, Share Content?"],
    ai:"Suggest a 4-step welcome sequence for a [type of business] after someone signs up for [lead magnet]."}}},

    {q:"Kisa yon kò imèl vant ta dwe eksplike, dapre Modil 5?",opts:["Sèlman karakteristik teknik","Benefis, pa jis karakteristik","Anyen espesifik","Sèlman pri a"],ans:1,fb:"Benefis konte plis pase karakteristik sèl."}],

 fr:{lede:"Un email de vente combine un sujet clair, un corps qui bâtit l'intérêt, et un appel à l'action (CTA) clair — sans un CTA, même le meilleur texte de vente ne mène à aucune action.",
   secs:[["Structure d'un email de vente","Un sujet qui dit ce qu'il y a dedans ; un corps qui explique les bénéfices (pas juste les caractéristiques, souvenez-vous du Module 5) ; et un bouton CTA clair qui dit exactement quelle action prendre."],
    ["Erreur fréquente","Écrire un bel email sans aucun bouton ou lien clair est la plus grande erreur — un lecteur intéressé a besoin de savoir exactement quoi faire ensuite."]],
   ex:"Écrivez un texte de CTA court (3-6 mots) pour un email de vente.",
   quiz:[
    {q:"De quoi un email de vente a-t-il besoin en plus d'un sujet et d'un corps ?",opts:["Rien, ça suffit","Un appel à l'action (CTA) clair qui dit quelle action prendre","Une liste de prix complète","Seulement une photo"],ans:1,fb:"Un CTA clair est ce qui manque."},
    {q:"Quelle est la plus grande erreur fréquente dans un email de vente ?",opts:["Écrire un bel email sans aucun bouton ou lien clair","Avoir un CTA clair","Expliquer les bénéfices du produit","Avoir un sujet clair"],ans:1,fb:"Sans bouton clair, l'email ne mène à aucune action."},
    {q:"Que devrait expliquer le corps d'un email de vente, selon le Module 5 ?",opts:["Seulement les caractéristiques techniques","Les bénéfices, pas juste les caractéristiques","Rien de spécifique","Seulement le prix"],ans:1,fb:"Les bénéfices comptent plus que les caractéristiques seules."}],
   close:{learned:"Un email de vente efficace a un sujet clair, un corps qui explique les bénéfices (pas juste les caractéristiques), et un bouton CTA qui dit exactement quelle action prendre.",
    mistake:"Écrire une belle description de produit sans aucun bouton ou lien clair, ce qui laisse le lecteur sans savoir quelle prochaine étape prendre.",
    tip:"Un CTA court et direct (comme « Acheter Maintenant » ou « Voir l'Offre ») est toujours plus clair qu'un bouton vague comme « Cliquez Ici ».",
    assign:"Écrivez un texte de CTA court (3-6 mots) pour un email de vente.",
    dl:"Fiche de travail : Structure d'Email de Vente",
    checklist:["Le sujet est-il clair ?","Au moins 1 bloc bouton (CTA) ajouté ?","Au moins 2 autres blocs de contenu ajoutés ?"],
    ai:"Écris un court email de vente pour un(e) [produit/service] avec un sujet, des bénéfices clés, et un CTA clair."}},
 en:{lede:"A sales email combines a clear subject, a body that builds interest, and a clear call to action (CTA) — without a CTA, even the best sales copy leads to no action.",
   secs:[["Structure of a sales email","A subject that says what's inside; a body that explains benefits (not just features, remember Module 5); and a clear CTA button that says exactly what action to take."],
    ["Common mistake","Writing a beautiful email with no clear button or link at all is the biggest mistake — an interested reader needs to know exactly what to do next."]],
   ex:"Write a short CTA text (3-6 words) for a sales email.",
   quiz:[
    {q:"What does a sales email need beyond a subject and a body?",opts:["Nothing, that's enough","A clear call to action (CTA) that says what action to take","A full price list","Only a photo"],ans:1,fb:"A clear CTA is what's missing."},
    {q:"What's the biggest common mistake in a sales email?",opts:["Writing a beautiful email with no clear button or link at all","Having a clear CTA","Explaining the product's benefits","Having a clear subject"],ans:1,fb:"Without a clear button, the email leads to no action."},
    {q:"What should a sales email's body explain, per Module 5?",opts:["Only technical features","Benefits, not just features","Nothing specific","Only the price"],ans:1,fb:"Benefits matter more than features alone."}],
   close:{learned:"An effective sales email has a clear subject, a body that explains benefits (not just features), and a CTA button that says exactly what action to take.",
    mistake:"Writing a beautiful product description with no clear button or link, which leaves the reader not knowing what next step to take.",
    tip:"A short, direct CTA (like \"Shop Now\" or \"See the Offer\") is always clearer than a vague button like \"Click Here\".",
    assign:"Write a short CTA text (3-6 words) for a sales email.",
    dl:"Worksheet: Sales Email Structure",
    checklist:["Is the subject clear?","At least 1 button (CTA) block added?","At least 2 other content blocks added?"],
    ai:"Write a short sales email for a [product/service] with a subject, key benefits, and a clear CTA."}}},

 fr:{lede:"Une automatisation commence toujours par un déclencheur (trigger) — un événement spécifique qui fait envoyer le premier email automatiquement, sans que personne n'ait besoin d'agir manuellement.",
   secs:[["Ce qu'est un déclencheur","Un événement comme « Nouvel Abonné » ou « Clic sur un Lien » qui fait démarrer une séquence automatiquement — sans un déclencheur, une séquence ne démarre jamais pour personne."],
    ["Le déclencheur va en premier","Dans n'importe quelle séquence automatisée, le déclencheur est toujours la première étape — tous les autres emails/étapes suivent après lui, comme nous l'avons vu à la Leçon 13.5."]],
   ex:"Quel déclencheur utiliseriez-vous pour démarrer une séquence pour un nouveau client qui vient d'acheter ?",
   quiz:[
    {q:"Que fait un déclencheur (trigger) ?",opts:["Rien de spécial","Il fait démarrer une séquence automatiquement quand un événement spécifique se produit","Il remplace le besoin d'un email","C'est seulement une décoration"],ans:1,fb:"Le déclencheur fait démarrer la séquence automatiquement."},
    {q:"Quelle position un déclencheur devrait-il avoir dans une séquence ?",opts:["Au milieu","La première étape","La dernière étape","Aucune position spécifique"],ans:1,fb:"Le déclencheur est toujours la première étape."},
    {q:"Donne un exemple de déclencheur.",opts:["Une couleur","Nouvel Abonné ou Clic sur un Lien","Un logo","Une adresse"],ans:1,fb:"Nouvel Abonné est un exemple de déclencheur."}],
   close:{learned:"Une automatisation commence toujours par un déclencheur (un événement spécifique) qui est toujours la première étape — tous les autres emails/étapes suivent après lui automatiquement.",
    mistake:"Penser qu'une séquence peut démarrer sans une raison spécifique — sans un déclencheur, le système n'a aucun moyen de savoir quand envoyer le premier email.",
    tip:"Choisissez un déclencheur qui correspond vraiment au moment de l'action (comme « Nouvel Abonné » pour une séquence de bienvenue, pas un événement sans rapport).",
    assign:"Quel déclencheur utiliseriez-vous pour démarrer une séquence pour un nouveau client qui vient d'acheter ?",
    dl:"Référence : Déclencheurs Courants en Automatisation Email",
    checklist:["Une étape de déclencheur ajoutée ?","Le déclencheur est-il la première étape de la séquence ?"],
    ai:"Suggère 4 déclencheurs différents qui pourraient démarrer une séquence automatisée pour un(e) [type d'entreprise]."}},

function wireToolPanel(){
 const box=$("emlBody");if(!box)return;
 document.querySelectorAll(".emltab").forEach(bt=>bt.addEventListener("click",()=>{
  S.tab=bt.dataset.tab;S.tool.visited[S.tab]=true;persist();checkTask(S.cur);renderRail();refreshTool();
 }));
 if(S.tab==="magnet"){
  const ti=$("emlMagTitle"),fo=$("emlMagFormat"),be=$("emlMagBenefit");
  if(ti)ti.addEventListener("input",e=>{S.tool.magnet.title=e.target.value;persist();checkTask(S.cur);renderRail();});
  if(fo)fo.addEventListener("change",e=>{S.tool.magnet.format=e.target.value;persist();checkTask(S.cur);renderRail();});
  if(be)be.addEventListener("input",e=>{S.tool.magnet.benefit=e.target.value;persist();checkTask(S.cur);renderRail();});
 } else if(S.tab==="form"){
  const hd=$("emlFormHeadline"),bt=$("emlFormBtn");
  if(hd)hd.addEventListener("input",e=>{S.tool.form.headline=e.target.value;persist();checkTask(S.cur);renderRail();});
  if(bt)bt.addEventListener("input",e=>{S.tool.form.buttonText=e.target.value;persist();checkTask(S.cur);renderRail();});
  document.querySelectorAll(".emltoggle").forEach(tg=>tg.addEventListener("click",()=>{
   const f=tg.dataset.field;S.tool.form.fields[f]=!S.tool.form.fields[f];persist();checkTask(S.cur);renderRail();refreshTool();
  }));
 } else if(S.tab==="builder"){
  const su=$("emlSubject");
  if(su)su.addEventListener("input",e=>{S.tool.email.subject=e.target.value;persist();checkTask(S.cur);renderRail();});
  document.querySelectorAll("#emlBlocks input, #emlBlocks textarea").forEach(el=>el.addEventListener("input",e=>{
   const bi=+e.target.dataset.bi;S.tool.email.blocks[bi].text=e.target.value;persist();checkTask(S.cur);renderRail();
  }));
  document.querySelectorAll("[data-rmv]").forEach(bt=>bt.addEventListener("click",()=>{
   S.tool.email.blocks.splice(+bt.dataset.rmv,1);persist();checkTask(S.cur);renderRail();refreshTool();
  }));
  document.querySelectorAll("[data-add]").forEach(bt=>bt.addEventListener("click",()=>{
   S.tool.email.blocks.push({type:bt.dataset.add,text:""});persist();checkTask(S.cur);renderRail();refreshTool();
  }));
 } else if(S.tab==="sequence"){
  document.querySelectorAll("[data-mv]").forEach(bt=>bt.addEventListener("click",()=>{
   const i=+bt.dataset.i,dir=bt.dataset.mv,seq=S.tool.sequence;
   const j=dir==="up"?i-1:i+1;
   if(j<0||j>=seq.length)return;
   [seq[i],seq[j]]=[seq[j],seq[i]];
   persist();checkTask(S.cur);renderRail();refreshTool();
  }));
  document.querySelectorAll("[data-rmvseq]").forEach(bt=>bt.addEventListener("click",()=>{
   S.tool.sequence.splice(+bt.dataset.rmvseq,1);persist();checkTask(S.cur);renderRail();refreshTool();
  }));
  const addBtn=$("emlSeqAdd");
  if(addBtn)addBtn.addEventListener("click",()=>{
   const pick=$("emlSeqPick").value;
   S.tool.sequence.push(pick);persist();checkTask(S.cur);renderRail();refreshTool();
  });
 }
}
