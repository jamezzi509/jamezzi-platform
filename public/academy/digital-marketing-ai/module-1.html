    {q:"Le marketing digital se comprend mieux comme :",opts:["Une compétence totalement séparée du marketing normal","Les mêmes principes marketing, appliqués via des canaux digitaux","Une tendance passagère","Quelque chose que seules les grandes entreprises peuvent faire"],ans:1,fb:"Ce sont les mêmes principes de base — comprendre le client, offrir de la valeur — mais via des canaux digitaux."},
    {q:"Lequel n'est PAS un canal digital principal couvert par ce cours ?",opts:["Moteurs de recherche","Email","Vente en porte-à-porte","Réseaux sociaux"],ans:2,fb:"La vente en porte-à-porte est une méthode traditionnelle, en personne — ce n'est pas un canal digital."}],
   close:{learned:"Le marketing digital signifie utiliser des canaux en ligne — recherche, réseaux sociaux, email, publicité — pour faire connaître et vendre une entreprise, avec les mêmes principes marketing de base.",
    mistake:"Penser que le marketing digital, c'est juste poster de temps en temps sur les réseaux sociaux, sans plan lié à de vrais clients ou objectifs.",
    tip:"Avant de publier quoi que ce soit, demandez-vous : pour qui est-ce, et que voulez-vous qu'ils fassent ensuite ? Poster sans plan produit rarement des ventes.",
    assign:"Listez tous les canaux digitaux que votre entreprise touche déjà (même un WhatsApp personnel) et notez lesquels vous utilisez exprès versus par hasard.",
    dl:"Fiche de travail : Audit des Canaux Digitaux (Module 1)",
    checklist:["Avez-vous un site ou une page pour votre entreprise ?","Avez-vous un compte sur un réseau social ?","Avez-vous un moyen de collecter des emails ou numéros ?","Avez-vous un moyen de mesurer l'un de ces canaux ?"],
    ai:"J'ai une [type d'entreprise] à [lieu]. Liste 5 canaux de marketing digital les plus pertinents pour mon type d'entreprise et explique pourquoi, en langage simple."}},
 en:{lede:"Every business markets itself, whether it means to or not. Digital marketing is simply doing that on purpose, using the channels billions of people already spend their day on.",
   secs:[["The definition","Digital marketing means promoting a product, service, or brand using digital tools — websites, search engines, social media, email, online ads — instead of relying only on print, TV, radio, or in-person selling. The core marketing principles stay the same; it's the tool that changes."],
    ["Why it matters now","Most customers research online before buying, even for something they'll buy in person. A business can often reach customers for less than a TV ad or a roadside billboard would cost, and you can measure whether it's working — in numbers, not just gut feeling."],
    ["The core channels","Search (SEO/search ads), social media, email, content (articles, video), paid advertising, and influencer marketing. Each module ahead digs into one of these channels in more depth."]],
   illus:"hub",hubLabels:["Search","Social Media","Email","Content","Advertising","Influencers"],hubCenter:"Digital Marketing",
   ex:"Name one thing you already do for your business that counts as digital marketing — a WhatsApp status about your product, a Facebook post, or even replying to a customer's DM.",
   quiz:[
    {q:"Which of these is an example of digital marketing?",opts:["Handing out flyers downtown","Posting your product on Instagram","A billboard on the highway","A radio ad"],ans:1,fb:"An Instagram post is a digital channel — that's exactly what digital marketing means."},
    {q:"What's one advantage digital marketing has over most traditional marketing?",opts:["It's always free","You can measure results in numbers","It only reaches local customers","It requires no planning at all"],ans:1,fb:"One of digital's biggest advantages is being able to measure exactly what's working."},
    {q:"Digital marketing is best understood as:",opts:["A totally separate skill from regular marketing","The same marketing principles, applied through digital channels","A trend that will fade","Something only large companies can do"],ans:1,fb:"It's the same core principles — understanding the customer, offering value — just through digital channels."},
    {q:"Which is NOT one of the core digital channels this course covers?",opts:["Search engines","Email","Door-to-door sales","Social media"],ans:2,fb:"Door-to-door selling is a traditional, in-person method — not a digital channel."}],
   close:{learned:"Digital marketing means using online channels — search, social, email, ads — to promote a business, with the same core marketing principles as always.",
    mistake:"Treating digital marketing as just posting on social media occasionally, without a plan tied to real customers or goals.",
    tip:"Before posting anything, ask: who is this for, and what do I want them to do next? Posting with no plan rarely produces sales.",
    assign:"List every digital channel your business already touches (even a personal WhatsApp) and mark which ones you use on purpose versus by accident.",
    dl:"Worksheet: Digital Channels Audit (Module 1)",
    checklist:["Do you have a website or page for your business?","Do you have a social media account?","Do you have a way to collect email or phone numbers?","Do you have a way to measure any of these channels?"],
    ai:"I run a [type of business] in [location]. List 5 digital marketing channels most relevant to my type of business and explain why, in plain language."}}},

2:{ht:{lede:"Maketing dijital ak maketing tradisyonèl pa rival — se zouti pou diferan travay, epi pifò vrè biznis itilize toude.",
   secs:[["Sa maketing tradisyonèl fè byen toujou","Konfyans lokal ak vizibilite (yon ansèy sou magazen w, bouch a zorèy nan legliz oswa nan mache), li pa bezwen entènèt pou rive jwenn yon kliyan, epi li ka gen efè imedya."],
    ["Sa dijital fè ke tradisyonèl pa ka fè","Vize (rive jwenn moun selon enterè, laj, kote yo ye egzakteman), mezire (wè an chif si li mache), vitès pou teste ak chanje (ajiste yon piblisite nan yon èdtan olye w reprime flyè), ak rive lwen pi lwen pase zòn ou (kliyan nan dyaspora, kliyan lòt vil)."],
    ["Chwazi bon melanj lan","Mande tèt ou: kote vrè kliyan mwen an pase tan atansyon li? Yon biznis ki gen kliyantèl riral ak aksè limite ak entènèt ka toujou bezwen metòd fizik/bouch a zorèy; yon biznis enpòtasyon/ekspòtasyon pou dyaspora a bezwen rive lwen sou dijital."]],
   illus:"bars",barLabels:["Pri","Rive Lwen","Vize","Mezire"],barTrad:[70,40,25,15],barDig:[50,75,85,90],barTradLbl:"Tradisyonèl",barDigLbl:"Dijital",
   ex:"Chwazi yon metòd tradisyonèl biznis ou deja itilize (yon ansèy, bouch a zorèy, flyè) ak yon metòd dijital. Ekri yon fraz sou sa chak youn fè byen pou ou.",
   quiz:[
    {q:"Ki yon fòs maketing tradisyonèl genyen sou dijital?",opts:["Vize presi","Kapasite pou mezire rezilta egzat","Gwo konfyans lokal san bezwen entènèt","Kapasite pou rive jwenn kliyan dyaspora imedyatman"],ans:2,fb:"Konfyans lokal ak absans bezwen entènèt se yon fòs reyèl metòd tradisyonèl yo genyen."},
    {q:"Ki yon fòs maketing dijital genyen sou tradisyonèl?",opts:["Ou ka mezire sa k mache epi ajiste vit","Li pa janm koute anyen","Li mache menm pou kliyan ki pa gen entènèt","Li pa bezwen okenn planifikasyon"],ans:0,fb:"Kapasite pou mezire epi ajiste vit se youn nan pi gwo fòs dijital la."},
    {q:"Bon chwa pou pifò vrè biznis se...",opts:["Sèlman dijital","Sèlman tradisyonèl","Yon melanj, selon kote vrè kliyan an ye","Nenpòt sa ki alamòd"],ans:2,fb:"Pifò biznis reyèl itilize yon melanj toude, chwazi selon kote kliyan yo reyèlman ye."},
    {q:"Yon biznis enpòtasyon/ekspòtasyon pou dyaspora a gen plis bezwen...",opts:["Sèlman flyè lokal","Yon prezans dijital serye, paske kliyan gaye nan plizyè peyi","Okenn maketing menm, paske bouch a zorèy sifi","Sèlman reklam televizyon"],ans:1,fb:"Yon kliyantèl gaye atravè peyi mande yon prezans dijital pou ou ka rive jwenn yo."}],
   close:{learned:"Maketing dijital ak tradisyonèl rezoud diferan pwoblèm — pifò vrè biznis itilize yon melanj, chwazi selon kote kliyan yo reyèlman ye.",
    mistake:"Abandone yon metòd tradisyonèl ki deja ap mache (tankou bouch a zorèy lokal) jis paske 'tout moun di al nan dijital'.",
    tip:"Matche kanal la ak kliyan an, pa ak mòd — yon kliyantèl dyaspora bezwen diferan zouti pase yon kliyantèl estrikteman lokal.",
    assign:"Ekri melanj maketing ou genyen kounye a (tradisyonèl + dijital) epi make si li reyèlman matche ak kote vrè kliyan ou ye.",
    dl:"Lis Verifikasyon: Melanj Maketing ou",
    checklist:["Ou gen yon kanal konfyans lokal?","Ou gen yon kanal rive lwen dijital?","Ou gen yon fason pou mezire omwen youn nan yo?"],
    ai:"Mwen vann [pwodwi/sèvis] bay [dekri kliyan, egzanp: lokal + dyaspora]. Sijere yon melanj maketing ak 2 kanal tradisyonèl ak 2 kanal dijital ki adapte ak odyans sa a."}},
 fr:{lede:"Le marketing digital et traditionnel ne sont pas rivaux — ce sont des outils pour des tâches différentes, et la plupart des vraies entreprises utilisent les deux.",
   secs:[["Ce que le traditionnel fait toujours bien","Confiance et visibilité locales (une enseigne sur votre boutique, le bouche-à-oreille à l'église ou au marché), pas besoin d'internet pour atteindre un client, et un effet immédiat."],
    ["Ce que le digital fait que le traditionnel ne peut pas","Le ciblage (atteindre des gens selon un intérêt, un âge, un lieu précis), la mesure (voir en chiffres si ça marche), la vitesse pour tester et changer (ajuster une pub en une heure plutôt que réimprimer des tracts), et une portée au-delà de votre zone physique (clients de la diaspora, clients d'autres villes)."],
    ["Choisir le bon mélange","Demandez-vous : où mon vrai client passe-t-il son attention ? Une clientèle rurale avec un accès internet limité peut encore avoir besoin de méthodes physiques/bouche-à-oreille ; une entreprise d'import/export pour la diaspora a besoin d'une portée digitale."]],
   illus:"bars",barLabels:["Coût","Portée","Ciblage","Mesure"],barTrad:[70,40,25,15],barDig:[50,75,85,90],barTradLbl:"Traditionnel",barDigLbl:"Digital",
   ex:"Choisissez une méthode traditionnelle que votre entreprise utilise déjà (une enseigne, le bouche-à-oreille, des tracts) et une méthode digitale. Écrivez une phrase sur ce que chacune fait bien pour vous.",
   quiz:[
    {q:"Quelle est une force du marketing traditionnel sur le digital ?",opts:["Ciblage précis","Capacité à mesurer des résultats exacts","Forte confiance locale sans besoin d'internet","Capacité à atteindre instantanément les clients de la diaspora"],ans:2,fb:"La confiance locale et l'absence de besoin d'internet sont une vraie force du traditionnel."},
    {q:"Quelle est une force du marketing digital sur le traditionnel ?",opts:["Vous pouvez mesurer ce qui marche et ajuster vite","Il ne coûte jamais rien","Il fonctionne même sans internet","Il ne demande aucune planification"],ans:0,fb:"La capacité à mesurer et ajuster rapidement est une des plus grandes forces du digital."},
    {q:"Le bon choix pour la plupart des vraies entreprises est :",opts:["Seulement le digital","Seulement le traditionnel","Un mélange, selon où se trouve vraiment le client","N'importe quoi de tendance"],ans:2,fb:"La plupart des vraies entreprises utilisent un mélange des deux, choisi selon où sont vraiment leurs clients."},
    {q:"Une entreprise d'import/export pour la diaspora a surtout besoin de :",opts:["Seulement des tracts locaux","Une vraie présence digitale, car les clients sont dans plusieurs pays","Aucun marketing, le bouche-à-oreille suffit","Seulement des pubs télé"],ans:1,fb:"Une clientèle dispersée dans plusieurs pays demande une présence digitale pour la joindre."}],
   close:{learned:"Le digital et le traditionnel résolvent des problèmes différents — la plupart des vraies entreprises utilisent un mélange, choisi selon où sont vraiment leurs clients.",
    mistake:"Abandonner une méthode traditionnelle qui fonctionne déjà (comme le bouche-à-oreille local) simplement parce que « tout le monde dit d'aller au digital ».",
    tip:"Faites correspondre le canal au client, pas à la tendance — une clientèle diaspora a besoin d'outils différents d'une clientèle strictement locale.",
    assign:"Écrivez votre mélange marketing actuel (traditionnel + digital) et notez s'il correspond vraiment à où sont vos vrais clients.",
    dl:"Liste de vérification : Votre Mélange Marketing",
    checklist:["Avez-vous un canal de confiance locale ?","Avez-vous un canal de portée digitale ?","Avez-vous un moyen de mesurer au moins l'un des deux ?"],
    ai:"Je vends [produit/service] à [décrire le client, ex : local + diaspora]. Suggère un mélange marketing de 2 canaux traditionnels et 2 canaux digitaux adaptés à ce public."}},
 en:{lede:"Digital and traditional marketing aren't rivals — they're tools for different jobs, and most real businesses use both.",
   secs:[["What traditional marketing still does well","Local trust and visibility (a sign on your shop, word of mouth at church or the market), no internet needed to reach a customer, and an immediate effect."],
    ["What digital does that traditional can't","Targeting (reaching people by exact interest, age, location), measurement (seeing in numbers whether it worked), speed to test and change (adjusting an ad in an hour instead of reprinting flyers), and reach beyond your physical area (diaspora customers, out-of-town customers)."],
    ["Choosing the right mix","Ask yourself: where does my actual customer spend their attention? A rural clientele with limited internet access may still need physical/word-of-mouth methods; a diaspora-facing import/export business needs real digital reach."]],
   illus:"bars",barLabels:["Cost","Reach","Targeting","Measurement"],barTrad:[70,40,25,15],barDig:[50,75,85,90],barTradLbl:"Traditional",barDigLbl:"Digital",
   ex:"Pick one traditional marketing method your business already uses (a sign, word of mouth, flyers) and one digital method. Write one sentence on what each does well for you.",
   quiz:[
    {q:"Which is a strength of traditional marketing over digital?",opts:["Precise audience targeting","Ability to measure exact results","Strong local trust with no internet needed","Instant reach to diaspora customers"],ans:2,fb:"Local trust and not needing internet access is a real strength of traditional methods."},
    {q:"Which is a strength of digital marketing over traditional?",opts:["You can measure what worked and adjust quickly","It always costs nothing","It works even without internet","It requires no planning"],ans:0,fb:"The ability to measure and adjust quickly is one of digital's biggest strengths."},
    {q:"The right choice for most real businesses is:",opts:["Only digital","Only traditional","A mix, based on where the actual customer is","Whichever is trendiest"],ans:2,fb:"Most real businesses use a mix of both, chosen based on where their customers actually are."},
    {q:"A diaspora-facing import/export business most likely needs:",opts:["Only local flyers","A meaningful digital presence, since customers are spread across countries","No marketing at all, since word of mouth is enough","Only TV ads"],ans:1,fb:"A customer base spread across countries needs a digital presence to actually reach them."}],
   close:{learned:"Digital and traditional marketing solve different problems — most real businesses use a mix, chosen based on where customers actually are.",
    mistake:"Abandoning a traditional method that already works (like local word of mouth) just because 'everyone says go digital.'",
    tip:"Match the channel to the customer, not the trend — a diaspora clientele needs different tools than a strictly local one.",
    assign:"Write down your current marketing mix (traditional + digital) and mark whether it actually matches where your real customers are.",
    dl:"Checklist: Your Marketing Mix",
    checklist:["Do you have a local-trust channel?","Do you have a digital-reach channel?","Do you have a way to measure at least one of them?"],
    ai:"I sell [product/service] to [describe customer, e.g. local + diaspora]. Suggest a marketing mix of 2 traditional and 2 digital channels suited to this audience."}}},

3:{ht:{lede:"Pèsonn pa achte premye fwa yo tande pale de ou — yo pase nan plizyè etap, epi konnen etap yo di w egzakteman kisa pou di nan chak moman.",
   secs:[["Kat etap yo","KONNEN (yo aprann ou egziste), KONPARE (yo konpare w ak lòt opsyon), DESIDE (yo chwazi/achte), FIDELITE (yo tounen epi yo pale de ou bay lòt moun). Egzanp: yon kliyan dyaspora wè yon piblisite Facebook pou yon sèvis enpòtasyon Ayiti = Konnen; li konpare pri/kòmantè 2-3 vandè = Konpare; li voye lajan an = Deside; li kòmande ankò mwa apre epi li rekòmande yon kouzen = Fidelite."],
    ["Matche kontni ak chak etap","Kontni Konnen reponn 'kisa sa ye?', kontni Konpare reponn 'poukisa ou, pa yo?', kontni Deside retire fristrasyon (pri klè, fason fasil pou peye/kòmande), kontni Fidelite kenbe relasyon an vivan (swiv, di mèsi, mande yon rekòmandasyon)."],
    ["Erè komen nan vwayaj la","Fè sèlman kontni 'achte kounye a' (sote Konnen/Konpare, sanble two ajisan pou moun ki poko konnen w); oswa lòt bò a, fè sèlman kontni 'fè moun konnen w' ki pa janm mande vant lan."]],
   illus:"journey",journeyLabels:["Konnen","Konpare","Deside","Fidelite"],
   ex:"Panse ak 3 dènye kliyan ou. Pou chak, èske ou ka di ki etap ki te fè yo konnen ou?",
   quiz:[
    {q:"Yon kliyan wè biznis ou pou premye fwa nan yon pòs yon zanmi pataje. Ki etap sa a?",opts:["Deside","Konpare","Konnen","Fidelite"],ans:2,fb:"Premye fwa yo tande pale de ou se etap KONNEN."},
    {q:"Yon kliyan voye mesaj bay 2 vandè pou konpare pri anvan li chwazi. Ki etap?",opts:["Konnen","Konpare","Deside","Fidelite"],ans:1,fb:"Konpare plizyè opsyon anvan yo chwazi se etap KONPARE."},
    {q:"Kontni ki toujou di 'Achte kounye a!' san kontèks echwe sitou nan ki etap?",opts:["Fidelite","Konnen ak Konpare","Deside","Okenn, li mache nan tout etap"],ans:1,fb:"San kontèks, moun ki poko konnen oswa konpare w ap santi kontni sa a two ajisan."},
    {q:"Yon kliyan ki tounen epi ki rekòmande yon kouzen nan ki etap?",opts:["Konnen","Konpare","Deside","Fidelite"],ans:3,fb:"Tounen achte epi rekòmande se sign FIDELITE."}],
   close:{learned:"Kliyan pase nan 4 etap — Konnen, Konpare, Deside, Fidelite — anvan ak apre yo achte.",
    mistake:"Montre sèlman kontni 'achte kounye a' bay moun ki toujou nan etap Konnen epi ki poko konnen oswa fè w konfyans.",
    tip:"Kreye omwen yon kontni pou chak nan 4 etap yo — pa jis pòs vant.",
    assign:"Ekri yon lide kontni pou chak nan 4 etap yo, pou pwòp biznis ou.",
    dl:"Modèl: Kat Vwayaj Kliyan an",
    checklist:["Ou gen kontni Konnen?","Ou gen kontni Konpare?","Ou retire fristrasyon nan etap Deside a?","Ou gen swivi pou Fidelite?"],
    ai:"Biznis mwen se [dekri l]. Ekri yon ti egzanp pòs pou chak etap vwayaj kliyan: Konnen, Konpare, Deside, Fidelite."}},
 fr:{lede:"Personne n'achète la première fois qu'il entend parler de vous — les gens traversent des étapes, et connaître ces étapes vous dit exactement quoi dire à chaque moment.",
   secs:[["Les 4 étapes","DÉCOUVERTE (ils apprennent que vous existez), COMPARAISON (ils vous comparent à d'autres options), DÉCISION (ils choisissent/achètent), FIDÉLITÉ (ils reviennent et en parlent). Exemple : un client de la diaspora voit une pub Facebook pour un service d'import Haïti = Découverte ; il compare prix/avis de 2-3 vendeurs = Comparaison ; il envoie le paiement = Décision ; il recommande le mois suivant à un cousin = Fidélité."],
    ["Adapter le contenu à chaque étape","Le contenu Découverte répond « qu'est-ce que c'est ? », le contenu Comparaison répond « pourquoi vous, pas eux ? », le contenu Décision retire les frictions (prix clair, façon facile de payer/commander), le contenu Fidélité garde la relation vivante (suivi, remerciement, demande de recommandation)."],
    ["Erreurs fréquentes du parcours","Ne créer que du contenu « achetez maintenant » (saute Découverte/Comparaison, semble trop insistant pour des gens qui ne vous connaissent pas encore) ; ou l'inverse, du contenu qui ne fait connaître la marque sans jamais demander la vente."]],
   illus:"journey",journeyLabels:["Découverte","Comparaison","Décision","Fidélité"],
   ex:"Pensez à vos 3 derniers clients. Pour chacun, pouvez-vous dire quelle étape vous les a fait connaître ?",
   quiz:[
    {q:"Un client voit votre entreprise pour la première fois dans un post partagé par un ami. Quelle étape ?",opts:["Décision","Comparaison","Découverte","Fidélité"],ans:2,fb:"La première fois qu'on entend parler de vous, c'est l'étape DÉCOUVERTE."},
    {q:"Un client message 2 vendeurs pour comparer les prix avant de choisir. Quelle étape ?",opts:["Découverte","Comparaison","Décision","Fidélité"],ans:1,fb:"Comparer plusieurs options avant de choisir, c'est l'étape COMPARAISON."},
    {q:"Un contenu qui ne dit que « Achetez maintenant ! » sans contexte échoue surtout à quelle étape ?",opts:["Fidélité","Découverte et Comparaison","Décision","Aucune, ça marche à toutes les étapes"],ans:1,fb:"Sans contexte, les gens qui ne vous connaissent pas encore trouveront ce contenu trop insistant."},
    {q:"Un client fidèle qui recommande un cousin est à quelle étape ?",opts:["Découverte","Comparaison","Décision","Fidélité"],ans:3,fb:"Racheter et recommander est un signe de FIDÉLITÉ."}],
   close:{learned:"Les clients traversent 4 étapes — Découverte, Comparaison, Décision, Fidélité — avant et après l'achat.",
    mistake:"Ne montrer que du contenu « achetez maintenant » à des gens encore en étape Découverte qui ne vous connaissent ou ne vous font pas encore confiance.",
    tip:"Créez au moins un contenu pour chacune des 4 étapes — pas seulement des posts de vente.",
    assign:"Écrivez une idée de contenu pour chacune des 4 étapes, pour votre propre entreprise.",
    dl:"Modèle : Carte du Parcours Client",
    checklist:["Avez-vous du contenu Découverte ?","Avez-vous du contenu Comparaison ?","Retirez-vous les frictions à l'étape Décision ?","Avez-vous un suivi Fidélité ?"],
    ai:"Mon entreprise est [décrire]. Écris un court exemple de post pour chaque étape du parcours client : Découverte, Comparaison, Décision, Fidélité."}},
 en:{lede:"Nobody buys the first time they hear about you — they travel through stages, and knowing the stages tells you exactly what to say at each one.",
   secs:[["The 4 stages","AWARENESS (they learn you exist), CONSIDERATION (they compare you to other options), DECISION (they choose/buy), LOYALTY (they come back and tell others). Example: a diaspora customer sees a Facebook ad for a Haiti-import service = Awareness; they compare 2-3 sellers' prices/reviews = Consideration; they send payment = Decision; they reorder next month and recommend a cousin = Loyalty."],
    ["Matching content to each stage","Awareness content answers 'what is this?', Consideration content answers 'why you, not them?', Decision content removes friction (clear price, an easy way to pay/order), Loyalty content keeps the relationship going (follow-up, a thank-you, a referral ask)."],
    ["Common journey mistakes","Only creating 'buy now' content (skips Awareness/Consideration, feels pushy to strangers who don't know you yet); or the opposite — only brand-awareness content that never actually asks for the sale."]],
   illus:"journey",journeyLabels:["Awareness","Consideration","Decision","Loyalty"],
   ex:"Think of your last 3 customers. For each one, can you name which stage introduced them to you?",
   quiz:[
    {q:"A customer sees your business for the first time in a friend's shared post. What stage is this?",opts:["Decision","Consideration","Awareness","Loyalty"],ans:2,fb:"The first time someone hears about you is the AWARENESS stage."},
    {q:"A customer messages 2 sellers to compare prices before choosing. What stage is this?",opts:["Awareness","Consideration","Decision","Loyalty"],ans:1,fb:"Comparing options before choosing is the CONSIDERATION stage."},
    {q:"Content that only ever says 'Buy now!' with no context mainly fails at which stage?",opts:["Loyalty","Awareness and Consideration","Decision","None, it works at every stage"],ans:1,fb:"With no context, people who don't know or trust you yet will find this content pushy."},
    {q:"A repeat customer who refers a cousin is in which stage?",opts:["Awareness","Consideration","Decision","Loyalty"],ans:3,fb:"Repeat purchases and referrals are a sign of LOYALTY."}],
   close:{learned:"Customers move through 4 stages — Awareness, Consideration, Decision, Loyalty — before and after buying.",
    mistake:"Showing only 'buy now' content to people who are still in Awareness and don't know or trust you yet.",
    tip:"Create at least one piece of content for each of the 4 stages — not just sales posts.",
    assign:"Write one content idea for each of the 4 stages, for your own business.",
    dl:"Template: Customer Journey Map",
    checklist:["Do you have Awareness content?","Do you have Consideration content?","Do you remove friction at the Decision stage?","Do you have Loyalty follow-up?"],
    ai:"My business is [describe]. Write one short example post for each customer journey stage: Awareness, Consideration, Decision, Loyalty."}}},

4:{ht:{lede:"Antonwa a se vwayaj kliyan an tounen an chif — li montre w egzakteman kote moun ap kite, konsa ou konnen kisa pou repare.",
   secs:[["Kisa yon antonwa ye","Yon seri etap ki vin pi etwat: soti nan 'tout moun ki ka wè w' desann jis 'moun ki achte': Rive/Konnen → Enterè → Konsiderasyon → Konvèsyon (achte) — toujou mwens moun nan chak etap pase etap anvan an."],
    ["Li yon antonwa","Si 1000 moun wè yon pòs ou, 200 klike pou aprann plis, 40 voye mesaj, 5 achte: chak chif la revele yon pwoblèm diferan — pi ba to klik = pòs la pa atire atansyon; anpil klik men pè mesaj = ofri pa klè/pa gen apèl aksyon; anpil mesaj men pè vant = pwoblèm pri/konfyans/klotire vant."],
    ["Itilize antonwa a pou amelyore","Idantifye toujou pi gwo pwen kote moun kite anvan, epi repare etap sa a anvan tout lòt bagay, olye ou eseye repare tout bagay an menm tan."]],
   illus:"funnel",funnelLabels:["Rive","Enterè","Konsiderasyon","Vant"],funnelNums:["1000","200","40","5"],
   ex:"Estime pwòp antonwa apwoksimatif ou pou mwa pase a (konbyen moun ki wè pòs ou yo, konbyen ki voye mesaj, konbyen ki achte) menm si se yon estimasyon apwoksimatif.",
   quiz:[
    {q:"Nan yon antonwa, kisa ki tipikman rive nan chak etap desann?",opts:["Kantite moun ogmante","Kantite moun diminye","Li rete egzakteman menm","Li depann sèlman de chans"],ans:1,fb:"Nòmalman, mwens moun rete nan chak etap ki vin apre a."},
    {q:"1000 moun wè yon pòs, sèlman 10 klike. Kisa sa sijere?",opts:["Pri a two wo","Pòs la menm pa atire atansyon","Twòp moun te wè l","Antonwa a kase epi li pa ka itilize"],ans:1,fb:"Yon to klik ba tankou sa sijere pòs la pa reyisi atire atansyon."},
    {q:"Anpil moun voye mesaj, men prèske pèsonn pa achte. Ki pwoblèm ki gen plis chans?",opts:["Rive w two piti","Yon bagay nan pri, konfyans, oswa klotire vant","Pòs ou pa t wè","Antonwa a gen twòp etap"],ans:1,fb:"Lè moun mesaje men pa achte, sa souvan mande gade pri, konfyans, oswa fason w klotire vant lan."},
    {q:"Fason ki pi itil pou itilize yon antonwa se...",opts:["Eseye repare tout etap yon sèl kou","Inyore l epi jis poste plis","Jwenn pi gwo pwen moun kite a epi repare etap sa a anvan","Gade l sèlman yon fwa pa ane"],ans:2,fb:"Jwenn pi gwo pwoblèm nan anvan, epi konsantre la a, se fason ki pi efikas pou itilize antonwa a."}],
   close:{learned:"Yon antonwa tounen vwayaj kliyan an an chif, li montre egzakteman kote moun ap kite.",
    mistake:"Eseye repare tout etap yon sèl kou olye w jwenn epi repare pi gwo pwen kote moun kite a anvan.",
    tip:"Menm chif apwoksimatif (pa analitik pafè) ka sifi pou wè yon pwoblèm evidan nan yon etap.",
    assign:"Ekri chif apwoksimatif antonwa ou pou mwa pase a epi antoure etap ki gen pi gwo pèt la.",
    dl:"Zouti: Swivi Antonwa Senp",
    checklist:["Ou konnen chif rive w la?","Ou konnen chif enterè/klik la?","Ou konnen chif mesaj/kesyon an?","Ou konnen chif vant lan?"],
    ai:"Men chif apwoksimatif mwen: [rive], [klik/enterè], [mesaj], [vant]. Di m ki etap antonwa a ki pi gwo pwoblèm mwen an ak 2 fason pou amelyore l."}},
 fr:{lede:"L'entonnoir transforme le parcours client en chiffres — il montre exactement où les gens abandonnent, pour savoir ce qu'il faut corriger.",
   secs:[["Qu'est-ce qu'un entonnoir","Une série d'étapes qui se rétrécit : de « tous ceux qui pourraient vous voir » jusqu'à « ceux qui achètent » : Portée/Découverte → Intérêt → Considération → Conversion (achat) — naturellement moins de gens à chaque étape que la précédente."],
    ["Lire un entonnoir","Si 1000 personnes voient votre post, 200 cliquent pour en savoir plus, 40 vous écrivent, 5 achètent : chaque chiffre révèle un problème différent — faible taux de clic = le post n'attire pas l'attention ; beaucoup de clics mais peu de messages = offre pas claire/pas d'appel à l'action ; beaucoup de messages mais peu de ventes = problème de prix, de confiance, ou de conclusion de vente."],
    ["Utiliser l'entonnoir pour s'améliorer","Identifiez toujours le plus gros point d'abandon en premier, et corrigez cette étape avant tout le reste, plutôt que d'essayer de tout réparer d'un coup."]],
   illus:"funnel",funnelLabels:["Portée","Intérêt","Considération","Vente"],funnelNums:["1000","200","40","5"],
   ex:"Estimez votre entonnoir approximatif du mois dernier (combien de personnes ont vu vos posts, combien vous ont écrit, combien ont acheté), même si c'est une estimation approximative.",
   quiz:[
    {q:"Dans un entonnoir, que se passe-t-il typiquement à chaque étape ?",opts:["Le nombre de personnes augmente","Le nombre de personnes diminue","Il reste exactement le même","Ça dépend seulement de la chance"],ans:1,fb:"Normalement, il reste moins de personnes à chaque étape suivante."},
    {q:"1000 personnes voient un post, seulement 10 cliquent. Que suggère cela ?",opts:["Le prix est trop élevé","Le post lui-même n'attire pas l'attention","Trop de gens l'ont vu","L'entonnoir est cassé et inutilisable"],ans:1,fb:"Un taux de clic aussi bas suggère que le post n'attire pas l'attention."},
    {q:"Beaucoup de gens vous écrivent, mais presque personne n'achète. Quel est le problème probable ?",opts:["Votre portée est trop petite","Quelque chose lié au prix, à la confiance, ou à la conclusion de la vente","Votre post n'a pas été vu","Votre entonnoir a trop d'étapes"],ans:1,fb:"Beaucoup de messages mais peu de ventes pointe souvent vers le prix, la confiance, ou la façon de conclure la vente."},
    {q:"La façon la plus utile d'utiliser un entonnoir est de :",opts:["Essayer de réparer toutes les étapes d'un coup","L'ignorer et juste poster plus","Trouver le plus gros point d'abandon et le corriger en premier","Ne le regarder qu'une fois par an"],ans:2,fb:"Trouver le plus gros problème d'abord, puis s'y concentrer, est la façon la plus efficace d'utiliser un entonnoir."}],
   close:{learned:"Un entonnoir transforme le parcours client en chiffres, montrant exactement où les gens abandonnent.",
    mistake:"Essayer de réparer toutes les étapes à la fois plutôt que de trouver et corriger le plus gros point d'abandon en premier.",
    tip:"Même des chiffres approximatifs (pas une analytique parfaite) suffisent pour repérer un problème évident.",
    assign:"Écrivez vos chiffres approximatifs d'entonnoir du mois dernier et entourez l'étape avec la plus grosse perte.",
    dl:"Outil : Suivi d'Entonnoir Simple",
    checklist:["Connaissez-vous votre chiffre de portée ?","Connaissez-vous votre chiffre d'intérêt/clics ?","Connaissez-vous votre chiffre de messages/questions ?","Connaissez-vous votre chiffre de ventes ?"],
    ai:"Voici mes chiffres approximatifs : [portée], [clics/intérêt], [messages], [ventes]. Dis-moi quelle étape de mon entonnoir est mon plus gros problème et donne 2 façons de l'améliorer."}},
 en:{lede:"A funnel turns the customer journey into numbers — it shows you exactly where people are dropping off, so you know what to fix.",
   secs:[["What a funnel is","A narrowing set of stages from 'everyone who could see you' down to 'people who bought': Reach/Awareness → Interest → Consideration → Conversion (purchase) — naturally fewer people at each stage than the one before."],
    ["Reading a funnel","If 1000 people see your post, 200 click to learn more, 40 message you, 5 buy: each number reveals a different problem — a low click rate means the post isn't grabbing attention; lots of clicks but few messages means an unclear offer or no call to action; lots of messages but few sales means a price, trust, or closing problem."],
    ["Using the funnel to improve","Always identify the biggest drop-off point first, and fix that stage before anything else, rather than trying to fix everything at once."]],
   illus:"funnel",funnelLabels:["Reach","Interest","Consideration","Sale"],funnelNums:["1000","200","40","5"],
   ex:"Estimate your own rough funnel for last month (how many people saw your posts, how many messaged you, how many bought), even if it's just a rough guess.",
   quiz:[
    {q:"In a funnel, what typically happens at each stage going down?",opts:["The number of people grows","The number of people shrinks","It stays exactly the same","It depends only on luck"],ans:1,fb:"Normally, fewer people remain at each stage going down."},
    {q:"1000 people see a post, only 10 click. What does that suggest?",opts:["The price is too high","The post itself isn't grabbing attention","Too many people saw it","The funnel is broken and unusable"],ans:1,fb:"A click rate that low suggests the post itself isn't grabbing attention."},
    {q:"Lots of people message you, but almost none buy. What's the likely issue?",opts:["Your reach is too small","Something in price, trust, or closing the sale","Your post didn't get seen","Your funnel has too many stages"],ans:1,fb:"Lots of messages but few sales usually points to price, trust, or how you close the sale."},
    {q:"The most useful way to use a funnel is to:",opts:["Try to fix every stage at once","Ignore it and just post more","Find the biggest drop-off and fix that stage first","Only look at it once a year"],ans:2,fb:"Finding the biggest problem first, then focusing there, is the most effective way to use a funnel."}],
   close:{learned:"A funnel turns the customer journey into numbers, showing exactly where people drop off.",
    mistake:"Trying to fix every stage at once instead of finding and fixing the single biggest drop-off first.",
    tip:"Even rough numbers (not perfect analytics) are enough to spot an obvious problem stage.",
    assign:"Write your rough funnel numbers for last month and circle the stage with the biggest drop.",
    dl:"Tool: Simple Funnel Tracker",
    checklist:["Do you know your reach number?","Do you know your interest/click number?","Do you know your message/inquiry number?","Do you know your sale number?"],
    ai:"Here are my rough numbers: [reach], [clicks/interest], [messages], [sales]. Tell me which funnel stage is my biggest problem and give 2 ways to improve it."}}},

5:{ht:{lede:"Moun pa achte pwodwi — yo achte sa pwodwi a fè pou lavi yo. Konprann valè vle di gade ofri w la ak zye kliyan an, pa ak pa w.",
   secs:[["Karakteristik kont avantaj","Yon karakteristik se yon reyalite sou pwodwi a ('kwizinyè diri sa a gen 6 vitès'); yon avantaj se sa reyalite sa a vle di pou lavi kliyan an ('manje pare nan 20 minit san w pa bezwen siveye l'). Kliyan aji poutèt avantaj, pa karakteristik."],
    ["Valè relatif ak kliyan an, li pa inivèsèl","Menm pwodwi a gen diferan valè pou diferan moun (yon chajè telefòn rapid se 'pratik' pou yon achtè epi 'endispansab pou travay livrezon mwen' pou yon lòt) — konnen ki valè ki enpòtan pou vrè kliyan ou."],
    ["Kominike valè yon fason klè","Kòmanse ak avantaj la, itilize karakteristik la pou apiye l, pa lòt sans lan; evite deklarasyon valè vag ('pi bon kalite a') pou spesifik ('rete frèt pou 24 èdtan')."]],
   illus:"fbmap",fbRows:[["Motè 1000 wat","Kraze glas an sekonn, konsa ou pa janm tann pou yon smoothie"],["Batri ki dire 3 jou","Ou pa bezwen chaje l chak swa, sa vle di mwens tèt chaje pou ou"]],fbFeat:"Karakteristik",fbBen:"Avantaj",
   ex:"Chwazi yon pwodwi/sèvis ou vann. Ekri yon karakteristik epi tradwi l an yon fraz avantaj.",
   quiz:[
    {q:"'Blenndè sa a gen yon motè 1000 wat' se yon egzanp...",opts:["Yon avantaj","Yon karakteristik","Yon pri","Yon etap antonwa"],ans:1,fb:"Se yon fè sou pwodwi a — yon karakteristik."},
    {q:"'Blenndè sa a kraze glas an sekonn, konsa ou pa janm tann pou yon smoothie' se yon egzanp...",opts:["Yon karakteristik","Yon avantaj","Yon kanal tradisyonèl","Yon manti"],ans:1,fb:"Sa se sa karakteristik la vle di pou lavi kliyan an — yon avantaj."},
    {q:"Pi bon fason pou konprann valè se...",opts:["Menm bagay la pou chak kliyan, toujou","Diferan selon sa ki enpòtan pou kliyan spesifik sa a","Sèlman konsène pi ba pri a","Sèlman pètinan nan Modil 4"],ans:1,fb:"Valè depann de kilès kliyan an ye, ak sa ki enpòtan pou li spesyalman."},
    {q:"Fason ki pi klè pou kominike valè se...",opts:["Fè yon lis tout karakteristik epi kite kliyan an dekouvri poukisa","Kòmanse ak avantaj la, epi itilize karakteristik la pou apiye l","Itilize mo vag tankou 'pi bon kalite'","Konsantre sèlman sou pri a"],ans:1,fb:"Kòmanse ak sa kliyan an genyen ladan l, apre montre karakteristik la kòm prèv, se pi efikas."}],
   close:{learned:"Kliyan achte avantaj (sa li fè pou yo), pa karakteristik (fè sou pwodwi a) — valè depann de kliyan spesifik la.",
    mistake:"Fè yon lis karakteristik epi sipoze kliyan an ap dekouvri poukisa sa enpòtan pou li.",
    tip:"Ranplase deklarasyon vag ('pi bon kalite') pou spesifik ak konkrè ('rete frèt 24 èdtan') — deklarasyon spesifik pi konvenkan.",
    assign:"Pou pi gwo pwodwi/sèvis ou, ekri 3 karakteristik epi tradwi chak an yon fraz avantaj pou kliyan.",
    dl:"Fèy Travay: Karakteristik → Avantaj",
    checklist:["Karakteristik la make?","Avantaj la ekri nan langaj kliyan an?","Deklarasyon vag ranplase ak spesifik?"],
    ai:"Pwodwi/sèvis mwen se [dekri l]. Fè yon lis 3 karakteristik epi tradwi chak an yon fraz avantaj klè pou kliyan."}},
 fr:{lede:"Les gens n'achètent pas des produits — ils achètent ce que le produit fait pour leur vie. Comprendre la valeur, c'est voir votre offre à travers les yeux du client, pas les vôtres.",
   secs:[["Caractéristiques contre avantages","Une caractéristique est un fait sur le produit (« ce cuiseur à riz a 6 réglages ») ; un avantage est ce que ce fait signifie pour la vie du client (« le dîner est prêt en 20 minutes sans surveiller la marmite »). Les clients agissent sur les avantages, pas les caractéristiques."],
    ["La valeur est relative au client, pas universelle","Le même produit a une valeur différente selon les gens (un chargeur rapide est « pratique » pour un acheteur et « essentiel pour mon travail de livraison » pour un autre) — sachez quelle valeur compte pour votre vrai client."],
    ["Communiquer la valeur clairement","Commencez par l'avantage, utilisez la caractéristique pour l'appuyer, pas l'inverse ; évitez les affirmations de valeur vagues (« la meilleure qualité ») au profit de spécifiques (« reste froid 24 heures »)."]],
   illus:"fbmap",fbRows:[["Moteur de 1000 watts","Écrase la glace en quelques secondes, vous n'attendez jamais pour un smoothie"],["Batterie qui dure 3 jours","Pas besoin de la recharger chaque soir, moins de tracas pour vous"]],fbFeat:"Caractéristique",fbBen:"Avantage",
   ex:"Choisissez un produit/service que vous vendez. Écrivez une caractéristique et traduisez-la en une phrase d'avantage.",
   quiz:[
    {q:"« Ce mixeur a un moteur de 1000 watts » est un exemple de :",opts:["Un avantage","Une caractéristique","Un prix","Une étape d'entonnoir"],ans:1,fb:"C'est un fait sur le produit — une caractéristique."},
    {q:"« Ce mixeur écrase la glace en quelques secondes, vous n'attendez jamais pour un smoothie » est un exemple de :",opts:["Une caractéristique","Un avantage","Un canal traditionnel","Un mythe"],ans:1,fb:"C'est ce que la caractéristique signifie pour la vie du client — un avantage."},
    {q:"La meilleure façon de comprendre la valeur est :",opts:["La même pour chaque client, toujours","Différente selon ce qui compte pour ce client spécifique","Seulement une question de prix le plus bas","Pertinente seulement au Module 4"],ans:1,fb:"La valeur dépend de qui est le client, et de ce qui compte spécifiquement pour lui."},
    {q:"La façon la plus claire de communiquer la valeur est de :",opts:["Lister toutes les caractéristiques et laisser le client deviner l'avantage","Commencer par l'avantage, et utiliser la caractéristique pour l'appuyer","Utiliser des mots vagues comme « meilleure qualité »","Se concentrer seulement sur le prix"],ans:1,fb:"Commencer par ce que le client y gagne, puis montrer la caractéristique comme preuve, est plus efficace."}],
   close:{learned:"Les clients achètent des avantages (ce que ça fait pour eux), pas des caractéristiques (des faits sur le produit) — la valeur dépend du client spécifique.",
    mistake:"Lister des caractéristiques en supposant que le client comprendra pourquoi ça compte pour lui.",
    tip:"Remplacez les affirmations vagues (« meilleure qualité ») par des affirmations spécifiques et concrètes (« reste froid 24 heures ») — c'est plus convaincant.",
    assign:"Pour votre produit/service principal, écrivez 3 caractéristiques et traduisez chacune en une phrase d'avantage client.",
    dl:"Fiche de travail : Caractéristique → Avantage",
    checklist:["Caractéristique notée ?","Avantage écrit dans le langage du client ?","Affirmations vagues remplacées par des spécifiques ?"],
    ai:"Mon produit/service est [décrire]. Liste 3 caractéristiques et traduis chacune en une phrase d'avantage client claire."}},
 en:{lede:"People don't buy products — they buy what the product does for their life. Understanding value means seeing your offer through your customer's eyes, not your own.",
   secs:[["Features vs. benefits","A feature is a fact about the product ('this rice cooker has 6 settings'); a benefit is what that fact means for the customer's life ('dinner's ready in 20 minutes without watching the pot'). Customers act on benefits, not features."],
    ["Value is relative to the customer, not universal","The same product has different value to different people (a fast phone charger is 'convenient' to one buyer and 'essential for my delivery job' to another) — know which value matters to your actual customer."],
    ["Communicating value clearly","Lead with the benefit, use the feature to back it up, not the other way around; avoid vague value claims ('the best quality') in favor of specific ones ('stays cold for 24 hours')."]],
   illus:"fbmap",fbRows:[["1000-watt motor","Crushes ice in seconds, so you never wait around for a smoothie"],["Battery lasts 3 days","No need to recharge every night, one less thing to think about"]],fbFeat:"Feature",fbBen:"Benefit",
   ex:"Pick one product/service you sell. Write one feature and translate it into one benefit sentence.",
   quiz:[
    {q:"'This blender has a 1000-watt motor' is an example of:",opts:["A benefit","A feature","A price","A funnel stage"],ans:1,fb:"That's a fact about the product — a feature."},
    {q:"'This blender crushes ice in seconds, so you never wait for a smoothie' is an example of:",opts:["A feature","A benefit","A traditional channel","A myth"],ans:1,fb:"That's what the feature means for the customer's life — a benefit."},
    {q:"Value is best understood as:",opts:["The same for every customer, always","Different depending on what matters to that specific customer","Only about the lowest price","Only relevant in Module 4"],ans:1,fb:"Value depends on who the customer is, and what specifically matters to them."},
    {q:"The clearest way to communicate value is to:",opts:["List every feature and let the customer figure out the benefit","Lead with the benefit, and use the feature to support it","Use vague words like 'best quality'","Focus only on price"],ans:1,fb:"Leading with what the customer gains, then showing the feature as proof, works better."}],
   close:{learned:"Customers buy benefits (what it does for them), not features (facts about the product) — value depends on the specific customer.",
    mistake:"Listing features and assuming the customer will figure out why it matters to them.",
    tip:"Replace vague claims ('best quality') with specific, concrete ones ('stays cold 24 hours') — specific claims are more convincing.",
    assign:"For your top product/service, write 3 features and translate each into a customer benefit sentence.",
    dl:"Worksheet: Feature-to-Benefit",
    checklist:["Feature listed?","Benefit written in customer language?","Vague claims replaced with specifics?"],
    ai:"My product/service is [describe]. List 3 features and translate each into a clear customer benefit sentence."}}},

6:{ht:{lede:"Move konsèy gaye pi vit pase bon konsèy sou entènèt — anvan w bati yon estrateji, li ede pou retire sa ki senpleman pa vre.",
   secs:[["Manti: 'Ou bezwen anpil abòne pou vann anliy'","Reyalite: yon ti odyans angaje ki fè w konfyans vann pi byen pase yon gwo odyans ki pa angaje; yon lis WhatsApp 50 kliyan fidèl ka vann plis pase yon paj 10,000 abòne pèsonn pa fè konfyans."],
    ["Manti: 'Maketing dijital gratis'","Reyalite: li koute tan menm lè li pa koute lajan, epi rive lwen peye (piblisite) souvan nesesè lè platfòm yo menm limite rive lwen òganik la."],
    ["Manti: 'Poste plis, vann plis' / 'Yon sèl pòs viral = siksè'","Reyalite: konsistans ak vize enpòtan plis pase volim oswa chans; yon sèl moman viral san yon plan pou kaptire moun sa yo (yon fason pou mesaje/swiv yo) souvan pa tounen an vrè vant ki dire."]],
   illus:"myths",mythCards:[["Ou bezwen 10,000 abòne","Yon ti lis moun ki fè w konfyans vann pi byen"],["Se gratis nèt","Li koute tan, souvan li mande peye tou"],["Plis pòs = plis vant","Konsistans ak vize bat volim"]],mythTag:"MANTI",realTag:"REYALITE",
   ex:"Kilès nan 3 manti sa yo ou te kwè anvan leson sa a? Ekri yon fraz sou poukisa reyalite a chanje sa ou pral fè diferan.",
   quiz:[
    {q:"Kilès ki vre sou gwosè odyans lan?",opts:["Ou toujou bezwen plis pase 10,000 abòne pou vann","Yon ti odyans ki fè w konfyans ka vann plis pase yon gwo ki pa angaje","Kantite abòne se sèl bagay ki konte","Abòne toujou egal vant"],ans:1,fb:"Yon ti odyans ki fè konfyans souvan vann pi byen pase yon gwo odyans ki pa angaje."},
    {q:"Èske maketing dijital gratis?",opts:["Wi, toujou","Non — li koute tan menm san lajan, epi souvan li mande rive lwen peye","Sèlman rezo sosyal gratis","Sèlman imèl gratis"],ans:1,fb:"Li koute tan, epi souvan mande yon bidjè pou piblisite peye."},
    {q:"Kisa ki tipikman rive apre yon sèl pòs viral san plan swivi?",opts:["Vant asire alontèm","Ra li tounen an vrè vant ki dire san yon fason pou kaptire moun sa yo","Li ranplase bezwen pou yon lis kliyan","Se toujou yon move bagay lè sa rive"],ans:1,fb:"San yon fason pou kaptire moun sa yo, yon moman viral ra tounen an vrè vant ki dire."},
    {q:"Konsistans kont yon sèl moman viral — kilès ki pi enpòtan alontèm?",opts:["Yon sèl pòs viral toujou genyen","Efò konsistan, byen vize sou tan","Ni youn ni lòt pa enpòtan","Sèlman piblisite peye konte"],ans:1,fb:"Efò konsistan ki byen vize sou tan bat yon sèl moman viral san plan."}],
   close:{learned:"Manti komen sou maketing dijital (ou bezwen anpil abòne, li gratis, plis pòs/viral = siksè) pa kenbe — konfyans, vize, ak konsistans enpòtan plis.",
    mistake:"Kouri dèyè kantite abòne oswa yon moman viral olye w bati yon ti odyans ki fè konfyans epi ki reyèlman achte.",
    tip:"Swiv konbyen abòne reyèlman tounen kliyan, pa jis konbyen ou genyen.",
    assign:"Ekri ki manti ou te pi kwè, epi yon aksyon pou korije sa semèn sa a.",
    dl:"Fèy Referans: Manti sou Maketing Dijital",
    checklist:["W ap swiv yon vrè lis kliyan, pa jis kouri dèyè kantite?","Ou gen yon bidjè mete kote pou rive lwen peye si nesesè?","Ou gen yon plan pou kaptire trafik si li vin viral?"],
    ai:"Mwen te kwè [manti a]. Eksplike an mo senp poukisa li fo epi ban m yon aksyon pratik pou [kalite biznis mwen an]."}},
 fr:{lede:"Les mauvais conseils se répandent plus vite en ligne que les bons — avant de construire une stratégie, il aide de d'abord écarter ce qui n'est simplement pas vrai.",

const NL=7,KEY="jamezzi:digital-marketing-ai:module1-sim-state";
/* Shared site-level progress: the same-origin course page/resume card reads
   this key (src/content/dominate-digital/lessons.ts has the matching slugs).
   Events must go through window.parent since dispatchEvent only reaches
   listeners on the window it's called on -- this file runs inside an iframe. */
const PROGRESS_KEY="jamezzi:digital-marketing-ai:completed";
const PROGRESS_EVENT="jamezzi:course-progress-changed";
const MOD1_LESSON_SLUGS=["what-is-digital-marketing","digital-vs-traditional-marketing","the-customer-journey","the-marketing-funnel","understanding-value","myths-about-digital-marketing","careers-in-digital-marketing"];
let S={lang:"ht",cur:1,done:Array(NL).fill(false),st:{}};
try{const raw=localStorage.getItem(KEY);if(raw)S=Object.assign(S,JSON.parse(raw));}catch{}
for(let i=1;i<=NL;i++){if(!S.st[i])S.st[i]={exDone:false,exText:"",quizAns:Array(4).fill(null)};}
function persist(){try{localStorage.setItem(KEY,JSON.stringify(S));}catch{}}
function markModuleComplete(){
 if(!S.done.every(Boolean))return;
 try{
  const raw=localStorage.getItem(PROGRESS_KEY);
  const parsed=raw?JSON.parse(raw):[];
  const list=Array.isArray(parsed)?parsed:[];
  let changed=false;
  MOD1_LESSON_SLUGS.forEach(slug=>{if(!list.includes(slug)){list.push(slug);changed=true;}});
  if(changed){
   localStorage.setItem(PROGRESS_KEY,JSON.stringify(list));
   window.parent.dispatchEvent(new CustomEvent(PROGRESS_EVENT,{detail:{storageKey:PROGRESS_KEY}}));
  }
 }catch{}
}

 });
}

function renderDiagram(d){
 if(d.illus==="hub"){
  const cx=330,cy=150,r=150;
  const pts=d.hubLabels.map((lbl,i)=>{const a=(Math.PI*2*i)/d.hubLabels.length-Math.PI/2;return{x:cx+Math.cos(a)*r,y:cy+Math.sin(a)*r,lbl};});
  let svg='<svg viewBox="0 0 660 300" style="width:100%;height:auto;max-width:660px;display:block;margin:0 auto">';
  pts.forEach(p=>{svg+='<line x1="'+cx+'" y1="'+cy+'" x2="'+p.x+'" y2="'+p.y+'" stroke="var(--edge2)" stroke-width="2"/>';});
  svg+='<circle cx="'+cx+'" cy="'+cy+'" r="52" fill="var(--brand)"/><text x="'+cx+'" y="'+(cy+5)+'" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">'+d.hubCenter+'</text>';
  pts.forEach(p=>{svg+='<circle cx="'+p.x+'" cy="'+p.y+'" r="42" fill="var(--ink-600)" stroke="var(--edge2)"/><text x="'+p.x+'" y="'+(p.y+5)+'" text-anchor="middle" fill="var(--text)" font-size="11.5" font-weight="600">'+p.lbl+'</text>';});
  svg+="</svg>";return svg;
 }
 if(d.illus==="bars"){
  const w=140,gap=30,x0=40,base=210;
  let svg='<svg viewBox="0 0 660 260" style="width:100%;height:auto;max-width:660px;display:block;margin:0 auto">';
  d.barLabels.forEach((lbl,i)=>{
   const gx=x0+i*(w+gap);
   const th=d.barTrad[i]*1.5,dh=d.barDig[i]*1.5;
   svg+='<rect x="'+gx+'" y="'+(base-th)+'" width="46" height="'+th+'" fill="var(--edge2)" rx="4"/>';
   svg+='<rect x="'+(gx+54)+'" y="'+(base-dh)+'" width="46" height="'+dh+'" fill="var(--brand)" rx="4"/>';
   svg+='<text x="'+(gx+50)+'" y="'+(base+22)+'" text-anchor="middle" fill="var(--dim)" font-size="12">'+lbl+'</text>';
  });
  svg+='<rect x="40" y="234" width="14" height="14" fill="var(--edge2)"/><text x="60" y="246" fill="var(--dim)" font-size="12">'+d.barTradLbl+'</text>';
  svg+='<rect x="150" y="234" width="14" height="14" fill="var(--brand)"/><text x="170" y="246" fill="var(--dim)" font-size="12">'+d.barDigLbl+'</text>';
  svg+="</svg>";return svg;
 }
 if(d.illus==="journey"){
  let svg='<svg viewBox="0 0 660 140" style="width:100%;height:auto;max-width:660px;display:block;margin:0 auto">';
  const n=d.journeyLabels.length,gap=660/n;
  svg+='<line x1="'+(gap/2)+'" y1="50" x2="'+(660-gap/2)+'" y2="50" stroke="var(--edge2)" stroke-width="3"/>';
  d.journeyLabels.forEach((lbl,i)=>{const cx=gap/2+i*gap;
   svg+='<circle cx="'+cx+'" cy="50" r="26" fill="var(--brand)"/><text x="'+cx+'" y="55" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">'+(i+1)+'</text>';
   svg+='<text x="'+cx+'" y="100" text-anchor="middle" fill="var(--text)" font-size="13" font-weight="600">'+lbl+'</text>';
  });
  svg+="</svg>";return svg;
 }
 if(d.illus==="funnel"){
  const topW=560,botW=140,h=190,x0=(660-topW)/2,y0=10,n=d.funnelLabels.length,seg=h/n;
  let svg='<svg viewBox="0 0 660 230" style="width:100%;height:auto;max-width:660px;display:block;margin:0 auto">';
  for(let i=0;i<n;i++){
   const wTop=topW-((topW-botW)/n)*i,wBot=topW-((topW-botW)/n)*(i+1);
   const xTop=(660-wTop)/2,xBot=(660-wBot)/2,y1=y0+seg*i,y2=y0+seg*(i+1);
   const op=(0.9-i*0.15).toFixed(2);
   svg+='<polygon points="'+xTop+','+y1+' '+(xTop+wTop)+','+y1+' '+(xBot+wBot)+','+y2+' '+xBot+','+y2+'" fill="var(--brand)" fill-opacity="'+op+'" stroke="var(--ink-900)" stroke-width="1.5"/>';
   svg+='<text x="330" y="'+((y1+y2)/2+5)+'" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">'+d.funnelLabels[i]+" — "+d.funnelNums[i]+'</text>';
  }
  svg+="</svg>";return svg;
 }
 if(d.illus==="fbmap"){
  let h='<div style="max-width:660px;margin:0 auto">';
  d.fbRows.forEach(r=>{
   h+='<div style="display:flex;align-items:center;gap:14px;margin-bottom:14px">'+
    '<div style="flex:1;background:var(--ink-600);border-radius:10px;padding:12px 14px;font-size:13px"><div style="font-size:10.5px;color:var(--mute);font-weight:700;text-transform:uppercase;margin-bottom:4px">'+d.fbFeat+'</div>'+r[0]+'</div>'+
    '<div style="color:var(--brand);font-size:20px">→</div>'+
    '<div style="flex:1;background:rgba(var(--brand-rgb),.14);border:1px solid var(--brand);border-radius:10px;padding:12px 14px;font-size:13px"><div style="font-size:10.5px;color:var(--brand);font-weight:700;text-transform:uppercase;margin-bottom:4px">'+d.fbBen+'</div>'+r[1]+'</div>'+
   '</div>';
  });
  h+="</div>";return h;
 }
 if(d.illus==="myths"){
  let h='<div style="max-width:660px;margin:0 auto;display:flex;flex-direction:column;gap:12px">';
  d.mythCards.forEach(m=>{
   h+='<div style="display:flex;gap:14px;align-items:stretch">'+
    '<div style="flex:1;background:rgba(196,43,28,.12);border:1px solid var(--danger);border-radius:10px;padding:12px 14px;font-size:13px"><div style="font-size:10.5px;color:#ff9a8f;font-weight:700;text-transform:uppercase;margin-bottom:4px">'+d.mythTag+'</div>'+m[0]+'</div>'+
    '<div style="flex:1;background:rgba(34,197,94,.12);border:1px solid var(--good);border-radius:10px;padding:12px 14px;font-size:13px"><div style="font-size:10.5px;color:#7fe3a3;font-weight:700;text-transform:uppercase;margin-bottom:4px">'+d.realTag+'</div>'+m[1]+'</div>'+
   '</div>';
  });
  h+="</div>";return h;
 }
 if(d.illus==="roles"){
  let h='<div style="max-width:660px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px">';
  d.roleCards.forEach(r=>{
   h+='<div style="background:var(--ink-600);border:1px solid var(--edge2);border-radius:12px;padding:14px;text-align:center">'+
    '<div style="font-size:26px;margin-bottom:8px">'+r[0]+'</div><div style="font-weight:700;font-size:13px;margin-bottom:4px">'+r[1]+'</div><div style="font-size:11.5px;color:var(--mute)">'+r[2]+'</div></div>';
  });
  h+="</div>";return h;
 }
 return "";
}

function render(){
 renderMods();
 const lang=S.lang,n=S.cur,d=C[n][lang],ui=UI[lang],st=S.st[n];
 $("cs").textContent=ui.cs;
 $("topTag").textContent="Modil 1 · 1."+n;
 $("topTitle").textContent=M1[lang][n-1];
 document.title="Academy · "+M1[lang][n-1];
 renderRail();
 aiSay(d.lede);

 const stage=$("stage");
 let h='<div class="labhead"><span class="labtag">Modil 1 · 1.'+n+'</span><h2 class="labh2">'+M1[lang][n-1]+'</h2><p class="lablead">'+d.lede+"</p></div>";
 h+='<div class="secs">'+d.secs.map(s=>'<div class="sec"><h3>'+s[0]+"</h3><p>"+s[1]+"</p></div>").join("")+"</div>";
 h+='<div class="illus">'+renderDiagram(d)+'<div class="cap">'+M1[lang][n-1]+"</div></div>";
 h+='<div class="exwrap"><div class="extag">'+ui.exTag+'</div><p class="exq">'+d.ex+'</p><textarea id="exArea" placeholder="...">'+(st.exText||"")+'</textarea><div style="margin-top:10px;display:flex;align-items:center;gap:12px"><button class="btn g" id="exSaveBtn">'+ui.exBtn+'</button><span class="exsaved" id="exSaved" style="'+(st.exDone?"display:inline":"")+'">'+ui.exSaved+"</span></div></div>";

 h+='<div class="quiz"><div class="qtag">'+ui.quizTag+'</div>';
 d.quiz.forEach((q,qi)=>{
  h+='<div class="qcard"><div class="qq">'+(qi+1)+". "+q.q+'</div><div class="qopts" id="qopts'+qi+'">';
  q.opts.forEach((o,oi)=>{
   let cls="qopt";const answered=st.quizAns[qi]!==null;
   if(answered){if(oi===q.ans)cls+=" correct";else if(oi===st.quizAns[qi])cls+=" wrong";}
   h+='<button class="'+cls+'" data-qi="'+qi+'" data-oi="'+oi+'"'+(answered?" disabled":"")+">"+o+"</button>";
  });
  h+="</div>";
  if(st.quizAns[qi]!==null)h+='<div class="qfb">'+q.fb+"</div>";
  h+="</div>";
 });
 h+="</div>";

 h+='<div class="close"><div class="ctag">'+ui.closeTag+'</div>'+
  '<div class="crow"><div class="cv"><div class="ck">'+ui.cLearned+'</div>'+d.close.learned+'</div></div>'+
  '<div class="crow"><div class="cv"><div class="ck">'+ui.cMistake+'</div>'+d.close.mistake+'</div></div>'+
  '<div class="crow"><div class="cv"><div class="ck">'+ui.cTip+'</div>'+d.close.tip+'</div></div>'+
  '<div class="crow"><div class="cv"><div class="ck">'+ui.cAssign+'</div>'+d.close.assign+'</div></div>'+
  '<div class="crow"><div class="cv"><div class="ck">'+ui.cDl+'</div>'+d.close.dl+'</div></div>'+
  '<div class="crow"><div class="cv"><div class="ck">'+ui.cChecklist+'</div><ul>'+d.close.checklist.map(c=>"<li>"+c+"</li>").join("")+'</ul></div></div>'+
  '<div class="crow"><div class="cv"><div class="ck">'+ui.cAi+'</div>"'+d.close.ai+'"</div></div>'+
 "</div>";

 const canFinish=st.exDone&&st.quizAns.every(a=>a!==null);
 h+='<div class="nextwrap">';
 if(!S.done[n-1]){
  h+='<button class="btn p" id="finishBtn"'+(canFinish?"":" disabled")+">"+ui.complete+"</button>";
 }else{
  h+='<span style="color:var(--good);font-weight:700;font-size:14px">'+ui.completed+"</span>";
  if(n<NL)h+='<button class="btn g" id="nextBtn">'+ui.next+"</button>";
  else h+='<button class="btn g" id="finalBtn">'+ui.stampBtn+"</button>";
 }
 h+="</div>";

 stage.innerHTML=h;stage.classList.add("fade");
 stage.scrollTop=0;

 $("exArea").addEventListener("input",e=>{st.exText=e.target.value;});
 $("exSaveBtn").addEventListener("click",()=>{
  if(st.exText&&st.exText.trim().length>0){st.exDone=true;$("exSaved").style.display="inline";persist();renderRail();updateFinishBtn();}
 });
 d.quiz.forEach((q,qi)=>{
  if(st.quizAns[qi]!==null)return;
  document.querySelectorAll('#qopts'+qi+' .qopt').forEach(btn=>{
   btn.addEventListener("click",()=>{
    st.quizAns[qi]=+btn.dataset.oi;persist();render();
   });
  });
 });
 const fb=$("finishBtn");
 if(fb)fb.addEventListener("click",()=>{
  S.done[n-1]=true;persist();markModuleComplete();render();
 });
 const nb=$("nextBtn");
 if(nb)nb.addEventListener("click",()=>{S.cur=n+1;persist();render();});
 const flb=$("finalBtn");
 if(flb)flb.addEventListener("click",showStamp);
}

function updateFinishBtn(){
 const st=S.st[S.cur];const fb=$("finishBtn");
 if(fb)fb.disabled=!(st.exDone&&st.quizAns.every(a=>a!==null));
}

function showStamp(){
 const ui=UI[S.lang];
 $("stage").innerHTML='<div class="stampscreen fade"><div class="stamp"><div class="si">🎟️</div></div><h2>'+ui.stampTitle+"</h2><p>"+ui.stampBody+'</p><a href="/academy/courses/digital-marketing-ai/learn/why-people-really-buy" target="_top" class="btn p" style="text-decoration:none;display:inline-block">'+ui.stampBtn+"</a></div>";
}

/* ============ chrome wiring ============ */
$("langs").addEventListener("click",e=>{
 const b=e.target.closest("button");if(!b)return;
 S.lang=b.dataset.l;persist();
 document.querySelectorAll("#langs button").forEach(x=>x.classList.toggle("on",x.dataset.l===S.lang));
 render();
});
$("resetBtn").addEventListener("click",()=>{
 if(!confirm(S.lang==="ht"?"Ou vle rekòmanse Modil 1?":S.lang==="fr"?"Voulez-vous recommencer le Module 1 ?":"Restart Module 1?"))return;
 S={lang:S.lang,cur:1,done:Array(NL).fill(false),st:{}};
 for(let i=1;i<=NL;i++)S.st[i]={exDone:false,exText:"",quizAns:Array(4).fill(null)};
 persist();render();
});
document.querySelectorAll("#langs button").forEach(x=>x.classList.toggle("on",x.dataset.l===S.lang));
render();
</script>
</body>
</html>
