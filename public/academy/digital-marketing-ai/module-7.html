 en:{lede:"Video isn't just 'another format' — it communicates trust, personality, and information faster than almost anything else, which is why every major platform now favors it.",
   secs:[["Why video builds trust faster","People trust a face and voice faster than text alone; seeing how someone talks, moves, and reacts gives viewers more signal about whether to trust them than words on a page — especially valuable for a new or small business with no existing reputation."],
    ["Why platforms favor video","Every major platform (Facebook, Instagram, TikTok, YouTube) shows video to more people organically than plain text/photo posts, because video keeps people on the platform longer, which is exactly what platforms optimize for."],
    ["You don't need to be 'camera-ready'","Viewers respond more to authenticity and usefulness than production polish; a phone camera, good lighting, and clear audio matter far more than expensive equipment; the goal is communicating clearly, not looking like a TV commercial."]],
   illus:"roles",roleCards:[["🤝","Faster Trust","A real face and voice"],["📈","Platforms Favor It","Keeps people longer"],["📱","No Expensive Gear","A phone is enough"]],
   ex:"What's one thing about your business a video could show better than text alone?",
   quiz:[
    {q:"Why does video build trust faster than text?",opts:["It doesn't","Seeing/hearing someone gives more trust signal than words alone","Trust isn't affected by format","Only professional actors build trust"],ans:1,fb:"Seeing and hearing someone gives more trust signal."},
    {q:"Why do platforms favor video content?",opts:["They don't","Video keeps people on the platform longer, which platforms optimize for","Video is required by law","Text always performs better"],ans:1,fb:"Video keeps people on the platform longer."},
    {q:"What matters more than expensive equipment?",opts:["Nothing, equipment is everything","Clear communication, decent lighting, and clear audio","A professional actor","A long runtime"],ans:1,fb:"Clear communication matters more than equipment."}],
   close:{learned:"Video builds trust faster than text and gets favored by platform algorithms — you don't need expensive equipment, just clear communication.",
    mistake:"Waiting to make video content until you have 'professional' equipment or feel camera-ready.",
    tip:"Start with what you already have (a phone, good lighting near a window) — polish can come later, clarity can't wait.",
    assign:"Write down one thing about your business a simple video could show better than a text post.",
    dl:"Worksheet: Video Readiness Checklist",
    checklist:["Phone with decent camera?","A quiet space with clear audio?","Natural light or a simple light source?"],
    ai:"My business is [describe]. Suggest 3 simple video ideas I could film with just a phone."}}},

    ["Diferans ki vo konnen","TikTok souvan rekonpanse otantik/brit sou poli; Instagram Reels benefisye de yon aparans vizyèlman pwòp paske odyans Instagram plis estetik; YouTube Shorts benefisye de yon sèl lide klè paske algoritm YouTube favorize klète sijè a. Sa yo se tandans, pa règ fiks — teste sa ki mache pou odyans espesifik ou."],
    ["Reyitilize atravè tou twa","Menm ti videyo a ka anjeneral poste sou tou twa platfòm ak ti ajisteman (soutit, hashtag); sa miltipliye rive lwen soti nan yon sèl moso kontni olye kreye 3 lide separe."]],
   illus:"roles",roleCards:[["🎵","TikTok","Rekonpanse otantik"],["📸","Reels","Aparans pwòp"],["▶️","YouTube Shorts","Yon sèl lide klè"]],

    {q:"Poukisa soutit enpòtan pou videyo kout?",opts:["Yo pa enpòtan ditou","Anpil moun gade san son, espesyalman okòmansman","Sèlman pou aksesibilite, anyen dòt","Soutit entèdi sou kèk platfòm"],ans:1,fb:"Anpil moun gade san son, espesyalman okòmansman."},
    {q:"Ki yon fason entelijan pou itilize yon moso kontni kout?",opts:["Sèlman janm poste l sou yon sèl platfòm","Reyitilize l atravè tou twa platfòm ak ti ajisteman","Efase l apre 24 èdtan toujou","Pa janm adapte anyen"],ans:1,fb:"Reyitilize atravè platfòm yo se entelijan."}],

 fr:{lede:"Shorts, Reels, et TikTok sont le même format sous des noms de plateforme différents — vertical, rapide, et conçu pour être regardé sans son au début.",
   secs:[["Ce qu'ils ont en commun","Format vertical (9:16), généralement sous 60-90 secondes, conçu pour se lire automatiquement et être regardé avec le son coupé au début (les sous-titres comptent), récompense fortement les 1-3 premières secondes avant presque tout le reste."],
    ["Différences à connaître","TikTok récompense souvent l'authentique/brut sur le poli ; Instagram Reels bénéficie d'un aspect visuellement propre car le public Instagram est plus esthétique ; YouTube Shorts bénéficie d'une seule idée claire car l'algorithme YouTube favorise la clarté du sujet. Ce sont des tendances, pas des règles rigides — testez ce qui fonctionne pour votre public spécifique."],
    ["Réutiliser sur les trois","La même courte vidéo peut généralement être postée sur les 3 plateformes avec de petits ajustements (sous-titres, hashtags) ; ça multiplie la portée d'un seul contenu plutôt que de créer 3 idées séparées."]],
   illus:"roles",roleCards:[["🎵","TikTok","Récompense l'authentique"],["📸","Reels","Aspect propre"],["▶️","YouTube Shorts","Une seule idée claire"]],
   ex:"Choisissez une idée de l'exercice de la Leçon 1. Décrivez (en mots) à quoi ressembleraient les 2 premières secondes à l'écran.",
   quiz:[
    {q:"Qu'est-ce que Shorts, Reels, et TikTok ont en commun ?",opts:["Rien, ils sont totalement différents","Format vertical, courte durée, et souvent regardé sans son","Ils durent tous exactement 10 minutes","Seul TikTok permet les sous-titres"],ans:1,fb:"Vertical, court, et souvent regardé sans son."},
    {q:"Pourquoi les sous-titres comptent-ils pour la vidéo courte ?",opts:["Ils ne comptent pas du tout","Beaucoup de spectateurs regardent sans son, surtout au début","Seulement pour l'accessibilité, rien d'autre","Les sous-titres sont interdits sur certaines plateformes"],ans:1,fb:"Beaucoup regardent sans son, surtout au début."},
    {q:"Quelle est une façon intelligente d'utiliser un contenu court ?",opts:["Ne le poster que sur une seule plateforme","Le réutiliser sur les 3 plateformes avec de petits ajustements","Toujours le supprimer après 24 heures","Ne jamais rien adapter"],ans:1,fb:"Réutiliser sur les plateformes est intelligent."}],
   close:{learned:"Shorts, Reels, et TikTok partagent le même format de base (vertical, court, adapté au son coupé) et une vidéo peut être réutilisée sur les trois.",
    mistake:"Créer une idée de vidéo complètement séparée pour chaque plateforme plutôt que de réutiliser une seule idée forte sur les trois.",
    tip:"Concevez d'abord pour un visionnage sans son (visuels forts, sous-titres) — le son devient un bonus, pas une exigence.",
    assign:"Prenez une idée de vidéo et écrivez comment vous l'ajusteriez légèrement pour TikTok vs. Reels vs. Shorts.",
    dl:"Liste de Vérification : Bases de la Vidéo Courte",
    checklist:["Format vertical ?","Moins de ~90 secondes ?","Sous-titres inclus ?","Fortes 2 premières secondes ?"],
    ai:"J'ai cette idée de vidéo courte : [décrire]. Suggère de petits ajustements pour bien la poster sur TikTok, Reels, et YouTube Shorts."}},
 en:{lede:"Shorts, Reels, and TikTok are the same format wearing different platform names — vertical, fast, and designed to be watched without sound at first.",
   secs:[["What they have in common","Vertical (9:16) format, typically under 60-90 seconds, designed to autoplay and be watched with sound off at first (captions matter), rewards a strong first 1-3 seconds above almost everything else."],
    ["Differences worth knowing","TikTok audiences often reward raw/authentic over polished; Instagram Reels benefit from being visually clean since Instagram audiences skew more aesthetic; YouTube Shorts benefit from a clear, single idea since YouTube favors clarity of topic. These are tendencies, not hard rules — test what works for your specific audience."],
    ["Repurposing across all three","The same short video can usually be posted on all 3 platforms with minor adjustments (captions, hashtags); this multiplies reach from one piece of content instead of creating 3 separate ideas."]],
   illus:"roles",roleCards:[["🎵","TikTok","Rewards authentic"],["📸","Reels","Clean look"],["▶️","YouTube Shorts","One clear idea"]],
   ex:"Pick one idea from Lesson 1's exercise. Describe (in words) how the first 2 seconds would look on screen.",
   quiz:[
    {q:"What do Shorts, Reels, and TikTok have in common?",opts:["Nothing, they're totally different","Vertical format, short length, and often watched without sound first","They're all exactly 10 minutes long","Only TikTok allows captions"],ans:1,fb:"Vertical, short, and often watched without sound."},
    {q:"Why do captions matter for short-form video?",opts:["They don't matter at all","Many viewers watch with sound off, especially at first","Only for accessibility, nothing else","Captions are banned on some platforms"],ans:1,fb:"Many viewers watch with sound off, especially at first."},
    {q:"What's a smart way to use one piece of short-form content?",opts:["Only ever post it on one single platform","Repurpose it across all 3 platforms with small adjustments","Delete it after 24 hours always","Never adapt anything"],ans:1,fb:"Repurposing across platforms is smart."}],
   close:{learned:"Shorts, Reels, and TikTok share the same core format (vertical, short, sound-off-friendly) and one video can be repurposed across all three.",
    mistake:"Creating a completely separate video idea for each platform instead of repurposing one strong idea across all three.",
    tip:"Design for sound-off viewing first (strong visuals, captions) — sound becomes a bonus, not a requirement.",
    assign:"Take one video idea and write how you'd adjust it slightly for TikTok vs. Reels vs. Shorts.",
    dl:"Checklist: Short-Form Video Basics",
    checklist:["Vertical format?","Under ~90 seconds?","Captions included?","Strong first 2 seconds?"],
    ai:"I have this short video idea: [describe]. Suggest small adjustments to post it well on TikTok, Reels, and YouTube Shorts."}}},

3:{ht:{lede:"YouTube rekonpanse yon lòt enstenk pase videyo kout — pwofondè ak tan gade konte plis pase yon senp kwochè rapid.",
   secs:[["Kijan YouTube diferan","Fòma pi long (souvan 5-20+ minit) rekonpanse vrè pwofondè/valè, pa jis yon kwochè rapid; algoritm YouTube evalye total tan gade anpil, konsa yon videyo ki kenbe moun gade pi lontan (menm si mwens moun klike) ka fè pi byen pase yon videyo ki gen plis klik men yon bès rapid."],
    ["Sa ki fè yon videyo long vo gade","Yon pwomès klè bonè (kisa moun ki gade a pral jwenn), yon estrikti òganize (moun santi rapid yon videyo ki ap radote), yon vrè rezilta ki matche sa tit/miniati a te pwomèt."],
    ["Erè videyo long komen","Yon tit/miniati ki pwomèt plis pase vrè kontni an (detwi konfyans e domaje videyo nan lavni), radote san okenn estrikti klè, ranpli longè yon videyo jis pou l sanble pi 'sibstansyèl', ki anjeneral ogmante moun kite."]],
   illus:"fbmap",fbRows:[["Tit fè pwomès","Rezilta reyèlman livre"]],fbFeat:"Pwomès",fbBen:"Rezilta",
   ex:"Chwazi yon sijè pou yon videyo long. Ekri sèl pwomès klè ou ta deklare nan premye 15 segond yo.",
   quiz:[
    {q:"Kisa algoritm YouTube evalye anpil?",opts:["Sèlman kantite klik","Total tan gade","Sèlman longè videyo a","Anyen mezirab"],ans:1,fb:"Total tan gade konte anpil pou YouTube."},
    {q:"Kisa ki fè yon videyo long vo gade?",opts:["Yon estrikti vag, ki radote","Yon pwomès bonè klè, yon estrikti òganize, ak yon vrè rezilta","Otan ranpli posib","Yon miniati twonpe"],ans:1,fb:"Pwomès + estrikti + rezilta se sa ki fè l vo gade."},
    {q:"Ki yon erè videyo long komen?",opts:["Livre egzakteman sa tit la te pwomèt","Yon tit/miniati ki pwomèt plis pase vrè kontni an","Gen yon estrikti klè","Kenbe videyo a konsantre"],ans:1,fb:"Pwomèt plis pase sa ki livre se yon erè komen."}],
   close:{learned:"YouTube rekonpanse vrè tan gade sou kwochè rapid sèl — yon pwomès klè, vrè estrikti, ak yon rezilta onèt konte plis.",
    mistake:"Pwomèt plis nan tit/miniati a pase sa videyo a reyèlman livre, ki detwi konfyans e domaje videyo nan lavni.",
    tip:"Deklare pwomès klè videyo ou nan premye 15 segond yo pou moun konnen egzakteman poukisa yo rete.",
    assign:"Ekri sèl pwomès klè ou ta deklare nan premye 15 segond yon videyo long sou yon sijè ou chwazi.",
    dl:"Fèy Travay: Planifikasyon Videyo Long",
    checklist:["Pwomès klè deklare bonè?","Estrikti òganize planifye?","Rezilta matche tit/miniati a onètman?"],
    ai:"Sijè videyo mwen se [dekri l]. Ede m ekri yon pwomès klè, onèt pou premye 15 segond yo ak yon estrikti senp pou rès la."}},
 fr:{lede:"YouTube récompense un instinct différent du format court — la profondeur et le temps de visionnage comptent plus que les accroches instantanées seules.",
   secs:[["En quoi YouTube est différent","Un format plus long (souvent 5-20+ minutes) récompense la vraie profondeur/valeur, pas juste une accroche rapide ; l'algorithme de YouTube pèse fortement le temps de visionnage total, donc une vidéo qui garde les gens plus longtemps (même avec moins de clics) peut surpasser une vidéo avec plus de clics mais un abandon rapide."],
    ["Ce qui rend une vidéo longue qu'il vaut la peine de regarder","Une promesse claire tôt (ce que le spectateur va obtenir), une structure organisée (les spectateurs sentent vite une vidéo qui divague), un vrai résultat qui correspond à ce que le titre/la miniature a promis."],
    ["Erreurs courantes en format long","Un titre/miniature qui promet plus que le contenu réel (détruit la confiance et nuit aux futures vidéos), divaguer sans structure claire, allonger une vidéo juste pour paraître plus « substantielle », ce qui augmente généralement l'abandon."]],
   illus:"fbmap",fbRows:[["Le titre fait une promesse","Le résultat livre vraiment"]],fbFeat:"Promesse",fbBen:"Résultat",
   ex:"Choisissez un sujet pour une vidéo longue. Écrivez la seule promesse claire que vous énonceriez dans les 15 premières secondes.",
   quiz:[
    {q:"Que pèse fortement l'algorithme de YouTube ?",opts:["Seulement le nombre de clics","Le temps de visionnage total","Seulement la longueur de la vidéo","Rien de mesurable"],ans:1,fb:"Le temps de visionnage total compte beaucoup pour YouTube."},
    {q:"Qu'est-ce qui rend une vidéo longue qu'il vaut la peine de regarder ?",opts:["Une structure vague qui divague","Une promesse claire tôt, une structure organisée, et un vrai résultat","Autant de remplissage que possible","Une miniature trompeuse"],ans:1,fb:"Promesse + structure + résultat rendent une vidéo digne d'intérêt."},
    {q:"Quelle est une erreur courante en format long ?",opts:["Livrer exactement ce que le titre a promis","Un titre/miniature qui promet plus que le contenu réel","Avoir une structure claire","Garder la vidéo concentrée"],ans:1,fb:"Promettre plus que ce qui est livré est une erreur courante."}],
   close:{learned:"YouTube récompense le vrai temps de visionnage plutôt que les accroches rapides seules — une promesse claire, une vraie structure, et un résultat honnête comptent le plus.",
    mistake:"Trop promettre dans le titre/la miniature par rapport à ce que la vidéo livre réellement, ce qui détruit la confiance et nuit aux futures vidéos.",
    tip:"Énoncez la promesse claire de votre vidéo dans les 15 premières secondes pour que les spectateurs sachent exactement pourquoi ils restent.",
    assign:"Écrivez la seule promesse claire que vous énonceriez dans les 15 premières secondes d'une vidéo longue sur un sujet de votre choix.",
    dl:"Fiche de travail : Planificateur de Vidéo Longue",
    checklist:["Promesse claire énoncée tôt ?","Structure organisée planifiée ?","Le résultat correspond honnêtement au titre/à la miniature ?"],
    ai:"Mon sujet de vidéo est [décrire]. Aide-moi à écrire une promesse claire et honnête pour les 15 premières secondes et une structure simple pour le reste."}},
 en:{lede:"YouTube rewards a different instinct than short-form — depth and watch time matter more than instant hooks alone.",
   secs:[["How YouTube is different","Longer format (often 5-20+ minutes) rewards genuine depth/value, not just a fast hook; YouTube's algorithm weighs total watch time heavily, so a video that keeps people watching longer (even if fewer people click it) can outperform a video with more clicks but a fast drop-off."],
    ["What makes a long-form video worth watching","A clear promise early (what will the viewer get by watching), organized structure (viewers can sense a rambling video quickly), a real payoff that matches what the title/thumbnail promised."],
    ["Common long-form mistakes","A title/thumbnail that overpromises compared to the actual content (destroys trust and hurts future videos); rambling with no clear structure; padding a video's length just to seem more 'substantial,' which usually just increases drop-off."]],
   illus:"fbmap",fbRows:[["Title makes a promise","Result actually delivers"]],fbFeat:"Promise",fbBen:"Result",
   ex:"Pick a topic for a long-form video. Write the one clear promise you'd state in the first 15 seconds.",
   quiz:[
    {q:"What does YouTube's algorithm weigh heavily?",opts:["Only the number of clicks","Total watch time","Only video length","Nothing measurable"],ans:1,fb:"Total watch time matters a lot for YouTube."},
    {q:"What makes a long-form video worth watching?",opts:["A vague, rambling structure","A clear early promise, organized structure, and a real payoff","As much padding as possible","A misleading thumbnail"],ans:1,fb:"Promise, structure, and payoff make a video worth watching."},
    {q:"What's a common long-form mistake?",opts:["Delivering exactly what the title promised","A title/thumbnail that overpromises compared to the actual content","Having a clear structure","Keeping the video focused"],ans:1,fb:"Overpromising compared to what's delivered is a common mistake."}],
   close:{learned:"YouTube rewards genuine watch time over fast hooks alone — a clear promise, real structure, and an honest payoff matter most.",
    mistake:"Overpromising in the title/thumbnail compared to what the video actually delivers, which destroys trust and hurts future videos.",
    tip:"State your video's clear promise in the first 15 seconds so viewers know exactly what they're staying for.",
    assign:"Write the one clear promise you'd state in the first 15 seconds of a long-form video on a topic of your choice.",
    dl:"Worksheet: Long-Form Video Planner",
    checklist:["Clear promise stated early?","Organized structure planned?","Payoff matches the title/thumbnail honestly?"],
    ai:"My video topic is [describe]. Help me write a clear, honest promise for the first 15 seconds and a simple structure for the rest."}}},

4:{ht:{lede:"Yon script se pa sou sonnen 'ekri davans' — se yon senp kat pou ou pa radote, bliye pwen ou, oswa manke bagay pou di nan mitan anrejistreman an.",
   secs:[["Yon estrikti script senp","Kwochè (premye liy, adapte prensip kwochè Modil 5 pou pale awotvwa), pwen prensipal yo (2-3 maksimòm pou yon videyo kout), yon apèl aksyon klè nan fen an."],
    ["Ekri pou zòrèy, pa pou zye","Fraz kout, kontraksyon, ak mo chak jou — tèks ekri souvan sonnen rèd lè li li awotvwa; li script ou awotvwa pandan w ap ekri l pou repere nenpòt bagay ki sanble rèd."],
    ["Konbyen pou ekri kont enpwovize","Yon script konplè mo-pou-mo mache pou mesaj presi (yon reklam, yon anons); yon plan pwen (pwen kle, pa mo egzat) souvan sonnen pi natirèl pou kontni kazyèl/edikatif — chwazi baze sou kijan poli kont otantik videyo a ta dwe santi."]],
   illus:"hub",hubLabels:["Kwochè","Pwen Prensipal","CTA"],hubCenter:"Script Videyo",
   ex:"Ekri yon plan pwen (pa yon script konplè) pou yon videyo 30-segond sou biznis ou.",

    {q:"Ki objektif yon script videyo?",opts:["Pou sonnen otan ekri davans posib","Yon senp kat pou ou pa radote oswa manke bagay pou di","Li obligatwa pou chak platfòm","Sèlman pou aktè pwofesyonèl"],ans:1,fb:"Se yon kat pou evite radote."},
    {q:"Poukisa ekri pou zòrèy, pa pou zye?",opts:["Sa pa enpòtan, tèks toujou sonnen menm jan awotvwa","Tèks ki li byen sou papye souvan sonnen rèd lè li pale awotvwa","Mo fòmèl toujou sonnen pi natirèl awotvwa","Li awotvwa pa janm itil"],ans:1,fb:"Tèks ki li byen ka sonnen rèd lè pale."},
    {q:"Kile yon script konplè mo-pou-mo mache pi byen?",opts:["Janm, toujou enpwovize","Pou mesaj presi tankou yon reklam oswa yon anons ofisyèl","Sèlman pou videyo pi long pase yon èdtan","Script sèlman pou pòs tèks"],ans:1,fb:"Script konplè mache pou mesaj presi."}],
   close:{learned:"Yon script se yon kat (kwochè, 2-3 pwen prensipal, CTA) ekri pou zòrèy — li l awotvwa pou repere sa ki sonnen rèd.",
    mistake:"Ekri fraz dans, fòmèl ki li byen sou papye men sonnen rèd lè yo pale awotvwa.",
    tip:"Pou kontni kazyèl, ekri yon plan pwen olye yon script konplè — li anjeneral sonnen pi natirèl.",
    assign:"Ekri yon plan pwen pou yon videyo 30-segond sou biznis ou.",
    dl:"Modèl: Plan Script Videyo Senp",
    checklist:["Kwochè ekri?","Sèlman 2-3 pwen prensipal?","CTA klè nan fen an?","Li awotvwa pou verifye li sonnen natirèl?"],
    ai:"Sijè videyo mwen se [dekri l]. Ekri yon senp plan pwen (kwochè, pwen prensipal, CTA) pou yon videyo 30-segond."}},
 fr:{lede:"Un script n'est pas une question de sonner « écrit à l'avance » — c'est une simple carte pour que vous ne divaguiez pas, n'oubliiez pas votre point, ou ne manquiez de choses à dire en cours d'enregistrement.",
   secs:[["Une structure de script simple","Accroche (première ligne, adaptant les principes d'accroche du Module 5 pour parler à voix haute), le(s) point(s) principal(aux) (2-3 max pour une vidéo courte), un appel à l'action clair à la fin."],
    ["Écrire pour l'oreille, pas pour l'œil","Phrases courtes, contractions, et mots du quotidien — le texte écrit sonne souvent rigide lu à voix haute ; lisez votre script à voix haute en l'écrivant pour repérer ce qui semble maladroit."],
    ["Combien scripter vs. improviser","Un script complet mot pour mot fonctionne pour un message précis (une pub, une annonce) ; un plan à puces (points clés, pas les mots exacts) sonne souvent plus naturel pour du contenu décontracté/éducatif — choisissez selon à quel point la vidéo devrait sembler polie vs. authentique."]],
   illus:"hub",hubLabels:["Accroche","Point Principal","CTA"],hubCenter:"Script Vidéo",
   ex:"Écrivez un plan à puces (pas un script complet) pour une vidéo de 30 secondes sur votre entreprise.",
   quiz:[
    {q:"Quel est le but d'un script vidéo ?",opts:["Sonner aussi scripté/formel que possible","Une simple carte pour ne pas divaguer ou manquer de choses à dire","C'est requis par chaque plateforme","Seulement pour les acteurs professionnels"],ans:1,fb:"C'est une carte pour éviter de divaguer."},

 en:{lede:"A script isn't about sounding scripted — it's a simple map so you don't ramble, forget your point, or run out of things to say mid-recording.",

    ["How much to script vs. improvise","A full word-for-word script works for precise messaging (an ad, an announcement); a bullet-point outline (key points, not exact words) often sounds more natural for casual/educational content — choose based on how polished vs. authentic the video should feel."]],

5:{ht:{lede:"Nan videyo, ou pa jis bezwen yon fò premye liy — ou bezwen yon fò ouvèti antye: sa ki wè, sa ki tande, ak sa ki sou ekran an, tout nan anviwon 3 segond.",
   secs:[["Poukisa kwochè videyo pi strik pase kwochè tèks","Moun defile pase yon videyo pi rapid toujou pase yo sote yon tit; premye kad la (anvan menm yon moun peze jwe nan kèk fil) ak premye mo pale yo toude bezwen genyen atansyon, pa jis mo yo."],
    ["Teknik kwochè vizyèl + odyo + tèks","Yon premye kad ki sipriz oswa ki pa komen, kòmanse nan mitan yon aksyon olye yon prepare lant, yon kwochè tèks sou ekran pou moun ki gade san son, yon kwochè pale ki non sitiyasyon egzat lektè a (reflete prensip kwochè Modil 5, aplike ak pawòl)."],
    ["Sa ki touye yon kwochè videyo","Yon entwodiksyon lant logo oswa animasyon mak anvan okenn kontni kòmanse, yon 'Alo tout moun, byenveni tounen nan chanèl mwen' pale anvan rive nan pwen an, yon premye kad estatik, enniyan san anyen k ap rive."]],
   illus:"myths",mythCards:[["Kwochè videyo fèb: entwodiksyon logo lant","Kwochè videyo fò: kòmanse dirèkteman nan mitan aksyon an"]],mythTag:"KWOCHÈ FÈB",realTag:"KWOCHÈ FÒ",
   ex:"Dekri premye 3 segond yo (sa ki wè, sa ki tande, ki tèks si genyen) yon kwochè videyo pou biznis ou.",
   quiz:[
    {q:"Poukisa kwochè videyo menm pi strik pase kwochè tèks?",opts:["Yo pa, yo menm bagay la","Moun defile pase videyo pi rapid toujou, e li bezwen mache vizyèlman, odyoman, ak an tèks an menm tan","Videyo pa bezwen okenn kwochè","Sèlman mo pale konte nan videyo"],ans:1,fb:"Pi strik, e miltip-kanal an menm tan."},
    {q:"Kilès ki yon teknik kwochè videyo fò?",opts:["Yon entwodiksyon lant logo anvan anyen rive","Kòmanse nan mitan aksyon oswa ak yon premye kad ki sipriz vizyèlman","Yon lonj 'byenveni tounen nan chanèl mwen'","Yon kad estatik san anyen k ap rive"],ans:1,fb:"Mitan-aksyon oswa yon kad sipriz se fò."},
    {q:"Kisa ki komenman touye yon kwochè videyo?",opts:["Rive nan pwen an imedyatman","Yon entwodiksyon mak lant oswa 'alo tout moun' anvan okenn vrè kontni","Yon kwochè tèks sou ekran","Yon fò premye kad"],ans:1,fb:"Yon entwodiksyon lant touye kwochè a."}],
   close:{learned:"Yon kwochè videyo dwe mache vizyèlman, odyoman, ak an tèks sou ekran nan anviwon 3 segond — entwodiksyon lant touye l.",
    mistake:"Ouvri ak yon animasyon logo oswa yon 'alo tout moun, byenveni tounen' anvan rive nan anyen lektè a enterese.",
    tip:"Kòmanse anrejistreman (oswa montaj) nan mitan aksyon an, apre deside si ou menm bezwen yon entwodiksyon ditou.",
    assign:"Dekri premye 3 segond (vizyèl, odyo, tèks sou ekran) yon kwochè pou yon videyo sou biznis ou.",
    dl:"Referans: Fèy Referans Teknik Kwochè Videyo",
    checklist:["Fò premye kad?","Okenn entwodiksyon/mak lant anvan kontni?","Kwochè tèks sou ekran pou moun ki gade san son?"],
    ai:"Videyo mwen sou [sijè]. Sijere 3 lide kwochè fò pou premye 3 segond (vizyèl, pale, ak tèks sou ekran)."}},
 fr:{lede:"En vidéo, vous n'avez pas juste besoin d'une ligne d'ouverture forte — vous avez besoin d'une ouverture forte entière : ce qui est vu, entendu, et à l'écran, tout ça en environ 3 secondes.",
   secs:[["Pourquoi les accroches vidéo sont plus strictes que les accroches texte","Les spectateurs défilent devant une vidéo encore plus vite qu'ils ne sautent un titre ; la première image (avant même qu'on appuie sur lecture dans certains fils) et les premiers mots parlés doivent tous deux gagner l'attention, pas juste les mots."],
    ["Techniques d'accroche visuelle + audio + texte","Une première image visuellement surprenante ou inhabituelle, commencer au milieu d'une action plutôt qu'une mise en place lente, une accroche texte à l'écran pour les spectateurs sans son, une accroche parlée qui nomme la situation exacte du spectateur (reflète les principes d'accroche du Module 5, appliqués à la parole)."],
    ["Ce qui tue une accroche vidéo","Une intro lente de logo ou animation de marque avant que le contenu ne commence, un « Salut tout le monde, bienvenue sur ma chaîne » parlé avant d'arriver au point, une première image statique et ennuyeuse sans rien qui se passe."]],
   illus:"myths",mythCards:[["Accroche vidéo faible : intro lente de logo","Accroche vidéo forte : commencer directement au milieu de l'action"]],mythTag:"ACCROCHE FAIBLE",realTag:"ACCROCHE FORTE",
   ex:"Décrivez les 3 premières secondes (ce qui est vu, entendu, quel texte le cas échéant) d'une accroche vidéo pour votre entreprise.",
   quiz:[
    {q:"Pourquoi les accroches vidéo sont-elles encore plus strictes que les accroches texte ?",opts:["Elles ne le sont pas, c'est pareil","Les spectateurs défilent devant la vidéo encore plus vite, et elle doit fonctionner visuellement, audiblement, et en texte à la fois","La vidéo n'a pas besoin d'accroche","Seuls les mots parlés comptent en vidéo"],ans:1,fb:"Plus strictes, et multi-canal à la fois."},
    {q:"Laquelle est une technique d'accroche vidéo forte ?",opts:["Une intro lente de logo avant que quoi que ce soit n'arrive","Commencer au milieu de l'action ou avec une première image visuellement surprenante","Une longue ouverture « bienvenue sur ma chaîne »","Une image statique sans rien qui se passe"],ans:1,fb:"Milieu d'action ou une image surprenante est fort."},
    {q:"Qu'est-ce qui tue couramment une accroche vidéo ?",opts:["Arriver au point immédiatement","Une intro lente de marque ou « salut tout le monde » avant tout vrai contenu","Une accroche texte à l'écran","Une forte première image"],ans:1,fb:"Une intro lente tue l'accroche."}],
   close:{learned:"Une accroche vidéo doit fonctionner visuellement, audiblement, et en texte à l'écran en environ 3 secondes — les intros lentes la tuent.",
    mistake:"Ouvrir avec une animation de logo ou un « salut tout le monde, bienvenue sur ma chaîne » avant d'arriver à quoi que ce soit qui intéresse le spectateur.",
    tip:"Commencez l'enregistrement (ou le montage) au milieu de l'action, puis décidez si vous avez même besoin d'une intro du tout.",
    assign:"Décrivez les 3 premières secondes (visuel, audio, texte à l'écran) d'une accroche pour une vidéo sur votre entreprise.",
    dl:"Référence : Antisèche des Techniques d'Accroche Vidéo",
    checklist:["Forte première image ?","Aucune intro/marque lente avant le contenu ?","Accroche texte à l'écran pour les spectateurs sans son ?"],
    ai:"Ma vidéo est sur [sujet]. Suggère 3 idées d'accroche fortes pour les 3 premières secondes (visuelle, parlée, et texte à l'écran)."}},
 en:{lede:"In video, you don't just need a strong opening line — you need a strong opening everything: what's seen, what's heard, and what's on screen, all within about 3 seconds.",
   secs:[["Why video hooks are stricter than text hooks","Viewers scroll past video even faster than they skip a headline; the first frame (before anyone even presses play in some feeds) and the first spoken words both need to earn attention, not just the words alone."],
    ["Visual + audio + text hook techniques","A visually surprising or unusual first frame, starting mid-action instead of a slow setup, an on-screen text hook for sound-off viewers, a spoken hook that names the viewer's exact situation (mirrors Module 5's hook principles, applied to speech)."],
    ["What kills a video hook","A slow logo intro or branding animation before any content starts, a spoken 'Hey guys, welcome back to my channel' before getting to the point, a static, boring first frame with nothing happening."]],
   illus:"myths",mythCards:[["Weak video hook: slow logo intro","Strong video hook: start directly mid-action"]],mythTag:"WEAK HOOK",realTag:"STRONG HOOK",
   ex:"Describe the first 3 seconds (what's seen, what's heard, what text if any) of a video hook for your business.",
   quiz:[
    {q:"Why are video hooks even stricter than text hooks?",opts:["They aren't, they're the same","Viewers scroll past video even faster, and it needs to work visually, audibly, and in text at once","Video doesn't need a hook","Only the spoken words matter in video"],ans:1,fb:"Stricter, and multi-channel at once."},
    {q:"Which is a strong video hook technique?",opts:["A slow logo intro before anything happens","Starting mid-action or with a visually surprising first frame","A long 'welcome back to my channel' opening","A static frame with nothing happening"],ans:1,fb:"Mid-action or a surprising frame is strong."},
    {q:"What commonly kills a video hook?",opts:["Getting to the point immediately","A slow branding intro or 'hey guys' opener before any real content","An on-screen text hook","A strong first frame"],ans:1,fb:"A slow intro kills the hook."}],
   close:{learned:"A video hook must work visually, audibly, and in on-screen text within about 3 seconds — slow intros kill it.",
    mistake:"Opening with a logo animation or a 'hey guys, welcome back' line before getting to anything the viewer cares about.",
    tip:"Start recording (or editing) from the middle of the action, then decide if you even need an intro at all.",
    assign:"Describe the first 3 seconds (visual, audio, on-screen text) of a hook for a video about your business.",
    dl:"Reference: Video Hook Technique Cheat Sheet",
    checklist:["Strong first frame?","No slow intro/branding before content?","On-screen text hook for sound-off viewers?"],
    ai:"My video is about [topic]. Suggest 3 strong opening-3-seconds hook ideas (visual, spoken, and on-screen text)."}}},

6:{ht:{lede:"Fè yon moun peze jwe se jis mwatye travay la — retansyon se kenbe yo ap gade yon fwa yo antre.",
   secs:[["Sa retansyon reyèlman mezire","Konbyen tan moun kontinye gade anvan yo kite, anjeneral montre kòm yon grafik; yon gwo bès bonè (nan premye kèk segond) endike yon kwochè fèb; yon bès konstan pandan tout videyo a anjeneral endike yon pwoblèm rit oswa enterè nan mitan an."],
    ["Teknik ki kenbe moun ap gade","Entèripsyon modèl (yon chanjman nan plan, ang, oswa rit chak kèk segond anpeche zye/sèvo tune soti), bouk ouvè (tiz yon bagay k ap vini pita — 'Mwen pral montre w rezilta a nan fen an' — ki fè moun tann pou wè rekonpans lan), koupe nenpòt bagay ki pa ajoute valè (silans, pwen repete, transisyon lant)."],
    ["Li pwòp done retansyon ou","Pifò platfòm montre yon grafik retansyon pou pwòp videyo ou; chèche egzakteman kote pi gwo bès la rive epi mande kisa ki te ap pase sou ekran an moman sa a — se sa espesifik pou repare pwochen fwa."]],
   illus:"bars",barLabels:["Retansyon"],barTrad:[35],barDig:[80],barTradLbl:"San Entèripsyon Modèl",barDigLbl:"Ak Entèripsyon Modèl",
   ex:"Gade (oswa imajine) dènye videyo ou. Ki kote moun ki gade yo ta pi souvan kite, e poukisa?",
   quiz:[
    {q:"Kisa retansyon mezire?",opts:["Sèlman kantite vizyonaj","Konbyen tan moun kontinye gade anvan yo kite","Sèlman longè videyo a","Anyen itil"],ans:1,fb:"Dire moun gade anvan yo kite."},
    {q:"Kisa yon teknik 'bouk ouvè' ye?",opts:["Fini yon videyo brital","Tiz yon bagay k ap vini pita pou fè moun tann rekonpans lan","Repete menm pwen an anpil fwa","Ajoute yon entwodiksyon lant"],ans:1,fb:"Tiz yon bagay pita pou fè moun tann."},
    {q:"Kisa yon gwo bès bonè anjeneral endike?",opts:["Yon kwochè fèb","Yon rit pafè","Videyo a two kout","Anyen ki vo repare"],ans:0,fb:"Yon gwo bès bonè endike yon kwochè fèb."}],
   close:{learned:"Retansyon se kenbe moun gade apre yo peze jwe — entèripsyon modèl, bouk ouvè, ak koupe pwa mò tout ede.",
    mistake:"Inyore grafik retansyon an epi repete menm erè yo videyo apre videyo olye jwenn egzakteman kote moun kite.",
    tip:"Gade pi gwo pwen bès ou epi mande kisa ki te sou ekran jis anvan l — se sa espesifik pou repare.",
    assign:"Gade dènye videyo ou (oswa imajine youn) epi idantifye yon sèl moman ki pi anpil chans pou pèdi moun k ap gade.",
    dl:"Fèy Travay: Gid Rezoud Pwoblèm Retansyon",
    checklist:["Entèripsyon modèl itilize chak kèk segond?","Omwen yon bouk ouvè?","Silans/repetisyon koupe?"],
    ai:"Men yon plan apwoksimatif videyo mwen: [dekri l]. Sijere kote pou ajoute yon entèripsyon modèl oswa bouk ouvè pou amelyore retansyon."}},
 fr:{lede:"Faire cliquer quelqu'un sur lecture n'est que la moitié du travail — la rétention, c'est le garder à regarder une fois entré.",
   secs:[["Ce que la rétention mesure vraiment","Combien de temps les gens continuent de regarder avant d'abandonner, généralement montré comme un graphique ; un gros abandon précoce (dans les premières secondes) pointe vers une accroche faible ; un abandon constant tout au long pointe généralement vers des problèmes de rythme ou d'intérêt au milieu."],
    ["Techniques qui gardent les gens à regarder","Interruptions de motif (un changement de plan, d'angle, ou de rythme toutes les quelques secondes empêche l'œil/le cerveau de décrocher), boucles ouvertes (teaser quelque chose à venir plus tard — « Je vais vous montrer le résultat à la fin » — qui fait attendre les gens pour voir la récompense), couper tout ce qui n'ajoute pas de valeur (silence mort, points répétés, transitions lentes)."],
    ["Lire vos propres données de rétention","La plupart des plateformes montrent un graphique de rétention pour vos propres vidéos ; cherchez exactement où se produit le plus gros abandon et demandez-vous ce qui se passait à l'écran à ce moment-là — c'est la chose spécifique à corriger la prochaine fois."]],
   illus:"bars",barLabels:["Rétention"],barTrad:[35],barDig:[80],barTradLbl:"Sans Interruption de Motif",barDigLbl:"Avec Interruption de Motif",
   ex:"Regardez (ou imaginez) votre dernière vidéo. Où les spectateurs abandonneraient-ils le plus probablement, et pourquoi ?",
   quiz:[
    {q:"Que mesure la rétention ?",opts:["Seulement le nombre de vues","Combien de temps les gens continuent de regarder avant d'abandonner","Seulement la longueur de la vidéo","Rien d'utile"],ans:1,fb:"Combien de temps les gens regardent avant d'abandonner."},
    {q:"Qu'est-ce qu'une technique de « boucle ouverte » ?",opts:["Terminer une vidéo abruptement","Teaser quelque chose à venir plus tard pour faire attendre les gens pour la récompense","Répéter le même point plusieurs fois","Ajouter une intro lente"],ans:1,fb:"Teaser quelque chose plus tard pour faire attendre les gens."},
    {q:"Qu'indique généralement un gros abandon précoce ?",opts:["Une accroche faible","Un rythme parfait","La vidéo étant trop courte","Rien qui vaille la peine d'être corrigé"],ans:0,fb:"Un gros abandon précoce indique une accroche faible."}],
   close:{learned:"La rétention, c'est garder les gens à regarder après qu'ils cliquent sur lecture — interruptions de motif, boucles ouvertes, et couper le poids mort aident tous.",
    mistake:"Ignorer le graphique de rétention et répéter les mêmes erreurs vidéo après vidéo plutôt que de trouver exactement où les gens abandonnent.",
    tip:"Regardez votre plus gros point d'abandon et demandez-vous ce qui était à l'écran juste avant — c'est la correction spécifique.",
    assign:"Regardez votre dernière vidéo (ou imaginez-en une) et identifiez le moment le plus susceptible de perdre des spectateurs.",
    dl:"Fiche de travail : Guide de Dépannage de la Rétention",
    checklist:["Interruptions de motif utilisées toutes les quelques secondes ?","Au moins une boucle ouverte ?","Silence mort/répétition coupés ?"],
    ai:"Voici un plan approximatif de ma vidéo : [décrire]. Suggère où ajouter une interruption de motif ou une boucle ouverte pour améliorer la rétention."}},
 en:{lede:"Getting someone to click play is only half the job — retention is keeping them watching once they're in.",
   secs:[["What retention actually measures","How long people keep watching before dropping off, usually shown as a graph; a big early drop-off (in the first few seconds) points to a weak hook; a steady drop throughout usually points to pacing or interest issues in the middle."],
    ["Techniques that keep people watching","Pattern interrupts (a change in shot, angle, or pace every few seconds prevents the eye/brain from tuning out), open loops (tease something coming later — 'I'll show you the result at the end' — that makes people wait to see the payoff), cutting anything that doesn't add value (dead air, repeated points, slow transitions)."],
    ["Reading your own retention data","Most platforms show a retention graph for your own videos; look for exactly where the biggest drop happens and ask what was happening on screen at that moment — that's the specific thing to fix next time."]],
   illus:"bars",barLabels:["Retention"],barTrad:[35],barDig:[80],barTradLbl:"No Pattern Interrupt",barDigLbl:"With Pattern Interrupt",
   ex:"Watch (or imagine) your last video. Where would viewers most likely drop off, and why?",
   quiz:[
    {q:"What does retention measure?",opts:["Only the number of views","How long people keep watching before dropping off","Only the video's length","Nothing useful"],ans:1,fb:"How long people watch before dropping off."},
    {q:"What's an 'open loop' technique?",opts:["Ending a video abruptly","Teasing something coming later to make people wait for the payoff","Repeating the same point many times","Adding a slow intro"],ans:1,fb:"Teasing something later to make people wait."},
    {q:"What does a big early drop-off usually point to?",opts:["A weak hook","Perfect pacing","The video being too short","Nothing worth fixing"],ans:0,fb:"A big early drop-off points to a weak hook."}],
   close:{learned:"Retention is keeping people watching after they click play — pattern interrupts, open loops, and cutting dead weight all help.",
    mistake:"Ignoring the retention graph and repeating the same mistakes video after video instead of finding exactly where people drop off.",
    tip:"Look at your biggest drop-off point and ask what was on screen right before it — that's the specific fix.",
    assign:"Watch your last video (or imagine one) and identify the one moment most likely to lose viewers.",
    dl:"Worksheet: Retention Troubleshooting Guide",
    checklist:["Pattern interrupts used every few seconds?","At least one open loop?","Dead air/repetition cut?"],
    ai:"Here's a rough outline of my video: [describe]. Suggest where to add a pattern interrupt or open loop to improve retention."}}},

7:{ht:{lede:"Yon miniati se yon tit ou wè olye w li — li gen menm sèl travay ak yon tit: fè moun klike.",
   secs:[["Sa ki fè yon miniati mache","Yon fokis klè (yon figi, objè, oswa mo — pa dezòd), fò kontras pou li lizib menm piti (jan li parèt nan yon fil), yon ekspresyon/moman emosyonèl oswa kirye, tèks (si itilize) kenbe a 3-4 mo maksimòm, lizib nan yon ti gwosè."],
    ["Matche miniati ak videyo a","Miniati a ta dwe kreye vrè kiryozite sou yon bagay videyo a reyèlman livre, pa yon apat-epi-chanje; yon miniati ki pa matche (twonpe san rekonpans) domaje konfyans e domaje videyo nan lavni, menm prensip ak onètte tit/miniati Leson 3 la."],
    ["Teste ak amelyore miniati","Retresi l a gwosè li ta reyèlman parèt (yon ti miniati fil) epi verifye li toujou klè; eseye 2-3 vèsyon epi wè kilès ki fè plis klik avèk tan; yon miniati ki mache pou yon sijè ka pa mache pou yon lòt — kontinye teste."]],
   illus:"roles",roleCards:[["🎯","Fokis Klè","Yon sèl bagay klè"],["⚡","Kontras Fò","Lizib piti"],["😲","Emosyon/Kiryozite","Yon ekspresyon reyèl"],["🔤","Tèks Kout","3-4 mo maksimòm"]],
   ex:"Dekri miniati ou ta design pou yon videyo sou biznis ou — ki fokis la, e ki 3-4 mo (si genyen) ou ta itilize?",
   quiz:[

/* ============ state ============ */
const NL=7,KEY="jamezzi:digital-marketing-ai:module7-sim-state";
const PROGRESS_KEY="jamezzi:digital-marketing-ai:completed";
const PROGRESS_EVENT="jamezzi:course-progress-changed";
const MOD7_LESSON_SLUGS=["why-video-works","short-form-video-shorts-reels-tiktok","youtube-long-form-video-basics","writing-a-video-script","hooks-for-video","retention-keeping-people-watching","thumbnails-that-get-clicks"];
let S={lang:"ht",cur:1,done:Array(NL).fill(false),st:{}};
try{const raw=localStorage.getItem(KEY);if(raw)S=Object.assign(S,JSON.parse(raw));}catch{}
for(let i=1;i<=NL;i++){if(!S.st[i])S.st[i]={exDone:false,exText:"",quizAns:Array(3).fill(null)};}
function persist(){try{localStorage.setItem(KEY,JSON.stringify(S));}catch{}}
function markModuleComplete(){
 if(!S.done.every(Boolean))return;
 try{
  const raw=localStorage.getItem(PROGRESS_KEY);
  const parsed=raw?JSON.parse(raw):[];
  const list=Array.isArray(parsed)?parsed:[];
  let changed=false;
  MOD7_LESSON_SLUGS.forEach(slug=>{if(!list.includes(slug)){list.push(slug);changed=true;}});
  if(changed){
   localStorage.setItem(PROGRESS_KEY,JSON.stringify(list));
   window.parent.dispatchEvent(new CustomEvent(PROGRESS_EVENT,{detail:{storageKey:PROGRESS_KEY}}));
  }
 }catch{}
}
function $(id){return document.getElementById(id);}

function renderMods(){
 const wrap=$("mods");wrap.innerHTML="";
 const firstLessonBySlug={1:"what-is-digital-marketing",2:"why-people-really-buy",3:"naming-your-business",4:"building-a-customer-avatar",5:"writing-headlines-that-get-read",6:"meet-the-editor",8:"meet-the-ai-chat-tool",9:"facebook-strategy",10:"what-are-content-pillars",11:"how-google-search-actually-works",12:"meet-your-business-profile",13:"meet-the-email-marketing-tool",14:"meet-the-page-builder",15:"meet-the-ads-manager",16:"meet-the-analytics-dashboard",17:"meet-the-automation-tool",18:"freelancing-vs-starting-an-agency",19:"marketing-for-local-service-businesses",20:"choosing-your-capstone-business"};
 MODULES[S.lang].forEach((title,i)=>{
  const n=i+1,isActive=n===7;
  const mod=document.createElement("div");mod.className="mod"+(isActive?" active":" locked");
  const mh=document.createElement("div");mh.className="mh";
  if(firstLessonBySlug[n]){
   mh.style.cursor="pointer";
   mh.innerHTML='<div class="num">'+n+'</div><div>'+title+'</div>';
   mh.addEventListener("click",()=>{window.top.location.href="/academy/courses/digital-marketing-ai/learn/"+firstLessonBySlug[n];});
  }else{
   mh.innerHTML='<div class="num">'+n+'</div><div>'+title+(isActive?"":" 🔒")+"</div>";
  }
  mod.appendChild(mh);
  if(isActive){
   const les=document.createElement("div");les.className="les";
   M7[S.lang].forEach((lt,li)=>{
    const n2=li+1;
    const item=document.createElement("div");item.className="li"+(n2===S.cur?" cur":"")+(S.done[li]?" done":"");
    item.innerHTML='<div class="dot">✓</div><div>'+n2+". "+lt+"</div>";
    item.addEventListener("click",()=>{S.cur=n2;persist();render();});
    les.appendChild(item);
   });
   mod.appendChild(les);
  }
  wrap.appendChild(mod);
 });
}

function renderRail(){
 const st=S.st[S.cur];
 $("prog").style.width=(Math.round((S.done.filter(Boolean).length/NL)*100))+"%";
 $("progText").textContent=S.done.filter(Boolean).length+" / "+NL;
 $("lblProg").textContent=UI[S.lang].prog;$("lblObj").textContent=UI[S.lang].obj;$("aiName").textContent=UI[S.lang].ai;
 const objs=[[st.exDone,UI[S.lang].objEx],[st.quizAns.every(a=>a!==null),UI[S.lang].objQuiz]];
 $("objList").innerHTML=objs.map(([done,label])=>'<div class="obj'+(done?" d":"")+'"><div class="bx">✓</div><div class="tx">'+label+"</div></div>").join("");
}

function aiSay(msg){$("aiMsg").textContent=msg;}

function renderDiagram(d){
 if(d.illus==="roles"){
  let h='<div style="max-width:660px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px">';
  d.roleCards.forEach(r=>{
   h+='<div style="background:var(--ink-600);border:1px solid var(--edge2);border-radius:12px;padding:14px;text-align:center">'+
    '<div style="font-size:26px;margin-bottom:8px">'+r[0]+'</div><div style="font-weight:700;font-size:13px;margin-bottom:4px">'+r[1]+'</div><div style="font-size:11.5px;color:var(--mute)">'+r[2]+'</div></div>';
  });
  h+="</div>";return h;
 }
 if(d.illus==="fbmap"){
  let h='<div style="max-width:660px;margin:0 auto">';
  d.fbRows.forEach(r=>{
   h+='<div style="display:flex;align-items:center;gap:14px;margin-bottom:14px">'+
    '<div style="flex:1;background:var(--ink-600);border-radius:10px;padding:12px 14px;font-size:13px"><div style="font-size:10.5px;color:var(--mute);font-weight:700;text-transform:uppercase;margin-bottom:4px">'+d.fbFeat+'</div>'+r[0]+'</div>'+
    '<div style="color:var(--brand);font-size:20px">→</div>'+
    '<div style="flex:1;background:rgba(var(--brand-rgb),.14);border:1px solid var(--brand);border-radius:10px;padding:12px 14px;font-size:13px"><div style="font-size:10.5px;color:var(--brand);font-weight:700;text-transform:uppercase;margin-bottom:4px">'+d.fbBen+'</div>'+r[1]+'</div>'+
   '</div>';
  });
  h+="</div>";return h;
 }
 if(d.illus==="hub"){
  const cx=330,cy=150,r=140;
  const pts=d.hubLabels.map((lbl,i)=>{const a=(Math.PI*2*i)/d.hubLabels.length-Math.PI/2;return{x:cx+Math.cos(a)*r,y:cy+Math.sin(a)*r,lbl};});
  let svg='<svg viewBox="0 0 660 300" style="width:100%;height:auto;max-width:660px;display:block;margin:0 auto">';
  pts.forEach(p=>{svg+='<line x1="'+cx+'" y1="'+cy+'" x2="'+p.x+'" y2="'+p.y+'" stroke="var(--edge2)" stroke-width="2"/>';});
  svg+='<circle cx="'+cx+'" cy="'+cy+'" r="56" fill="var(--brand)"/><text x="'+cx+'" y="'+(cy+5)+'" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">'+d.hubCenter+'</text>';
  pts.forEach(p=>{svg+='<circle cx="'+p.x+'" cy="'+p.y+'" r="46" fill="var(--ink-600)" stroke="var(--edge2)"/><text x="'+p.x+'" y="'+(p.y+5)+'" text-anchor="middle" fill="var(--text)" font-size="12" font-weight="600">'+p.lbl+'</text>';});
  svg+="</svg>";return svg;
 }
 if(d.illus==="myths"){
  let h='<div style="max-width:660px;margin:0 auto;display:flex;flex-direction:column;gap:12px">';
  d.mythCards.forEach(m=>{
   h+='<div style="display:flex;gap:14px;align-items:stretch">'+
    '<div style="flex:1;background:rgba(196,43,28,.12);border:1px solid var(--danger);border-radius:10px;padding:12px 14px;font-size:13px"><div style="font-size:10.5px;color:#ff9a8f;font-weight:700;text-transform:uppercase;margin-bottom:4px">'+d.mythTag+'</div>'+m[0]+'</div>'+
    '<div style="flex:1;background:rgba(34,197,94,.12);border:1px solid var(--good);border-radius:10px;padding:12px 14px;font-size:13px"><div style="font-size:10.5px;color:#7fe3a3;font-weight:700;text-transform:uppercase;margin-bottom:4px">'+d.realTag+'</div>'+m[1]+'</div>'+
   '</div>';
  });
  h+="</div>";return h;
 }
 if(d.illus==="bars"){
  const w=160,gap=60,x0=180,base=190;
  let svg='<svg viewBox="0 0 660 240" style="width:100%;height:auto;max-width:660px;display:block;margin:0 auto">';
  d.barLabels.forEach((lbl,i)=>{
   const gx=x0+i*(w+gap+54);
   const th=d.barTrad[i]*1.7,dh=d.barDig[i]*1.7;
   svg+='<rect x="'+gx+'" y="'+(base-th)+'" width="46" height="'+th+'" fill="var(--edge2)" rx="4"/>';
   svg+='<rect x="'+(gx+54)+'" y="'+(base-dh)+'" width="46" height="'+dh+'" fill="var(--brand)" rx="4"/>';
   svg+='<text x="'+(gx+50)+'" y="'+(base+22)+'" text-anchor="middle" fill="var(--dim)" font-size="12">'+lbl+'</text>';
  });
  svg+='<rect x="150" y="215" width="14" height="14" fill="var(--edge2)"/><text x="170" y="227" fill="var(--dim)" font-size="12">'+d.barTradLbl+'</text>';
  svg+='<rect x="380" y="215" width="14" height="14" fill="var(--brand)"/><text x="400" y="227" fill="var(--dim)" font-size="12">'+d.barDigLbl+'</text>';
  svg+="</svg>";return svg;
 }
 return "";
}

function render(){
 renderMods();
 const lang=S.lang,n=S.cur,d=C[n][lang],ui=UI[lang],st=S.st[n];
 $("cs").textContent=ui.cs;
 $("topTag").textContent="Modil 7 · 7."+n;
 $("topTitle").textContent=M7[lang][n-1];
 document.title="Academy · "+M7[lang][n-1];
 renderRail();
 aiSay(d.lede);

 const stage=$("stage");
 let h='<div class="labhead"><span class="labtag">Modil 7 · 7.'+n+'</span><h2 class="labh2">'+M7[lang][n-1]+'</h2><p class="lablead">'+d.lede+"</p></div>";
 h+='<div class="secs">'+d.secs.map(s=>'<div class="sec"><h3>'+s[0]+"</h3><p>"+s[1]+"</p></div>").join("")+"</div>";
 h+='<div class="illus">'+renderDiagram(d)+'<div class="cap">'+M7[lang][n-1]+"</div></div>";
 h+='<div class="exwrap"><div class="extag">'+ui.exTag+'</div><p class="exq">'+d.ex+'</p><textarea id="exArea" placeholder="...">'+(st.exText||"")+'</textarea><div style="margin-top:10px;display:flex;align-items:center;gap:12px"><button class="btn g" id="exSaveBtn">'+ui.exBtn+'</button><span class="exsaved" id="exSaved" style="'+(st.exDone?"display:inline":"")+'">'+ui.exSaved+"</span></div></div>";

 h+='<div class="quiz"><div class="qtag">'+ui.quizTag+'</div>';
 d.quiz.forEach((q,qi)=>{
  h+='<div class="qcard"><div class="qq">'+(qi+1)+". "+q.q+'</div><div class="qopts" id="qopts'+qi+'">';
  q.opts.forEach((o,oi)=>{
   let cls="qopt";const answered=st.quizAns[qi]!==null;
   if(answered){if(oi===q.ans)cls+=" correct";else if(oi===st.quizAns[qi])cls+=" wrong";}
   h+='<button class="'+cls+'" data-qi="'+qi+'" data-oi="'+oi+'"'+(answered?" disabled":"")+">"+o+"</button>";
  });
  h+="</div>";
  if(st.quizAns[qi]!==null)h+='<div class="qfb">'+q.fb+"</div>";
  h+="</div>";
 });
 h+="</div>";

 h+='<div class="close"><div class="ctag">'+ui.closeTag+'</div>'+
  '<div class="crow"><div class="cv"><div class="ck">'+ui.cLearned+'</div>'+d.close.learned+'</div></div>'+
  '<div class="crow"><div class="cv"><div class="ck">'+ui.cMistake+'</div>'+d.close.mistake+'</div></div>'+
  '<div class="crow"><div class="cv"><div class="ck">'+ui.cTip+'</div>'+d.close.tip+'</div></div>'+
  '<div class="crow"><div class="cv"><div class="ck">'+ui.cAssign+'</div>'+d.close.assign+'</div></div>'+
  '<div class="crow"><div class="cv"><div class="ck">'+ui.cDl+'</div>'+d.close.dl+'</div></div>'+
  '<div class="crow"><div class="cv"><div class="ck">'+ui.cChecklist+'</div><ul>'+d.close.checklist.map(c=>"<li>"+c+"</li>").join("")+'</ul></div></div>'+
  '<div class="crow"><div class="cv"><div class="ck">'+ui.cAi+'</div>"'+d.close.ai+'"</div></div>'+
 "</div>";

 const canFinish=st.exDone&&st.quizAns.every(a=>a!==null);
 h+='<div class="nextwrap">';
 if(!S.done[n-1]){
  h+='<button class="btn p" id="finishBtn"'+(canFinish?"":" disabled")+">"+ui.complete+"</button>";
 }else{
  h+='<span style="color:var(--good);font-weight:700;font-size:14px">'+ui.completed+"</span>";
  if(n<NL)h+='<button class="btn g" id="nextBtn">'+ui.next+"</button>";
  else h+='<button class="btn g" id="finalBtn">'+ui.stampBtn+"</button>";
 }
 h+="</div>";

 stage.innerHTML=h;stage.classList.add("fade");
 stage.scrollTop=0;

 $("exArea").addEventListener("input",e=>{st.exText=e.target.value;});
 $("exSaveBtn").addEventListener("click",()=>{
  if(st.exText&&st.exText.trim().length>0){st.exDone=true;$("exSaved").style.display="inline";persist();renderRail();}
 });
 d.quiz.forEach((q,qi)=>{
  if(st.quizAns[qi]!==null)return;
  document.querySelectorAll('#qopts'+qi+' .qopt').forEach(btn=>{
   btn.addEventListener("click",()=>{
    st.quizAns[qi]=+btn.dataset.oi;persist();render();
   });
  });
 });
 const fb=$("finishBtn");
 if(fb)fb.addEventListener("click",()=>{
  S.done[n-1]=true;persist();markModuleComplete();render();
 });
 const nb=$("nextBtn");
 if(nb)nb.addEventListener("click",()=>{S.cur=n+1;persist();render();});
 const flb=$("finalBtn");
 if(flb)flb.addEventListener("click",showStamp);
}

function updateFinishBtn(){
 const st=S.st[S.cur];const fb=$("finishBtn");
 if(fb)fb.disabled=!(st.exDone&&st.quizAns.every(a=>a!==null));
}

function showStamp(){
 const ui=UI[S.lang];
 $("stage").innerHTML='<div class="stampscreen fade"><div class="stamp"><div class="si">🎟️</div></div><h2>'+ui.stampTitle+"</h2><p>"+ui.stampBody+'</p><a href="/academy/courses/digital-marketing-ai/learn/meet-the-ai-chat-tool" target="_top" class="btn p" style="text-decoration:none;display:inline-block">'+ui.stampBtn+"</a></div>";
}

/* ============ chrome wiring ============ */
$("langs").addEventListener("click",e=>{
 const b=e.target.closest("button");if(!b)return;
 S.lang=b.dataset.l;persist();
 document.querySelectorAll("#langs button").forEach(x=>x.classList.toggle("on",x.dataset.l===S.lang));
 render();
});
$("resetBtn").addEventListener("click",()=>{
 if(!confirm(S.lang==="ht"?"Ou vle rekòmanse Modil 7?":S.lang==="fr"?"Voulez-vous recommencer le Module 7 ?":"Restart Module 7?"))return;
 S={lang:S.lang,cur:1,done:Array(NL).fill(false),st:{}};
 for(let i=1;i<=NL;i++)S.st[i]={exDone:false,exText:"",quizAns:Array(3).fill(null)};
 persist();render();
});
document.querySelectorAll("#langs button").forEach(x=>x.classList.toggle("on",x.dataset.l===S.lang));
render();
</script>
