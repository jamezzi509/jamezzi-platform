 en:{lede:"Every search engine follows the same basic three-step process — understanding it demystifies \"SEO\" from a mysterious black box into a logical system you can actually work with.",
   secs:[["Crawling","Search engines send out automated programs (crawlers/bots) that follow links from page to page, discovering what pages exist across the web."],
    ["Indexing","Once a page is found, the search engine reads and stores its content in a massive index — like a library card catalog — so it can be retrieved later; a page that isn't indexed can't show up in search results at all, no matter how good it is."],
    ["Ranking","When someone searches, the engine doesn't show every indexed page — it ranks pages by how well they seem to answer that specific search, using signals like relevance, quality, and trustworthiness (not paid placement, which is a separate paid-ads system covered in Module 15)."]],
   illus:"journey",journeySteps:["Crawl","Index","Rank","Serve"],
   ex:"In your own words, explain why a page that isn't indexed can never appear in search results, no matter how well-written it is.",
   quiz:[
    {q:"What do crawlers do?",opts:["Nothing, they don't exist","Follow links from page to page discovering what pages exist","Only work on paid ads","Rank pages instantly"],ans:1,fb:"Crawlers follow links discovering pages."},
    {q:"What happens if a page is never indexed?",opts:["It ranks #1 automatically","It can't show up in search results at all","It only shows up for paid searches","Indexing doesn't matter"],ans:1,fb:"Without indexing, the page can't show up at all."},
    {q:"What does ranking use to decide order?",opts:["A random lottery","Signals like relevance, quality, and trustworthiness","Only how much money was paid","Alphabetical order"],ans:1,fb:"Ranking uses relevance/quality/trust signals."}],
   close:{learned:"Search engines follow 3 steps — crawling (discovering pages), indexing (storing them), and ranking (ordering results by relevance/quality/trust) — a page invisible to any step can't appear in results.",
    mistake:"Assuming a website automatically appears in search just by existing — if it's never crawled or indexed, it's invisible no matter how good the content is.",
    tip:"If you're unsure whether your site is indexed, search \"site:yourdomain.com\" in Google to see what pages it has stored.",
    assign:"Explain in your own words why a page that isn't indexed can never appear in search results.",
    dl:"Reference: How Search Engines Work, Simplified",
    checklist:["Can explain crawling?","Can explain indexing?","Can explain ranking?","Understands these are 3 separate steps?"],
    ai:"Explain how search engines find, store, and rank web pages, in simple terms for a small business owner."}}},

 fr:{lede:"Les mots-clés sont les vrais mots et phrases que les gens tapent dans une barre de recherche — savoir lesquels vos vrais clients utilisent est la fondation sur laquelle tout le reste du SEO se construit.",
   secs:[["D'où viennent les idées de mots-clés","Les questions que les clients vous posent réellement (en personne, par message, dans les avis) ; ce pour quoi les pages des concurrents se classent ; et les suggestions d'auto-complétion du moteur de recherche lui-même quand vous commencez à taper une phrase pertinente."],
    ["Mots-clés courts vs. longue traîne","Les mots-clés courts (« chaussures ») sont larges, très recherchés, et très compétitifs ; les mots-clés longue traîne (« chaussures de marche confortables pour pieds plats ») sont plus spécifiques, moins recherchés, mais beaucoup plus faciles à classer et souvent plus proches de quelqu'un prêt à acheter."],
    ["Faire correspondre les mots-clés aux vraies pages","Chaque page importante de votre site devrait avoir un mot-clé principal autour duquel elle est construite, intégré naturellement dans le titre, les titres, et le corps — pas bourré artificiellement, ce qui se lit mal et peut en fait nuire plutôt qu'aider."]],
   illus:"roles",roleCards:[["💬","Questions Clients","Ce que les gens vous demandent tout le temps"],["🔎","Auto-complétion de Recherche","Suggestions que donne la recherche"],["🏆","Pages Concurrentes","Ce qui fonctionne pour d'autres"]],
   ex:"Listez 3 vraies questions ou phrases que vos clients utilisent réellement en cherchant ce que vous offrez.",
   quiz:[
    {q:"Qu'est-ce qu'un mot-clé « longue traîne » ?",opts:["Une recherche très courte, un seul mot","Une phrase plus spécifique, moins recherchée mais plus facile à classer","Un mot-clé qui n'est jamais recherché","Seulement utilisé pour les publicités payantes"],ans:1,fb:"La longue traîne est spécifique, moins recherchée, plus facile à classer."},
    {q:"D'où viennent les bonnes idées de mots-clés ?",opts:["Seulement deviner au hasard","Vraies questions clients, pages concurrentes, et auto-complétion de recherche","Seulement de logiciels chers","Ils n'ont pas d'importance, n'importe quel mot fonctionne"],ans:1,fb:"Vraies questions/concurrents/auto-complétion sont de bonnes sources."},
    {q:"Que se passe-t-il si vous bourrez artificiellement des mots-clés dans une page ?",opts:["Elle se classe toujours #1","Elle se lit mal et peut en fait nuire plutôt qu'aider","Rien ne change du tout","C'est la stratégie SEO recommandée"],ans:1,fb:"Le bourrage artificiel se lit mal et peut nuire."}],
   close:{learned:"Les mots-clés sont les vrais mots que les clients recherchent — les mots-clés longue traîne sont plus spécifiques et plus faciles à classer, et chaque page devrait naturellement se centrer sur un mot-clé principal.",
    mistake:"Bourrer artificiellement un mot-clé dans une page de façon répétée, ce qui se lit mal pour les vrais visiteurs et peut nuire plutôt qu'aider votre classement.",
    tip:"Les mots-clés longue traîne sont moins recherchés mais généralement plus faciles à classer et plus proches d'un client prêt à acheter.",
    assign:"Listez 3 vraies questions ou phrases que vos clients utilisent réellement en cherchant ce que vous offrez.",
    dl:"Fiche de travail : Banque d'Idées de Mots-Clés",
    checklist:["3 vraies phrases clients listées ?","Au moins une phrase longue traîne incluse ?","Les mots-clés se sentent naturels, pas bourrés ?"],
    ai:"Suggère 8 phrases de mots-clés longue traîne qu'un client pourrait rechercher pour un(e) [type d'entreprise] dans [lieu/contexte]."}},
 en:{lede:"Keywords are the actual words and phrases people type into a search bar — knowing which ones your real customers use is the foundation everything else in SEO builds on.",
   secs:[["Where keyword ideas come from","The questions customers actually ask you (in person, by message, in reviews); what competitors' pages are ranking for; and a search engine's own autocomplete suggestions when you start typing a relevant phrase."],
    ["Short vs. long-tail keywords","Short keywords (\"shoes\") are broad, highly searched, and highly competitive; long-tail keywords (\"comfortable walking shoes for flat feet\") are more specific, searched less often, but far easier to rank for and often closer to someone ready to buy."],
    ["Matching keywords to real pages","Each important page on your site should have a primary keyword it's built around, naturally worked into the title, headings, and body — not stuffed in unnaturally, which reads poorly and can actually hurt rather than help."]],
   illus:"roles",roleCards:[["💬","Customer Questions","What people ask you all the time"],["🔎","Search Autocomplete","Suggestions search itself gives"],["🏆","Competitor Pages","What works for others"]],
   ex:"List 3 real questions or phrases your customers actually use when looking for what you offer.",
   quiz:[
    {q:"What is a \"long-tail\" keyword?",opts:["A very short, one-word search","A more specific phrase, searched less often but easier to rank for","A keyword that never gets searched","Only used for paid ads"],ans:1,fb:"Long-tail is specific, less searched, easier to rank for."},
    {q:"Where do good keyword ideas come from?",opts:["Only guessing randomly","Real customer questions, competitor pages, and search autocomplete","Only from expensive software","They don't matter, any word works"],ans:1,fb:"Real questions/competitors/autocomplete are good sources."},
    {q:"What happens if you unnaturally stuff keywords into a page?",opts:["It always ranks #1","It reads poorly and can actually hurt rather than help","Nothing changes at all","It's the recommended SEO strategy"],ans:1,fb:"Unnatural stuffing reads poorly and can hurt."}],
   close:{learned:"Keywords are the real words customers search — long-tail keywords are more specific and easier to rank for, and each page should naturally center on one primary keyword.",
    mistake:"Unnaturally stuffing a keyword into a page repeatedly, which reads poorly to real visitors and can hurt rather than help your ranking.",
    tip:"Long-tail keywords are searched less often but are usually easier to rank for and closer to a ready-to-buy customer.",
    assign:"List 3 real questions or phrases your customers actually use when looking for what you offer.",
    dl:"Worksheet: Keyword Idea Bank",
    checklist:["3 real customer phrases listed?","At least one long-tail phrase included?","Keywords feel natural, not stuffed?"],
    ai:"Suggest 8 long-tail keyword phrases a customer might search for a [type of business] in [location/context]."}}},

 fr:{lede:"Exactement le même mot-clé peut vouloir dire des choses complètement différentes selon ce que le chercheur veut vraiment — faire correspondre votre contenu à la vraie intention derrière une recherche compte plus que le mot-clé lui-même.",
   secs:[["Intention informationnelle","Le chercheur veut apprendre quelque chose (« comment fonctionne le SEO ») — il n'est pas encore prêt à acheter, donc le contenu ici devrait enseigner, pas vendre."],
    ["Intention navigationnelle","Le chercheur sait déjà où il veut aller et utilise juste la recherche pour y arriver (« connexion Jamezzi Academy ») — pas grand-chose à optimiser ici au-delà de s'assurer que les recherches de votre marque mènent bien à vous."],
    ["Intention transactionnelle","Le chercheur est prêt à agir (« acheter des chaussures de course en ligne », « consultant SEO près de chez moi ») — c'est ici qu'une offre claire et un appel à l'action (Module 5) ont leur place, puisque la personne est proche d'une décision."]],
   illus:"roles",roleCards:[["📖","Informationnelle","Veut apprendre quelque chose"],["🧭","Navigationnelle","Sait déjà où aller"],["🛒","Transactionnelle","Prêt à agir/acheter"]],
   ex:"Prenez une idée de mot-clé de votre liste et identifiez laquelle des 3 intentions elle correspond.",
   quiz:[
    {q:"Que signifie l'intention de recherche informationnelle ?",opts:["Le chercheur est prêt à acheter immédiatement","Le chercheur veut apprendre quelque chose et n'est pas prêt à acheter","Le chercheur sait déjà exactement où aller","L'intention n'affecte pas du tout le contenu"],ans:1,fb:"Informationnelle veut apprendre, pas encore prêt à acheter."},
    {q:"Que signifie l'intention transactionnelle ?",opts:["Le chercheur veut seulement des infos générales","Le chercheur est prêt à agir, comme acheter ou réserver","Le chercheur cherche un site web spécifique connu","L'intention est la même que navigationnelle"],ans:1,fb:"Transactionnelle signifie prêt à agir."},
    {q:"Pourquoi faire correspondre l'intention compte-t-il plus que le mot-clé seul ?",opts:["Ça n'a pas d'importance du tout","Le même mot-clé peut vouloir dire des choses très différentes selon ce que le chercheur veut vraiment","Seule la correspondance exacte du mot-clé compte","L'intention n'est pertinente que pour les publicités payantes"],ans:1,fb:"Même mot-clé, vraie signification différente."}],
   close:{learned:"Le même mot-clé peut porter une intention informationnelle, navigationnelle, ou transactionnelle — faire correspondre le contenu à la vraie intention derrière une recherche compte plus que le mot-clé lui-même.",
    mistake:"Écrire un pur argumentaire de vente pour une recherche informationnelle, ce qui ne correspond pas à ce que ce chercheur voulait vraiment et le fait fuir.",
    tip:"Les pages d'intention transactionnelle sont où une offre claire et un appel à l'action ont leur place — les pages informationnelles devraient d'abord enseigner.",
    assign:"Prenez une idée de mot-clé de votre liste et identifiez laquelle des 3 intentions elle correspond.",

    ai:"Pour le mot-clé [votre mot-clé], dis-moi quelle intention de recherche il correspond probablement et quel type de contenu lui conviendrait."}},
 en:{lede:"The exact same keyword can mean completely different things depending on what the searcher actually wants — matching your content to the real intent behind a search matters more than the keyword itself.",
   secs:[["Informational intent","The searcher wants to learn something (\"how does SEO work\") — they're not ready to buy yet, so content here should teach, not pitch."],
    ["Navigational intent","The searcher already knows where they want to go and is just using search to get there (\"Jamezzi Academy login\") — not much to optimize here beyond making sure your own branded searches lead to you."],
    ["Transactional intent","The searcher is ready to act (\"buy running shoes online,\" \"SEO consultant near me\") — this is where a clear offer and call to action (Module 5) belongs, since the person is close to a decision."]],
   illus:"roles",roleCards:[["📖","Informational","Wants to learn something"],["🧭","Navigational","Already knows where to go"],["🛒","Transactional","Ready to act/buy"]],
   ex:"Take one keyword idea from your list and identify which of the 3 intents it matches.",
   quiz:[
    {q:"What does informational search intent mean?",opts:["The searcher is ready to buy immediately","The searcher wants to learn something and isn't ready to buy yet","The searcher already knows exactly where to go","Intent doesn't affect content at all"],ans:1,fb:"Informational means wanting to learn, not ready to buy."},
    {q:"What does transactional intent mean?",opts:["The searcher wants general information only","The searcher is ready to act, like buying or booking","The searcher is looking for a specific known website","Intent is the same as navigational"],ans:1,fb:"Transactional means ready to act."},
    {q:"Why does matching intent matter more than the keyword alone?",opts:["It doesn't matter at all","The same keyword can mean very different things depending on what the searcher actually wants","Only the exact keyword match matters","Intent is only relevant for paid ads"],ans:1,fb:"Same keyword, different real meaning."}],
   close:{learned:"The same keyword can carry informational, navigational, or transactional intent — matching content to the real intent behind a search matters more than the keyword itself.",
    mistake:"Writing a pure sales pitch for an informational search, which mismatches what that searcher actually wanted and drives them away.",
    tip:"Transactional-intent pages are where a clear offer and call to action belong — informational pages should teach first.",
    assign:"Take one keyword idea from your list and identify which of the 3 intents it matches.",
    dl:"Reference: The 3 Types of Search Intent",
    checklist:["Keyword picked from your list?","Correct intent identified?","Understands why content should match that intent?"],
    ai:"For the keyword [your keyword], tell me which search intent it likely matches and what kind of content would fit it."}}},

    ["Tèks altènatif imaj","Yon ti deskripsyon tèks tache ak chak imaj, li pa motè rechèch (ki pa ka 'wè' imaj) ak pa lektè ekran pou vizitè ki gen andikap vizyèl — yon pratik SEO ak aksè an menm tan."]],
   illus:"roles",roleCards:[["🏷️","Tit Tag","Tit klè ak mo kle"],["📝","Deskripsyon Meta","Rezime ki fè moun klike"],["🖼️","Tèks Altènatif Imaj","Deskri imaj pou aksè ak SEO"]],
   ex:"Ekri yon tit tag ak yon deskripsyon meta pou yon vrè paj sou sit ou (oswa youn ou ta renmen bati).",
   quiz:[
    {q:"Kisa yon tit tag ye?",opts:["Yon chan kache pèsonn pa wè","Tit ou ka klike montre nan rezilta rechèch, ki dekri paj la","Yon non fichye entèn o aza","Sèlman itilize pou imaj"],ans:1,fb:"Tit tag se tit ou ka klike nan rezilta rechèch."},
    {q:"Èske deskripsyon meta afekte klasman dirèkteman?",opts:["Wi, se faktè klasman #1","Non, men yon rezime konvenkan ogmante chans yon moun klike sou rezilta ou","Li ranplase bezwen pou yon tit tag","Li sèlman pètinan pou imaj"],ans:1,fb:"Li pa klase dirèkteman, li ogmante klik."},
    {q:"Pou kisa tèks altènatif imaj itilize?",opts:["Anyen itil","Dekri yon imaj pou motè rechèch ak lektè ekran, ede tou de SEO ak aksè","Sèlman rezon dekoratif","Fè yon imaj chaje pi vit"],ans:1,fb:"Se SEO + aksè an menm tan."}],

    ai:"Ekri yon tit tag ak deskripsyon meta pou yon paj sou [dekri paj la] ki vize mo kle [mo kle ou a]."}},
 fr:{lede:"Le SEO on-page, c'est tout ce que vous contrôlez directement sur votre propre page pour aider à la fois les moteurs de recherche et les vrais visiteurs à comprendre de quoi il s'agit — de petits détails spécifiques qui s'additionnent.",
   secs:[["Balises de titre et titres","La balise de titre (ce qui s'affiche comme le lien bleu cliquable dans les résultats de recherche) devrait décrire clairement la page et inclure son mot-clé principal naturellement ; les titres (H1, H2...) organisent la page pour les lecteurs et les moteurs de recherche, similaire à la structure de blog du Module 10."],
    ["Meta descriptions","Le court résumé affiché sous le titre dans les résultats de recherche ; il n'affecte pas directement le classement, mais une description claire et convaincante augmente la chance que quelqu'un clique réellement sur votre résultat plutôt que celui d'un concurrent."],
    ["Texte alternatif d'image","Une courte description textuelle attachée à chaque image, lue par les moteurs de recherche (qui ne peuvent pas « voir » les images) et par les lecteurs d'écran pour les visiteurs malvoyants — à la fois une pratique SEO et d'accessibilité."]],
   illus:"roles",roleCards:[["🏷️","Balise de Titre","Titre clair avec mot-clé"],["📝","Meta Description","Résumé qui fait cliquer"],["🖼️","Texte Alt d'Image","Décrit l'image pour l'accès et le SEO"]],
   ex:"Écrivez une balise de titre et une meta description pour une vraie page de votre site (ou une que vous aimeriez construire).",
   quiz:[
    {q:"Qu'est-ce qu'une balise de titre ?",opts:["Un champ caché que personne ne voit","Le titre cliquable affiché dans les résultats de recherche, décrivant la page","Un nom de fichier interne aléatoire","Seulement utilisé pour les images"],ans:1,fb:"La balise de titre est le titre cliquable dans les résultats de recherche."},
    {q:"La meta description affecte-t-elle directement le classement ?",opts:["Oui, c'est le facteur de classement #1","Non, mais une convaincante augmente la chance que quelqu'un clique sur votre résultat","Elle remplace le besoin d'une balise de titre","Elle n'est pertinente que pour les images"],ans:1,fb:"Elle ne classe pas directement, elle augmente les clics."},
    {q:"À quoi sert le texte alternatif d'image ?",opts:["Rien d'utile","Décrire une image pour les moteurs de recherche et les lecteurs d'écran, aidant le SEO et l'accessibilité","Seulement des fins décoratives","Faire charger une image plus vite"],ans:1,fb:"C'est le SEO + l'accessibilité en même temps."}],
   close:{learned:"Le SEO on-page couvre les balises de titre, les titres, les meta descriptions, et le texte alternatif d'image — de petits détails on-page qui aident les moteurs de recherche et les vrais visiteurs à comprendre et choisir votre page.",
    mistake:"Laisser les balises de titre génériques ou par défaut (comme « Home » ou « Sans titre ») plutôt que d'écrire une description claire et naturelle avec mot-clé de la page réelle.",
    tip:"Une meta description convaincante ne boostera pas directement le classement, mais elle peut significativement augmenter combien de chercheurs cliquent sur votre résultat plutôt qu'un concurrent.",
    assign:"Écrivez une balise de titre et une meta description pour une vraie page de votre site (ou une que vous aimeriez construire).",
    dl:"Fiche de travail : Liste de Vérification SEO On-Page",
    checklist:["Balise de titre écrite avec le mot-clé principal ?","Meta description convaincante et exacte ?","Texte alternatif considéré pour les images clés ?"],
    ai:"Écris une balise de titre et une meta description pour une page sur [décris la page] ciblant le mot-clé [ton mot-clé]."}},
 en:{lede:"On-page SEO is everything you control directly on your own page to help both search engines and real visitors understand what it's about — small, specific details that add up.",
   secs:[["Title tags and headings","The title tag (what shows as the clickable blue link in search results) should clearly describe the page and include its primary keyword naturally; headings (H1, H2...) organize the page for both readers and search engines, similar to the blog structure from Module 10."],
    ["Meta descriptions","The short summary shown under the title in search results; it doesn't directly affect ranking, but a clear, compelling one increases the chance someone actually clicks your result over a competitor's."],
    ["Image alt text","A short text description attached to each image, read by search engines (who can't \"see\" images) and by screen readers for visually impaired visitors — both an SEO and an accessibility practice at once."]],
   illus:"roles",roleCards:[["🏷️","Title Tag","Clear title with keyword"],["📝","Meta Description","Summary that earns clicks"],["🖼️","Image Alt Text","Describes image for access & SEO"]],
   ex:"Write a title tag and a meta description for one real page on your site (or one you'd like to build).",
   quiz:[
    {q:"What is a title tag?",opts:["A hidden field nobody sees","The clickable headline shown in search results, describing the page","A random internal file name","Only used for images"],ans:1,fb:"A title tag is the clickable headline in search results."},
    {q:"Does the meta description directly affect ranking?",opts:["Yes, it's the #1 ranking factor","No, but a compelling one increases the chance someone clicks your result","It replaces the need for a title tag","It only matters for images"],ans:1,fb:"It doesn't rank directly, it boosts clicks."},
    {q:"What is image alt text used for?",opts:["Nothing useful","Describing an image for search engines and screen readers, helping both SEO and accessibility","Only decorative purposes","Making an image load faster"],ans:1,fb:"It's SEO + accessibility at once."}],
   close:{learned:"On-page SEO covers title tags, headings, meta descriptions, and image alt text — small on-page details that help both search engines and real visitors understand and choose your page.",
    mistake:"Leaving title tags generic or default (like \"Home\" or \"Untitled\") instead of writing a clear, keyword-natural description of the actual page.",
    tip:"A compelling meta description won't boost ranking directly, but it can meaningfully increase how many searchers click your result over a competitor's.",
    assign:"Write a title tag and a meta description for one real page on your site (or one you'd like to build).",
    dl:"Worksheet: On-Page SEO Checklist",
    checklist:["Title tag written with primary keyword?","Meta description compelling and accurate?","Alt text considered for key images?"],
    ai:"Write a title tag and meta description for a page about [describe the page] targeting the keyword [your keyword]."}}},

5:{ht:{lede:"Menm pi bon paj ekri ka gen difikilte pou klase si gen yon pwoblèm teknik ki jennen li — SEO teknik se debarase chemen an pou motè rechèch ak vizitè ka reyèlman rive e itilize sit ou.",
   secs:[["Vitès sit la","Yon paj ki chaje lan fristre vizitè (ki souvan pati anvan li fini chaje) e motè rechèch yo konte vitès chajman nan klasman, paske yon eksperyans lan se yon move eksperyans pou moun k ap chèche."],
    ["Bon pou mobil","Pifò rechèch kounye a fèt sou telefòn, e yon sit ki difisil pou itilize sou yon ti ekran (tèks tou piti, bouton twò pre) fè mal ni eksperyans vizitè a ni klasman an."],
    ["Ka eksplore (Crawlability)","Motè rechèch bezwen reyèlman kapab jwenn e li paj ou yo; lyen ki kase, paj aksidantèlman bloke soti nan motè rechèch, ak navigasyon sit konfizan tout fè travay crawlers (Leson 11.1) pi difisil."]],
   illus:"roles",roleCards:[["⚡","Vitès Sit la","Chaje rapid, pa fè moun tann"],["📱","Bon pou Mobil","Fasil pou itilize sou telefòn"],["🔗","Ka Eksplore","Lyen ki mache, pa gen bloke"]],
   ex:"Ouvri sit ou (oswa yon konkiran) sou telefòn ou — èske li fasil pou li e touche san zoom?",
   quiz:[
    {q:"Poukisa vitès sit la enpòtan pou SEO?",opts:["Li pa enpòtan ditou","Paj lan fristre vizitè e motè rechèch konte vitès nan klasman","Vitès sèlman enpòtan pou gwo sit web","Sit ki pi rapid toujou klase #1 otomatikman"],ans:1,fb:"Li fristre vizitè e konte nan klasman."},
    {q:"Poukisa bon pou mobil enpòtan?",opts:["Pèsonn pa chèche sou telefòn","Pifò rechèch fèt sou telefòn, e yon sit difisil pou mobil fè mal tou de eksperyans ak klasman","Mobil pa gen okenn efè sou SEO","Sèlman desktop enpòtan pou klasman"],ans:1,fb:"Pifò rechèch se sou mobil."},
    {q:"Kisa 'ka eksplore' (crawlability) ye?",opts:["Sèlman kijan yon paj chaje vit","Èske motè rechèch ka reyèlman jwenn e li paj ou san obstak","Yon kalite piblisite peye","Sèlman pètinan pou imaj"],ans:1,fb:"Se èske motè rechèch ka jwenn/li sit la."}],
   close:{learned:"SEO teknik debarase chemen an pou motè rechèch ak vizitè — vitès sit la, bon pou mobil, ak ka eksplore (pa gen lyen kase oswa bloke aksidantèl) tout enpòtan ansanm ak bon kontni.",
    mistake:"Konsantre sèlman sou ekri gwo kontni pandan w inyore yon sit ki lan pou chaje oswa difisil pou mobil, ki mine chans kontni sa a genyen pou klase oswa konvèti.",
    tip:"Teste pwòp sit ou sou telefòn ou regilyèman — yon eksperyans ki pa bon pou mobil koute w tou de vizitè ak klasman an silans.",
    assign:"Ouvri sit ou (oswa yon konkiran) sou telefòn ou — èske li fasil pou li e touche san zoom?",
    dl:"Lis Verifikasyon: Baz SEO Teknik",
    checklist:["Sit teste sou mobil?","Vitès chajman verifye?","Pa gen lyen kase evidan jwenn?"],
    ai:"Ban m yon lis verifikasyon SEO teknik senp pou revize pou yon sit web [kalite biznis]."}},
 fr:{lede:"Même la page la mieux écrite peut avoir du mal à se classer s'il y a un problème technique qui bloque le chemin — le SEO technique consiste à dégager la voie pour que les moteurs de recherche et les visiteurs puissent réellement atteindre et utiliser votre site.",
   secs:[["Vitesse du site","Une page qui charge lentement frustre les visiteurs (qui partent souvent avant qu'elle finisse de charger) et les moteurs de recherche tiennent compte de la vitesse de chargement dans le classement, car une expérience lente est une mauvaise expérience pour les chercheurs."],
    ["Convivialité mobile","La plupart des recherches se font maintenant sur téléphone, et un site difficile à utiliser sur un petit écran (texte minuscule, boutons trop rapprochés) nuit à la fois à l'expérience visiteur et au classement."],
    ["Explorabilité (Crawlability)","Les moteurs de recherche doivent réellement pouvoir trouver et lire vos pages ; les liens brisés, les pages accidentellement bloquées aux moteurs de recherche, et une navigation de site confuse rendent tous le travail des crawlers (Leçon 11.1) plus difficile."]],
   illus:"roles",roleCards:[["⚡","Vitesse du Site","Charge vite, ne fait pas attendre"],["📱","Convivial Mobile","Facile à utiliser sur téléphone"],["🔗","Explorable","Liens qui fonctionnent, rien de bloqué"]],
   ex:"Ouvrez votre site (ou celui d'un concurrent) sur votre téléphone — est-il facile à lire et à toucher sans zoomer ?",
   quiz:[
    {q:"Pourquoi la vitesse du site compte-t-elle pour le SEO ?",opts:["Ça n'a pas d'importance du tout","Les pages lentes frustrent les visiteurs et les moteurs de recherche tiennent compte de la vitesse dans le classement","La vitesse ne compte que pour les grands sites web","Les sites plus rapides se classent toujours #1 automatiquement"],ans:1,fb:"Ça frustre les visiteurs et compte dans le classement."},
    {q:"Pourquoi la convivialité mobile compte-t-elle ?",opts:["Personne ne cherche sur téléphone","La plupart des recherches se font sur téléphone, et un site difficile sur mobile nuit à l'expérience et au classement","Le mobile n'a aucun effet sur le SEO","Seul le bureau compte pour le classement"],ans:1,fb:"La plupart des recherches sont sur mobile."},
    {q:"Qu'est-ce que « l'explorabilité » (crawlability) ?",opts:["Seulement la vitesse de chargement d'une page","Si les moteurs de recherche peuvent réellement trouver et lire vos pages sans obstacles","Un type de publicité payante","Seulement pertinent pour les images"],ans:1,fb:"C'est si les moteurs de recherche peuvent trouver/lire le site."}],
   close:{learned:"Le SEO technique dégage la voie pour les moteurs de recherche et les visiteurs — la vitesse du site, la convivialité mobile, et l'explorabilité (pas de liens brisés ou de blocages accidentels) comptent toutes aux côtés d'un bon contenu.",
    mistake:"Se concentrer uniquement sur l'écriture d'un excellent contenu tout en ignorant un site lent ou difficile à utiliser sur mobile, ce qui compromet la chance de ce contenu de se classer ou de convertir.",
    tip:"Testez régulièrement votre propre site sur votre téléphone — une expérience mobile peu conviviale vous coûte silencieusement à la fois des visiteurs et du classement.",
    assign:"Ouvrez votre site (ou celui d'un concurrent) sur votre téléphone — est-il facile à lire et à toucher sans zoomer ?",
    dl:"Liste de Vérification : Bases du SEO Technique",
    checklist:["Site testé sur mobile ?","Vitesse de chargement vérifiée ?","Aucun lien manifestement brisé trouvé ?"],
    ai:"Donne-moi une liste de vérification SEO technique simple à examiner pour un site web de [type d'entreprise]."}},
 en:{lede:"Even the best-written page can struggle to rank if there's a technical problem getting in its way — technical SEO is about clearing the path so search engines and visitors can actually reach and use your site.",
   secs:[["Site speed","A page that loads slowly frustrates visitors (who often leave before it finishes) and search engines factor loading speed into ranking, since a slow experience is a bad one for searchers."],
    ["Mobile-friendliness","Most searches now happen on phones, and a site that's hard to use on a small screen (tiny text, buttons too close together) hurts both the visitor experience and ranking."],
    ["Crawlability","Search engines need to actually be able to find and read your pages; broken links, pages accidentally blocked from search engines, and confusing site navigation all make it harder for crawlers (Lesson 11.1) to do their job."]],
   illus:"roles",roleCards:[["⚡","Site Speed","Loads fast, no waiting"],["📱","Mobile-Friendly","Easy to use on a phone"],["🔗","Crawlable","Links that work, nothing blocked"]],
   ex:"Open your site (or a competitor's) on your phone — is it easy to read and tap without zooming?",
   quiz:[
    {q:"Why does site speed matter for SEO?",opts:["It doesn't matter at all","Slow pages frustrate visitors and search engines factor speed into ranking","Speed only matters for large websites","Faster sites always rank #1 automatically"],ans:1,fb:"It frustrates visitors and is factored into ranking."},
    {q:"Why does mobile-friendliness matter?",opts:["Nobody searches on phones","Most searches happen on phones, and a hard-to-use mobile site hurts both experience and ranking","Mobile has no effect on SEO","Only desktop matters for ranking"],ans:1,fb:"Most searches are mobile."},
    {q:"What is \"crawlability\"?",opts:["How fast a page loads only","Whether search engines can actually find and read your pages without obstacles","A type of paid ad","Only relevant for images"],ans:1,fb:"It's whether search engines can find/read the site."}],
   close:{learned:"Technical SEO clears the path for search engines and visitors — site speed, mobile-friendliness, and crawlability (no broken links or accidental blocks) all matter alongside good content.",
    mistake:"Focusing only on writing great content while ignoring a slow-loading or hard-to-use-on-mobile site, which undermines that content's chance to rank or convert.",
    tip:"Test your own site on your phone regularly — a mobile-unfriendly experience quietly costs you both visitors and ranking.",
    assign:"Open your site (or a competitor's) on your phone — is it easy to read and tap without zooming?",
    dl:"Checklist: Technical SEO Basics",
    checklist:["Site tested on mobile?","Loading speed checked?","No obviously broken links found?"],
    ai:"Give me a simple technical SEO checklist to review for a [type of business] website."}}},

6:{ht:{lede:"Pou yon biznis ki sèvi yon zòn espesifik, parèt lè kliyan tou pre chèche konte plis pase klase nasyonalman — SEO lokal se genyen moman 'tou pre m' sa a.",
   secs:[["Google Business Profile kòm fondasyon","Yon Google Business Profile konplè, egzat, verifye (non, adrès, orè, kategori, foto) se pi gwo faktè sèl nan vizibilite rechèch lokal — kouvri an plen pwofondè nan Modil 12."],
    ["Mo kle lokal","Ajoute kote natirèlman nan kontni ou ('boulanjri nan Pétion-Ville' olye jis 'boulanjri') ede motè rechèch matche w ak moun tou pre k ap chèche egzakteman sa a."],
    ["Revi ak sitasyon","Vrè revi kliyan bati sinyal konfyans motè rechèch peze lou pou rezilta lokal; sitasyon (non biznis ou, adrès, ak telefòn liste konsistan atravè lòt sit/anyè) ranfòse ke ou se yon vrè biznis lokal etabli."]],
   illus:"hub",hubCenter:"SEO Lokal",hubSpokes:["Google Business Profile","Mo Kle Lokal","Revi Kliyan","Sitasyon Konsistan"],
   ex:"Chèche non biznis ou plis vil ou — kisa ki parèt, e èske Google Business Profile ou parèt?",
   quiz:[
    {q:"Kisa ki pi gwo faktè sèl nan vizibilite rechèch lokal?",opts:["Yon kanpay piblisite peye sèlman","Yon Google Business Profile konplè, egzat, verifye","Koulè sit web ou","Longè non domèn ou"],ans:1,fb:"Google Business Profile se pi gwo faktè a."},
    {q:"Kisa mo kle lokal ye?",opts:["Mo kle san rapò ak kote","Kote ajoute natirèlman nan kontni pou matche moun tou pre k ap chèche","Sèlman itilize nan piblisite peye","Mo kle ki fè mal pou SEO"],ans:1,fb:"Se kote ajoute nan kontni."},
    {q:"Kisa 'sitasyon' nan SEO lokal ye?",opts:["Dokiman legal","Non biznis ou, adrès, ak telefòn liste konsistan atravè lòt sit/anyè","Yon kalite revi","Yon penalite klasman"],ans:1,fb:"Se lis NAP konsistan."}],
   close:{learned:"SEO lokal santre sou yon Google Business Profile konplè, mo kle lokal natirèl, ak revi/sitasyon konsistan — tout sinyal ke ou se yon vrè biznis lokal etabli.",
    mistake:"Gen yon non biznis, adrès, oswa nimewo telefòn ki pa konsistan atravè diferan lis sou entènèt, ki konfonn motè rechèch sou si ou se yon vrè biznis etabli.",
    tip:"Vrè revi, ak reponn yo, se youn nan pi fò sinyal konfyans lokal yo — aktivman mande kliyan satisfè kite youn.",
    assign:"Chèche non biznis ou plis vil ou — kisa ki parèt, e èske Google Business Profile ou parèt?",
    dl:"Lis Verifikasyon: Baz SEO Lokal",
    checklist:["Google Business Profile verifye/reklame?","Omwen yon mo kle lokal idantifye?","Enfòmasyon biznis konsistan atravè lis yo?"],
    ai:"Sijere 5 fraz mo kle lokal pou yon [kalite biznis] ki chita nan [vil/katye]."}},
 fr:{lede:"Pour une entreprise qui sert une zone spécifique, apparaître quand des clients à proximité cherchent compte plus que se classer nationalement — le SEO local consiste à gagner ce moment « près de moi ».",
   secs:[["Google Business Profile comme fondation","Un profil Google Business complet, exact, vérifié (nom, adresse, heures, catégorie, photos) est le facteur unique le plus important de visibilité de recherche locale — couvert en pleine profondeur au Module 12."],
    ["Mots-clés locaux","Ajouter la localisation naturellement dans votre contenu (« boulangerie à Pétion-Ville » plutôt que juste « boulangerie ») aide les moteurs de recherche à vous faire correspondre aux chercheurs à proximité cherchant exactement ça."],
    ["Avis et citations","De vrais avis clients bâtissent des signaux de confiance que les moteurs de recherche pèsent lourdement pour les résultats locaux ; les citations (le nom, l'adresse, et le téléphone de votre entreprise listés de façon cohérente sur d'autres sites/annuaires) renforcent que vous êtes une vraie entreprise locale établie."]],
   illus:"hub",hubCenter:"SEO Local",hubSpokes:["Google Business Profile","Mots-Clés Locaux","Avis Clients","Citations Cohérentes"],
   ex:"Cherchez le nom de votre entreprise plus votre ville — qu'est-ce qui apparaît, et votre profil Google Business apparaît-il ?",
   quiz:[
    {q:"Quel est le facteur unique le plus important de visibilité de recherche locale ?",opts:["Seulement une campagne publicitaire payante","Un profil Google Business complet, exact, vérifié","La couleur de votre site web","La longueur de votre nom de domaine"],ans:1,fb:"Le profil Google Business est le plus grand facteur."},
    {q:"Que sont les mots-clés locaux ?",opts:["Des mots-clés sans rapport avec la localisation","La localisation ajoutée naturellement dans le contenu pour correspondre aux chercheurs à proximité","Seulement utilisés dans les publicités payantes","Des mots-clés qui nuisent au SEO"],ans:1,fb:"C'est la localisation ajoutée dans le contenu."},
    {q:"Que sont les « citations » en SEO local ?",opts:["Des documents juridiques","Le nom, l'adresse, et le téléphone de votre entreprise listés de façon cohérente sur d'autres sites/annuaires","Un type d'avis","Une pénalité de classement"],ans:1,fb:"Ce sont des listes NAP cohérentes."}],
   close:{learned:"Le SEO local se centre sur un profil Google Business complet, des mots-clés locaux naturels, et des avis/citations cohérents — tous des signaux que vous êtes une vraie entreprise locale établie.",
    mistake:"Avoir un nom d'entreprise, une adresse, ou un numéro de téléphone incohérent à travers différentes fiches en ligne, ce qui confond les moteurs de recherche sur si vous êtes une entreprise légitime et établie.",
    tip:"Les avis authentiques, avec réponse, sont l'un des signaux de confiance locaux les plus forts — demandez activement aux clients satisfaits d'en laisser un.",
    assign:"Cherchez le nom de votre entreprise plus votre ville — qu'est-ce qui apparaît, et votre profil Google Business apparaît-il ?",
    dl:"Liste de Vérification : Bases du SEO Local",
    checklist:["Profil Google Business vérifié/réclamé ?","Au moins un mot-clé local identifié ?","Infos d'entreprise cohérentes à travers les fiches ?"],
    ai:"Suggère 5 phrases de mots-clés locaux pour un(e) [type d'entreprise] situé(e) à [ville/quartier]."}},
 en:{lede:"For a business that serves a specific area, showing up when nearby customers search matters more than ranking nationally — local SEO is about winning that \"near me\" moment.",
   secs:[["Google Business Profile as the foundation","A complete, accurate, verified Google Business Profile (name, address, hours, category, photos) is the single biggest factor in local search visibility — covered in full depth in Module 12."],
    ["Local keywords","Adding location naturally into your content (\"bakery in Pétion-Ville\" instead of just \"bakery\") helps search engines match you to nearby searchers looking for exactly that."],
    ["Reviews and citations","Genuine customer reviews build trust signals search engines weigh heavily for local results; citations (your business name, address, and phone listed consistently across other sites/directories) reinforce that you're a real, established local business."]],
   illus:"hub",hubCenter:"Local SEO",hubSpokes:["Google Business Profile","Local Keywords","Customer Reviews","Consistent Citations"],
   ex:"Search your own business name plus your city — what shows up, and does your Google Business Profile appear?",
   quiz:[
    {q:"What's the single biggest factor in local search visibility?",opts:["A paid ad campaign only","A complete, accurate, verified Google Business Profile","The color of your website","How long your domain name is"],ans:1,fb:"Google Business Profile is the biggest factor."},
    {q:"What are local keywords?",opts:["Keywords with no relevance to location","Location added naturally into content to match nearby searchers","Only used in paid ads","Keywords that hurt SEO"],ans:1,fb:"It's location added into content."},
    {q:"What are \"citations\" in local SEO?",opts:["Legal documents","Your business name, address, and phone listed consistently across other sites/directories","A type of review","A ranking penalty"],ans:1,fb:"Consistent NAP listings."}],
   close:{learned:"Local SEO centers on a complete Google Business Profile, natural local keywords, and consistent reviews/citations — all signals that you're a real, established local business.",
    mistake:"Having an inconsistent business name, address, or phone number across different online listings, which confuses search engines about whether you're a legitimate, established business.",
    tip:"Genuine, responded-to reviews are one of the strongest local trust signals — actively ask satisfied customers to leave one.",
    assign:"Search your own business name plus your city — what shows up, and does your Google Business Profile appear?",
    dl:"Checklist: Local SEO Basics",
    checklist:["Google Business Profile checked/claimed?","At least one local keyword identified?","Business info consistent across listings?"],
    ai:"Suggest 5 local keyword phrases for a [type of business] located in [city/neighborhood]."}}},

7:{ht:{lede:"Plis moun kounye a jwenn repons soti nan zouti chat IA ak rezime rechèch pouse pa IA olye yon lis lyen ble tradisyonèl — se sous IA a reyèlman site se yon nouvo abilite ki lye ak SEO tradisyonèl li vo bati akote li.",
   secs:[["Kijan rechèch IA diferan de rechèch tradisyonèl","Olye yon lis lyen pou klike, yon rechèch pouse pa IA souvan bay yon repons ekri dirèk, pafwa site kèk sous — klè, estriktire, e reponn dirèkteman a yon kesyon fè kontni pi anpil chans pou rale nan repons sa a."],
    ["Sa ki fè kontni site pa IA","Repons klè, dirèk deklare klèman (pa antere anba entwodiksyon vag); kontni byen estriktire ak vrè tit (ki tou de SEO tradisyonèl ak analiz IA benefisye); ak enfòmasyon reyèlman egzat, fyab, paske zouti IA favorize kontni ki li kòm otorite."],
    ["Sa a bati sou, pa ranplase, SEO tradisyonèl","Menm fondamantal yo nan tout modil sa a (vrè mo kle, matche entansyon, estrikti klè sou paj, sante teknik) se egzakteman sa ki fè kontni fasil tou pou zouti IA jwenn, konprann, e site — pa gen okenn jwèt separe, diferan pou aprann soti nan zewo."]],

/* ============ state ============ */
const NL=7,KEY="jamezzi:digital-marketing-ai:module11-sim-state";
const PROGRESS_KEY="jamezzi:digital-marketing-ai:completed";
const PROGRESS_EVENT="jamezzi:course-progress-changed";
const MOD11_LESSON_SLUGS=["how-google-search-actually-works","keyword-research-basics","search-intent","on-page-seo-basics","technical-seo-basics","local-seo","ai-search-optimization"];
let S={lang:"ht",cur:1,done:Array(NL).fill(false),st:{}};
try{const raw=localStorage.getItem(KEY);if(raw)S=Object.assign(S,JSON.parse(raw));}catch{}
for(let i=1;i<=NL;i++){if(!S.st[i])S.st[i]={exDone:false,exText:"",quizAns:Array(3).fill(null)};}
function persist(){try{localStorage.setItem(KEY,JSON.stringify(S));}catch{}}
function markModuleComplete(){
 if(!S.done.every(Boolean))return;
 try{
  const raw=localStorage.getItem(PROGRESS_KEY);
  const parsed=raw?JSON.parse(raw):[];
  const list=Array.isArray(parsed)?parsed:[];
  let changed=false;
  MOD11_LESSON_SLUGS.forEach(slug=>{if(!list.includes(slug)){list.push(slug);changed=true;}});
  if(changed){
   localStorage.setItem(PROGRESS_KEY,JSON.stringify(list));
   window.parent.dispatchEvent(new CustomEvent(PROGRESS_EVENT,{detail:{storageKey:PROGRESS_KEY}}));
  }
 }catch{}
}
function $(id){return document.getElementById(id);}

function renderMods(){
 const wrap=$("mods");wrap.innerHTML="";
 const firstLessonBySlug={1:"what-is-digital-marketing",2:"why-people-really-buy",3:"naming-your-business",4:"building-a-customer-avatar",5:"writing-headlines-that-get-read",6:"meet-the-editor",7:"why-video-works",8:"meet-the-ai-chat-tool",9:"facebook-strategy",10:"what-are-content-pillars"};
 MODULES[S.lang].forEach((title,i)=>{
  const n=i+1,isActive=n===11;
  const mod=document.createElement("div");mod.className="mod"+(isActive?" active":" locked");
  const mh=document.createElement("div");mh.className="mh";
  if(firstLessonBySlug[n]){
   mh.style.cursor="pointer";
   mh.innerHTML='<div class="num">'+n+'</div><div>'+title+'</div>';
   mh.addEventListener("click",()=>{window.top.location.href="/academy/courses/digital-marketing-ai/learn/"+firstLessonBySlug[n];});
  }else{
   mh.innerHTML='<div class="num">'+n+'</div><div>'+title+(isActive?"":" 🔒")+"</div>";
  }
  mod.appendChild(mh);
  if(isActive){
   const les=document.createElement("div");les.className="les";
   M11[S.lang].forEach((lt,li)=>{
    const n2=li+1;
    const item=document.createElement("div");item.className="li"+(n2===S.cur?" cur":"")+(S.done[li]?" done":"");
    item.innerHTML='<div class="dot">✓</div><div>'+n2+". "+lt+"</div>";
    item.addEventListener("click",()=>{S.cur=n2;persist();render();});
    les.appendChild(item);
   });
   mod.appendChild(les);
  }
  wrap.appendChild(mod);
 });
}

function renderRail(){
 const st=S.st[S.cur];
 $("prog").style.width=(Math.round((S.done.filter(Boolean).length/NL)*100))+"%";
 $("progText").textContent=S.done.filter(Boolean).length+" / "+NL;
 $("lblProg").textContent=UI[S.lang].prog;$("lblObj").textContent=UI[S.lang].obj;$("aiName").textContent=UI[S.lang].ai;
 const objs=[[st.exDone,UI[S.lang].objEx],[st.quizAns.every(a=>a!==null),UI[S.lang].objQuiz]];
 $("objList").innerHTML=objs.map(([done,label])=>'<div class="obj'+(done?" d":"")+'"><div class="bx">✓</div><div class="tx">'+label+"</div></div>").join("");
}

function aiSay(msg){$("aiMsg").textContent=msg;}

function renderDiagram(d){
 if(d.illus==="roles"){
  let h='<div style="max-width:660px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px">';
  d.roleCards.forEach(r=>{
   h+='<div style="background:var(--ink-600);border:1px solid var(--edge2);border-radius:12px;padding:14px;text-align:center">'+
    '<div style="font-size:26px;margin-bottom:8px">'+r[0]+'</div><div style="font-weight:700;font-size:13px;margin-bottom:4px">'+r[1]+'</div><div style="font-size:11.5px;color:var(--mute)">'+r[2]+'</div></div>';
  });
  h+="</div>";return h;
 }
 if(d.illus==="hub"){
  let h='<div style="max-width:560px;margin:0 auto;text-align:center">'+
   '<div style="display:inline-block;background:var(--brand);color:#fff;font-weight:800;font-size:14px;border-radius:12px;padding:14px 22px;margin-bottom:18px">'+d.hubCenter+'</div>'+
   '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px">';
  d.hubSpokes.forEach(s=>{
   h+='<div style="background:var(--ink-600);border:1px solid var(--edge2);border-radius:10px;padding:11px;font-size:12.5px;font-weight:600">'+s+"</div>";
  });
  h+="</div></div>";return h;
 }
 if(d.illus==="journey"){
  let h='<div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:660px;margin:0 auto">';
  d.journeySteps.forEach((s,i)=>{
   h+='<div style="display:flex;align-items:center;gap:8px">'+
    '<div style="background:var(--ink-600);border:1px solid var(--edge2);border-radius:10px;padding:12px 16px;text-align:center;min-width:90px">'+
    '<div style="width:22px;height:22px;border-radius:50%;background:var(--brand);color:#fff;display:grid;place-items:center;font-size:11px;font-weight:800;margin:0 auto 6px">'+(i+1)+'</div>'+
    '<div style="font-size:12.5px;font-weight:600">'+s+"</div></div>"+
    (i<d.journeySteps.length-1?'<div style="color:var(--mute);font-size:16px">→</div>':"")+"</div>";
  });
  h+="</div>";return h;
 }
 return "";
}

function render(){
 renderMods();
 const lang=S.lang,n=S.cur,d=C[n][lang],ui=UI[lang],st=S.st[n];
 $("cs").textContent=ui.cs;
 $("topTag").textContent="Modil 11 · 11."+n;
 $("topTitle").textContent=M11[lang][n-1];
 document.title="Academy · "+M11[lang][n-1];
 renderRail();
 aiSay(d.lede);

 const stage=$("stage");
 let h='<div class="labhead"><span class="labtag">Modil 11 · 11.'+n+'</span><h2 class="labh2">'+M11[lang][n-1]+'</h2><p class="lablead">'+d.lede+"</p></div>";
 h+='<div class="secs">'+d.secs.map(s=>'<div class="sec"><h3>'+s[0]+"</h3><p>"+s[1]+"</p></div>").join("")+"</div>";
 h+='<div class="illus">'+renderDiagram(d)+'<div class="cap">'+M11[lang][n-1]+"</div></div>";
 h+='<div class="exwrap"><div class="extag">'+ui.exTag+'</div><p class="exq">'+d.ex+'</p><textarea id="exArea" placeholder="...">'+(st.exText||"")+'</textarea><div style="margin-top:10px;display:flex;align-items:center;gap:12px"><button class="btn g" id="exSaveBtn">'+ui.exBtn+'</button><span class="exsaved" id="exSaved" style="'+(st.exDone?"display:inline":"")+'">'+ui.exSaved+"</span></div></div>";

 h+='<div class="quiz"><div class="qtag">'+ui.quizTag+'</div>';
 d.quiz.forEach((q,qi)=>{
  h+='<div class="qcard"><div class="qq">'+(qi+1)+". "+q.q+'</div><div class="qopts" id="qopts'+qi+'">';
  q.opts.forEach((o,oi)=>{
   let cls="qopt";const answered=st.quizAns[qi]!==null;
   if(answered){if(oi===q.ans)cls+=" correct";else if(oi===st.quizAns[qi])cls+=" wrong";}
   h+='<button class="'+cls+'" data-qi="'+qi+'" data-oi="'+oi+'"'+(answered?" disabled":"")+">"+o+"</button>";
  });
  h+="</div>";
  if(st.quizAns[qi]!==null)h+='<div class="qfb">'+q.fb+"</div>";
  h+="</div>";
 });
 h+="</div>";

 h+='<div class="close"><div class="ctag">'+ui.closeTag+'</div>'+
  '<div class="crow"><div class="cv"><div class="ck">'+ui.cLearned+'</div>'+d.close.learned+'</div></div>'+
  '<div class="crow"><div class="cv"><div class="ck">'+ui.cMistake+'</div>'+d.close.mistake+'</div></div>'+
  '<div class="crow"><div class="cv"><div class="ck">'+ui.cTip+'</div>'+d.close.tip+'</div></div>'+
  '<div class="crow"><div class="cv"><div class="ck">'+ui.cAssign+'</div>'+d.close.assign+'</div></div>'+
  '<div class="crow"><div class="cv"><div class="ck">'+ui.cDl+'</div>'+d.close.dl+'</div></div>'+
  '<div class="crow"><div class="cv"><div class="ck">'+ui.cChecklist+'</div><ul>'+d.close.checklist.map(c=>"<li>"+c+"</li>").join("")+'</ul></div></div>'+
  '<div class="crow"><div class="cv"><div class="ck">'+ui.cAi+'</div>"'+d.close.ai+'"</div></div>'+
 "</div>";

 const canFinish=st.exDone&&st.quizAns.every(a=>a!==null);
 h+='<div class="nextwrap">';
 if(!S.done[n-1]){
  h+='<button class="btn p" id="finishBtn"'+(canFinish?"":" disabled")+">"+ui.complete+"</button>";
 }else{
  h+='<span style="color:var(--good);font-weight:700;font-size:14px">'+ui.completed+"</span>";
  if(n<NL)h+='<button class="btn g" id="nextBtn">'+ui.next+"</button>";
  else h+='<button class="btn g" id="finalBtn">'+ui.stampBtn+"</button>";
 }
 h+="</div>";

 stage.innerHTML=h;stage.classList.add("fade");
 stage.scrollTop=0;

 $("exArea").addEventListener("input",e=>{st.exText=e.target.value;});
 $("exSaveBtn").addEventListener("click",()=>{
  if(st.exText&&st.exText.trim().length>0){st.exDone=true;$("exSaved").style.display="inline";persist();renderRail();}
 });
 d.quiz.forEach((q,qi)=>{
  if(st.quizAns[qi]!==null)return;
  document.querySelectorAll('#qopts'+qi+' .qopt').forEach(btn=>{
   btn.addEventListener("click",()=>{
    st.quizAns[qi]=+btn.dataset.oi;persist();render();
   });
  });
 });
 const fb=$("finishBtn");
 if(fb)fb.addEventListener("click",()=>{
  S.done[n-1]=true;persist();markModuleComplete();render();
 });
 const nb=$("nextBtn");
 if(nb)nb.addEventListener("click",()=>{S.cur=n+1;persist();render();});
 const flb=$("finalBtn");
 if(flb)flb.addEventListener("click",showStamp);
}

function showStamp(){
 const ui=UI[S.lang];
 $("stage").innerHTML='<div class="stampscreen fade"><div class="stamp"><div class="si">🎟️</div></div><h2>'+ui.stampTitle+"</h2><p>"+ui.stampBody+'</p><a href="/academy/courses/digital-marketing-ai" target="_top" class="btn p" style="text-decoration:none;display:inline-block">'+ui.stampBtn+"</a></div>";
}

/* ============ chrome wiring ============ */
$("langs").addEventListener("click",e=>{
 const b=e.target.closest("button");if(!b)return;
 S.lang=b.dataset.l;persist();
 document.querySelectorAll("#langs button").forEach(x=>x.classList.toggle("on",x.dataset.l===S.lang));
 render();
});
$("resetBtn").addEventListener("click",()=>{
 if(!confirm(S.lang==="ht"?"Ou vle rekòmanse Modil 11?":S.lang==="fr"?"Voulez-vous recommencer le Module 11 ?":"Restart Module 11?"))return;
 S={lang:S.lang,cur:1,done:Array(NL).fill(false),st:{}};
 for(let i=1;i<=NL;i++)S.st[i]={exDone:false,exText:"",quizAns:Array(3).fill(null)};
 persist();render();
});
document.querySelectorAll("#langs button").forEach(x=>x.classList.toggle("on",x.dataset.l===S.lang));
render();
</script>
