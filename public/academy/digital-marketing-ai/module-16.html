function cac(){return +(DATA.adSpend/DATA.adConversions).toFixed(2);}
function revenue(){return DATA.adConversions*DATA.avgOrderValue;}
function roas(){return +(revenue()/DATA.adSpend).toFixed(2);}
function roi(){return +(((revenue()-DATA.adSpend)/DATA.adSpend)*100).toFixed(1);}

 $("lblProg").textContent=UI[S.lang].prog;$("lblObj").textContent=UI[S.lang].obj;$("aiName").textContent=UI[S.lang].ai;
 const objs=[[st.edDone,UI[S.lang].objEd],[st.exDone,UI[S.lang].objEx],[st.quizAns.every(a=>a!==null),UI[S.lang].objQuiz]];
 $("objList").innerHTML=objs.map(([done,label])=>'<div class="obj'+(done?" d":"")+'"><div class="bx">✓</div><div class="tx">'+label+"</div></div>").join("");
}

function aiSay(msg){$("aiMsg").textContent=msg;}

/* ============ analytics dashboard engine ============ */
function checkTask(n){
 const st=S.st[n];
 const done=C[n].check(S.an);
 if(done&&!st.edDone){st.edDone=true;persist();}
 else if(!done&&st.edDone){st.edDone=false;persist();}
 return done;
}
function renderToolPanel(){
 const lang=S.lang,ui=UI[lang],a=S.an;
 let h='<div class="gawrap"><div class="gatabs">';
 [["overview",ui.tabOverview],["sources",ui.tabSources],["engagement",ui.tabEngagement],["conversion",ui.tabConversion],["money",ui.tabMoney],["dashboard",ui.tabDashboard]].forEach(([id,lbl])=>{
  h+='<button class="gatab'+(S.tab===id?" on":"")+'" data-tab="'+id+'">'+lbl+"</button>";
 });
 h+='</div><div class="gabody" id="gaBody">';

 if(S.tab==="overview"){
  h+='<div class="galbl">'+ui.sevenDays+'</div><div class="gabars">'+
   DATA.sessionsByDay.map((v,i)=>{
    const maxV=Math.max(...DATA.sessionsByDay);
    return '<div class="gabarcol"><div class="gabarval">'+v+'</div><div class="gabar" style="height:'+Math.round((v/maxV)*100)+'%"></div><div class="gabarlbl">'+ui.dayNames[i]+"</div></div>";
   }).join("")+"</div>";
  h+='<div class="gatiles"><div class="gatile"><div class="n">'+DATA.sessions.toLocaleString()+'</div><div class="l">'+ui.sessions+'</div></div>'+
   '<div class="gatile"><div class="n">'+DATA.users.toLocaleString()+'</div><div class="l">'+ui.users+'</div></div>'+
   '<div class="gatile"><div class="n">'+DATA.conversions+'</div><div class="l">'+ui.conversions+"</div></div></div>";
 } else if(S.tab==="sources"){
  const srcs=[["direct",ui.srcDirect,DATA.sources.direct],["organic",ui.srcOrganic,DATA.sources.organic],["social",ui.srcSocial,DATA.sources.social],["paid",ui.srcPaid,DATA.sources.paid],["referral",ui.srcReferral,DATA.sources.referral]];
  const maxV=Math.max(...srcs.map(s=>s[2]));
  h+='<div class="galbl">'+ui.tabSources+'</div><div class="gabars">'+
   srcs.map(([id,l,v])=>'<div class="gabarcol'+(a.selSource===id?" sel":"")+'" data-src="'+id+'"><div class="gabarval">'+v+'</div><div class="gabar" style="height:'+Math.round((v/maxV)*100)+'%"></div><div class="gabarlbl">'+l+"</div></div>").join("")+
   "</div>";
 } else if(S.tab==="engagement"){
  const tiles=[["sessions",ui.sessions,DATA.sessions],["users",ui.users,DATA.users],["bounce",ui.bounceRate,DATA.bounceRate+"%"]];
  h+='<div class="galbl">'+ui.tabEngagement+'</div><div class="gatiles">'+
   tiles.map(([id,l,v])=>'<div class="gatile clickable'+(a.selEngagement===id?" sel":"")+'" data-eng="'+id+'"><div class="n">'+v+'</div><div class="l">'+l+"</div></div>").join("")+
   "</div>";
 } else if(S.tab==="conversion"){
  h+='<div class="gatiles"><div class="gatile"><div class="n">'+DATA.sessions.toLocaleString()+'</div><div class="l">'+ui.sessions+'</div></div>'+
   '<div class="gatile"><div class="n">'+DATA.conversions+'</div><div class="l">'+ui.conversions+"</div></div></div>";
  h+='<div class="gaformula">'+ui.conversionRate+' = (Conversions ÷ Sessions) × 100</div>';
  const ok=Math.abs(parseFloat(a.convRateInput||"0")-conversionRate())<=0.3;
  h+='<div class="gainputrow"><label>'+ui.conversionRate+' (%)</label><input class="gainput" id="gaConvInput" value="'+(a.convRateInput||"").replace(/"/g,"&quot;")+'"/><span class="gacheck '+(ok&&a.convRateInput?"ok":"no")+'">'+(ok&&a.convRateInput?ui.correct:ui.check)+"</span></div>";
 } else if(S.tab==="money"){
  h+='<div class="gatiles"><div class="gatile"><div class="n">$'+DATA.adSpend+'</div><div class="l">'+ui.adSpend+'</div></div>'+
   '<div class="gatile"><div class="n">'+DATA.adConversions+'</div><div class="l">'+ui.adConversions+'</div></div>'+
   '<div class="gatile"><div class="n">$'+revenue()+'</div><div class="l">'+ui.revenue+"</div></div></div>";
  h+='<div class="gaformula">'+ui.cac+' = '+ui.adSpend+' ÷ '+ui.adConversions+'</div>';
  const cacOk=Math.abs(parseFloat(a.cacInput||"0")-cac())<=1;
  h+='<div class="gainputrow"><label>'+ui.cac+' ($)</label><input class="gainput" id="gaCacInput" value="'+(a.cacInput||"").replace(/"/g,"&quot;")+'"/><span class="gacheck '+(cacOk&&a.cacInput?"ok":"no")+'">'+(cacOk&&a.cacInput?ui.correct:ui.check)+"</span></div>";
  h+='<div class="gaformula">'+ui.roas+' = '+ui.revenue+' ÷ '+ui.adSpend+' &nbsp;·&nbsp; '+ui.roi+' = (('+ui.revenue+' − '+ui.adSpend+') ÷ '+ui.adSpend+') × 100</div>';
  const roasOk=Math.abs(parseFloat(a.roasInput||"0")-roas())<=0.3;
  const roiOk=Math.abs(parseFloat(a.roiInput||"0")-roi())<=15;
  h+='<div class="gainputrow"><label>'+ui.roas+'</label><input class="gainput" id="gaRoasInput" value="'+(a.roasInput||"").replace(/"/g,"&quot;")+'"/><span class="gacheck '+(roasOk&&a.roasInput?"ok":"no")+'">'+(roasOk&&a.roasInput?ui.correct:ui.check)+"</span></div>";
  h+='<div class="gainputrow"><label>'+ui.roi+' (%)</label><input class="gainput" id="gaRoiInput" value="'+(a.roiInput||"").replace(/"/g,"&quot;")+'"/><span class="gacheck '+(roiOk&&a.roiInput?"ok":"no")+'">'+(roiOk&&a.roiInput?ui.correct:ui.check)+"</span></div>";
 } else if(S.tab==="dashboard"){
  const metrics=[["sessions",ui.mSessions,"traffic"],["users",ui.mUsers,"traffic"],["bounce",ui.mBounce,"traffic"],["sources",ui.mSources,"traffic"],["convrate",ui.mConvRate,"money"],["cac",ui.mCac,"money"],["roas",ui.mRoas,"money"],["roi",ui.mRoi,"money"]];
  h+='<div class="galbl">'+ui.pinMetrics+'</div><div class="gachips">'+
   metrics.map(([id,l])=>'<div class="gachip'+(a.pinned.includes(id)?" on":"")+'" data-pin="'+id+'">'+l+"</div>").join("")+"</div>";
  if(a.pinned.length){
   h+='<div class="galbl" style="margin-top:16px">'+ui.pinned+'</div><div class="gatiles">'+
    a.pinned.map(id=>{const m=metrics.find(x=>x[0]===id);return '<div class="gatile"><div class="l">'+m[1]+"</div></div>";}).join("")+"</div>";
  }
 }
 h+="</div></div>";
 return h;
}
function wireToolPanel(){
 const box=$("gaBody");if(!box)return;
 document.querySelectorAll(".gatab").forEach(bt=>bt.addEventListener("click",()=>{
  S.tab=bt.dataset.tab;S.an.visited[S.tab]=true;persist();checkTask(S.cur);renderRail();refreshTool();
 }));
 if(S.tab==="sources"){
  document.querySelectorAll("[data-src]").forEach(bt=>bt.addEventListener("click",()=>{
   S.an.selSource=bt.dataset.src;persist();checkTask(S.cur);renderRail();refreshTool();
  }));
 } else if(S.tab==="engagement"){
  document.querySelectorAll("[data-eng]").forEach(bt=>bt.addEventListener("click",()=>{
   S.an.selEngagement=bt.dataset.eng;persist();checkTask(S.cur);renderRail();refreshTool();
  }));
 } else if(S.tab==="conversion"){
  const ci=$("gaConvInput");
  if(ci)ci.addEventListener("input",e=>{S.an.convRateInput=e.target.value;persist();checkTask(S.cur);renderRail();refreshTool();});
 } else if(S.tab==="money"){
  const cc=$("gaCacInput"),rr=$("gaRoasInput"),ri=$("gaRoiInput");
  if(cc)cc.addEventListener("input",e=>{S.an.cacInput=e.target.value;persist();checkTask(S.cur);renderRail();refreshTool();});
  if(rr)rr.addEventListener("input",e=>{S.an.roasInput=e.target.value;persist();checkTask(S.cur);renderRail();refreshTool();});
  if(ri)ri.addEventListener("input",e=>{S.an.roiInput=e.target.value;persist();checkTask(S.cur);renderRail();refreshTool();});
 } else if(S.tab==="dashboard"){
  document.querySelectorAll("[data-pin]").forEach(ch=>ch.addEventListener("click",()=>{
   const id=ch.dataset.pin,arr=S.an.pinned;
   const idx=arr.indexOf(id);
   if(idx>=0)arr.splice(idx,1);else arr.push(id);
   persist();checkTask(S.cur);renderRail();refreshTool();
  }));
 }
}
function refreshTool(){
 const root=$("gaRoot");if(!root)return;
 root.innerHTML=renderToolPanel();
 wireToolPanel();
}

function render(){
 renderMods();
 const lang=S.lang,n=S.cur,d=C[n][lang],ui=UI[lang],st=S.st[n];
 $("cs").textContent=ui.cs;
 $("topTag").textContent="Modil 16 · 16."+n;
 $("topTitle").textContent=M16[lang][n-1];
 document.title="Academy · "+M16[lang][n-1];
 aiSay(d.lede);

 const stage=$("stage");
 let h='<div class="labhead"><span class="labtag">Modil 16 · 16.'+n+'</span><h2 class="labh2">'+M16[lang][n-1]+'</h2><p class="lablead">'+d.lede+"</p></div>";
 h+='<div class="secs">'+d.secs.map(s=>'<div class="sec"><h3>'+s[0]+"</h3><p>"+s[1]+"</p></div>").join("")+"</div>";
 h+='<div class="illus"><div id="gaRoot"></div><div class="gatask"><b>'+ui.objEd+':</b> '+C[n].task[lang]+"</div></div>";
 h+='<div class="exwrap"><div class="extag">'+ui.exTag+'</div><p class="exq">'+d.ex+'</p><textarea id="exArea" placeholder="...">'+(st.exText||"")+'</textarea><div style="margin-top:10px;display:flex;align-items:center;gap:12px"><button class="btn g" id="exSaveBtn">'+ui.exBtn+'</button><span class="exsaved" id="exSaved" style="'+(st.exDone?"display:inline":"")+'">'+ui.exSaved+"</span></div></div>";

 h+='<div class="quiz"><div class="qtag">'+ui.quizTag+'</div>';
 d.quiz.forEach((q,qi)=>{
  h+='<div class="qcard"><div class="qq">'+(qi+1)+". "+q.q+'</div><div class="qopts" id="qopts'+qi+'">';
  q.opts.forEach((o,oi)=>{
   let cls="qopt";const answered=st.quizAns[qi]!==null;
   if(answered){if(oi===q.ans)cls+=" correct";else if(oi===st.quizAns[qi])cls+=" wrong";}
   h+='<button class="'+cls+'" data-qi="'+qi+'" data-oi="'+oi+'"'+(answered?" disabled":"")+">"+o+"</button>";
  });
  h+="</div>";
  if(st.quizAns[qi]!==null)h+='<div class="qfb">'+q.fb+"</div>";
  h+="</div>";
 });
 h+="</div>";

 h+='<div class="close"><div class="ctag">'+ui.closeTag+'</div>'+
  '<div class="crow"><div class="cv"><div class="ck">'+ui.cLearned+'</div>'+d.close.learned+'</div></div>'+
  '<div class="crow"><div class="cv"><div class="ck">'+ui.cMistake+'</div>'+d.close.mistake+'</div></div>'+
  '<div class="crow"><div class="cv"><div class="ck">'+ui.cTip+'</div>'+d.close.tip+'</div></div>'+
  '<div class="crow"><div class="cv"><div class="ck">'+ui.cAssign+'</div>'+d.close.assign+'</div></div>'+
  '<div class="crow"><div class="cv"><div class="ck">'+ui.cDl+'</div>'+d.close.dl+'</div></div>'+
  '<div class="crow"><div class="cv"><div class="ck">'+ui.cChecklist+'</div><ul>'+d.close.checklist.map(c=>"<li>"+c+"</li>").join("")+'</ul></div></div>'+
  '<div class="crow"><div class="cv"><div class="ck">'+ui.cAi+'</div>"'+d.close.ai+'"</div></div>'+
 "</div>";

 checkTask(n);
 const canFinish=st.edDone&&st.exDone&&st.quizAns.every(a=>a!==null);
 h+='<div class="nextwrap">';
 if(!S.done[n-1]){
  h+='<button class="btn p" id="finishBtn"'+(canFinish?"":" disabled")+">"+ui.complete+"</button>";
 }else{
  h+='<span style="color:var(--good);font-weight:700;font-size:14px">'+ui.completed+"</span>";
  if(n<NL)h+='<button class="btn g" id="nextBtn">'+ui.next+"</button>";
  else h+='<button class="btn g" id="finalBtn">'+ui.stampBtn+"</button>";
 }
 h+="</div>";

 stage.innerHTML=h;stage.classList.add("fade");
 stage.scrollTop=0;

 const root=$("gaRoot");
 root.innerHTML=renderToolPanel();wireToolPanel();

 $("exArea").addEventListener("input",e=>{st.exText=e.target.value;});
 $("exSaveBtn").addEventListener("click",()=>{
  if(st.exText&&st.exText.trim().length>0){st.exDone=true;$("exSaved").style.display="inline";persist();renderRail();updateFinishBtn();}
 });
 d.quiz.forEach((q,qi)=>{
  if(st.quizAns[qi]!==null)return;
  document.querySelectorAll('#qopts'+qi+' .qopt').forEach(btn=>{
   btn.addEventListener("click",()=>{
    st.quizAns[qi]=+btn.dataset.oi;persist();render();
   });
  });
 });
 const fb=$("finishBtn");
 if(fb)fb.addEventListener("click",()=>{
  S.done[n-1]=true;persist();markModuleComplete();render();
 });
 const nb=$("nextBtn");
 if(nb)nb.addEventListener("click",()=>{S.cur=n+1;persist();render();});
 const flb=$("finalBtn");
 if(flb)flb.addEventListener("click",showStamp);
 renderRail();
}
function updateFinishBtn(){
 const st=S.st[S.cur];
 const fb=$("finishBtn");
 if(fb)fb.disabled=!(st.edDone&&st.exDone&&st.quizAns.every(a=>a!==null));
}

function showStamp(){
 const ui=UI[S.lang];
 $("stage").innerHTML='<div class="stampscreen fade"><div class="stamp"><div class="si">🎟️</div></div><h2>'+ui.stampTitle+"</h2><p>"+ui.stampBody+'</p><a href="/academy/courses/digital-marketing-ai/learn/meet-the-automation-tool" target="_top" class="btn p" style="text-decoration:none;display:inline-block">'+ui.stampBtn+"</a></div>";
}

/* ============ per-lesson tasks & checks ============ */
C[1].task={ht:"Vizite chak nan 6 seksyon yo omwen yon fwa.",fr:"Visitez chacune des 6 sections au moins une fois.",en:"Visit each of the 6 sections at least once."};
C[1].check=a=>Object.values(a.visited).every(Boolean);
C[2].task={ht:"Klike sou sous trafik ki pi gwo a.",fr:"Cliquez sur la source de trafic la plus grande.",en:"Click on the biggest traffic source."};
C[2].check=a=>{const top=Object.entries(DATA.sources).sort((x,y)=>y[1]-x[1])[0][0];return a.selSource===top;};
C[3].task={ht:"Klike sou metrik ki gen pi ba nimewo a.",fr:"Cliquez sur la métrique qui a le nombre le plus bas.",en:"Click on the metric with the lowest number."};
C[3].check=a=>{const vals={sessions:DATA.sessions,users:DATA.users,bounce:DATA.bounceRate};const lowest=Object.entries(vals).sort((x,y)=>x[1]-y[1])[0][0];return a.selEngagement===lowest;};
C[4].task={ht:"Kalkile to konvèsyon an (Konvèsyon ÷ Sesyon × 100) epi antre repons lan.",fr:"Calculez le taux de conversion (Conversions ÷ Sessions × 100) et entrez la réponse.",en:"Calculate the conversion rate (Conversions ÷ Sessions × 100) and enter the answer."};
C[4].check=a=>Math.abs(parseFloat(a.convRateInput||"0")-conversionRate())<=0.3&&!!a.convRateInput;
C[5].task={ht:"Kalkile CAC (Depans ÷ Konvèsyon) epi antre repons lan.",fr:"Calculez le CAC (Dépense ÷ Conversions) et entrez la réponse.",en:"Calculate CAC (Spend ÷ Conversions) and enter the answer."};
C[5].check=a=>Math.abs(parseFloat(a.cacInput||"0")-cac())<=1&&!!a.cacInput;
C[6].task={ht:"Kalkile ROAS (Revni ÷ Depans) ak ROI ((Revni − Depans) ÷ Depans, kòm pousantaj) epi antre repons yo.",fr:"Calculez le ROAS (Revenu ÷ Dépense) et le ROI ((Revenu − Dépense) ÷ Dépense, en pourcentage) et entrez les réponses.",en:"Calculate ROAS (Revenue ÷ Spend) and ROI ((Revenue − Spend) ÷ Spend, as a percentage) and enter the answers."};
C[6].check=a=>Math.abs(parseFloat(a.roasInput||"0")-roas())<=0.3&&!!a.roasInput&&Math.abs(parseFloat(a.roiInput||"0")-roi())<=15&&!!a.roiInput;
C[7].task={ht:"Chwazi omwen 3 metrik pou tablo pèsonèl ou, ki gen ladan omwen 1 metrik trafik ak 1 metrik lajan.",fr:"Choisissez au moins 3 métriques pour votre tableau personnel, incluant au moins 1 métrique de trafic et 1 métrique d'argent.",en:"Choose at least 3 metrics for your personal dashboard, including at least 1 traffic metric and 1 money metric."};
C[7].check=a=>{const traffic=["sessions","users","bounce","sources"],money=["convrate","cac","roas","roi"];return a.pinned.length>=3&&a.pinned.some(m=>traffic.includes(m))&&a.pinned.some(m=>money.includes(m));};

/* ============ chrome wiring ============ */
$("langs").addEventListener("click",e=>{
 const b=e.target.closest("button");if(!b)return;
 S.lang=b.dataset.l;persist();
 document.querySelectorAll("#langs button").forEach(x=>x.classList.toggle("on",x.dataset.l===S.lang));
 render();
});
$("resetBtn").addEventListener("click",()=>{
 if(!confirm(S.lang==="ht"?"Ou vle rekòmanse Modil 16?":S.lang==="fr"?"Voulez-vous recommencer le Module 16 ?":"Restart Module 16?"))return;
 S={lang:S.lang,cur:1,done:Array(NL).fill(false),st:{},tab:"overview",an:freshAnalytics()};
 for(let i=1;i<=NL;i++)S.st[i]={exDone:false,exText:"",quizAns:Array(3).fill(null),edDone:false};
 persist();render();
});
document.querySelectorAll("#langs button").forEach(x=>x.classList.toggle("on",x.dataset.l===S.lang));
render();
</script>
