2:{ht:{lede:"Instagram se yon platfòm ki vizyèl an premye — jan kontni ou parèt konte otan ke sa li di.",

 fr:{lede:"Instagram est une plateforme visuelle avant tout — l'apparence de votre contenu compte autant que ce qu'il dit.",
   secs:[["Qui est sur Instagram et ce qu'ils attendent","Un public orienté visuellement qui attend du poli et de la cohérence dans l'esthétique du fil, tandis que les Stories et Reels récompensent un sentiment plus décontracté, en coulisses — les deux formats peuvent avoir des tons différents sur le même compte."],
    ["Ce qui fonctionne bien sur Instagram","Un style visuel cohérent à travers le fil principal (couleurs, polices, ambiance de votre kit de marque du Module 3), les Stories pour des mises à jour quotidiennes, décontractées, à durée limitée, les Reels pour atteindre au-delà de vos abonnés actuels."],
    ["Une habitude spécifique à Instagram","Utilisez vos Épingles (Stories sauvegardées) comme un mini-menu permanent pour votre entreprise — horaires, FAQ, catégories de produits — pour que les nouveaux visiteurs apprennent les bases sans faire défiler tout votre fil."]],
   illus:"roles",roleCards:[["🎨","Fil Visuel Cohérent","Style qui correspond à la marque"],["📱","Stories Décontractées","Mises à jour quotidiennes"],["🚀","Reels pour Portée","Au-delà des abonnés"]],
   ex:"Décrivez le style visuel (couleurs, ambiance) que vous voulez pour votre fil Instagram, basé sur votre kit de marque du Module 3.",
   quiz:[

    {q:"Quel ton les Stories récompensent-elles typiquement par rapport au fil principal ?",opts:["Le même ton formel identique","Un sentiment plus décontracté, en coulisses","Ne jamais rien poster de décontracté","Seulement des annonces professionnelles"],ans:1,fb:"Les Stories récompensent un ton plus décontracté."},
    {q:"Quelle est une bonne utilisation des Épingles Instagram ?",opts:["Les supprimer immédiatement","Un mini-menu permanent (horaires, FAQ, catégories) pour les nouveaux visiteurs","Cacher les informations de votre entreprise","Seulement pour les comptes personnels"],ans:1,fb:"Les Épingles font un bon mini-menu permanent."}],
   close:{learned:"Instagram récompense la cohérence visuelle dans le fil principal, tandis que Stories/Reels permettent un ton plus décontracté et de la portée.",
    mistake:"Publier un fil visuellement incohérent sans aucune connexion à vos vraies couleurs/style de marque.",

    ai:"Suggère une structure d'Épingles Instagram (catégories) pour un(e) [type d'entreprise]."}},
 en:{lede:"Instagram is a visual-first platform — the look and feel of your content carries as much weight as what it says.",
   secs:[["Who's on Instagram and what they expect","A visually-driven audience that expects polish and consistency in feed aesthetics, while Stories and Reels reward a more casual, behind-the-scenes feel — the two formats can have different tones from the same account."],
    ["What works well on Instagram","A consistent visual style across the main feed (colors, fonts, mood from your Module 3 brand kit), Stories for daily, casual, time-limited updates, Reels for reach beyond your existing followers."],
    ["An Instagram-specific habit","Use your Highlights (saved Stories) as a permanent mini-menu of your business — hours, FAQs, product categories — so new visitors can learn the basics without scrolling your whole feed."]],
   illus:"roles",roleCards:[["🎨","Consistent Visual Feed","Matches your brand style"],["📱","Casual Stories","Daily updates"],["🚀","Reels for Reach","Beyond your followers"]],
   ex:"Describe the visual style (colors, mood) you want your Instagram feed to have, based on your Module 3 brand kit.",
   quiz:[
    {q:"What does Instagram reward in the main feed?",opts:["Random inconsistent posts","A consistent visual style and aesthetic","Only text posts","Ignoring brand colors"],ans:1,fb:"The feed rewards visual consistency."},
    {q:"What tone do Stories typically reward compared to the main feed?",opts:["Identical formal tone","A more casual, behind-the-scenes feel","Never post anything casual","Only professional announcements"],ans:1,fb:"Stories reward a more casual tone."},
    {q:"What's a good use of Instagram Highlights?",opts:["Deleting them immediately","A permanent mini-menu (hours, FAQs, categories) for new visitors","Hiding your business information","Only for personal accounts"],ans:1,fb:"Highlights make a good permanent mini-menu."}],
   close:{learned:"Instagram rewards visual consistency in the main feed, while Stories/Reels allow a more casual tone and reach.",
    mistake:"Posting a visually inconsistent feed with no connection to your actual brand colors/style.",
    tip:"Use Highlights as a saved mini-menu so new visitors can learn your basics without scrolling everything.",
    assign:"Describe your ideal Instagram feed's visual style based on your brand kit from Module 3.",
    dl:"Reference: Instagram Format Guide (Feed/Stories/Reels)",
    checklist:["Feed visually consistent with brand?","Stories used for casual updates?","Reels used for reach?","Highlights organized?"],
    ai:"Suggest an Instagram Highlights structure (categories) for a [type of business]."}}},

3:{ht:{lede:"TikTok rekonpanse dekouvèt sou kantite abòne — videyo yon kont tou nèf ka rive jwenn dè milye etranje nan premye jou si kontni an menm merite atansyon.",
   secs:[["Kijan distribisyon TikTok mache konseptyèlman","Kontni montre laj pou teste reyaksyon odyans lan, apre pouse pi lwen bay plis moun si li kenbe atansyon — sa vle di kantite abòne konte mwens isit la pase prèske nenpòt lòt kote, e konsistans/volim pòs konte plis pase sou platfòm ki pi lant."],
    ["Sa ki mache byen sou TikTok","Kontni brit, otantik, ki pa two poli souvan fè pi byen pase videyo trè pwodwi; tandans/son/fòma espesifik nan platfòm lan (vo veye sa ki popilè kounye a, paske sa chanje san rete); valè rapid, dirèk nan premye segond yo (soti nan prensip kwochè videyo Modil 7)."],
    ["Yon abitid espesifik TikTok","Poste konsistan olye pafè yon sèl videyo — paske dekouvèt pa depann sèlman de abòne, plis ti eseye otantik souvan fè pi byen pase okenn videyo trè poli."]],
   illus:"roles",roleCards:[["🔍","Dekouvèt Pa Depann de Abòne","Angajman rekonpanse"],["🎬","Otantik Bat Poli","Brit fè pi byen"],["📅","Poste Souvan","Konsistans bat pèfeksyon"]],
   ex:"Site yon lide videyo brit, otantik (pa two poli) ou ta ka reyèlman filme pou TikTok semèn sa a.",
   quiz:[
    {q:"Poukisa kantite abòne konte mwens sou TikTok pase sou anpil platfòm?",opts:["Li pa konte mwens, li idantik toupatou","Kontni ka rive jwenn nouvo moun baze sou angajman, pa jis abòne aktyèl","TikTok pa gen okenn sistèm distribisyon","Abòne kache sou TikTok"],ans:1,fb:"Rive lwen baze sou angajman, pa sèlman abòne."},
    {q:"Kisa ki souvan fè pi byen pase videyo trè poli sou TikTok?",opts:["Anyen, poli toujou genyen","Kontni brit, otantik","Pòs sèlman tèks","Pa janm poste ditou"],ans:1,fb:"Kontni brit, otantik souvan fè pi byen."},
    {q:"Ki yon bon abitid TikTok?",opts:["Poste yon fwa pa ane, pafè","Poste konsistan olye tann pou pafè yon sèl videyo","Sèlman itilize kontni ki soti nan lòt platfòm san chanje","Evite tandans nèt"],ans:1,fb:"Poste konsistan se yon bon abitid."}],
   close:{learned:"Distribisyon TikTok rekonpanse angajman sou kantite abòne — kontni brit, otantik, konsistan souvan bat videyo poli okazyonèl.",
    mistake:"Tann pou poste jiskaske yon videyo santi 'pafè', olye poste konsistan e otantikman.",
    tip:"Veye sa ki tandans kounye a sou platfòm lan regilyèman — fòma ak son yo chanje san rete.",
    assign:"Site yon lide videyo brit, otantik ou ta ka reyèlman filme pou TikTok semèn sa a.",
    dl:"Lis Verifikasyon: Abitid Pòs TikTok",
    checklist:["Poste konsistan, pa jis okazyonèlman?","Kontni santi otantik, pa two pwodwi?","Fò premye segond (Modil 7)?"],
    ai:"Sijere 3 lide videyo TikTok brit, otantik pou yon [kalite biznis] ki pa mande pwodiksyon pwofesyonèl."}},
 fr:{lede:"TikTok récompense la découverte plutôt que le nombre d'abonnés — la vidéo d'un tout nouveau compte peut atteindre des milliers d'inconnus dès le premier jour si le contenu lui-même mérite l'attention.",
   secs:[["Comment fonctionne la distribution TikTok conceptuellement","Le contenu est montré largement pour tester la réaction du public, puis poussé plus loin vers plus de gens s'il retient l'attention — ce qui veut dire que le nombre d'abonnés compte moins ici que presque n'importe où ailleurs, et la constance/le volume de publication comptent plus que sur des plateformes plus lentes."],
    ["Ce qui fonctionne bien sur TikTok","Le contenu brut, authentique, non poli surpasse souvent la vidéo très produite ; les tendances/sons/formats spécifiques à la plateforme (ça vaut le coup de regarder ce qui est populaire actuellement, car ça change constamment) ; une valeur directe et rapide dans les premières secondes (des principes d'accroche vidéo du Module 7)."],
    ["Une habitude spécifique à TikTok","Publiez de façon constante plutôt que de perfectionner une seule vidéo — puisque la découverte ne dépend pas purement des abonnés, des tentatives plus fréquentes et authentiques surpassent souvent des vidéos occasionnelles très polies."]],
   illus:"roles",roleCards:[["🔍","Découverte Sans Dépendre des Abonnés","L'engagement récompensé"],["🎬","Authentique Bat Poli","Le brut fonctionne mieux"],["📅","Publier Souvent","Constance bat perfection"]],
   ex:"Nommez une idée de vidéo brute et authentique (pas trop polie) que vous pourriez réellement filmer pour TikTok cette semaine.",
   quiz:[
    {q:"Pourquoi le nombre d'abonnés compte-t-il moins sur TikTok que sur beaucoup de plateformes ?",opts:["Il ne compte pas moins, c'est identique partout","Le contenu peut atteindre de nouvelles personnes basé sur l'engagement, pas juste les abonnés actuels","TikTok n'a aucun système de distribution","Les abonnés sont cachés sur TikTok"],ans:1,fb:"La portée basée sur l'engagement, pas seulement les abonnés."},
    {q:"Qu'est-ce qui surpasse souvent la vidéo très polie sur TikTok ?",opts:["Rien, le poli gagne toujours","Le contenu brut, authentique","Seulement les posts texte","Ne jamais rien publier"],ans:1,fb:"Le contenu brut, authentique surpasse souvent le poli."},
    {q:"Quelle est une bonne habitude TikTok ?",opts:["Publier une fois par an, parfaitement","Publier de façon constante plutôt que d'attendre de perfectionner une seule vidéo","N'utiliser que du contenu d'autres plateformes sans changement","Éviter complètement les tendances"],ans:1,fb:"Publier de façon constante est une bonne habitude."}],
   close:{learned:"La distribution TikTok récompense l'engagement plus que le nombre d'abonnés — un contenu brut, authentique, et constant bat souvent des vidéos polies occasionnelles.",
    mistake:"Attendre de publier jusqu'à ce qu'une vidéo semble « parfaite », plutôt que de publier de façon constante et authentique.",
    tip:"Regardez régulièrement ce qui est actuellement tendance sur la plateforme — les formats et sons changent constamment.",
    assign:"Nommez une idée de vidéo brute et authentique que vous pourriez réellement filmer pour TikTok cette semaine.",
    dl:"Liste de Vérification : Habitudes de Publication TikTok",
    checklist:["Publication constante, pas juste occasionnelle ?","Le contenu semble authentique, pas trop produit ?","Fortes premières secondes (Module 7) ?"],
    ai:"Suggère 3 idées de vidéos TikTok brutes et authentiques pour un(e) [type d'entreprise] qui ne nécessitent pas de production professionnelle."}},
 en:{lede:"TikTok rewards discovery over follower count — a brand-new account's video can reach thousands of strangers on day one if the content itself earns attention.",
   secs:[["How TikTok distribution works conceptually","Content is shown broadly to test audience reaction, then pushed further to more people if it holds attention — meaning follower count matters less here than almost anywhere else, and consistency/volume of posting matters more than on slower platforms."],
    ["What works well on TikTok","Raw, authentic, unpolished content often outperforms highly produced video; trends/sounds/formats specific to the platform (worth watching what's currently popular, since this shifts constantly); direct, fast value in the first seconds (from Module 7's video hook principles)."],
    ["A TikTok-specific habit","Post consistently rather than perfecting one video — since discovery isn't purely follower-based, more frequent, authentic attempts often outperform occasional highly-polished ones."]],
   illus:"roles",roleCards:[["🔍","Discovery Not Follower-Based","Engagement rewarded"],["🎬","Authentic Beats Polished","Raw performs well"],["📅","Post Often","Consistency beats perfection"]],
   ex:"Name one raw, authentic (not overly polished) video idea you could realistically film for TikTok this week.",
   quiz:[
    {q:"Why does follower count matter less on TikTok than on many platforms?",opts:["It doesn't matter less, it's identical everywhere","Content can reach new people based on engagement, not just existing followers","TikTok has no distribution system","Followers are hidden on TikTok"],ans:1,fb:"Reach is based on engagement, not just followers."},
    {q:"What often outperforms highly polished video on TikTok?",opts:["Nothing, polish always wins","Raw, authentic content","Text-only posts","Never posting at all"],ans:1,fb:"Raw, authentic content often outperforms polish."},
    {q:"What's a smart TikTok habit?",opts:["Post once a year, perfected","Post consistently rather than waiting to perfect one video","Only use content from other platforms unchanged","Avoid trends entirely"],ans:1,fb:"Posting consistently is a smart habit."}],
   close:{learned:"TikTok distribution rewards engagement over follower count — raw, authentic, consistent posting often beats occasional polished videos.",
    mistake:"Waiting to post until a video feels 'perfect,' instead of posting consistently and authentically.",
    tip:"Watch what's currently trending on the platform regularly — formats and sounds shift constantly.",
    assign:"Name one raw, authentic video idea you could realistically film for TikTok this week.",
    dl:"Checklist: TikTok Posting Habits",
    checklist:["Posting consistently, not just occasionally?","Content feels authentic, not overproduced?","Strong first seconds (Module 7)?"],
    ai:"Suggest 3 raw, authentic TikTok video ideas for a [type of business] that don't require professional production."}}},

    {q:"Kisa ki mache byen sou LinkedIn?",opts:["Sèlman pòs pwomosyonèl jenerik","Pataje vrè ekspètiz, insight, ak etap enpòtan pwofesyonèl","Inyore konvèsasyon pwofesyonèl","Evite nenpòt vwa pèsonèl"],ans:1,fb:"Vrè ekspètiz ak insight mache byen."},
    {q:"Ki yon bon abitid LinkedIn?",opts:["Poste sèlman kòm yon mak san figi","Poste kòm yon moun espesifik ak vrè ekspètiz ak istwa","Pa janm angaje ak pòs lòt moun","Kopye kontni viral ki soti nan lòt platfòm"],ans:1,fb:"Poste kòm yon moun espesifik se bon abitid."}],

 fr:{lede:"LinkedIn est une plateforme de contexte professionnel — le contenu ici devrait bâtir la crédibilité et des relations professionnelles, pas courir après le divertissement viral.",
   secs:[["Qui est sur LinkedIn et pourquoi","Des professionnels, propriétaires d'entreprise, et décideurs, souvent activement à la recherche d'expertise, de services, ou de connexions professionnelles plutôt que de divertissement."],
    ["Ce qui fonctionne bien sur LinkedIn","Partager de vraies expertises et insights (de votre vrai travail/secteur), des étapes professionnelles importantes et études de cas, un engagement authentique dans des conversations professionnelles pertinentes plutôt que des posts promotionnels génériques."],
    ["Une habitude spécifique à LinkedIn","Publiez en tant que personne spécifique (vous, le propriétaire d'entreprise) plutôt qu'en tant que marque sans visage — les publics LinkedIn répondent fortement à l'expertise individuelle et aux vraies histoires professionnelles, plus qu'au message de marque poli."]],
   illus:"roles",roleCards:[["💼","Contexte Professionnel","Expertise et connexions"],["🧠","Partager une Vraie Expertise","Insight de vrai travail"],["🙋","Parler comme une Personne","Pas une marque sans visage"]],
   ex:"Écrivez un élément de vraie expertise ou d'insight de votre travail que vous pourriez partager comme post LinkedIn.",
   quiz:[
    {q:"Que recherche typiquement le public de LinkedIn ?",opts:["Du pur divertissement","De l'expertise, des services, et des connexions professionnelles","Des mèmes viraux","Rien de spécifique"],ans:1,fb:"LinkedIn recherche expertise et connexions."},
    {q:"Qu'est-ce qui fonctionne bien sur LinkedIn ?",opts:["Seulement des posts promotionnels génériques","Partager de vraies expertises, insights, et étapes professionnelles importantes","Ignorer les conversations professionnelles","Éviter toute voix personnelle"],ans:1,fb:"De vraies expertises et insights fonctionnent bien."},

/* ============ state ============ */
const NL=8,KEY="jamezzi:digital-marketing-ai:module9-sim-state";
const PROGRESS_KEY="jamezzi:digital-marketing-ai:completed";
const PROGRESS_EVENT="jamezzi:course-progress-changed";
const MOD9_LESSON_SLUGS=["facebook-strategy","instagram-strategy","tiktok-strategy","linkedin-strategy","x-twitter-strategy","pinterest-strategy","whatsapp-business-strategy","youtube-channel-strategy"];
let S={lang:"ht",cur:1,done:Array(NL).fill(false),st:{}};
try{const raw=localStorage.getItem(KEY);if(raw)S=Object.assign(S,JSON.parse(raw));}catch{}
for(let i=1;i<=NL;i++){if(!S.st[i])S.st[i]={exDone:false,exText:"",quizAns:Array(3).fill(null)};}
function persist(){try{localStorage.setItem(KEY,JSON.stringify(S));}catch{}}
function markModuleComplete(){
 if(!S.done.every(Boolean))return;
 try{
  const raw=localStorage.getItem(PROGRESS_KEY);
  const parsed=raw?JSON.parse(raw):[];
  const list=Array.isArray(parsed)?parsed:[];
  let changed=false;
  MOD9_LESSON_SLUGS.forEach(slug=>{if(!list.includes(slug)){list.push(slug);changed=true;}});
  if(changed){
   localStorage.setItem(PROGRESS_KEY,JSON.stringify(list));
   window.parent.dispatchEvent(new CustomEvent(PROGRESS_EVENT,{detail:{storageKey:PROGRESS_KEY}}));
  }
 }catch{}
}
function $(id){return document.getElementById(id);}

function renderMods(){
 const wrap=$("mods");wrap.innerHTML="";
 const firstLessonBySlug={1:"what-is-digital-marketing",2:"why-people-really-buy",3:"naming-your-business",4:"building-a-customer-avatar",5:"writing-headlines-that-get-read",6:"meet-the-editor",7:"why-video-works",8:"meet-the-ai-chat-tool"};
 MODULES[S.lang].forEach((title,i)=>{
  const n=i+1,isActive=n===9;
  const mod=document.createElement("div");mod.className="mod"+(isActive?" active":" locked");
  const mh=document.createElement("div");mh.className="mh";
  if(firstLessonBySlug[n]){
   mh.style.cursor="pointer";
   mh.innerHTML='<div class="num">'+n+'</div><div>'+title+'</div>';
   mh.addEventListener("click",()=>{window.top.location.href="/academy/courses/digital-marketing-ai/learn/"+firstLessonBySlug[n];});
  }else{
   mh.innerHTML='<div class="num">'+n+'</div><div>'+title+(isActive?"":" 🔒")+"</div>";
  }
  mod.appendChild(mh);
  if(isActive){
   const les=document.createElement("div");les.className="les";
   M9[S.lang].forEach((lt,li)=>{
    const n2=li+1;
    const item=document.createElement("div");item.className="li"+(n2===S.cur?" cur":"")+(S.done[li]?" done":"");
    item.innerHTML='<div class="dot">✓</div><div>'+n2+". "+lt+"</div>";
    item.addEventListener("click",()=>{S.cur=n2;persist();render();});
    les.appendChild(item);
   });
   mod.appendChild(les);
  }
  wrap.appendChild(mod);
 });
}

function renderRail(){
 const st=S.st[S.cur];
 $("prog").style.width=(Math.round((S.done.filter(Boolean).length/NL)*100))+"%";
 $("progText").textContent=S.done.filter(Boolean).length+" / "+NL;
 $("lblProg").textContent=UI[S.lang].prog;$("lblObj").textContent=UI[S.lang].obj;$("aiName").textContent=UI[S.lang].ai;
 const objs=[[st.exDone,UI[S.lang].objEx],[st.quizAns.every(a=>a!==null),UI[S.lang].objQuiz]];
 $("objList").innerHTML=objs.map(([done,label])=>'<div class="obj'+(done?" d":"")+'"><div class="bx">✓</div><div class="tx">'+label+"</div></div>").join("");
}

function aiSay(msg){$("aiMsg").textContent=msg;}

function renderDiagram(d){
 if(d.illus==="roles"){
  let h='<div style="max-width:660px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px">';
  d.roleCards.forEach(r=>{
   h+='<div style="background:var(--ink-600);border:1px solid var(--edge2);border-radius:12px;padding:14px;text-align:center">'+
    '<div style="font-size:26px;margin-bottom:8px">'+r[0]+'</div><div style="font-weight:700;font-size:13px;margin-bottom:4px">'+r[1]+'</div><div style="font-size:11.5px;color:var(--mute)">'+r[2]+'</div></div>';
  });
  h+="</div>";return h;
 }
 return "";
}

function render(){
 renderMods();
 const lang=S.lang,n=S.cur,d=C[n][lang],ui=UI[lang],st=S.st[n];
 $("cs").textContent=ui.cs;
 $("topTag").textContent="Modil 9 · 9."+n;
 $("topTitle").textContent=M9[lang][n-1];
 document.title="Academy · "+M9[lang][n-1];
 renderRail();
 aiSay(d.lede);

 const stage=$("stage");
 let h='<div class="labhead"><span class="labtag">Modil 9 · 9.'+n+'</span><h2 class="labh2">'+M9[lang][n-1]+'</h2><p class="lablead">'+d.lede+"</p></div>";
 h+='<div class="secs">'+d.secs.map(s=>'<div class="sec"><h3>'+s[0]+"</h3><p>"+s[1]+"</p></div>").join("")+"</div>";
 h+='<div class="illus">'+renderDiagram(d)+'<div class="cap">'+M9[lang][n-1]+"</div></div>";
 h+='<div class="exwrap"><div class="extag">'+ui.exTag+'</div><p class="exq">'+d.ex+'</p><textarea id="exArea" placeholder="...">'+(st.exText||"")+'</textarea><div style="margin-top:10px;display:flex;align-items:center;gap:12px"><button class="btn g" id="exSaveBtn">'+ui.exBtn+'</button><span class="exsaved" id="exSaved" style="'+(st.exDone?"display:inline":"")+'">'+ui.exSaved+"</span></div></div>";

 h+='<div class="quiz"><div class="qtag">'+ui.quizTag+'</div>';
 d.quiz.forEach((q,qi)=>{
  h+='<div class="qcard"><div class="qq">'+(qi+1)+". "+q.q+'</div><div class="qopts" id="qopts'+qi+'">';
  q.opts.forEach((o,oi)=>{
   let cls="qopt";const answered=st.quizAns[qi]!==null;
   if(answered){if(oi===q.ans)cls+=" correct";else if(oi===st.quizAns[qi])cls+=" wrong";}
   h+='<button class="'+cls+'" data-qi="'+qi+'" data-oi="'+oi+'"'+(answered?" disabled":"")+">"+o+"</button>";
  });
  h+="</div>";
  if(st.quizAns[qi]!==null)h+='<div class="qfb">'+q.fb+"</div>";
  h+="</div>";
 });
 h+="</div>";

 h+='<div class="close"><div class="ctag">'+ui.closeTag+'</div>'+
  '<div class="crow"><div class="cv"><div class="ck">'+ui.cLearned+'</div>'+d.close.learned+'</div></div>'+
  '<div class="crow"><div class="cv"><div class="ck">'+ui.cMistake+'</div>'+d.close.mistake+'</div></div>'+
  '<div class="crow"><div class="cv"><div class="ck">'+ui.cTip+'</div>'+d.close.tip+'</div></div>'+
  '<div class="crow"><div class="cv"><div class="ck">'+ui.cAssign+'</div>'+d.close.assign+'</div></div>'+
  '<div class="crow"><div class="cv"><div class="ck">'+ui.cDl+'</div>'+d.close.dl+'</div></div>'+
  '<div class="crow"><div class="cv"><div class="ck">'+ui.cChecklist+'</div><ul>'+d.close.checklist.map(c=>"<li>"+c+"</li>").join("")+'</ul></div></div>'+
  '<div class="crow"><div class="cv"><div class="ck">'+ui.cAi+'</div>"'+d.close.ai+'"</div></div>'+
 "</div>";

 const canFinish=st.exDone&&st.quizAns.every(a=>a!==null);
 h+='<div class="nextwrap">';
 if(!S.done[n-1]){
  h+='<button class="btn p" id="finishBtn"'+(canFinish?"":" disabled")+">"+ui.complete+"</button>";
 }else{
  h+='<span style="color:var(--good);font-weight:700;font-size:14px">'+ui.completed+"</span>";
  if(n<NL)h+='<button class="btn g" id="nextBtn">'+ui.next+"</button>";
  else h+='<button class="btn g" id="finalBtn">'+ui.stampBtn+"</button>";
 }
 h+="</div>";

 stage.innerHTML=h;stage.classList.add("fade");
 stage.scrollTop=0;

 $("exArea").addEventListener("input",e=>{st.exText=e.target.value;});
 $("exSaveBtn").addEventListener("click",()=>{
  if(st.exText&&st.exText.trim().length>0){st.exDone=true;$("exSaved").style.display="inline";persist();renderRail();}
 });
 d.quiz.forEach((q,qi)=>{
  if(st.quizAns[qi]!==null)return;
  document.querySelectorAll('#qopts'+qi+' .qopt').forEach(btn=>{
   btn.addEventListener("click",()=>{
    st.quizAns[qi]=+btn.dataset.oi;persist();render();
   });
  });
 });
 const fb=$("finishBtn");
 if(fb)fb.addEventListener("click",()=>{
  S.done[n-1]=true;persist();markModuleComplete();render();
 });
 const nb=$("nextBtn");
 if(nb)nb.addEventListener("click",()=>{S.cur=n+1;persist();render();});
 const flb=$("finalBtn");
 if(flb)flb.addEventListener("click",showStamp);
}

function showStamp(){
 const ui=UI[S.lang];
 $("stage").innerHTML='<div class="stampscreen fade"><div class="stamp"><div class="si">🎟️</div></div><h2>'+ui.stampTitle+"</h2><p>"+ui.stampBody+'</p><a href="/academy/courses/digital-marketing-ai" target="_top" class="btn p" style="text-decoration:none;display:inline-block">'+ui.stampBtn+"</a></div>";
}

/* ============ chrome wiring ============ */
$("langs").addEventListener("click",e=>{
 const b=e.target.closest("button");if(!b)return;
 S.lang=b.dataset.l;persist();
 document.querySelectorAll("#langs button").forEach(x=>x.classList.toggle("on",x.dataset.l===S.lang));
 render();
});
$("resetBtn").addEventListener("click",()=>{
 if(!confirm(S.lang==="ht"?"Ou vle rekòmanse Modil 9?":S.lang==="fr"?"Voulez-vous recommencer le Module 9 ?":"Restart Module 9?"))return;
 S={lang:S.lang,cur:1,done:Array(NL).fill(false),st:{}};
 for(let i=1;i<=NL;i++)S.st[i]={exDone:false,exText:"",quizAns:Array(3).fill(null)};
 persist();render();
});
document.querySelectorAll("#langs button").forEach(x=>x.classList.toggle("on",x.dataset.l===S.lang));
render();
</script>
