   secs:[["Kesyon debaz yon estrateji reponn","Pou kiyès kontni sa a reyèlman ye (avata kliyan Modil 4 ou)? Kisa chak moso ta dwe akonpli (edike, bati konfyans, mennen yon vant)? Ki kanal ki matche pi byen ak odyans ak pilye ou (chak pilye pa bezwen chak platfòm)?"],
    ["Matche kontni ak antonwa an","Diferan pilye/kalite kontni matche ak diferan etap nan antonwa maketing an (Modil 1): kontni konsyantizasyon prezante w bay etranje; kontni konsiderasyon bati konfyans ak moun ki deja konnen w; kontni desizyon pouse yon moun ki enterese pran aksyon."],
    ["Kenbe estrateji a realis","Yon estrateji ki sipoze pòs chak jou sou 6 platfòm souvan efondre — yon pi piti plan sostenab ou reyèlman kenbe bat yon anbisye ou abandone apre de semèn."]],

   quiz:[
    {q:"Ki kesyon debaz yon estrateji kontni reponn?",opts:["Anyen itil","Pou kiyès kontni an ye, kisa li ta dwe akonpli, ak ki kanal ki matche","Sèlman konbyen 'like' pou atann","Ki font pou itilize"],ans:1,fb:"Estrateji a reponn kiyès/kisa/ki kanal."},
    {q:"Kisa kontni etap konsyantizasyon fè?",opts:["Konvenk yon moun achte imedyatman","Prezante w bay etranje ki poko konnen w","Anyen, kontni konsyantizasyon pa nesesè","Sèlman vize kliyan ki egziste deja"],ans:1,fb:"Konsyantizasyon prezante w bay etranje."},
    {q:"Poukisa yon plan kontni twò anbisye souvan echwe?",opts:["Plan anbisye toujou reyisi","Li sipoze yon rit ki pa sostenab sou twòp kanal e li efondre","Anbisyon pa gen okenn efè sou plan kontni","Plis kanal toujou vle di plis vant"],ans:1,fb:"Yon rit ki pa sostenab fè plan an efondre."}],
   close:{learned:"Yon estrateji kontni konekte chak moso kontni ak yon vrè odyans, yon vrè objektif, ak bon kanal — epi rete ase realis pou reyèlman sostni.",
    mistake:"Bati yon estrateji ki sipoze pòs chak jou toupatou, ki efondre nan kèk semèn olye bati momantòm konsistan.",

    checklist:["Odyans defini?","Objektif pa pilye/kalite kontni klè?","Kanal yo realis pou kapasite ou?","Etap antonwa konsidere?"],

 fr:{lede:"Une stratégie de contenu est le plan qui relie ce que vous publiez à pourquoi vous le publiez — sans elle, le contenu devient un jeu de devinettes sans moyen de savoir ce qui fonctionne.",
   secs:[["Les questions centrales auxquelles une stratégie répond","Pour qui ce contenu est-il vraiment (votre avatar client du Module 4) ? Que devrait accomplir chaque pièce (éduquer, bâtir la confiance, générer une vente) ? Quels canaux correspondent le mieux à votre audience et vos piliers (chaque pilier n'a pas besoin de chaque plateforme) ?"],
    ["Faire correspondre le contenu à l'entonnoir","Différents piliers/types de contenu correspondent à différentes étapes de l'entonnoir marketing (du Module 1) : le contenu de sensibilisation vous présente à des inconnus ; le contenu de considération bâtit la confiance avec des gens qui vous connaissent déjà ; le contenu de décision pousse une personne intéressée à agir."],
    ["Garder la stratégie réaliste","Une stratégie qui suppose une publication quotidienne sur 6 plateformes s'effondre généralement — un plan plus petit et durable que vous maintenez réellement bat un plan ambitieux que vous abandonnez après deux semaines."]],
   illus:"hub",hubCenter:"Stratégie de Contenu",hubSpokes:["Votre Client (Module 4)","Objectif de Chaque Post","Canaux qui Vous Conviennent","Rythme Durable"],
   ex:"Répondez : pour qui votre contenu est-il principalement, que devrait-il accomplir, et quels 1-2 canaux conviennent le mieux en ce moment ?",
   quiz:[
    {q:"À quelle question centrale une stratégie de contenu répond-elle ?",opts:["Rien d'utile","Pour qui est le contenu, ce qu'il devrait accomplir, et quels canaux conviennent","Seulement combien de likes attendre","Quelle police utiliser"],ans:1,fb:"La stratégie répond à qui/quoi/quels canaux."},
    {q:"Que fait le contenu de sensibilisation ?",opts:["Convaincre quelqu'un d'acheter immédiatement","Vous présenter à des inconnus qui ne vous connaissent pas encore","Rien, le contenu de sensibilisation n'est pas nécessaire","Seulement cibler les clients existants"],ans:1,fb:"La sensibilisation vous présente à des inconnus."},
    {q:"Pourquoi un plan de contenu trop ambitieux échoue-t-il souvent ?",opts:["Les plans ambitieux réussissent toujours","Il suppose un rythme non durable sur trop de canaux et s'effondre","L'ambition n'a aucun effet sur les plans de contenu","Plus de canaux signifie toujours plus de ventes"],ans:1,fb:"Un rythme non durable fait s'effondrer le plan."}],
   close:{learned:"Une stratégie de contenu relie chaque pièce de contenu à une vraie audience, un vrai objectif, et le bon canal — et reste assez réaliste pour vraiment durer.",
    mistake:"Bâtir une stratégie qui suppose une publication quotidienne partout, qui s'effondre en quelques semaines plutôt que de bâtir un élan constant.",
    tip:"Faites correspondre votre contenu aux étapes de l'entonnoir — sensibilisation, considération, et décision sont tous différents.",
    assign:"Écrivez pour qui votre contenu est principalement, ce qu'il devrait accomplir, et quels 1-2 canaux conviennent le mieux en ce moment.",
    dl:"Fiche de travail : Stratégie de Contenu en Une Page",
    checklist:["Audience définie ?","Objectif par pilier/type de contenu clair ?","Canaux réalistes pour votre capacité ?","Étapes de l'entonnoir considérées ?"],
    ai:"Aide-moi à bâtir une stratégie de contenu simple et réaliste pour un(e) [type d'entreprise] publiant sur [1-2 plateformes]."}},
 en:{lede:"A content strategy is the plan connecting what you post to why you're posting it — without one, content becomes a guessing game with no way to tell what's working.",
   secs:[["The core questions a strategy answers","Who is this content actually for (your customer avatar from Module 4)? What should each piece accomplish (educate, build trust, drive a sale)? Which channels fit your audience and pillars best (not every pillar needs every platform)?"],
    ["Matching content to the funnel","Different pillars/content types fit different stages of the marketing funnel (from Module 1): awareness content introduces you to strangers, consideration content builds trust with people who already know you, decision content pushes an interested person to act."],
    ["Keeping strategy realistic","A strategy that assumes daily posting across 6 platforms usually collapses — a smaller, sustainable plan you actually keep beats an ambitious one you abandon after two weeks."]],
   illus:"hub",hubCenter:"Content Strategy",hubSpokes:["Your Customer (Mod. 4)","Goal per Post","Channels That Fit You","Sustainable Rhythm"],
   ex:"Answer: who is your content mainly for, what should it accomplish, and which 1-2 channels fit best right now?",
   quiz:[
    {q:"What core question does a content strategy answer?",opts:["Nothing useful","Who the content is for, what it should accomplish, and which channels fit","Only how many likes to expect","Which font to use"],ans:1,fb:"The strategy answers who/what/which channels."},
    {q:"What does awareness-stage content do?",opts:["Convince someone to buy immediately","Introduce you to strangers who don't know you yet","Nothing, awareness content isn't needed","Only target existing customers"],ans:1,fb:"Awareness introduces you to strangers."},
    {q:"Why does an overly ambitious content plan often fail?",opts:["Ambitious plans always succeed","It assumes an unsustainable pace across too many channels and collapses","Ambition has no effect on content plans","More channels always means more sales"],ans:1,fb:"An unsustainable pace makes the plan collapse."}],
   close:{learned:"A content strategy connects each piece of content to a real audience, a real goal, and the right channel — and stays realistic enough to actually sustain.",
    mistake:"Building a strategy that assumes daily posting everywhere, which collapses within weeks instead of building consistent momentum.",
    tip:"Match your content to funnel stages — awareness, consideration, and decision content all look different.",
    assign:"Write who your content is mainly for, what it should accomplish, and which 1-2 channels fit best right now.",
    dl:"Worksheet: Content Strategy One-Pager",
    checklist:["Audience defined?","Goal per pillar/content type clear?","Channels realistic for your capacity?","Funnel stages considered?"],
    ai:"Help me build a simple, realistic content strategy for a [type of business] posting on [1-2 platforms]."}}},

3:{ht:{lede:"Yon kalandriye kontni transfòme 'mwen ta dwe poste yon bagay' an yon plan ou reyèlman swiv — deside sa pou poste ak kilè, davans, olye kouri chak jou.",
   secs:[["Sa ki antre nan yon kalandriye","Ki pilye chak moso kontni soti; fòma a (pòs, Istwa, videyo, blog, bilten); ak dat/kanal li soti — pa bezwen konplike, yon senp lis pa semèn mache."],
    ["Gwoupe kontni (Batching)","Kreye plizyè moso kontni nan yon sèl sesyon (olye youn pa youn, chak jou) sove tan ak enèji mantal, epi kite w planifye pilye/fòma yo delibereman olye reyaktivman."],
    ["Rete fleksib","Yon kalandriye se yon plan, se pa yon kontra — kite plas pou reyaji ak yon vrè opòtinite (yon moman ki tandans, yon kesyon kliyan) san w pa abandone tout plan an."]],
   illus:"journey",journeySteps:["Planifye","Kreye","Pwograme","Pibliye","Analize"],
   ex:"Planifye kontni pou pwochen semèn: site 3-5 moso ak pilye, fòma, ak jou planifye yo.",
   quiz:[
    {q:"Kisa yon kalandriye kontni ede ak li?",opts:["Anyen pratik","Deside sa pou poste ak kilè, davans","Ranplase bezwen pou yon estrateji kontni","Sèlman gwo ekip bezwen youn"],ans:1,fb:"Kalandriye a ede deside davans."},
    {q:"Kisa 'batching' kontni ye?",opts:["Poste yon sèl moso pa jou sèlman","Kreye plizyè moso kontni nan yon sèl sesyon pou sove tan","Efase ansyen kontni","Inyore kalandriye a nèt"],ans:1,fb:"Batching se kreye plizyè moso nan yon sèl sesyon."},
    {q:"Poukisa rete fleksib ak yon kalandriye?",opts:["Fleksibilite pa nesesè","Pou kite plas pou opòtinite reyèl san abandone tout plan an","Yon kalandriye pa ta dwe janm chanje","Plan yo initil kanmenm"],ans:1,fb:"Fleksibilite kite plas pou opòtinite reyèl."}],
   close:{learned:"Yon kalandriye kontni planifye sa pou poste, nan ki fòma, ak kilè — gwoupe kontni sove tan pandan w rete fleksib pou moman reyèl.",
    mistake:"Swa pa gen okenn plan ditou (kouri chak jou) oswa yon kalandriye si rijid li pa ka fleksib pou yon vrè opòtinite.",
    tip:"Gwoupe yon semèn (oswa yon mwa) kontni nan yon sèl sesyon olye kreye anba presyon chak jou.",
    assign:"Planifye kontni pou pwochen semèn: site 3-5 moso ak pilye, fòma, ak jou planifye yo.",
    dl:"Modèl: Kalandriye Kontni Semèn",
    checklist:["Chak moso lye ak yon pilye?","Fòma espesifye?","Jou/kanal asiyen?","Plas kite pou pòs espontane?"],
    ai:"Ede m bati yon kalandriye kontni yon semèn pou yon [kalite biznis] ki kouvri [kantite] moso sou [platfòm]."}},
 fr:{lede:"Un calendrier de contenu transforme « je devrais publier quelque chose » en un plan que vous suivez réellement — décider quoi publier et quand, à l'avance, au lieu de vous précipiter chaque jour.",
   secs:[["Ce qui appartient à un calendrier","De quel pilier vient chaque pièce de contenu, le format (post, Story, vidéo, blog, newsletter), et la date/canal de sortie — pas besoin d'être compliqué, une simple liste par semaine fonctionne."],
    ["Le batching de contenu","Créer plusieurs pièces de contenu en une seule session (plutôt qu'une à la fois, quotidiennement) économise du temps et de l'énergie mentale, et vous permet de planifier piliers/formats délibérément plutôt que réactivement."],
    ["Rester flexible","Un calendrier est un plan, pas un contrat — laissez de la place pour réagir à de vraies opportunités (un moment tendance, une question client) sans abandonner tout le plan."]],
   illus:"journey",journeySteps:["Planifier","Créer","Programmer","Publier","Analyser"],
   ex:"Planifiez le contenu de la semaine prochaine : listez 3-5 pièces avec leur pilier, format, et jour prévu.",
   quiz:[
    {q:"À quoi aide un calendrier de contenu ?",opts:["Rien de pratique","Décider quoi publier et quand, à l'avance","Remplacer le besoin d'une stratégie de contenu","Seulement les grandes équipes en ont besoin"],ans:1,fb:"Le calendrier aide à décider à l'avance."},
    {q:"Qu'est-ce que le « batching » de contenu ?",opts:["Publier une seule pièce par jour seulement","Créer plusieurs pièces de contenu en une session pour économiser du temps","Supprimer l'ancien contenu","Ignorer complètement le calendrier"],ans:1,fb:"Le batching consiste à créer plusieurs pièces en une session."},
    {q:"Pourquoi rester flexible avec un calendrier ?",opts:["La flexibilité n'est pas nécessaire","Pour laisser de la place aux opportunités réelles sans abandonner tout le plan","Un calendrier ne devrait jamais changer","Les plans sont inutiles de toute façon"],ans:1,fb:"La flexibilité laisse de la place aux opportunités réelles."}],
   close:{learned:"Un calendrier de contenu planifie quoi publier, dans quel format, et quand — le batching économise du temps tout en restant flexible pour les moments réels.",
    mistake:"Soit n'avoir aucun plan du tout (se précipiter quotidiennement), soit un calendrier si rigide qu'il ne peut pas s'adapter à une vraie opportunité.",
    tip:"Regroupez une semaine (ou un mois) de contenu en une seule session plutôt que de créer sous pression quotidienne.",
    assign:"Planifiez le contenu de la semaine prochaine : listez 3-5 pièces avec leur pilier, format, et jour prévu.",
    dl:"Modèle : Calendrier de Contenu Hebdomadaire",
    checklist:["Chaque pièce liée à un pilier ?","Format spécifié ?","Jour/canal assigné ?","Place laissée pour des posts spontanés ?"],
    ai:"Aide-moi à bâtir un calendrier de contenu d'une semaine pour un(e) [type d'entreprise] couvrant [nombre] pièces sur [plateformes]."}},
 en:{lede:"A content calendar turns \"I should post something\" into a plan you actually follow — deciding what to post and when, ahead of time, instead of scrambling every day.",
   secs:[["What belongs on a calendar","Which pillar each piece of content comes from, the format (post, Story, video, blog, newsletter), and the date/channel it goes out on — doesn't need to be complicated, a simple list by week works."],
    ["Batching content","Creating several pieces of content in one sitting (instead of one at a time, daily) saves time and mental energy, and lets you plan pillars/formats deliberately instead of reactively."],
    ["Staying flexible","A calendar is a plan, not a contract — leave room to react to real-time opportunities (a trending moment, a customer question) without abandoning the whole plan."]],
   illus:"journey",journeySteps:["Plan","Create","Schedule","Publish","Analyze"],
   ex:"Plan next week's content: list 3-5 pieces with their pillar, format, and planned day.",
   quiz:[
    {q:"What does a content calendar help with?",opts:["Nothing practical","Deciding what to post and when, ahead of time","Replacing the need for a content strategy","Only large teams need one"],ans:1,fb:"The calendar helps decide ahead of time."},
    {q:"What is \"batching\" content?",opts:["Posting one piece per day only","Creating several pieces of content in one sitting to save time","Deleting old content","Ignoring the calendar entirely"],ans:1,fb:"Batching means creating several pieces in one sitting."},
    {q:"Why stay flexible with a calendar?",opts:["Flexibility isn't needed","To leave room for real-time opportunities without abandoning the whole plan","A calendar should never change","Plans are pointless anyway"],ans:1,fb:"Flexibility leaves room for real opportunities."}],
   close:{learned:"A content calendar plans what to post, in what format, and when — batching content saves time while staying flexible for real-time moments.",
    mistake:"Either having no plan at all (scrambling daily) or a calendar so rigid it can't flex for a real opportunity.",
    tip:"Batch a week (or month) of content in one sitting rather than creating under daily pressure.",
    assign:"Plan next week's content: list 3-5 pieces with their pillar, format, and planned day.",
    dl:"Template: Weekly Content Calendar",
    checklist:["Each piece tied to a pillar?","Format specified?","Day/channel assigned?","Room left for spontaneous posts?"],
    ai:"Help me build a 1-week content calendar for a [type of business] covering [number] pieces across [platforms]."}}},

4:{ht:{lede:"Yon sèl bon moso kontni ka vin senk oswa sis — repwodwi vle di reranje menm lide debaz la pou diferan fòma ak platfòm olye kòmanse san anyen chak fwa.",
   secs:[["Poukisa pou repwodwi","Kreye kontni ki soti nan anyen chak fwa fatigan e pa sostenab; yon sèl lide byen rechèche (yon kesyon kliyan, yon leson yo aprann, yon etid ka) tipikman gen ase sibstans pou plizyè fòma."],
    ["Kijan yon lide vin plizyè","Yon sèl lide ka vin yon long atik blog, yon script videyo kout (Modil 7), yon karisèl oswa grafik (Modil 6), kèk kaptyon rezo sosyal, ak yon seksyon bilten — chak fòma reranje menm lide debaz la pou jan odyans kanal sa a reyèlman konsome kontni."],
    ["Sa pou kenbe menm, sa pou chanje","Lide/mesaj debaz la ta dwe rete konsistan atravè fòma yo (pou odyans ou rekonèt li kòm 'ou menm,' matche vwa mak Modil 3 ou); longè, ton, ak estrikti a ta dwe adapte pou matche chak fòma ak platfòm."]],
   illus:"hub",hubCenter:"Yon Sèl Lide",hubSpokes:["Atik Blog","Videyo Kout","Grafik/Karisèl","Kaptyon Rezo Sosyal","Seksyon Bilten"],
   ex:"Pran yon lide ou deja genyen epi site 3 diferan fòma ou ta ka repwodwi li ladan yo.",
   quiz:[
    {q:"Kisa 'repwodwi' kontni vle di?",opts:["Efase ansyen kontni","Reranje menm lide debaz la nan diferan fòma/platfòm","Sèlman poste menm pòs egzat toupatou san chanje","Inyore ansyen kontni nèt"],ans:1,fb:"Repwodwi se reranje menm lide."},
    {q:"Poukisa repwodwi itil?",opts:["Li pa itil","Yon sèl bon lide ka founi plizyè fòma olye kòmanse san anyen","Li ranplase bezwen pou yon estrateji kontni","Li sèlman mache pou gwo ekip kontni"],ans:1,fb:"Yon sèl lide founi plizyè fòma."},
    {q:"Kisa ki ta dwe rete konsistan atravè fòma repwodwi yo?",opts:["Anyen, tout bagay ta dwe chanje","Lide/mesaj debaz la, ki matche vwa mak ou","Menm longè egzat toupatou","Anyen pa bezwen santi 'ou menm'"],ans:1,fb:"Lide/mesaj debaz la rete konsistan."}],
   close:{learned:"Repwodwi reranje yon sèl bon lide nan plizyè fòma (blog, videyo, grafik, kaptyon, bilten) olye kòmanse san anyen chak fwa.",
    mistake:"Trete chak moso kontni tankou li bezwen yon lide tou nèf, ki fatigan e pa sostenab alontèm.",
    tip:"Kenbe lide debaz la ak vwa mak ou konsistan atravè fòma yo — sèlman longè, ton, ak estrikti ta dwe adapte.",

    dl:"Fèy Travay: Yon Sèl Lide, Plizyè Fòma",
    checklist:["Lide debaz idantifye?","Omwen 3 fòma site?","Mesaj/vwa debaz rete konsistan atravè yo tout?"],
    ai:"Sijere 4 diferan fòma mwen ta ka repwodwi lide sa a ladan yo: [dekri yon lide kontni]."}},
 fr:{lede:"Une bonne pièce de contenu peut en devenir cinq ou six — repurposer signifie remodeler la même idée centrale pour différents formats et plateformes plutôt que de repartir de zéro à chaque fois.",
   secs:[["Pourquoi repurposer","Créer du contenu à partir de rien à chaque fois est épuisant et non durable ; une seule idée bien recherchée (une question client, une leçon apprise, une étude de cas) a généralement assez de substance pour plusieurs formats."],
    ["Comment une idée en devient plusieurs","Une seule idée peut devenir un long article de blog, un script vidéo court (Module 7), un carrousel ou graphique (Module 6), quelques légendes sociales, et une section de newsletter — chaque format remodèle la même idée centrale pour la façon dont l'audience de ce canal consomme réellement le contenu."],
    ["Ce qui reste pareil, ce qui change","L'idée/message central devrait rester cohérent à travers les formats (pour que votre audience le reconnaisse comme « vous », correspondant à la voix de marque du Module 3) ; la longueur, le ton, et la structure devraient s'adapter pour correspondre à chaque format et plateforme."]],
   illus:"hub",hubCenter:"Une Seule Idée",hubSpokes:["Article de Blog","Vidéo Courte","Graphique/Carrousel","Légende Réseaux Sociaux","Section Newsletter"],
   ex:"Prenez une idée que vous avez déjà et listez 3 formats différents dans lesquels vous pourriez la repurposer.",
   quiz:[
    {q:"Que veut dire « repurposer » du contenu ?",opts:["Supprimer l'ancien contenu","Remodeler la même idée centrale en différents formats/plateformes","Seulement publier exactement le même post partout sans changement","Ignorer complètement le contenu passé"],ans:1,fb:"Repurposer, c'est remodeler la même idée."},
    {q:"Pourquoi repurposer est-il utile ?",opts:["Ce n'est pas utile","Une seule bonne idée peut alimenter plusieurs formats plutôt que repartir de zéro","Ça remplace le besoin d'une stratégie de contenu","Ça ne fonctionne que pour les grandes équipes de contenu"],ans:1,fb:"Une seule idée alimente plusieurs formats."},
    {q:"Qu'est-ce qui devrait rester cohérent à travers les formats repurposés ?",opts:["Rien, tout devrait changer","L'idée/message central, correspondant à votre voix de marque","La même longueur exacte partout","Rien n'a besoin de ressembler à « vous »"],ans:1,fb:"L'idée/message central reste cohérent."}],
   close:{learned:"Repurposer remodèle une seule bonne idée en plusieurs formats (blog, vidéo, graphique, légendes, newsletter) plutôt que de repartir de zéro à chaque fois.",
    mistake:"Traiter chaque pièce de contenu comme ayant besoin d'une idée toute neuve, ce qui est épuisant et non durable à long terme.",
    tip:"Gardez l'idée centrale et la voix de marque cohérentes à travers les formats — seuls la longueur, le ton, et la structure devraient s'adapter.",
    assign:"Prenez une idée que vous avez déjà et listez 3 formats différents dans lesquels vous pourriez la repurposer.",
    dl:"Fiche de travail : Une Idée, Plusieurs Formats",
    checklist:["Idée centrale identifiée ?","Au moins 3 formats listés ?","Message/voix central reste cohérent à travers tous ?"],
    ai:"Suggère 4 formats différents dans lesquels je pourrais repurposer cette idée : [décrire une idée de contenu]."}},
 en:{lede:"One good piece of content can become five or six — repurposing means reshaping the same core idea for different formats and platforms instead of starting from scratch every time.",
   secs:[["Why repurpose","Creating content from nothing every time is exhausting and unsustainable; a single well-researched idea (a customer question, a lesson learned, a case study) usually has enough substance for multiple formats."],
    ["How one idea becomes many","A single idea can become a long blog post, a short video script (Module 7), a carousel or graphic (Module 6), a few social captions, and a newsletter section — each format reshapes the same core idea for how that channel's audience actually consumes content."],
    ["What to keep the same, what to change","The core idea/message should stay consistent across formats (so your audience recognizes it as \"you,\" matching Module 3's brand voice); the length, tone, and structure should adapt to fit each format and platform."]],
   illus:"hub",hubCenter:"One Idea",hubSpokes:["Blog Post","Short Video","Graphic/Carousel","Social Caption","Newsletter Section"],
   ex:"Take one idea you already have and list 3 different formats you could repurpose it into.",
   quiz:[
    {q:"What does \"repurposing\" content mean?",opts:["Deleting old content","Reshaping the same core idea into different formats/platforms","Only posting the same exact post everywhere unchanged","Ignoring past content entirely"],ans:1,fb:"Repurposing means reshaping the same idea."},
    {q:"Why is repurposing useful?",opts:["It isn't useful","One good idea can fuel many formats instead of starting from scratch each time","It replaces the need for a content strategy","Only works for large content teams"],ans:1,fb:"One idea fuels many formats."},
    {q:"What should stay consistent across repurposed formats?",opts:["Nothing, everything should change","The core idea/message, matching your brand voice","The exact same length everywhere","Nothing needs to feel like \"you\""],ans:1,fb:"The core idea/message stays consistent."}],
   close:{learned:"Repurposing reshapes one solid idea into multiple formats (blog, video, graphic, captions, newsletter) instead of starting from scratch every time.",
    mistake:"Treating every piece of content as needing a brand-new idea, which is exhausting and unsustainable long-term.",
    tip:"Keep the core idea and brand voice consistent across formats — only the length, tone, and structure should adapt.",
    assign:"Take one idea you already have and list 3 different formats you could repurpose it into.",
    dl:"Worksheet: One Idea, Many Formats",
    checklist:["Core idea identified?","At least 3 formats listed?","Core message/voice stays consistent across all of them?"],
    ai:"Suggest 4 different formats I could repurpose this idea into: [describe one content idea]."}}},

5:{ht:{lede:"Tout kontni pa vyeyi menm jan — konnen diferans ant kontni dire lontan ak kontni aktyèl ede w bati yon melanj ki kontinye mache lontan apre w pibliye, ak yon melanj ki rete aktyèl tou.",
   secs:[["Sa kontni dire lontan ye","Kontni ki rete itil e pètinan pou lontan (gid kijan-pou-fè, FAQ, eksplikasyon fondamantal) — li kontinye atire vizit/lekti lontan apre pibliye, e li vo envesti plis efò ladan paske li peye plizyè fwa."],
    ["Sa kontni aktyèl ye","Kontni ki lye ak yon moman espesifik (yon evènman aktyèl, yon moman sezonye, yon tandans) — li ka fè trè byen pou yon ti tan, men li pèdi pètinans rapid, kidonk li pa vo envesti twòp tan pwodiksyon ladan."],
    ["Bati bon melanj lan","Yon bon plan kontni tipikman panche sitou vè dire lontan (fondasyon estab la) ak kèk kontni aktyèl melanje ladan (pou rete aktyèl ak pwofite moman reyèl yo) — ni yon ekstrèm (tout dire lontan, oswa tout aktyèl/reyaktif) pa sèvi yon biznis byen alontèm."]],
   illus:"myths",mythsCards:[["Dire Lontan",["Dire lontan","Envesti plis tan","Toujou pètinan"]],["Aktyèl/Tan",["Kout dire","Rapid pou fè","Lye ak yon moman"]]],
   ex:"Site yon lide kontni dire lontan ak yon lide kontni aktyèl ou ta ka kreye mwa sa a.",
   quiz:[
    {q:"Kisa kontni dire lontan ye?",opts:["Kontni ki disparèt apre yon jou","Kontni ki rete itil e pètinan pou lontan","Kontni sèlman sou tandans sezonye","Kontni pèsonn pa janm li"],ans:1,fb:"Dire lontan rete itil alontèm."},
    {q:"Kisa kontni aktyèl ye?",opts:["Kontni ki dire pou tout tan","Kontni ki lye ak yon moman espesifik ki pèdi pètinans rapid","Sèl kalite kontni ki vo fè","Kontni ki pa janm bezwen mizajou"],ans:1,fb:"Aktyèl lye ak yon moman, li disparèt rapid."},
    {q:"Kisa yon bon melanj kontni ye?",opts:["Tout dire lontan, pa gen kontni aktyèl ditou","Sitou dire lontan ak kèk kontni aktyèl melanje ladan","Tout aktyèl, pa gen dire lontan ditou","Sa pa gen enpòtans, melanj lan pa gen okenn efè"],ans:1,fb:"Sitou dire lontan + kèk aktyèl se bon melanj."}],
   close:{learned:"Kontni dire lontan rete itil alontèm e vo envesti plis; kontni aktyèl fè byen pou yon ti tan e pa dwe resevwa twòp envestisman — yon bon plan melanje sitou dire lontan ak kèk aktyèl.",
    mistake:"Ale nan yon sèl ekstrèm — swa sèlman kouri dèyè tandans (anyen pa dire) oswa sèlman dire lontan (pa janm santi aktyèl).",
    tip:"Envesti pi bon efò pwodiksyon ou nan moso dire lontan paske yo kontinye peye lontan apre pibliye.",
    assign:"Site yon lide kontni dire lontan ak yon lide kontni aktyèl ou ta ka kreye mwa sa a.",
    dl:"Referans: Gid Kontni Dire Lontan kont Aktyèl",
    checklist:["Omwen yon lide dire lontan idantifye?","Omwen yon lide aktyèl idantifye?","Plis efò planifye pou moso dire lontan an?"],
    ai:"Sijere 3 lide kontni dire lontan ak 2 lide kontni aktyèl pou yon [kalite biznis] mwa sa a."}},
 fr:{lede:"Tout le contenu ne vieillit pas de la même façon — connaître la différence entre contenu intemporel et contenu actuel vous aide à bâtir un mélange qui continue de fonctionner longtemps après publication, et un mélange qui reste actuel aussi.",
   secs:[["Ce qu'est le contenu intemporel","Du contenu qui reste utile et pertinent longtemps (guides pratiques, FAQ, explications fondamentales) — il continue d'attirer des vues/lectures longtemps après publication, et vaut la peine d'y investir un effort supplémentaire car ça paie plusieurs fois."],
    ["Ce qu'est le contenu actuel","Du contenu lié à un moment spécifique (un événement actuel, un moment saisonnier, une tendance) — il peut très bien performer brièvement, mais perd sa pertinence rapidement, donc ça ne vaut pas la peine d'y sur-investir du temps de production."],
    ["Bâtir le bon mélange","Un plan de contenu sain penche généralement surtout vers l'intemporel (la fondation stable) avec un peu de contenu actuel mélangé (pour rester actuel et profiter des moments réels) — ni l'un ni l'autre extrême (tout intemporel, ou tout actuel/réactif) ne sert bien une entreprise à long terme."]],
   illus:"myths",mythsCards:[["Intemporel",["Dure longtemps","Investir plus de temps","Toujours pertinent"]],["Actuel/Momentané",["Courte durée","Rapide à faire","Lié à un moment"]]],
   ex:"Listez une idée de contenu intemporel et une idée de contenu actuel que vous pourriez créer ce mois-ci.",
   quiz:[
    {q:"Qu'est-ce que le contenu intemporel ?",opts:["Du contenu qui disparaît après un jour","Du contenu qui reste utile et pertinent longtemps","Du contenu seulement sur les tendances saisonnières","Du contenu que personne ne lit jamais"],ans:1,fb:"L'intemporel reste utile à long terme."},
    {q:"Qu'est-ce que le contenu actuel ?",opts:["Du contenu qui dure éternellement","Du contenu lié à un moment spécifique qui perd sa pertinence rapidement","Le seul type de contenu qui vaille la peine","Du contenu qui n'a jamais besoin de mise à jour"],ans:1,fb:"L'actuel est lié à un moment, il s'estompe vite."},
    {q:"Qu'est-ce qu'un mélange de contenu sain ?",opts:["Tout intemporel, jamais de contenu actuel","Surtout intemporel avec un peu de contenu actuel mélangé","Tout actuel, jamais d'intemporel","Ça n'a pas d'importance, le mélange n'a aucun effet"],ans:1,fb:"Surtout intemporel + un peu d'actuel est un bon mélange."}],
   close:{learned:"Le contenu intemporel reste utile à long terme et vaut un investissement supplémentaire ; le contenu actuel performe brièvement et ne devrait pas être sur-investi — un plan sain mélange surtout de l'intemporel avec un peu d'actuel.",
    mistake:"Aller à un extrême — soit seulement courir après les tendances (rien ne dure), soit seulement de l'intemporel (jamais se sentir actuel).",
    tip:"Investissez votre meilleur effort de production dans les pièces intemporelles car elles continuent de payer longtemps après publication.",
    assign:"Listez une idée de contenu intemporel et une idée de contenu actuel que vous pourriez créer ce mois-ci.",
    dl:"Référence : Guide Contenu Intemporel vs. Actuel",
    checklist:["Au moins une idée intemporelle identifiée ?","Au moins une idée actuelle identifiée ?","Effort supplémentaire prévu pour la pièce intemporelle ?"],
    ai:"Suggère 3 idées de contenu intemporel et 2 idées de contenu actuel pour un(e) [type d'entreprise] ce mois-ci."}},
 en:{lede:"Not all content ages the same way — knowing the difference between evergreen and timely content helps you build a mix that keeps working long after you hit publish, and a mix that stays current too.",
   secs:[["What evergreen content is","Content that stays useful and relevant for a long time (how-to guides, FAQs, foundational explainers) — it keeps attracting views/reads long after publishing, and is worth investing extra effort into since it pays off repeatedly."],
    ["What timely content is","Content tied to a specific moment (a current event, a seasonal moment, a trend) — it can perform very well briefly, but loses relevance fast, so it's not worth over-investing production time into."],
    ["Building the right mix","A healthy content plan usually leans mostly evergreen (the steady foundation) with some timely content mixed in (to stay current and take advantage of real-time moments) — neither extreme (all evergreen, or all timely/reactive) serves a business well long-term."]],
   illus:"myths",mythsCards:[["Evergreen",["Lasts a long time","Invest more time","Always relevant"]],["Timely",["Short-lived","Quick to make","Tied to a moment"]]],
   ex:"List one evergreen content idea and one timely content idea you could create this month.",
   quiz:[
    {q:"What is evergreen content?",opts:["Content that disappears after a day","Content that stays useful and relevant for a long time","Content only about seasonal trends","Content nobody ever reads"],ans:1,fb:"Evergreen stays useful long-term."},
    {q:"What is timely content?",opts:["Content that lasts forever","Content tied to a specific moment that loses relevance fast","The only kind of content worth making","Content that never needs updating"],ans:1,fb:"Timely is tied to a moment and fades fast."},
    {q:"What's a healthy content mix?",opts:["All evergreen, no timely content ever","Mostly evergreen with some timely content mixed in","All timely, no evergreen content ever","It doesn't matter, mix has no effect"],ans:1,fb:"Mostly evergreen plus some timely is a good mix."}],
   close:{learned:"Evergreen content stays useful long-term and is worth extra investment; timely content performs briefly and shouldn't be over-invested in — a healthy plan mixes mostly evergreen with some timely.",
    mistake:"Going all-in on one extreme — either only chasing trends (nothing lasts) or only evergreen content (never feeling current).",
    tip:"Invest your best production effort into evergreen pieces since they keep paying off long after publishing.",
    assign:"List one evergreen content idea and one timely content idea you could create this month.",
    dl:"Reference: Evergreen vs. Timely Content Guide",
    checklist:["At least one evergreen idea identified?","At least one timely idea identified?","Extra effort planned for the evergreen piece?"],
    ai:"Suggest 3 evergreen content ideas and 2 timely content ideas for a [type of business] this month."}}},

6:{ht:{lede:"Yon blog bay biznis ou yon kay sou entènèt ou posede nèt — kontrèman ak platfòm sosyal, pèsonn pa ka chanje règ yo sou sa ou deja bati la.",
   secs:[["Poukisa blog toujou enpòtan","Pòs blog ka kontinye atire vizitè nan rechèch lontan apre pibliye (kontrèman ak vi kout yon pòs sosyal); ou posede kontni an ak relasyon odyans lan nèt (pa gen algoritm platfòm k ap deside kiyès ki wè li); pòs blog se materyèl natirèl pou repwodwi nan lòt fòma (Leson 10.4)."],
    ["Sa ki fè yon pòs blog vo pibliye","Li reponn yon vrè kesyon kliyan ou reyèlman poze (pa jis yon sijè ou santi w vle ekri); li òganize ak tit klè pou yon lektè k ap eskane ka jwenn valè kanmenm; li fini ak yon pwochen etap klè (yon CTA, soti nan Modil 5) olye jis trennen."],
    ["Yon abitid blog realis","Konsistans konte plis pase frekans — yon sèl pòs byen ekri, vrèman itil pa mwa bat kat pòs kouri, mens. Chak pòs se tou yon byen alontèm (lide 'dire lontan' Leson 10.5) ki vo efò siplemantè a."]],
   illus:"roles",roleCards:[["🏠","Kay ou Posede","Pa gen platfòm ki ka chanje l"],["🔍","Trafik Rechèch Alontèm","Kontinye jwenn vizitè"],["♻️","Materyèl pou Repwodwi","Fè lòt fòma ak li"]],
   ex:"Ekri yon vrè kesyon kliyan ou reyèlman poze ki ta ka vin yon tit pòs blog.",
   quiz:[
    {q:"Ki yon avantaj kle yon blog konpare ak yon platfòm sosyal?",opts:["Okenn, yo idantik","Ou posede kontni ak relasyon odyans lan nèt, san okenn algoritm k ap deside pòte","Blog efase pi vit","Pèsonn pa janm ka jwenn kontni blog"],ans:1,fb:"Ou posede kontni an san yon algoritm k ap deside pòte."},
    {q:"Kisa ki fè yon pòs blog vo pibliye?",opts:["Nenpòt sijè o aza ou santi w vle","Li reponn yon vrè kesyon kliyan ou reyèlman poze, òganize klè ak yon pwochen etap","Longè se sèl bagay ki konte","Li pa ta dwe janm gen yon apèl a aksyon"],ans:1,fb:"Li reponn yon vrè kesyon kliyan."},
    {q:"Kisa ki konte plis pou yon abitid blog sostenab?",opts:["Frekans anvan tout bagay","Konsistans ak kalite anvan senp frekans","Pibliye plizyè douzèn pòs mens chak semèn","Blog pa gen okenn valè alontèm"],ans:1,fb:"Konsistans ak kalite konte plis pase frekans."}],
   close:{learned:"Yon blog se kontni ou posede nèt ki ka kontinye atire trafik rechèch lontan apre pibliye — li vo ekri konsistan, menm si pa frekan.",
    mistake:"Pibliye pòs kouri, mens sèlman pou rive nan yon objektif frekans, olye pi piti pòs ki reyèlman reponn yon vrè kesyon kliyan.",
    tip:"Òganize pòs yo ak tit klè epi fini ak yon vrè pwochen etap (yon CTA), pa jis trennen san fini.",
    assign:"Ekri yon vrè kesyon kliyan ou reyèlman poze ki ta ka vin yon tit pòs blog.",
    dl:"Fèy Travay: Bank Lide Pòs Blog",
    checklist:["Pòs la reponn yon vrè kesyon kliyan?","Òganize ak tit klè?","Fini ak yon pwochen etap/CTA klè?"],
    ai:"Sijere 5 lide tit pòs blog ki reponn vrè kesyon kliyan poze yon [kalite biznis]."}},
 fr:{lede:"Un blog donne à votre entreprise une maison sur internet que vous possédez entièrement — contrairement aux plateformes sociales, personne ne peut changer les règles sur ce que vous y avez déjà bâti.",
   secs:[["Pourquoi le blogging compte encore","Les articles de blog peuvent continuer à attirer des visiteurs depuis la recherche longtemps après publication (contrairement à la courte durée de vie d'un post social) ; vous possédez entièrement le contenu et la relation avec l'audience (aucun algorithme de plateforme ne décide qui le voit) ; les articles de blog sont un matériau naturel à repurposer en d'autres formats (Leçon 10.4)."],
    ["Ce qui rend un article de blog digne d'être publié","Il répond à une vraie question que vos clients posent réellement (pas juste un sujet que vous avez envie d'écrire) ; il est organisé avec des titres clairs pour qu'un lecteur qui survole puisse quand même en tirer de la valeur ; il se termine par une prochaine étape claire (un CTA, du Module 5) plutôt que de simplement s'estomper."],
    ["Une habitude de blogging réaliste","La constance compte plus que la fréquence — un article par mois bien écrit et vraiment utile bat quatre articles bâclés et minces. Chaque article est aussi un actif à long terme (l'idée « intemporel » de la Leçon 10.5) qui vaut l'effort supplémentaire."]],
   illus:"roles",roleCards:[["🏠","Une Maison que Vous Possédez","Aucune plateforme ne peut la changer"],["🔍","Trafic de Recherche à Long Terme","Continue d'attirer des visiteurs"],["♻️","Matériau à Repurposer","Créez d'autres formats avec"]],
   ex:"Écrivez une vraie question que vos clients posent réellement qui pourrait devenir un titre d'article de blog.",
   quiz:[
    {q:"Quel est un avantage clé d'un blog par rapport à une plateforme sociale ?",opts:["Aucun, ils sont identiques","Vous possédez entièrement le contenu et la relation avec l'audience, sans algorithme décidant de la portée","Les blogs sont supprimés plus vite","Personne ne peut jamais trouver de contenu de blog"],ans:1,fb:"Vous possédez le contenu sans algorithme décidant de la portée."},
    {q:"Qu'est-ce qui rend un article de blog digne d'être publié ?",opts:["N'importe quel sujet au hasard que vous avez envie d'écrire","Il répond à une vraie question que vos clients posent réellement, organisé clairement avec une prochaine étape","La longueur est la seule chose qui compte","Il ne devrait jamais avoir d'appel à l'action"],ans:1,fb:"Il répond à une vraie question client."},
    {q:"Qu'est-ce qui compte le plus pour une habitude de blogging durable ?",opts:["La fréquence avant tout","La constance et la qualité plutôt que la pure fréquence","Publier des dizaines d'articles minces chaque semaine","Le blogging n'a aucune valeur à long terme"],ans:1,fb:"La constance et la qualité comptent plus que la fréquence."}],
   close:{learned:"Un blog est du contenu que vous possédez entièrement et qui peut continuer à attirer du trafic de recherche longtemps après publication — vaut la peine d'écrire de façon constante, même si pas fréquente.",
    mistake:"Publier des articles bâclés et minces juste pour atteindre un objectif de fréquence, plutôt que moins d'articles qui répondent vraiment à une vraie question client.",
    tip:"Organisez les articles avec des titres clairs et terminez par une vraie prochaine étape (un CTA), pas juste une fin qui s'estompe.",
    assign:"Écrivez une vraie question que vos clients posent réellement qui pourrait devenir un titre d'article de blog.",
    dl:"Fiche de travail : Banque d'Idées d'Articles de Blog",
    checklist:["L'article répond-il à une vraie question client ?","Organisé avec des titres clairs ?","Se termine par une prochaine étape/CTA claire ?"],
    ai:"Suggère 5 idées de titres d'articles de blog répondant à de vraies questions que posent les clients d'un(e) [type d'entreprise]."}},
 en:{lede:"A blog gives your business a home base on the internet that you fully own — unlike social platforms, nobody can change the rules on what you've already built there.",
   secs:[["Why blogging still matters","Blog posts can keep attracting visitors from search long after publishing (unlike a social post's short lifespan), you fully own the content and audience relationship (no platform algorithm deciding who sees it), and blog posts are natural material to repurpose into other formats (Lesson 10.4)."],
    ["What makes a blog post worth publishing","It answers a real question your customers actually ask (not just a topic you feel like writing about), it's organized with clear headings so a skimming reader can still get value, and it ends with a clear next step (a CTA, from Module 5) rather than just trailing off."],
    ["A realistic blogging habit","Consistency matters more than frequency — one well-written, genuinely useful post a month beats four rushed, thin ones; each post is also a long-term asset (Lesson 10.5's evergreen idea) worth the extra effort."]],
   illus:"roles",roleCards:[["🏠","A Home You Own","No platform can change it"],["🔍","Long-Term Search Traffic","Keeps attracting visitors"],["♻️","Material to Repurpose","Build other formats from it"]],
   ex:"Write one real question your customers actually ask that could become a blog post title.",
   quiz:[
    {q:"What's a key advantage of a blog vs. a social platform?",opts:["None, they're identical","You fully own the content and audience relationship, with no algorithm deciding reach","Blogs get deleted faster","Nobody can ever find blog content"],ans:1,fb:"You own the content with no algorithm deciding reach."},
    {q:"What makes a blog post worth publishing?",opts:["Any random topic you feel like","It answers a real question your customers actually ask, organized clearly with a next step","Length is the only thing that matters","It should never have a call to action"],ans:1,fb:"It answers a real customer question."},
    {q:"What matters more for a sustainable blogging habit?",opts:["Frequency above all else","Consistency and quality over sheer frequency","Publishing dozens of thin posts weekly","Blogging has no long-term value"],ans:1,fb:"Consistency and quality matter more than frequency."}],
   close:{learned:"A blog is content you fully own that can keep attracting search traffic long after publishing — worth writing consistently, even if not frequently.",
    mistake:"Publishing rushed, thin posts just to hit a frequency target, instead of fewer posts that genuinely answer a real customer question.",
    tip:"Organize posts with clear headings and end with a real next step (a CTA), not just a trailing-off ending.",
    assign:"Write one real question your customers actually ask that could become a blog post title.",
    dl:"Worksheet: Blog Post Idea Bank",
    checklist:["Post answers a real customer question?","Organized with clear headings?","Ends with a clear next step/CTA?"],
    ai:"Suggest 5 blog post title ideas answering real questions customers ask a [type of business]."}}},

7:{ht:{lede:"Yon bilten ale dirèkteman nan yon bwat resepsyon ou pa gen pou goumen ak okenn algoritm pou rive ladan l — nan tout sa nou kouvri jiskaprezan, se liy ki pi dirèk vè moun ki deja chwazi tande ou.",
   secs:[["Poukisa yon bilten diferan de kontni sosyal","Abòne yo deja enskri, kidonk yon bilten rive jwenn yon odyans ki deja montre vrè enterè; li pa soumèt a yon algoritm fil k ap deside kiyès ki wè li, kontrèman ak platfòm sosyal; li kreye yon pwen kontak regilye, atann, ki bati familyarite sou tan."],
    ["Sa ki antre nan yon bilten","Yon melanj ki soti nan pilye kontni ou (Leson 10.1), souvan repwodwi (Leson 10.4) soti nan yon pòs blog, videyo, oswa seri sosyal an yon fòma ekri pi kout; vrè valè an premye (yon insight, yon mizajou, yon konsèy itil) ak nenpòt pwomosyon ki santi segondè, pa tout pwen an."],
    ["Yon abitid bilten sostenab","Chwazi yon frekans anvwa realis ou reyèlman ka kenbe (chak mwa souvan pi sostenab pase chak semèn pou yon ti biznis) — yon bilten ki rete an silans pandan plizyè mwa mine konfyans li ta dwe bati a."]],
   illus:"roles",roleCards:[["📥","Odyans ki Deja Enterese","Yo te chwazi enskri"],["🚫","Pa Gen Algoritm","Rive dirèkteman"],["🔁","Souvan Repwodwi","Soti nan lòt kontni"]],
   ex:"Ekri yon tit yon liy pou bilten pwochen mwa a, itilize youn nan pilye kontni ou yo.",
   quiz:[
    {q:"Poukisa odyans yon bilten diferan de abòne rezo sosyal?",opts:["Li pa diferan ditou","Yo te deja enskri, montre vrè enterè, kontrèman ak yon odyans algoritm fil jenerik","Bilten pa gen okenn vrè odyans","Tout moun resevwa li kit yo enterese kit non"],ans:1,fb:"Abòne bilten te deja enskri, montre vrè enterè."},
    {q:"Kisa yon bilten ta dwe mennen ak li?",opts:["Sèlman pwomosyon ak ofri vant","Vrè valè an premye, ak pwomosyon ki santi segondè","Anyen, bilten ta dwe vid","Kontni o aza ki pa gen rapò"],ans:1,fb:"Vrè valè an premye se sa yon bilten ta dwe mennen ak li."},
    {q:"Kisa yon abitid bilten sostenab ye?",opts:["Voye chak jou kanmenm","Chwazi yon frekans realis (souvan chak mwa) ou reyèlman ka kenbe","Pa janm voye youn ditou","Frekans pa gen enpòtans"],ans:1,fb:"Yon frekans realis, sostenab se yon bon abitid."}],
   close:{learned:"Yon bilten rive jwenn yon odyans ki deja enterese, ki te enskri, dirèkteman, san okenn algoritm nan chemen an — mennen ak vrè valè, e chwazi yon frekans ou ka sostni.",

/* ============ state ============ */
const NL=7,KEY="jamezzi:digital-marketing-ai:module10-sim-state";
const PROGRESS_KEY="jamezzi:digital-marketing-ai:completed";
const PROGRESS_EVENT="jamezzi:course-progress-changed";
const MOD10_LESSON_SLUGS=["what-are-content-pillars","building-a-content-strategy","the-content-calendar","repurposing-content","evergreen-vs-timely-content","blogging-basics","newsletters"];
let S={lang:"ht",cur:1,done:Array(NL).fill(false),st:{}};
try{const raw=localStorage.getItem(KEY);if(raw)S=Object.assign(S,JSON.parse(raw));}catch{}
for(let i=1;i<=NL;i++){if(!S.st[i])S.st[i]={exDone:false,exText:"",quizAns:Array(3).fill(null)};}
function persist(){try{localStorage.setItem(KEY,JSON.stringify(S));}catch{}}
function markModuleComplete(){
 if(!S.done.every(Boolean))return;
 try{
  const raw=localStorage.getItem(PROGRESS_KEY);
  const parsed=raw?JSON.parse(raw):[];
  const list=Array.isArray(parsed)?parsed:[];
  let changed=false;
  MOD10_LESSON_SLUGS.forEach(slug=>{if(!list.includes(slug)){list.push(slug);changed=true;}});
  if(changed){
   localStorage.setItem(PROGRESS_KEY,JSON.stringify(list));
   window.parent.dispatchEvent(new CustomEvent(PROGRESS_EVENT,{detail:{storageKey:PROGRESS_KEY}}));
  }
 }catch{}
}
function $(id){return document.getElementById(id);}

function renderMods(){
 const wrap=$("mods");wrap.innerHTML="";
 const firstLessonBySlug={1:"what-is-digital-marketing",2:"why-people-really-buy",3:"naming-your-business",4:"building-a-customer-avatar",5:"writing-headlines-that-get-read",6:"meet-the-editor",7:"why-video-works",8:"meet-the-ai-chat-tool",9:"facebook-strategy",11:"how-google-search-actually-works",12:"meet-your-business-profile",13:"meet-the-email-marketing-tool",14:"meet-the-page-builder",15:"meet-the-ads-manager",16:"meet-the-analytics-dashboard",17:"meet-the-automation-tool",18:"freelancing-vs-starting-an-agency",19:"marketing-for-local-service-businesses",20:"choosing-your-capstone-business"};
 MODULES[S.lang].forEach((title,i)=>{
  const n=i+1,isActive=n===10;
  const mod=document.createElement("div");mod.className="mod"+(isActive?" active":" locked");
  const mh=document.createElement("div");mh.className="mh";
  if(firstLessonBySlug[n]){
   mh.style.cursor="pointer";
   mh.innerHTML='<div class="num">'+n+'</div><div>'+title+'</div>';
   mh.addEventListener("click",()=>{window.top.location.href="/academy/courses/digital-marketing-ai/learn/"+firstLessonBySlug[n];});
  }else{
   mh.innerHTML='<div class="num">'+n+'</div><div>'+title+(isActive?"":" 🔒")+"</div>";
  }
  mod.appendChild(mh);
  if(isActive){
   const les=document.createElement("div");les.className="les";
   M10[S.lang].forEach((lt,li)=>{
    const n2=li+1;
    const item=document.createElement("div");item.className="li"+(n2===S.cur?" cur":"")+(S.done[li]?" done":"");
    item.innerHTML='<div class="dot">✓</div><div>'+n2+". "+lt+"</div>";
    item.addEventListener("click",()=>{S.cur=n2;persist();render();});
    les.appendChild(item);
   });
   mod.appendChild(les);
  }
  wrap.appendChild(mod);
 });
}

function renderRail(){
 const st=S.st[S.cur];
 $("prog").style.width=(Math.round((S.done.filter(Boolean).length/NL)*100))+"%";
 $("progText").textContent=S.done.filter(Boolean).length+" / "+NL;
 $("lblProg").textContent=UI[S.lang].prog;$("lblObj").textContent=UI[S.lang].obj;$("aiName").textContent=UI[S.lang].ai;
 const objs=[[st.exDone,UI[S.lang].objEx],[st.quizAns.every(a=>a!==null),UI[S.lang].objQuiz]];
 $("objList").innerHTML=objs.map(([done,label])=>'<div class="obj'+(done?" d":"")+'"><div class="bx">✓</div><div class="tx">'+label+"</div></div>").join("");
}

function aiSay(msg){$("aiMsg").textContent=msg;}

function renderDiagram(d){
 if(d.illus==="roles"){
  let h='<div style="max-width:660px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px">';
  d.roleCards.forEach(r=>{
   h+='<div style="background:var(--ink-600);border:1px solid var(--edge2);border-radius:12px;padding:14px;text-align:center">'+
    '<div style="font-size:26px;margin-bottom:8px">'+r[0]+'</div><div style="font-weight:700;font-size:13px;margin-bottom:4px">'+r[1]+'</div><div style="font-size:11.5px;color:var(--mute)">'+r[2]+'</div></div>';
  });
  h+="</div>";return h;
 }
 if(d.illus==="hub"){
  let h='<div style="max-width:560px;margin:0 auto;text-align:center">'+
   '<div style="display:inline-block;background:var(--brand);color:#fff;font-weight:800;font-size:14px;border-radius:12px;padding:14px 22px;margin-bottom:18px">'+d.hubCenter+'</div>'+
   '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px">';
  d.hubSpokes.forEach(s=>{
   h+='<div style="background:var(--ink-600);border:1px solid var(--edge2);border-radius:10px;padding:11px;font-size:12.5px;font-weight:600">'+s+"</div>";
  });
  h+="</div></div>";return h;
 }
 if(d.illus==="journey"){
  let h='<div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:660px;margin:0 auto">';
  d.journeySteps.forEach((s,i)=>{
   h+='<div style="display:flex;align-items:center;gap:8px">'+
    '<div style="background:var(--ink-600);border:1px solid var(--edge2);border-radius:10px;padding:12px 16px;text-align:center;min-width:90px">'+
    '<div style="width:22px;height:22px;border-radius:50%;background:var(--brand);color:#fff;display:grid;place-items:center;font-size:11px;font-weight:800;margin:0 auto 6px">'+(i+1)+'</div>'+
    '<div style="font-size:12.5px;font-weight:600">'+s+"</div></div>"+
    (i<d.journeySteps.length-1?'<div style="color:var(--mute);font-size:16px">→</div>':"")+"</div>";
  });
  h+="</div>";return h;
 }
 if(d.illus==="myths"){
  let h='<div style="max-width:600px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:14px">';
  d.mythsCards.forEach((c,i)=>{
   const accent=i===0?"var(--good)":"var(--warn)";
   h+='<div style="background:var(--ink-600);border:1px solid '+accent+';border-radius:12px;padding:14px">'+
    '<div style="font-weight:800;font-size:13px;color:'+accent+';margin-bottom:8px">'+c[0]+"</div>"+
    '<ul style="margin:0;padding-left:18px">'+c[1].map(x=>'<li style="font-size:12.5px;color:#c9d1e0;margin-bottom:4px">'+x+"</li>").join("")+"</ul></div>";
  });
  h+="</div>";return h;
 }
 return "";
}

function render(){
 renderMods();
 const lang=S.lang,n=S.cur,d=C[n][lang],ui=UI[lang],st=S.st[n];
 $("cs").textContent=ui.cs;
 $("topTag").textContent="Modil 10 · 10."+n;
 $("topTitle").textContent=M10[lang][n-1];
 document.title="Academy · "+M10[lang][n-1];
 renderRail();
 aiSay(d.lede);

 const stage=$("stage");
 let h='<div class="labhead"><span class="labtag">Modil 10 · 10.'+n+'</span><h2 class="labh2">'+M10[lang][n-1]+'</h2><p class="lablead">'+d.lede+"</p></div>";
 h+='<div class="secs">'+d.secs.map(s=>'<div class="sec"><h3>'+s[0]+"</h3><p>"+s[1]+"</p></div>").join("")+"</div>";
 h+='<div class="illus">'+renderDiagram(d)+'<div class="cap">'+M10[lang][n-1]+"</div></div>";
 h+='<div class="exwrap"><div class="extag">'+ui.exTag+'</div><p class="exq">'+d.ex+'</p><textarea id="exArea" placeholder="...">'+(st.exText||"")+'</textarea><div style="margin-top:10px;display:flex;align-items:center;gap:12px"><button class="btn g" id="exSaveBtn">'+ui.exBtn+'</button><span class="exsaved" id="exSaved" style="'+(st.exDone?"display:inline":"")+'">'+ui.exSaved+"</span></div></div>";

 h+='<div class="quiz"><div class="qtag">'+ui.quizTag+'</div>';
 d.quiz.forEach((q,qi)=>{
  h+='<div class="qcard"><div class="qq">'+(qi+1)+". "+q.q+'</div><div class="qopts" id="qopts'+qi+'">';
  q.opts.forEach((o,oi)=>{
   let cls="qopt";const answered=st.quizAns[qi]!==null;
   if(answered){if(oi===q.ans)cls+=" correct";else if(oi===st.quizAns[qi])cls+=" wrong";}
   h+='<button class="'+cls+'" data-qi="'+qi+'" data-oi="'+oi+'"'+(answered?" disabled":"")+">"+o+"</button>";
  });
  h+="</div>";
  if(st.quizAns[qi]!==null)h+='<div class="qfb">'+q.fb+"</div>";
  h+="</div>";
 });
 h+="</div>";

 h+='<div class="close"><div class="ctag">'+ui.closeTag+'</div>'+
  '<div class="crow"><div class="cv"><div class="ck">'+ui.cLearned+'</div>'+d.close.learned+'</div></div>'+
  '<div class="crow"><div class="cv"><div class="ck">'+ui.cMistake+'</div>'+d.close.mistake+'</div></div>'+
  '<div class="crow"><div class="cv"><div class="ck">'+ui.cTip+'</div>'+d.close.tip+'</div></div>'+
  '<div class="crow"><div class="cv"><div class="ck">'+ui.cAssign+'</div>'+d.close.assign+'</div></div>'+
  '<div class="crow"><div class="cv"><div class="ck">'+ui.cDl+'</div>'+d.close.dl+'</div></div>'+
  '<div class="crow"><div class="cv"><div class="ck">'+ui.cChecklist+'</div><ul>'+d.close.checklist.map(c=>"<li>"+c+"</li>").join("")+'</ul></div></div>'+
  '<div class="crow"><div class="cv"><div class="ck">'+ui.cAi+'</div>"'+d.close.ai+'"</div></div>'+
 "</div>";

 const canFinish=st.exDone&&st.quizAns.every(a=>a!==null);
 h+='<div class="nextwrap">';
 if(!S.done[n-1]){
  h+='<button class="btn p" id="finishBtn"'+(canFinish?"":" disabled")+">"+ui.complete+"</button>";
 }else{
  h+='<span style="color:var(--good);font-weight:700;font-size:14px">'+ui.completed+"</span>";
  if(n<NL)h+='<button class="btn g" id="nextBtn">'+ui.next+"</button>";
  else h+='<button class="btn g" id="finalBtn">'+ui.stampBtn+"</button>";
 }
 h+="</div>";

 stage.innerHTML=h;stage.classList.add("fade");
 stage.scrollTop=0;

 $("exArea").addEventListener("input",e=>{st.exText=e.target.value;});
 $("exSaveBtn").addEventListener("click",()=>{
  if(st.exText&&st.exText.trim().length>0){st.exDone=true;$("exSaved").style.display="inline";persist();renderRail();}
 });
 d.quiz.forEach((q,qi)=>{
  if(st.quizAns[qi]!==null)return;
  document.querySelectorAll('#qopts'+qi+' .qopt').forEach(btn=>{
   btn.addEventListener("click",()=>{
    st.quizAns[qi]=+btn.dataset.oi;persist();render();
   });
  });
 });
 const fb=$("finishBtn");
 if(fb)fb.addEventListener("click",()=>{
  S.done[n-1]=true;persist();markModuleComplete();render();
 });
 const nb=$("nextBtn");
 if(nb)nb.addEventListener("click",()=>{S.cur=n+1;persist();render();});
 const flb=$("finalBtn");
 if(flb)flb.addEventListener("click",showStamp);
}

function showStamp(){
 const ui=UI[S.lang];
 $("stage").innerHTML='<div class="stampscreen fade"><div class="stamp"><div class="si">🎟️</div></div><h2>'+ui.stampTitle+"</h2><p>"+ui.stampBody+'</p><a href="/academy/courses/digital-marketing-ai/learn/how-google-search-actually-works" target="_top" class="btn p" style="text-decoration:none;display:inline-block">'+ui.stampBtn+"</a></div>";
}

/* ============ chrome wiring ============ */
$("langs").addEventListener("click",e=>{
 const b=e.target.closest("button");if(!b)return;
 S.lang=b.dataset.l;persist();
 document.querySelectorAll("#langs button").forEach(x=>x.classList.toggle("on",x.dataset.l===S.lang));
 render();
});
$("resetBtn").addEventListener("click",()=>{
 if(!confirm(S.lang==="ht"?"Ou vle rekòmanse Modil 10?":S.lang==="fr"?"Voulez-vous recommencer le Module 10 ?":"Restart Module 10?"))return;
 S={lang:S.lang,cur:1,done:Array(NL).fill(false),st:{}};
 for(let i=1;i<=NL;i++)S.st[i]={exDone:false,exText:"",quizAns:Array(3).fill(null)};
 persist();render();
});
document.querySelectorAll("#langs button").forEach(x=>x.classList.toggle("on",x.dataset.l===S.lang));
render();
</script>
