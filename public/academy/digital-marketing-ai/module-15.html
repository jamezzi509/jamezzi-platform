.labh2{font-size:25px;font-weight:800;letter-spacing:-.02em;margin:12px 0 8px}.lablead{color:var(--dim);font-size:15.5px;line-height:1.65;max-width:660px;font-style:italic}
.btn{border:none;border-radius:10px;padding:11px 20px;font-weight:700;font-size:14px;cursor:pointer}

.nextwrap{margin-top:26px;display:flex;gap:12px;align-items:center}
.secs{max-width:700px;margin-top:24px}

.illus{max-width:700px;margin:26px 0}

.exwrap .extag{font-size:11.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--warn)}
.exwrap p.exq{font-size:14.5px;margin:8px 0 12px;color:var(--text);line-height:1.6}
.exwrap textarea{width:100%;min-height:80px;border-radius:10px;border:1px solid var(--edge2);background:var(--ink-800);color:var(--text);font-family:var(--font);font-size:14px;padding:12px;resize:vertical}
.exwrap textarea:focus{outline:2px solid var(--brand)}
.exsaved{font-size:12.5px;color:var(--good);margin-top:8px;display:none}
.quiz{max-width:700px;margin:26px 0}
.qtag{font-size:11.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--brand);margin-bottom:14px}

.qopts{display:flex;flex-direction:column;gap:8px}
.qopt{text-align:left;border:1px solid var(--edge2);background:var(--ink-600);color:var(--text);border-radius:9px;padding:10px 13px;font-size:13.5px;cursor:pointer;font-family:var(--font)}
.qopt:hover:not(:disabled){border-color:var(--brand)}

 fr:{lede:"Une campagne qui vise « tout le monde » gaspille souvent de l'argent sur des gens qui ne seraient jamais intéressés — un bon ciblage concentre votre budget sur les gens qui correspondent réellement à vos vrais clients.",
   secs:[["Trois façons de définir l'audience","Tranche d'âge, lieu, et centres d'intérêt — chacun vous aide à vous rapprocher de votre vrai avatar client (Module 4) plutôt que « tout le monde ayant internet »."],
    ["L'équilibre, pas l'extrême","Une audience trop large (tout le monde 18-65 sans intérêt spécifique) gaspille le budget ; une audience trop étroite peut laisser le budget sans assez de gens à atteindre."]],
   ex:"Décrivez la tranche d'âge, le lieu, et les centres d'intérêt qui seraient les plus logiques pour les vrais clients de votre entreprise.",
   quiz:[
    {q:"Pourquoi viser « tout le monde » gaspille-t-il souvent de l'argent ?",opts:["Ça ne gaspille rien","Ça dépense sur des gens qui ne seraient jamais intéressés au lieu de se concentrer sur les vrais clients","Tout le monde est toujours mieux","Le ciblage n'affecte pas les résultats"],ans:1,fb:"Viser tout le monde dépense sur des gens non intéressés."},
    {q:"Quelles sont les 3 façons de définir une audience ?",opts:["Seulement la couleur","Âge, lieu, et centres d'intérêt","Seulement le nom","Il n'y a pas de façon de définir"],ans:1,fb:"Âge, lieu, et centres d'intérêt sont les 3 façons."},
    {q:"Que peut-il se passer si votre audience est trop étroite ?",opts:["Rien, plus étroit est toujours mieux","Le budget peut ne pas avoir assez de gens à atteindre","C'est toujours plus économique","Ça n'affecte pas du tout les résultats"],ans:1,fb:"Trop étroit peut signifier pas assez de gens à atteindre."}],
   close:{learned:"Un bon ciblage (âge, lieu, centres d'intérêt) se rapproche de votre vrai avatar client plutôt que « tout le monde » — mais cherchez un équilibre, pas un extrême trop large ou trop étroit.",
    mistake:"Laisser la tranche d'âge au défaut complet (18-65) sans choisir aucun centre d'intérêt, ce qui gaspille le budget sur des gens qui ne seraient jamais intéressés.",
    tip:"Pensez à votre avatar client (Module 4) pour décider de l'âge, du lieu, et des centres d'intérêt les plus logiques avant de lancer une campagne.",
    assign:"Décrivez la tranche d'âge, le lieu, et les centres d'intérêt qui seraient les plus logiques pour les vrais clients de votre entreprise.",

 en:{lede:"A campaign that targets \"everyone\" often wastes money on people who'd never be interested — good targeting focuses your budget on people who actually match your real customers.",
   secs:[["Three ways to shape an audience","Age range, location, and interests — each helps you get closer to your real customer avatar (Module 4) instead of \"everyone with internet.\""],
    ["Balance, not extremes","An audience too broad (everyone 18-65 with no specific interests) wastes budget; an audience too narrow can leave the budget with not enough people to reach."]],
   ex:"Describe the age range, location, and interests that would make the most sense for your business's real customers.",
   quiz:[
    {q:"Why does targeting \"everyone\" often waste money?",opts:["It doesn't waste anything","It spends on people who'd never be interested instead of focusing on real customers","Everyone is always better","Targeting doesn't affect results"],ans:1,fb:"Targeting everyone spends on uninterested people."},
    {q:"What are the 3 ways to shape an audience?",opts:["Only color","Age, location, and interests","Only name","There's no way to shape it"],ans:1,fb:"Age, location, and interests are the 3 ways."},
    {q:"What can happen if your audience is too narrow?",opts:["Nothing, narrower is always better","The budget may not have enough people to reach","It's always more economical","It doesn't affect results at all"],ans:1,fb:"Too narrow can mean not enough people to reach."}],
   close:{learned:"Good targeting (age, location, interests) gets closer to your real customer avatar instead of \"everyone\" — but aim for balance, not an extreme too broad or too narrow.",
    mistake:"Leaving the age range at the full default (18-65) with no interests chosen, which wastes budget on people who'd never be interested.",
    tip:"Think about your customer avatar (Module 4) to decide the most logical age, location, and interests before launching a campaign.",
    assign:"Describe the age range, location, and interests that would make the most sense for your business's real customers.",
    dl:"Worksheet: Targeting Your Audience",
    checklist:["Age range narrower than 18-65 (no more than 30 years)?","A location entered?","1-3 interests chosen?"],
    ai:"Help me define an audience (age, location, interests) for a [type of business] targeting [describe your customer]."}}},

5:{ht:{lede:"Yon bidjè ki twò piti pa bay yon kanpay ase tan pou reyèlman aprann sa k ap mache — bidjè ou ak konbyen jou kanpay la kouri ansanm detèmine sa ou ka aprann.",
   secs:[["Bidjè chak jou kont dire kanpay la","Yon bidjè chak jou di konbyen ou pare pou depanse chak jou; dire a di konbyen jou kanpay la kontinye — toude ansanm detèmine depans total la."],
    ["Bay kanpay la tan pou aprann","Yon kanpay ki kouri sèlman 1 jou pa gen ase done pou konnen si li mache — pifò platfòm rekòmande omwen kèk jou pou platfòm lan aprann ki moun ki reponn pi byen."]],
   ex:"Poukisa ta ka gen sans kite yon kanpay kouri plizyè jou anvan w jije si li mache?",
   quiz:[
    {q:"Kisa bidjè chak jou reprezante?",opts:["Depans total pou tout kanpay la","Konbyen ou pare pou depanse chak jou","Yon frè inik","Pri pou chak klik"],ans:1,fb:"Bidjè chak jou se konbyen ou depanse chak jou."},
    {q:"Poukisa yon kanpay 1 jou ka pa ase?",opts:["Li toujou ase","Pa gen ase tan pou platfòm lan aprann ki moun ki reponn pi byen","1 jou toujou pi bon pase plis jou","Dire pa afekte rezilta"],ans:1,fb:"1 jou pa bay ase tan pou platfòm lan aprann."},
    {q:"Kisa ki detèmine depans total yon kanpay?",opts:["Sèlman bidjè chak jou","Bidjè chak jou konbine ak dire kanpay la","Sèlman dire a","Okenn nan yo"],ans:1,fb:"Bidjè chak jou X dire a = depans total."}],
   close:{learned:"Bidjè chak jou ak dire kanpay la ansanm detèmine depans total ak konbyen tan platfòm lan gen pou aprann — yon kanpay ki twò kout pa bay ase tan pou vrèman aprann.",
    mistake:"Fikse yon bidjè ki minim posib ak yon dire trè kout (1 jou), ki pa bay ase tan/done pou konnen si kanpay la reyèlman mache.",
    tip:"Kite yon kanpay kouri omwen kèk jou anvan w jije rezilta li — desizyon rapid ka bloke yon kanpay ki ta mache si l te gen plis tan.",
    assign:"Poukisa ta ka gen sans kite yon kanpay kouri plizyè jou anvan w jije si li mache?",
    dl:"Lis Verifikasyon: Bidjè Kanpay Rezonab",
    checklist:["Bidjè chak jou omwen $10?","Dire kanpay la omwen 3 jou?"],
    ai:"Sijere yon bidjè chak jou ak yon dire rezonab pou yon premye kanpay pou yon [kalite biznis]."}},
 fr:{lede:"Un budget trop petit ne donne pas à une campagne assez de temps pour vraiment apprendre ce qui fonctionne — votre budget et le nombre de jours où la campagne tourne déterminent ensemble ce que vous pouvez apprendre.",
   secs:[["Budget quotidien vs. durée de la campagne","Un budget quotidien dit combien vous êtes prêt à dépenser chaque jour ; la durée dit combien de jours la campagne continue — les deux ensemble déterminent la dépense totale."],
    ["Donner à la campagne le temps d'apprendre","Une campagne qui ne tourne qu'1 jour n'a pas assez de données pour savoir si elle fonctionne — la plupart des plateformes recommandent au moins quelques jours pour que la plateforme apprenne qui répond le mieux."]],
   ex:"Pourquoi pourrait-il être logique de laisser une campagne tourner plusieurs jours avant de juger si elle fonctionne ?",
   quiz:[
    {q:"Que représente le budget quotidien ?",opts:["La dépense totale pour toute la campagne","Combien vous êtes prêt à dépenser chaque jour","Des frais uniques","Le prix par clic"],ans:1,fb:"Le budget quotidien est combien vous dépensez chaque jour."},
    {q:"Pourquoi une campagne d'1 jour peut-elle ne pas suffire ?",opts:["Elle suffit toujours","Pas assez de temps pour que la plateforme apprenne qui répond le mieux","1 jour est toujours mieux que plus de jours","La durée n'affecte pas les résultats"],ans:1,fb:"1 jour ne donne pas assez de temps pour que la plateforme apprenne."},
    {q:"Qu'est-ce qui détermine la dépense totale d'une campagne ?",opts:["Seulement le budget quotidien","Le budget quotidien combiné à la durée de la campagne","Seulement la durée","Aucun des deux"],ans:1,fb:"Budget quotidien × durée = dépense totale."}],
   close:{learned:"Le budget quotidien et la durée de la campagne déterminent ensemble la dépense totale et combien de temps la plateforme a pour apprendre — une campagne trop courte ne donne pas assez de temps pour vraiment apprendre.",
    mistake:"Fixer un budget aussi minimal que possible avec une durée très courte (1 jour), ce qui ne donne pas assez de temps/données pour savoir si la campagne fonctionne vraiment.",
    tip:"Laissez une campagne tourner au moins quelques jours avant de juger ses résultats — des décisions rapides peuvent bloquer une campagne qui aurait fonctionné avec plus de temps.",
    assign:"Pourquoi pourrait-il être logique de laisser une campagne tourner plusieurs jours avant de juger si elle fonctionne ?",
    dl:"Liste de Vérification : Budget de Campagne Raisonnable",
    checklist:["Budget quotidien d'au moins 10 $ ?","Durée de la campagne d'au moins 3 jours ?"],
    ai:"Suggère un budget quotidien et une durée raisonnables pour une première campagne pour un(e) [type d'entreprise]."}},
 en:{lede:"A budget that's too small doesn't give a campaign enough time to really learn what's working — your budget and how many days the campaign runs together determine what you can learn.",
   secs:[["Daily budget vs. campaign duration","A daily budget says how much you're willing to spend each day; duration says how many days the campaign continues — both together determine total spend."],
    ["Giving the campaign time to learn","A campaign that runs only 1 day doesn't have enough data to know if it's working — most platforms recommend at least a few days for the platform to learn who responds best."]],
   ex:"Why might it make sense to let a campaign run for several days before judging whether it's working?",
   quiz:[
    {q:"What does daily budget represent?",opts:["Total spend for the whole campaign","How much you're willing to spend each day","A one-time fee","Price per click"],ans:1,fb:"Daily budget is how much you spend each day."},
    {q:"Why might a 1-day campaign not be enough?",opts:["It's always enough","Not enough time for the platform to learn who responds best","1 day is always better than more days","Duration doesn't affect results"],ans:1,fb:"1 day doesn't give enough time for the platform to learn."},
    {q:"What determines a campaign's total spend?",opts:["Only daily budget","Daily budget combined with campaign duration","Only duration","Neither of them"],ans:1,fb:"Daily budget × duration = total spend."}],
   close:{learned:"Daily budget and campaign duration together determine total spend and how much time the platform has to learn — a campaign that's too short doesn't give enough time to really learn.",
    mistake:"Setting the smallest possible budget with a very short duration (1 day), which doesn't give enough time/data to know if the campaign is really working.",
    tip:"Let a campaign run for at least a few days before judging its results — quick decisions can kill a campaign that would have worked with more time.",
    assign:"Why might it make sense to let a campaign run for several days before judging whether it's working?",
    dl:"Checklist: Reasonable Campaign Budget",
    checklist:["Daily budget of at least $10?","Campaign duration of at least 3 days?"],
    ai:"Suggest a reasonable daily budget and duration for a first campaign for a [type of business]."}}},

6:{ht:{lede:"Menm bon siblaj pa sove yon kreyasyon fèb — tit, imaj, ak CTA a travay ansanm pou fè yon moun rete gade epi aji.",
   secs:[["3 pati yon bon kreyasyon","Yon tit ki atire atansyon rapid, yon imaj ki matche mesaj la (pa jis dekorasyon), ak yon CTA espesifik ki di egzakteman ki aksyon pou pran (sonje Modil 5 ak 14)."],
    ["Rete koeran ak mak ou","Kreyasyon an ta dwe santi tankou biznis ou, pa yon mòd jenerik ki ka aplike a nenpòt biznis — sonje idantite mak Modil 3 la."]],

    {q:"Ki 3 pati yon bon kreyasyon piblisite genyen?",opts:["Sèlman yon tit","Tit, imaj, ak CTA","Sèlman yon imaj","Sèlman pri a"],ans:1,fb:"Tit, imaj, ak CTA se 3 pati yo."},
    {q:"Poukisa yon imaj ta dwe matche mesaj la?",opts:["Imaj se sèlman dekorasyon san rezon","Yon imaj ki matche ede kominike mesaj la klèman","Imaj pa gen okenn wòl","Nenpòt imaj mache byen"],ans:1,fb:"Yon imaj ki matche kominike mesaj la klèman."},
    {q:"Ki modil ki kouvri idantite mak ki ta dwe rete koeran nan yon kreyasyon?",opts:["Modil 1","Modil 3","Modil 7","Modil 11"],ans:1,fb:"Modil 3 kouvri idantite mak."}],
   close:{learned:"Yon bon kreyasyon piblisite konbine yon tit ki atire, yon imaj ki matche mesaj la, ak yon CTA espesifik — tout pandan li rete koeran ak idantite mak ou (Modil 3).",
    mistake:"Kite tèks CTA a jenerik ('Submit'/'Click Here') olye di egzakteman ki aksyon pou pran, ki fè moun pa sèten kisa pou fè apre.",

    dl:"Fèy Travay: Estrikti Kreyasyon Piblisite",

    ai:"Ekri yon tit piblisite, sijere yon imaj, ak yon tèks CTA espesifik pou yon [pwodwi/sèvis]."}},
 fr:{lede:"Même un bon ciblage ne sauve pas un créatif faible — le titre, l'image, et le CTA travaillent ensemble pour faire arrêter quelqu'un et agir.",
   secs:[["Les 3 parties d'un bon créatif","Un titre qui attire l'attention rapidement, une image qui correspond au message (pas juste de la décoration), et un CTA spécifique qui dit exactement quelle action prendre (souvenez-vous des Modules 5 et 14)."],
    ["Rester cohérent avec votre marque","Le créatif devrait ressembler à votre entreprise, pas à un modèle générique applicable à n'importe quelle entreprise — souvenez-vous de l'identité de marque du Module 3."]],
   ex:"Écrivez un titre publicitaire pour votre entreprise qui attire l'attention en 3 secondes.",
   quiz:[
    {q:"Quelles sont les 3 parties d'un bon créatif publicitaire ?",opts:["Seulement un titre","Titre, image, et CTA","Seulement une image","Seulement le prix"],ans:1,fb:"Titre, image, et CTA sont les 3 parties."},
    {q:"Pourquoi une image devrait-elle correspondre au message ?",opts:["L'image est juste de la décoration sans raison","Une image qui correspond aide à communiquer le message clairement","L'image n'a aucun rôle","N'importe quelle image fonctionne bien"],ans:1,fb:"Une image qui correspond communique le message clairement."},
    {q:"Quel module couvre l'identité de marque qui devrait rester cohérente dans un créatif ?",opts:["Module 1","Module 3","Module 7","Module 11"],ans:1,fb:"Le Module 3 couvre l'identité de marque."}],
   close:{learned:"Un bon créatif publicitaire combine un titre attirant, une image qui correspond au message, et un CTA spécifique — tout en restant cohérent avec votre identité de marque (Module 3).",
    mistake:"Laisser le texte du CTA générique (« Envoyer »/« Cliquez Ici ») plutôt que de dire exactement quelle action prendre, ce qui laisse les gens incertains de quoi faire ensuite.",
    tip:"Choisissez une image qui représente vraiment ce que vous offrez, pas juste une belle image sans rapport avec le message.",
    assign:"Écrivez un titre publicitaire pour votre entreprise qui attire l'attention en 3 secondes.",
    dl:"Fiche de travail : Structure du Créatif Publicitaire",
    checklist:["Titre écrit (au moins 10 caractères) ?","Image choisie ?","Texte CTA spécifique (pas « Envoyer »/« Cliquez Ici ») ?"],
    ai:"Écris un titre publicitaire, suggère une image, et un texte CTA spécifique pour un(e) [produit/service]."}},
 en:{lede:"Even good targeting doesn't save a weak creative — the headline, image, and CTA work together to make someone stop scrolling and act.",
   secs:[["The 3 parts of a good creative","A headline that grabs attention fast, an image that matches the message (not just decoration), and a specific CTA that says exactly what action to take (remember Modules 5 and 14)."],
    ["Staying consistent with your brand","The creative should feel like your business, not a generic template that could apply to any business — remember Module 3's brand identity."]],
   ex:"Write an ad headline for your business that grabs attention in 3 seconds.",
   quiz:[
    {q:"What are the 3 parts of a good ad creative?",opts:["Only a headline","Headline, image, and CTA","Only an image","Only the price"],ans:1,fb:"Headline, image, and CTA are the 3 parts."},
    {q:"Why should an image match the message?",opts:["Image is just decoration for no reason","A matching image helps communicate the message clearly","Image has no role","Any image works fine"],ans:1,fb:"A matching image communicates the message clearly."},
    {q:"Which module covers the brand identity that should stay consistent in a creative?",opts:["Module 1","Module 3","Module 7","Module 11"],ans:1,fb:"Module 3 covers brand identity."}],
   close:{learned:"A good ad creative combines an attention-grabbing headline, an image that matches the message, and a specific CTA — all while staying consistent with your brand identity (Module 3).",
    mistake:"Leaving the CTA text generic (\"Submit\"/\"Click Here\") rather than saying exactly what action to take, which leaves people unsure what to do next.",
    tip:"Choose an image that genuinely represents what you offer, not just a pretty image unrelated to the message.",
    assign:"Write an ad headline for your business that grabs attention in 3 seconds.",
    dl:"Worksheet: Ad Creative Structure",
    checklist:["Headline written (at least 10 characters)?","Image chosen?","Specific CTA text (not \"Submit\"/\"Click Here\")?"],
    ai:"Write an ad headline, suggest an image, and a specific CTA text for a [product/service]."}}},

7:{ht:{lede:"Yon pixel se yon ti kòd ki swiv moun ki vizite sit ou — san li enstale, ou pa ka rebati yon odyans pou moun ki deja montre enterè.",
   secs:[["Pixel la anvan tout bagay","Pixel la dwe enstale sou sit ou anvan nenpòt lòt bagay — li se sa ki kolekte done sou ki moun vizite, san li ou pa gen okenn done pou travay ak li."],
    ["Retablaj (retargeting) itilize done sa a","Yon fwa pixel la enstale, ou ka bati yon odyans espesifik ki gen ladan sèlman moun ki deja vizite sit ou — moun sa yo souvan konvèti pi byen paske yo deja konnen w."]],
   ex:"Poukisa yon odyans retablaj konvèti pi byen pase yon odyans ki pa janm tande pale de biznis ou?",
   quiz:[
    {q:"Kisa yon pixel fè?",opts:["Anyen espesyal","Swiv moun ki vizite sit ou pou kolekte done","Ranplase bezwen pou yon sit web","Se yon kalite imaj"],ans:1,fb:"Pixel la swiv vizitè pou kolekte done."},
    {q:"Poukisa pixel la dwe enstale anvan retablaj?",opts:["Lòd la pa enpòtan","San pixel la, pa gen done pou bati yon odyans retablaj","Retablaj mache san pixel","Pixel la vin apre retablaj toujou"],ans:1,fb:"San pixel la, pa gen done pou retablaj."},
    {q:"Poukisa yon odyans retablaj souvan konvèti pi byen?",opts:["Yo peye plis","Yo deja konnen biznis ou e montre enterè anvan","Yo pa janm tande pale de biznis ou","Pa gen rezon espesifik"],ans:1,fb:"Yo deja konnen w e montre enterè anvan."}],
   close:{learned:"Yon pixel dwe enstale anvan nenpòt lòt bagay, paske li kolekte done san sa pa gen okenn fason pou bati yon odyans retablaj — moun nan yon odyans retablaj souvan konvèti pi byen paske yo deja konnen w.",
    mistake:"Eseye bati yon odyans retablaj anvan pixel la menm enstale, ki enposib paske pa gen done pou travay ak li.",
    tip:"Enstale pixel la kounye a, menm anvan w gen yon kanpay ki pare — plis tan li kolekte done, pi bon odyans retablaj ou ka bati pita.",
    assign:"Poukisa yon odyans retablaj konvèti pi byen pase yon odyans ki pa janm tande pale de biznis ou?",
    dl:"Referans: Pixel ak Retablaj Eksplike",
    checklist:["Pixel la aktive?","Retablaj aktive apre pixel la?"],
    ai:"Eksplike relasyon ant yon pixel swiv ak yon odyans retablaj, an tèm senp pou yon pwopriyetè ti biznis."}},
 fr:{lede:"Un pixel est un petit code qui suit les gens qui visitent votre site — sans lui installé, vous ne pouvez pas reconstruire une audience de gens ayant déjà montré de l'intérêt.",
   secs:[["Le pixel avant tout","Le pixel doit être installé sur votre site avant tout le reste — c'est lui qui collecte les données sur qui visite, sans lui vous n'avez aucune donnée avec laquelle travailler."],
    ["Le reciblage (retargeting) utilise ces données","Une fois le pixel installé, vous pouvez bâtir une audience spécifique qui inclut seulement les gens ayant déjà visité votre site — ces gens convertissent souvent mieux car ils vous connaissent déjà."]],
   ex:"Pourquoi une audience de reciblage convertit-elle mieux qu'une audience qui n'a jamais entendu parler de votre entreprise ?",
   quiz:[
    {q:"Que fait un pixel ?",opts:["Rien de spécial","Suit les gens qui visitent votre site pour collecter des données","Remplace le besoin d'un site web","C'est un type d'image"],ans:1,fb:"Le pixel suit les visiteurs pour collecter des données."},
    {q:"Pourquoi le pixel doit-il être installé avant le reciblage ?",opts:["L'ordre n'a pas d'importance","Sans le pixel, il n'y a pas de données pour bâtir une audience de reciblage","Le reciblage fonctionne sans pixel","Le pixel vient toujours après le reciblage"],ans:1,fb:"Sans le pixel, il n'y a pas de données pour le reciblage."},
    {q:"Pourquoi une audience de reciblage convertit-elle souvent mieux ?",opts:["Ils paient plus","Ils connaissent déjà votre entreprise et ont montré de l'intérêt avant","Ils n'ont jamais entendu parler de votre entreprise","Aucune raison particulière"],ans:1,fb:"Ils vous connaissent déjà et ont montré de l'intérêt avant."}],
   close:{learned:"Un pixel doit être installé avant tout le reste, car il collecte les données sans lesquelles il n'y a aucun moyen de bâtir une audience de reciblage — les gens dans une audience de reciblage convertissent souvent mieux car ils vous connaissent déjà.",
    mistake:"Essayer de bâtir une audience de reciblage avant même que le pixel soit installé, ce qui est impossible car il n'y a pas de données avec lesquelles travailler.",
    tip:"Installez le pixel maintenant, même avant d'avoir une campagne prête — plus longtemps il collecte des données, meilleure sera l'audience de reciblage que vous pourrez bâtir plus tard.",
    assign:"Pourquoi une audience de reciblage convertit-elle mieux qu'une audience qui n'a jamais entendu parler de votre entreprise ?",
    dl:"Référence : Pixel et Reciblage Expliqués",
    checklist:["Le pixel est-il activé ?","Le reciblage est-il activé après le pixel ?"],
    ai:"Explique la relation entre un pixel de suivi et une audience de reciblage, en termes simples pour un propriétaire de petite entreprise."}},
 en:{lede:"A pixel is a small code that tracks people who visit your site — without it installed, you can't rebuild an audience of people who already showed interest.",
   secs:[["The pixel comes before everything","The pixel must be installed on your site before anything else — it's what collects data on who visits; without it, you have no data to work with."],
    ["Retargeting uses that data","Once the pixel is installed, you can build a specific audience that includes only people who already visited your site — these people often convert better because they already know you."]],
   ex:"Why does a retargeting audience convert better than an audience that's never heard of your business?",
   quiz:[
    {q:"What does a pixel do?",opts:["Nothing special","Tracks people who visit your site to collect data","Replaces the need for a website","It's a type of image"],ans:1,fb:"The pixel tracks visitors to collect data."},
    {q:"Why must the pixel be installed before retargeting?",opts:["Order doesn't matter","Without the pixel, there's no data to build a retargeting audience","Retargeting works without a pixel","The pixel always comes after retargeting"],ans:1,fb:"Without the pixel, there's no data for retargeting."},

function estReach(c){
 let reach=100000;
 const ageWidth=c.audience.ageMax-c.audience.ageMin;
 reach=Math.round(reach*(ageWidth/47));
 c.audience.interests.forEach(()=>{reach=Math.round(reach*0.55);});
 if(c.audience.location.trim())reach=Math.round(reach*0.6);
 return Math.max(500,reach);
}
