.mod .num{width:20px;height:20px;border-radius:6px;background:var(--ink-500);color:var(--dim);display:grid;place-items:center;font-size:10.5px;font-weight:700;flex:none}

.li{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;font-size:14px;color:var(--mute);cursor:pointer}
.li:hover{background:var(--ink-600);color:var(--dim)}.li.cur{background:rgba(var(--brand-rgb),.14);color:#fff}

.li.done .dot{background:var(--good);border-color:var(--good);color:#fff}.li .lx{margin-left:auto;font-size:10.5px;color:var(--mute)}
.main{flex:1;min-width:0;display:flex;flex-direction:column}

.langs{margin-left:auto;display:flex;background:var(--ink-700);border:1px solid var(--edge2);border-radius:9px;padding:3px}
.langs button{border:none;background:none;color:var(--dim);font-weight:700;font-size:12.5px;padding:6px 13px;border-radius:6px;cursor:pointer}
.langs button.on{background:var(--brand);color:#fff}
.reset{margin-left:6px;width:32px;height:32px;border-radius:8px;border:1px solid var(--edge2);background:var(--ink-700);color:var(--dim);cursor:pointer}
.wsp{flex:1;min-height:0;display:flex}
.stagewrap{flex:1;min-width:0;padding:16px}
.stage{position:relative;height:100%;width:100%;border-radius:12px;overflow:auto;box-shadow:0 20px 50px -12px rgba(0,0,0,.5);background:var(--ink-800);border:1px solid var(--edge);padding:28px 34px}
.rail{width:312px;flex:none;border-left:1px solid #1a2231;display:flex;flex-direction:column}
.rs{padding:17px 18px;border-bottom:1px solid #1a2231}
.lbl{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--mute);margin-bottom:9px}
.pr{height:7px;border-radius:6px;background:var(--edge);overflow:hidden;margin-top:12px}.pr>span{display:block;height:100%;width:0;background:var(--good);transition:width .5s}
.prtext{font-size:11.5px;color:var(--mute);margin-top:8px}
.obj{display:flex;gap:10px;font-size:13.5px;margin:10px 0;color:var(--mute)}.obj.d{color:var(--text)}
.obj .bx{width:18px;height:18px;border-radius:50%;border:1px solid #566078;display:grid;place-items:center;font-size:11px;color:transparent;flex:none;margin-top:1px}
.obj.d .bx{background:var(--good);border-color:var(--good);color:#fff}.obj.d .tx{text-decoration:line-through;text-decoration-color:rgba(120,130,150,.55)}
.assist{margin-top:auto;padding:17px}.abox{background:var(--ink-700);border:1px solid var(--edge);border-radius:14px;padding:15px}
.ah{display:flex;align-items:center;gap:9px;margin-bottom:8px}.av{width:30px;height:30px;border-radius:50%;background:rgba(var(--brand-rgb),.18);display:grid;place-items:center;font-size:16px}
.an{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--mute)}.am{font-size:14px;line-height:1.6;color:#dbe2ee;min-height:60px}
.labhead{max-width:700px}.labtag{display:inline-block;font-size:11.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--brand);background:rgba(var(--brand-rgb),.12);border-radius:999px;padding:5px 12px}
.labh2{font-size:25px;font-weight:800;letter-spacing:-.02em;margin:12px 0 8px}.lablead{color:var(--dim);font-size:15.5px;line-height:1.65;max-width:660px;font-style:italic}
.btn{border:none;border-radius:10px;padding:11px 20px;font-weight:700;font-size:14px;cursor:pointer}
.btn.p{background:var(--brand);color:#fff}.btn.p:hover{background:var(--brand2)}.btn.p:disabled{opacity:.4;cursor:not-allowed}
.btn.g{background:var(--ink-700);border:1px solid var(--edge2);color:var(--text)}
.nextwrap{margin-top:26px;display:flex;gap:12px;align-items:center}
.secs{max-width:700px;margin-top:24px}
.sec{margin-bottom:20px}.sec h3{font-size:16.5px;font-weight:700;margin-bottom:7px}.sec p{font-size:14.5px;line-height:1.7;color:#c9d1e0}
.illus{max-width:700px;margin:26px 0}
.exwrap{max-width:700px;margin:26px 0;border:1px solid var(--edge2);background:var(--ink-700);border-radius:14px;padding:18px 20px}
.exwrap .extag{font-size:11.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--warn)}
.exwrap p.exq{font-size:14.5px;margin:8px 0 12px;color:var(--text);line-height:1.6}
.exwrap textarea{width:100%;min-height:80px;border-radius:10px;border:1px solid var(--edge2);background:var(--ink-800);color:var(--text);font-family:var(--font);font-size:14px;padding:12px;resize:vertical}
.exwrap textarea:focus{outline:2px solid var(--brand)}
.exsaved{font-size:12.5px;color:var(--good);margin-top:8px;display:none}
.quiz{max-width:700px;margin:26px 0}
.qtag{font-size:11.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--brand);margin-bottom:14px}
.qcard{border:1px solid var(--edge2);background:var(--ink-700);border-radius:14px;padding:16px 18px;margin-bottom:14px}
.qcard .qq{font-size:14.5px;font-weight:600;margin-bottom:12px;line-height:1.55}
.qopts{display:flex;flex-direction:column;gap:8px}
.qopt{text-align:left;border:1px solid var(--edge2);background:var(--ink-600);color:var(--text);border-radius:9px;padding:10px 13px;font-size:13.5px;cursor:pointer;font-family:var(--font)}
.qopt:hover:not(:disabled){border-color:var(--brand)}
.qopt:disabled{cursor:default}
.qopt.correct{background:rgba(34,197,94,.16);border-color:var(--good);color:#c9f5d8}
.qopt.wrong{background:rgba(196,43,28,.16);border-color:var(--danger);color:#ffd7d2}
.qfb{font-size:13px;color:var(--dim);margin-top:10px;line-height:1.55}
.close{max-width:700px;margin:26px 0 6px}
.close .ctag{font-size:11.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--brand);margin-bottom:14px}
.crow{display:flex;gap:12px;padding:13px 0;border-bottom:1px solid var(--edge2)}
.crow:last-child{border-bottom:none}
.crow .ck{font-weight:700;font-size:13.5px;margin-bottom:3px}
.crow .cv{font-size:13.5px;color:#c9d1e0;line-height:1.6}
.crow ul{margin:4px 0 0 18px;padding:0}
.crow li{font-size:13.5px;color:#c9d1e0;line-height:1.6}
.stampscreen{max-width:560px;margin:40px auto;text-align:center}
.stamp{width:118px;height:118px;border-radius:50%;border:4px double var(--brand);display:grid;place-items:center;margin:0 auto 22px;background:rgba(var(--brand-rgb),.1);transform:rotate(-8deg)}

.stampscreen p{font-size:14.5px;color:var(--dim);line-height:1.65;margin-bottom:22px}
.fade{animation:fd .3s ease}@keyframes fd{from{opacity:0;transform:translateY(6px)}to{opacity:1}}
/* ============ GBP tool surface (generic SaaS dashboard, neutral accent) ============ */
.gbpwrap{font-family:-apple-system,'Segoe UI',Roboto,system-ui;background:#fff;border-radius:10px;overflow:hidden;color:#1b1f27;box-shadow:0 8px 24px rgba(0,0,0,.35)}
.gbptabs{display:flex;border-bottom:1px solid #e5e7eb;overflow-x:auto}
.gbptab{padding:12px 16px;font-size:13px;font-weight:600;color:#5b6472;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none;font-family:inherit}
.gbptab.on{color:#3B6FE0;border-bottom-color:#3B6FE0}
.gbpbody{padding:18px}
.gbprow{margin-bottom:14px}
.gbplbl{font-size:11.5px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.03em;margin-bottom:5px}
.gbpinput,.gbpselect,.gbptextarea{width:100%;border:1px solid #d7dce3;border-radius:8px;padding:9px 11px;font-size:13.5px;font-family:inherit;color:#1b1f27}
.gbpinput:focus,.gbpselect:focus,.gbptextarea:focus{outline:2px solid #3B6FE0}
.gbpdays{display:flex;gap:6px;flex-wrap:wrap}

.gbpday.on{background:#3B6FE0;color:#fff;border-color:#3B6FE0}
.gbpgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px}
.gbpphoto{border:1px solid #e5e7eb;border-radius:10px;padding:10px;text-align:center;background:#f9fafb}
.gbpphoto .em{font-size:26px;margin-bottom:6px}

.gbpstars{color:#f59e0b;font-size:13px}
.gbprevtext{font-size:13px;color:#374151;margin-bottom:10px}
.gbpreplybtns{display:flex;flex-direction:column;gap:6px}

.gbpreplied{font-size:12px;color:#166534;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:8px 10px}
.gbppost{display:flex;flex-direction:column;gap:10px;max-width:400px}
.gbppostlist{margin-top:14px}
.gbppostcard{border:1px solid #e5e7eb;border-radius:10px;padding:10px 12px;margin-bottom:8px;font-size:12.5px}

.gbptile .n{font-size:22px;font-weight:700}

.gbpbarcol{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%}

.gbpbarlbl{font-size:9.5px;color:#6b7280;text-align:center;margin-top:4px}
.gbpqueries{font-size:12.5px;color:#374151;margin-top:6px;padding-left:18px}

.gbpscore{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}

.gbptask{max-width:700px;margin-top:14px;font-size:13px;color:var(--dim);background:rgba(var(--brand-rgb),.08);border:1px solid rgba(var(--brand-rgb),.3);border-radius:10px;padding:11px 14px}

    dl:"Liste de Vérification : Photos dont Votre Profil a Besoin",

 en:{lede:"Photos are often the first thing someone looks at on a profile — a logo, a cover photo, and a few real photos build trust before someone even reads a review.",
   secs:[["3 kinds of photos you need","A logo (your brand identity), a cover photo (first impression), and at least 3 gallery photos (interior, products, team) that show the real business."],
    ["Why it makes a difference","A profile with good photos gives people confidence to visit or buy — a profile with no photos often feels suspicious or abandoned."]],
   ex:"Which 3 photos would you take first for your real business profile, and why?",
   quiz:[
    {q:"What 3 kinds of photos does a good profile need?",opts:["Only a logo","A logo, a cover photo, and at least 3 gallery photos","Only product photos","No photos are needed at all"],ans:1,fb:"A good profile needs logo, cover, and gallery photos."},
    {q:"Why do photos make a difference?",opts:["They make no difference","They build confidence to visit or buy before someone even reads a review","They're only decorative","They replace the need for reviews"],ans:1,fb:"Photos build trust before even a review."},
    {q:"What does a cover photo do?",opts:["Nothing special","Gives the first impression when someone finds the profile","It's only for employees to see","It replaces the logo"],ans:1,fb:"The cover photo gives the first impression."}],
   close:{learned:"A good profile needs a logo, a cover photo, and at least 3 gallery photos that show the real business — photos build trust before even a review.",
    mistake:"Leaving the profile with no photos at all or only one generic photo, which makes it feel abandoned or unserious.",
    tip:"Real photos (even simple ones) always beat no photos at all — they're the first trust signal a visitor sees.",
    assign:"Which 3 photos would you take first for your real business profile, and why?",
    dl:"Checklist: Photos Your Profile Needs",
    checklist:["Logo set?","Cover photo set?","At least 3 photos in the gallery?"],
    ai:"Suggest 5 kinds of photos a [type of business] should have on its Google Business Profile."}}},

4:{ht:{lede:"Revi se youn nan sinyal konfyans ki pi fò moun tou pre wè — men kijan ou reponn yo, sitou yon move revi, konte plis pase revi a limenm.",
   secs:[["Reponn tout revi, bon ak move","Reponn yon revi pozitif montre w apresye kliyan yo; men se kijan ou reponn yon revi negatif ki reyèlman montre karaktè biznis ou bay lòt moun k ap li."],
    ["Yon repons pwofesyonèl pou yon plent","Yon bon repons rekonèt pwoblèm nan espesifikman, di dezole san fè eskiz, epi ofri yon fason pou rezoud li — pa nye pwoblèm nan e pa jis kopye-kole yon repons jenerik."]],
   ex:"Ekri kijan ou ta reponn yon revi 2-etwal ki plenyen sou yon reta nan sèvis.",
   quiz:[
    {q:"Poukisa reponn revi enpòtan?",opts:["Li pa enpòtan ditou","Kijan ou reponn, sitou yon move revi, montre karaktè biznis ou bay lòt moun k ap li","Sèlman revi 5-etwal merite yon repons","Google efase revi ou pa reponn"],ans:1,fb:"Repons ou vizib pou tout moun k ap li revi yo."},
    {q:"Kisa yon bon repons a yon plent ta dwe fè?",opts:["Nye pwoblèm nan e di kliyan an mal","Rekonèt pwoblèm nan espesifikman e ofri yon fason pou rezoud li","Inyore revi a nèt","Kopye-kole menm repons jenerik la pou tout moun"],ans:1,fb:"Yon bon repons rekonèt e ofri rezoud."},
    {q:"Kisa ki fè yon repons santi jenerik/move?",opts:["Rekonèt pwoblèm espesifik la","Yon repons ki pa adrese detay reyèl plent lan e ki santi kopye-kole","Ofri yon fason pou rezoud li","Di dezole san fè eskiz"],ans:1,fb:"Yon repons ki pa adrese detay reyèl la santi jenerik."}],
   close:{learned:"Reponn tout revi konte, men kijan ou reponn yon plent — rekonèt pwoblèm nan espesifikman e ofri rezoud li — se sa ki montre bon karaktè biznis ou bay lòt moun k ap li.",
    mistake:"Nye oswa diskite ak yon revi negatif, oswa reponn ak yon mesaj jenerik ki pa rekonèt detay reyèl plent la.",
    tip:"Yon repons pwofesyonèl a yon move revi ka konvenk yon lòt moun k ap li plis pase 10 bon revi.",
    assign:"Ekri kijan ou ta reponn yon revi 2-etwal ki plenyen sou yon reta nan sèvis.",
    dl:"Referans: Kijan pou Reponn Revi Negatif",
    checklist:["Tout 4 revi yo reponn?","Revi negatif la reponn ak yon mesaj pwofesyonèl, pa yon mesaj jenerik oswa defansif?"],
    ai:"Ekri yon repons pwofesyonèl a yon revi 2-etwal ki plenyen sou [dekri pwoblèm nan]."}},
 fr:{lede:"Les avis sont l'un des signaux de confiance les plus forts que les gens à proximité voient — mais la façon dont vous y répondez, surtout à un mauvais avis, compte plus que l'avis lui-même.",
   secs:[["Répondre à tous les avis, bons et mauvais","Répondre à un avis positif montre que vous appréciez vos clients ; mais c'est la façon dont vous répondez à un avis négatif qui montre vraiment le caractère de votre entreprise aux autres qui le lisent."],
    ["Une réponse professionnelle à une plainte","Une bonne réponse reconnaît le problème spécifiquement, s'excuse sincèrement, et offre un moyen de le résoudre — sans nier le problème et sans juste copier-coller une réponse générique."]],
   ex:"Écrivez comment vous répondriez à un avis 2 étoiles se plaignant d'un retard de service.",
   quiz:[
    {q:"Pourquoi répondre aux avis est-il important ?",opts:["Ce n'est pas important du tout","La façon dont vous répondez, surtout à un mauvais avis, montre le caractère de votre entreprise à tous ceux qui le lisent","Seuls les avis 5 étoiles méritent une réponse","Google supprime les avis auxquels vous ne répondez pas"],ans:1,fb:"Votre réponse est visible par tous ceux qui lisent les avis."},
    {q:"Que devrait faire une bonne réponse à une plainte ?",opts:["Nier le problème et dire au client qu'il a tort","Reconnaître le problème spécifiquement et offrir un moyen de le résoudre","Ignorer complètement l'avis","Copier-coller la même réponse générique pour tout le monde"],ans:1,fb:"Une bonne réponse reconnaît et offre de résoudre."},
    {q:"Qu'est-ce qui rend une réponse générique/mauvaise ?",opts:["Reconnaître le problème spécifique","Une réponse qui n'aborde pas les vrais détails de la plainte et semble copiée-collée","Offrir un moyen de le résoudre","S'excuser sincèrement"],ans:1,fb:"Une réponse qui n'aborde pas les vrais détails semble générique."}],
   close:{learned:"Répondre à tous les avis compte, mais la façon dont vous répondez à une plainte — en reconnaissant le problème spécifiquement et en offrant de le résoudre — montre le vrai caractère de votre entreprise.",
    mistake:"Nier ou débattre avec un avis négatif, ou répondre avec un message générique qui n'aborde pas les vrais détails de la plainte.",
    tip:"Une réponse professionnelle à un mauvais avis peut convaincre un autre lecteur plus que 10 bons avis.",
    assign:"Écrivez comment vous répondriez à un avis 2 étoiles se plaignant d'un retard de service.",
    dl:"Référence : Comment Répondre aux Avis Négatifs",
    checklist:["Les 4 avis ont-ils reçu une réponse ?","L'avis négatif a-t-il reçu un message professionnel, pas générique ou défensif ?"],
    ai:"Écris une réponse professionnelle à un avis 2 étoiles se plaignant de [décris le problème]."}},
 en:{lede:"Reviews are one of the strongest trust signals nearby people see — but how you reply to them, especially a bad one, matters more than the review itself.",
   secs:[["Reply to every review, good and bad","Replying to a positive review shows you appreciate your customers; but it's how you reply to a negative one that really shows your business's character to everyone else reading it."],
    ["A professional reply to a complaint","A good reply acknowledges the specific problem, apologizes sincerely, and offers a way to resolve it — not denying the issue and not just copy-pasting a generic reply."]],
   ex:"Write how you would reply to a 2-star review complaining about a service delay.",
   quiz:[
    {q:"Why does replying to reviews matter?",opts:["It doesn't matter at all","How you reply, especially to a bad review, shows your business's character to everyone reading it","Only 5-star reviews deserve a reply","Google deletes reviews you don't reply to"],ans:1,fb:"Your reply is visible to everyone reading the reviews."},
    {q:"What should a good reply to a complaint do?",opts:["Deny the problem and tell the customer they're wrong","Acknowledge the specific problem and offer a way to resolve it","Ignore the review entirely","Copy-paste the same generic reply for everyone"],ans:1,fb:"A good reply acknowledges and offers to resolve."},
    {q:"What makes a reply feel generic/bad?",opts:["Acknowledging the specific problem","A reply that doesn't address the real details of the complaint and feels copy-pasted","Offering a way to resolve it","Apologizing sincerely"],ans:1,fb:"A reply that doesn't address real details feels generic."}],
   close:{learned:"Replying to every review matters, but how you reply to a complaint — acknowledging the specific problem and offering to resolve it — is what shows your business's real character to everyone reading it.",
    mistake:"Denying or arguing with a negative review, or replying with a generic message that doesn't address the real details of the complaint.",
    tip:"A professional reply to a bad review can convince another reader more than 10 good reviews.",
    assign:"Write how you would reply to a 2-star review complaining about a service delay.",
    dl:"Reference: How to Reply to Negative Reviews",
    checklist:["All 4 reviews replied to?","The negative review replied to with a professional message, not generic or defensive?"],
    ai:"Write a professional reply to a 2-star review complaining about [describe the problem]."}}},

5:{ht:{lede:"Pòs sou pwofil ou tankou ti mizajou ki kenbe l vivan — yo montre Google (ak vizitè) ke biznis ou aktif, pa yon pwofil moun te kreye epi bliye.",
   secs:[["3 kalite pòs","Mizajou (nouvèl jeneral), Ofri (yon pwomosyon espesifik), ak Evènman (yon dat espesifik) — chak kalite gen yon rezon diferan pou itilize li."],
    ["Poukisa poste regilyèman konte","Yon pwofil ki poste regilyèman siyale li aktif e byen jere, ki se yon faktè Google konsidere pou vizibilite lokal (n ap wè sa an detay nan Leson 12.7)."]],
   ex:"Ekri tèks yon pòs 'Mizajou' pou biznis ou ki ta enterese yon vrè kliyan.",
   quiz:[
    {q:"Ki 3 kalite pòs ou ka kreye?",opts:["Sèlman yon kalite","Mizajou, Ofri, ak Evènman","Sèlman Ofri","Pòs pa gen kalite"],ans:1,fb:"Gen 3 kalite: Mizajou, Ofri, Evènman."},
    {q:"Poukisa poste regilyèman konte?",opts:["Li pa gen okenn efè","Li siyale pwofil la aktif e byen jere, ki ede vizibilite lokal","Sèlman fè pwofil la parèt plen","Google inyore pòs yo nèt"],ans:1,fb:"Poste aktif se yon faktè vizibilite lokal."},
    {q:"Kisa yon pòs 'Ofri' ye?",opts:["Yon nouvèl jeneral san detay","Yon pwomosyon espesifik","Yon dat evènman","Yon revi kliyan"],ans:1,fb:"Yon pòs Ofri se yon pwomosyon espesifik."}],
   close:{learned:"Pòs (Mizajou, Ofri, Evènman) kenbe pwofil ou vivan e siyale Google ke biznis ou aktif e byen jere.",
    mistake:"Kreye yon pwofil epi pa janm poste ankò, ki fè li santi abandone menm si enfòmasyon debaz yo korèk.",
    tip:"Yon ti pòs regilye (menm chak kèk semèn) fè plis pase okenn pòs ditou pou montre biznis ou aktif.",
    assign:"Ekri tèks yon pòs 'Mizajou' pou biznis ou ki ta enterese yon vrè kliyan.",
    dl:"Modèl: Estrikti Pòs Google Business Profile",
    checklist:["Kalite pòs chwazi?","Tèks pòs ekri?","Foto chwazi pou pòs la?","Pòs pibliye?"],
    ai:"Ekri yon pòs 'Ofri' kout pou yon [kalite biznis] ki anonse [dekri ofri a]."}},
 fr:{lede:"Les publications sur votre profil sont comme de petites mises à jour qui le gardent vivant — elles montrent à Google (et aux visiteurs) que votre entreprise est active, pas un profil que quelqu'un a créé puis oublié.",
   secs:[["3 types de publications","Mise à Jour (nouvelle générale), Offre (une promotion spécifique), et Événement (une date spécifique) — chaque type a une raison différente d'être utilisé."],
    ["Pourquoi publier régulièrement compte","Un profil qui publie régulièrement signale qu'il est actif et bien géré, ce qui est un facteur que Google considère pour la visibilité locale (nous le verrons en détail à la Leçon 12.7)."]],
   ex:"Écrivez le texte d'une publication « Mise à Jour » pour votre entreprise qui intéresserait un vrai client.",
   quiz:[
    {q:"Quels 3 types de publications pouvez-vous créer ?",opts:["Seulement un type","Mise à Jour, Offre, et Événement","Seulement Offre","Les publications n'ont pas de type"],ans:1,fb:"Il y a 3 types : Mise à Jour, Offre, Événement."},
    {q:"Pourquoi publier régulièrement compte-t-il ?",opts:["Ça n'a aucun effet","Ça signale que le profil est actif et bien géré, ce qui aide la visibilité locale","Ça fait seulement paraître le profil rempli","Google ignore complètement les publications"],ans:1,fb:"Publier activement est un facteur de visibilité locale."},
    {q:"Qu'est-ce qu'une publication « Offre » ?",opts:["Une nouvelle générale sans détail","Une promotion spécifique","Une date d'événement","Un avis client"],ans:1,fb:"Une publication Offre est une promotion spécifique."}],
   close:{learned:"Les publications (Mise à Jour, Offre, Événement) gardent votre profil vivant et signalent à Google que votre entreprise est active et bien gérée.",
    mistake:"Créer un profil et ne plus jamais publier, ce qui le fait sembler abandonné même si les infos de base sont correctes.",
    tip:"Une petite publication régulière (même toutes les quelques semaines) fait plus qu'aucune publication du tout pour montrer que l'entreprise est active.",
    assign:"Écrivez le texte d'une publication « Mise à Jour » pour votre entreprise qui intéresserait un vrai client.",
    dl:"Modèle : Structure de Publication Google Business Profile",
    checklist:["Type de publication choisi ?","Texte de publication écrit ?","Photo choisie pour la publication ?","Publication publiée ?"],
    ai:"Écris une courte publication « Offre » pour un(e) [type d'entreprise] annonçant [décris l'offre]."}},
 en:{lede:"Posts on your profile are like little updates that keep it alive — they show Google (and visitors) that your business is active, not a profile someone created and forgot about.",
   secs:[["3 kinds of posts","Update (general news), Offer (a specific promotion), and Event (a specific date) — each type has a different reason to use it."],
    ["Why posting regularly matters","A profile that posts regularly signals it's active and well-managed, which is a factor Google considers for local visibility (we'll see this in detail in Lesson 12.7)."]],
   ex:"Write the text of an \"Update\" post for your business that would interest a real customer.",
   quiz:[
    {q:"What 3 kinds of posts can you create?",opts:["Only one kind","Update, Offer, and Event","Only Offer","Posts don't have a type"],ans:1,fb:"There are 3 kinds: Update, Offer, Event."},
    {q:"Why does posting regularly matter?",opts:["It has no effect","It signals the profile is active and well-managed, which helps local visibility","It only makes the profile look full","Google ignores posts entirely"],ans:1,fb:"Actively posting is a local visibility factor."},
    {q:"What is an \"Offer\" post?",opts:["A general update with no detail","A specific promotion","An event date","A customer review"],ans:1,fb:"An Offer post is a specific promotion."}],
   close:{learned:"Posts (Update, Offer, Event) keep your profile alive and signal to Google that your business is active and well-managed.",
    mistake:"Creating a profile and then never posting again, which makes it feel abandoned even if the basic info is correct.",
    tip:"A small, regular post (even every few weeks) does more than no post at all to show the business is active.",
    assign:"Write the text of an \"Update\" post for your business that would interest a real customer.",
    dl:"Template: Google Business Profile Post Structure",
    checklist:["Post type chosen?","Post text written?","Photo chosen for the post?","Post published?"],
    ai:"Write a short \"Offer\" post for a [type of business] announcing [describe the offer]."}}},

    {q:"Poukisa itilize done sa yo enpòtan?",opts:["Yo pa itil ditou","Yo ede w konnen sa k ap mache e sa pou amelyore","Yo sèlman pou kirye","Google mande w regade yo chak jou san rezon"],ans:1,fb:"Done yo montre kijan pou amelyore pwofil ou."},
    {q:"Ki egzanp aksyon kliyan Apèsi ka montre?",opts:["Rele, mande direksyon, vizite sit web","Sèlman kantite revi","Sèlman kantite foto","Okenn aksyon pa swiv"],ans:1,fb:"Aksyon kliyan gen rele, direksyon, ak vizit sit web."}],
   close:{learned:"Seksyon Apèsi montre vrè done — vizit, rechèch ki mennen isit la, ak aksyon kliyan pran — pou ede w konnen sa k ap mache reyèlman.",
    mistake:"Inyore seksyon Apèsi nèt e pa janm gade ki aksyon kliyan yo pran, sa fè w pèdi enfòmasyon itil pou amelyore pwofil ou.",
    tip:"Si yon aksyon (tankou vizit sit web) ba, konsidere si sit web ou (Modil 14) fasil pou itilize e klè.",

    checklist:["Gade done vizit yo?","Gade rechèch ki mennen isit yo?","Idantifye aksyon kliyan ki pi souvan?"],
    ai:"Eksplike kisa done Apèsi Google Business Profile yo vle di pou yon [kalite biznis], e ki aksyon ki ta ka pran ak yo."}},
 fr:{lede:"La section Aperçus montre de vraies données sur comment les gens trouvent et utilisent votre profil — les comprendre vous aide à savoir ce qui fonctionne et quoi améliorer.",
   secs:[["Ce que montrent les Aperçus","Combien de gens voient votre profil chaque jour, quels mots ils cherchent qui les mènent ici, et quelles actions ils prennent (appeler, demander l'itinéraire, ou visiter votre site web)."],
    ["Utiliser les données, pas juste les regarder","Si la plupart des gens appellent plutôt que de visiter votre site web, ça pourrait signifier que votre numéro de téléphone est facile à trouver mais votre site web pourrait avoir besoin d'être amélioré (Module 14)."]],
   ex:"Quelle action (appel, itinéraire, site web) pensez-vous serait la plus fréquente pour votre entreprise, et pourquoi ?",
   quiz:[
    {q:"Que montre la section Aperçus ?",opts:["Seulement combien d'argent vous gagnez","De vraies données sur comment les gens trouvent et utilisent votre profil","Seulement les avis clients","Une liste de vos concurrents"],ans:1,fb:"Les Aperçus montrent de vraies données d'utilisation du profil."},
    {q:"Pourquoi utiliser ces données est-il important ?",opts:["Elles ne sont pas utiles du tout","Elles vous aident à savoir ce qui fonctionne et quoi améliorer","Elles sont seulement pour la curiosité","Google vous demande de les regarder chaque jour sans raison"],ans:1,fb:"Les données montrent comment améliorer votre profil."},
    {q:"Quel exemple d'action client les Aperçus peuvent-ils montrer ?",opts:["Appeler, demander l'itinéraire, visiter le site web","Seulement le nombre d'avis","Seulement le nombre de photos","Aucune action n'est suivie"],ans:1,fb:"Les actions client incluent appel, itinéraire, et visite du site web."}],
   close:{learned:"La section Aperçus montre de vraies données — vues, recherches qui ont mené ici, et actions client — pour vous aider à savoir ce qui fonctionne vraiment.",
    mistake:"Ignorer complètement la section Aperçus et ne jamais regarder quelles actions les clients prennent, ce qui vous fait perdre des informations utiles pour améliorer votre profil.",
    tip:"Si une action (comme les visites du site web) est faible, considérez si votre site web (Module 14) est facile à utiliser et clair.",
    assign:"Quelle action (appel, itinéraire, site web) pensez-vous serait la plus fréquente pour votre entreprise, et pourquoi ?",
    dl:"Référence : Comprendre les Aperçus de Google Business Profile",
    checklist:["Données de vues consultées ?","Recherches qui ont mené ici consultées ?","Action client la plus fréquente identifiée ?"],
    ai:"Explique ce que signifient les données d'Aperçus de Google Business Profile pour un(e) [type d'entreprise], et quelles actions pourraient être prises avec elles."}},
 en:{lede:"The Insights section shows real data on how people find and use your profile — understanding it helps you know what's working and what to improve.",
   secs:[["What Insights shows","How many people see your profile each day, what words they searched that led them here, and what actions they take (calling, requesting directions, or visiting your website)."],
    ["Using the data, not just looking at it","If most people call rather than visit your website, that might mean your phone number is easy to find but your website could need improving (Module 14)."]],
   ex:"Which action (call, directions, website) do you think would be most common for your business, and why?",
   quiz:[
    {q:"What does the Insights section show?",opts:["Only how much money you make","Real data on how people find and use your profile","Only customer reviews","A list of your competitors"],ans:1,fb:"Insights shows real profile usage data."},
    {q:"Why does using this data matter?",opts:["It isn't useful at all","It helps you know what's working and what to improve","It's only for curiosity","Google requires you to look at it daily for no reason"],ans:1,fb:"The data shows how to improve your profile."},
    {q:"What example of customer action can Insights show?",opts:["Calling, requesting directions, visiting the website","Only the number of reviews","Only the number of photos","No actions are tracked"],ans:1,fb:"Customer actions include calls, directions, and website visits."}],
   close:{learned:"The Insights section shows real data — views, searches that led here, and customer actions — to help you know what's actually working.",
    mistake:"Ignoring the Insights section entirely and never looking at what actions customers take, which loses useful information for improving your profile.",
    tip:"If one action (like website visits) is low, consider whether your website (Module 14) is easy to use and clear.",
    assign:"Which action (call, directions, website) do you think would be most common for your business, and why?",
    dl:"Reference: Understanding Google Business Profile Insights",
    checklist:["Views data checked?","Searches that led here checked?","Most common customer action identified?"],
    ai:"Explain what Google Business Profile Insights data means for a [type of business], and what actions could be taken with it."}}},

7:{ht:{lede:"Google eksplike piblikman vizibilite lokal soti nan 3 faktè: Pètinans, Distans, ak Enpòtans (Prominence) — ou pa ka kontwole distans, men ou ka kontwole anpil bagay ki nouri pètinans ak enpòtans.",
   secs:[["Pètinans ak Enpòtans, sa ou ka kontwole","Pètinans se jan byen pwofil ou matche ak sa yon moun chèche (kategori, mo kle, deskripsyon); enpòtans se jan biznis ou byen konni — foto, revi, ak pòs aktif tout ede pètinans ak enpòtans."],
    ["Distans, sa ou pa ka kontwole","Distans se senp distans jewografik ant moun k ap chèche a ak biznis ou — sa deyò kontwòl ou, kidonk konsantre sou sa ou ka reyèlman chanje."]],
   ex:"Ki 1 faktè (enfòmasyon, foto, revi, oswa pòs) ou panse pwofil ou pi fèb sou li kounye a, e ki pwochen etap ou ta pran?",
   quiz:[

function markModuleComplete(){
 if(!S.done.every(Boolean))return;
 try{
  const raw=localStorage.getItem(PROGRESS_KEY);
  const parsed=raw?JSON.parse(raw):[];
  const list=Array.isArray(parsed)?parsed:[];
  let changed=false;
  MOD12_LESSON_SLUGS.forEach(slug=>{if(!list.includes(slug)){list.push(slug);changed=true;}});
  if(changed){
   localStorage.setItem(PROGRESS_KEY,JSON.stringify(list));
   window.parent.dispatchEvent(new CustomEvent(PROGRESS_EVENT,{detail:{storageKey:PROGRESS_KEY}}));

 }catch{}
}

function checkTask(n){
 const st=S.st[n];
 const done=C[n].check(S.biz);
 if(done&&!st.edDone){st.edDone=true;persist();}
 else if(!done&&st.edDone){st.edDone=false;persist();}
 return done;
}
function factorScore(){
 const b=S.biz,ui=UI[S.lang];
 const f1=!!(b.name.trim()&&b.category&&b.address.trim()&&b.phone.trim()&&Object.values(b.hours).some(Boolean)&&b.description.trim().length>=20);
 const f2=!!(b.logo&&b.cover&&b.gallery.length>=3);
 const f3=REVIEWS.every(r=>b.reviewReplies[r.id]!=null);
 const f4=b.posts.length>=1;
 return [[ui.factorInfo,f1],[ui.factorPhotos,f2],[ui.factorReviews,f3],[ui.factorPosts,f4]];
}

function wireToolPanel(){
 const box=$("gbpBody");if(!box)return;
 document.querySelectorAll(".gbptab").forEach(t=>t.addEventListener("click",()=>{
  S.tab=t.dataset.tab;S.biz.visited[S.tab]=true;persist();refreshTool();
 }));
 if(S.tab==="info"){
  const nm=$("gbpName"),ca=$("gbpCat"),ad=$("gbpAddr"),ph=$("gbpPhone"),de=$("gbpDesc");
  if(nm)nm.addEventListener("input",e=>{S.biz.name=e.target.value;persist();checkTask(S.cur);renderRail();});
  if(ca)ca.addEventListener("change",e=>{S.biz.category=e.target.value;persist();checkTask(S.cur);renderRail();});
  if(ad)ad.addEventListener("input",e=>{S.biz.address=e.target.value;persist();checkTask(S.cur);renderRail();});
  if(ph)ph.addEventListener("input",e=>{S.biz.phone=e.target.value;persist();checkTask(S.cur);renderRail();});
  if(de)de.addEventListener("input",e=>{S.biz.description=e.target.value;persist();checkTask(S.cur);renderRail();});
  document.querySelectorAll(".gbpday").forEach(d=>d.addEventListener("click",()=>{
   S.biz.hours[d.dataset.day]=!S.biz.hours[d.dataset.day];persist();checkTask(S.cur);renderRail();refreshTool();
  }));
 } else if(S.tab==="photos"){
  document.querySelectorAll("[data-act]").forEach(btn=>btn.addEventListener("click",()=>{
   const id=btn.dataset.id,act=btn.dataset.act;
   if(act==="logo")S.biz.logo=S.biz.logo===id?null:id;
   else if(act==="cover")S.biz.cover=S.biz.cover===id?null:id;
   else if(act==="gallery"){
    const idx=S.biz.gallery.indexOf(id);
    if(idx>=0)S.biz.gallery.splice(idx,1);else S.biz.gallery.push(id);
   }
   persist();checkTask(S.cur);renderRail();refreshTool();
  }));
 } else if(S.tab==="reviews"){
  document.querySelectorAll(".gbpreplybtn").forEach(btn=>btn.addEventListener("click",()=>{
   S.biz.reviewReplies[btn.dataset.rid]=btn.dataset.good==="true"?"good":"bad";
   persist();checkTask(S.cur);renderRail();refreshTool();
  }));
 } else if(S.tab==="posts"){
  const pub=$("gbpPublish");
  if(pub)pub.addEventListener("click",()=>{
   const type=$("gbpPostType").value,text=$("gbpPostText").value.trim(),photo=$("gbpPostPhoto").value;
   if(!text||!photo)return;
   S.biz.posts.push({type,text,photo});
   persist();checkTask(S.cur);renderRail();refreshTool();
  });
 } else if(S.tab==="insights"){
  document.querySelectorAll(".gbptile").forEach(t=>t.addEventListener("click",()=>{
   const k=t.dataset.action;
   const top=Object.entries(INSIGHTS.actions).sort((a,b)=>b[1]-a[1])[0][0];
   S.insightPick=k;
   if(k===top)S.biz.insightAnswered=true;
   persist();checkTask(S.cur);renderRail();refreshTool();
  }));
 }
}
function refreshTool(){

 root.innerHTML=renderToolPanel();
 wireToolPanel();
}

 h+='<div class="quiz"><div class="qtag">'+ui.quizTag+'</div>';
 d.quiz.forEach((q,qi)=>{
  h+='<div class="qcard"><div class="qq">'+(qi+1)+". "+q.q+'</div><div class="qopts" id="qopts'+qi+'">';
  q.opts.forEach((o,oi)=>{
   let cls="qopt";const answered=st.quizAns[qi]!==null;
   if(answered){if(oi===q.ans)cls+=" correct";else if(oi===st.quizAns[qi])cls+=" wrong";}
   h+='<button class="'+cls+'" data-qi="'+qi+'" data-oi="'+oi+'"'+(answered?" disabled":"")+">"+o+"</button>";
  });
  h+="</div>";
  if(st.quizAns[qi]!==null)h+='<div class="qfb">'+q.fb+"</div>";
  h+="</div>";
 });
 h+="</div>";

 h+='<div class="close"><div class="ctag">'+ui.closeTag+'</div>'+
  '<div class="crow"><div class="cv"><div class="ck">'+ui.cLearned+'</div>'+d.close.learned+'</div></div>'+
  '<div class="crow"><div class="cv"><div class="ck">'+ui.cMistake+'</div>'+d.close.mistake+'</div></div>'+
  '<div class="crow"><div class="cv"><div class="ck">'+ui.cTip+'</div>'+d.close.tip+'</div></div>'+
  '<div class="crow"><div class="cv"><div class="ck">'+ui.cAssign+'</div>'+d.close.assign+'</div></div>'+
  '<div class="crow"><div class="cv"><div class="ck">'+ui.cDl+'</div>'+d.close.dl+'</div></div>'+
  '<div class="crow"><div class="cv"><div class="ck">'+ui.cChecklist+'</div><ul>'+d.close.checklist.map(c=>"<li>"+c+"</li>").join("")+'</ul></div></div>'+
  '<div class="crow"><div class="cv"><div class="ck">'+ui.cAi+'</div>"'+d.close.ai+'"</div></div>'+
 "</div>";

 checkTask(n);
 const canFinish=st.edDone&&st.exDone&&st.quizAns.every(a=>a!==null);
 h+='<div class="nextwrap">';
 if(!S.done[n-1]){
  h+='<button class="btn p" id="finishBtn"'+(canFinish?"":" disabled")+">"+ui.complete+"</button>";
 }else{
  h+='<span style="color:var(--good);font-weight:700;font-size:14px">'+ui.completed+"</span>";
  if(n<NL)h+='<button class="btn g" id="nextBtn">'+ui.next+"</button>";
  else h+='<button class="btn g" id="finalBtn">'+ui.stampBtn+"</button>";
 }
 h+="</div>";

 stage.innerHTML=h;stage.classList.add("fade");
 stage.scrollTop=0;

 const root=$("gbpRoot");
 if(n===7)root.innerHTML=renderRankingPanel();
 else{root.innerHTML=renderToolPanel();wireToolPanel();}

 $("exArea").addEventListener("input",e=>{st.exText=e.target.value;});
 $("exSaveBtn").addEventListener("click",()=>{
  if(st.exText&&st.exText.trim().length>0){st.exDone=true;$("exSaved").style.display="inline";persist();renderRail();updateFinishBtn();}
 });
 d.quiz.forEach((q,qi)=>{
  if(st.quizAns[qi]!==null)return;
  document.querySelectorAll('#qopts'+qi+' .qopt').forEach(btn=>{
   btn.addEventListener("click",()=>{
    st.quizAns[qi]=+btn.dataset.oi;persist();render();
   });
  });
 });
 const fb=$("finishBtn");
 if(fb)fb.addEventListener("click",()=>{
  S.done[n-1]=true;persist();markModuleComplete();render();
 });
 const nb=$("nextBtn");
 if(nb)nb.addEventListener("click",()=>{S.cur=n+1;persist();render();});
 const flb=$("finalBtn");
 if(flb)flb.addEventListener("click",showStamp);
 renderRail();
}
function updateFinishBtn(){
 const st=S.st[S.cur];
 const fb=$("finishBtn");
 if(fb)fb.disabled=!(st.edDone&&st.exDone&&st.quizAns.every(a=>a!==null));
}

function showStamp(){
 const ui=UI[S.lang];
 $("stage").innerHTML='<div class="stampscreen fade"><div class="stamp"><div class="si">🎟️</div></div><h2>'+ui.stampTitle+"</h2><p>"+ui.stampBody+'</p><a href="/academy/courses/digital-marketing-ai/learn/meet-the-email-marketing-tool" target="_top" class="btn p" style="text-decoration:none;display:inline-block">'+ui.stampBtn+"</a></div>";
}

/* ============ per-lesson tasks & checks ============ */
C[1].task={ht:"Klike sou chak nan 5 tab yo (Enfòmasyon, Foto, Revi, Pòs, Apèsi) omwen yon fwa.",fr:"Cliquez sur chacun des 5 onglets (Infos, Photos, Avis, Publications, Aperçus) au moins une fois.",en:"Click on each of the 5 tabs (Info, Photos, Reviews, Posts, Insights) at least once."};
C[1].check=b=>Object.values(b.visited).every(Boolean);
C[2].task={ht:"Ranpli non, kategori, adrès, telefòn, omwen yon jou ouvè, ak yon deskripsyon (omwen 20 karaktè).",fr:"Remplissez le nom, la catégorie, l'adresse, le téléphone, au moins un jour ouvert, et une description (au moins 20 caractères).",en:"Fill in name, category, address, phone, at least one open day, and a description (at least 20 characters)."};
C[2].check=b=>!!(b.name.trim()&&b.category&&b.address.trim()&&b.phone.trim()&&Object.values(b.hours).some(Boolean)&&b.description.trim().length>=20);
C[3].task={ht:"Mete yon logo, yon foto kouvèti, ak omwen 3 foto nan galri a.",fr:"Définissez un logo, une photo de couverture, et au moins 3 photos dans la galerie.",en:"Set a logo, a cover photo, and at least 3 photos in the gallery."};
C[3].check=b=>!!(b.logo&&b.cover&&b.gallery.length>=3);
C[4].task={ht:"Reponn tout 4 revi yo — chwazi repons pwofesyonèl la pou revi negatif la.",fr:"Répondez aux 4 avis — choisissez la réponse professionnelle pour l'avis négatif.",en:"Reply to all 4 reviews — choose the professional reply for the negative review."};
C[4].check=b=>REVIEWS.every(r=>b.reviewReplies[r.id]!=null)&&b.reviewReplies.r3==="good";
C[5].task={ht:"Kreye epi pibliye yon pòs ak yon kalite, yon tèks, ak yon foto.",fr:"Créez et publiez une publication avec un type, un texte, et une photo.",en:"Create and publish a post with a type, text, and a photo."};
C[5].check=b=>b.posts.length>=1;
C[6].task={ht:"Klike sou vinyèt aksyon kliyan ki gen pi gwo nimewo a.",fr:"Cliquez sur la vignette d'action client qui a le plus grand nombre.",en:"Click the customer-action tile with the biggest number."};
C[6].check=b=>b.insightAnswered===true;
C[7].task={ht:"Fè tout 4 faktè yo vin \"Sou\" nan tablo Nòt Vizibilite a (retounen nan lòt tab yo si sa nesesè).",fr:"Faites en sorte que les 4 facteurs soient « Actifs » dans le tableau de Score de Visibilité (retournez aux autres onglets si nécessaire).",en:"Get all 4 factors to show \"On\" in the Visibility Score panel (go back to the other tabs if needed)."};
C[7].check=b=>factorScoreFor(b)===4;
function factorScoreFor(b){
 const f1=!!(b.name.trim()&&b.category&&b.address.trim()&&b.phone.trim()&&Object.values(b.hours).some(Boolean)&&b.description.trim().length>=20);
 const f2=!!(b.logo&&b.cover&&b.gallery.length>=3);
 const f3=REVIEWS.every(r=>b.reviewReplies[r.id]!=null);
 const f4=b.posts.length>=1;
 return [f1,f2,f3,f4].filter(Boolean).length;
}

/* ============ chrome wiring ============ */
$("langs").addEventListener("click",e=>{
 const b=e.target.closest("button");if(!b)return;
 S.lang=b.dataset.l;persist();
 document.querySelectorAll("#langs button").forEach(x=>x.classList.toggle("on",x.dataset.l===S.lang));
 render();
});
$("resetBtn").addEventListener("click",()=>{
 if(!confirm(S.lang==="ht"?"Ou vle rekòmanse Modil 12?":S.lang==="fr"?"Voulez-vous recommencer le Module 12 ?":"Restart Module 12?"))return;
 S={lang:S.lang,cur:1,done:Array(NL).fill(false),st:{},tab:"info",biz:freshBiz()};
 for(let i=1;i<=NL;i++)S.st[i]={exDone:false,exText:"",quizAns:Array(3).fill(null),edDone:false};
 persist();render();
});
document.querySelectorAll("#langs button").forEach(x=>x.classList.toggle("on",x.dataset.l===S.lang));
render();
</script>
