 fr:{lead:"Le CPU est le travailleur qui fait tous les calculs. Regardez la photo, puis répondez à la question.",

4:{ht:{lead:"RAM se espas travay tanporè òdinatè a itilize pandan li limen. Louvri onglè youn pa youn pou wè sa k rive.",

   openTab:"Louvri yon Onglè Navigatè +",closeTab:"Fèmen yon Onglè −",
   fullMsg:"RAM ou plen! Ou ka santi òdinatè a vin pi lan kounye a — twòp travay ouvri anmenm tan.",
   tabFb:"Onglè {n} louvri. Chak onglè itilize yon ti pòsyon RAM pandan l ap louvri.",
   closeFb:"Ou fèmen yon onglè — RAM sa a lib kounye a pou lòt travay.",

   yesWrong:"Wi, li disparèt",noRight:"Non, si m te anrejistre l",
   yesFb:"Non se pa vre! Fèmen yon onglè oswa yon aplikasyon jis efase l nan RAM (memwa tanporè). Yon fichye ou te ANREJISTRE rete an sekirite nan Estokaj — se de bagay ki diferan.",
   noFb:"Egzat! RAM se tanporè — li efase lè ou fèmen yon bagay. Estokaj se pèmanan — yon fichye anrejistre rete la menm si ou fèmen tout bagay oswa etenn òdinatè a.",
   welcome:"Klike 'Louvri yon Onglè' plizyè fwa pou wè RAM ou ranpli.",
   done:"Ou konprann kounye a: RAM se espas tanporè k ap ranpli pandan travay, Estokaj se kote fichye ANREJISTRE rete pou tout tan."},
 fr:{lead:"La RAM est l'espace de travail temporaire que l'ordinateur utilise pendant qu'il fonctionne. Ouvrez des onglets un par un pour voir ce qui se passe.",
   objs:["Ouvrir assez d'onglets pour voir la RAM pleine","Apprendre la différence entre RAM et Stockage"],
   openTab:"Ouvrir un Onglet +",closeTab:"Fermer un Onglet −",
   fullMsg:"Votre RAM est pleine ! Vous pouvez sentir l'ordinateur ralentir maintenant — trop de travail ouvert en même temps.",
   tabFb:"Onglet {n} ouvert. Chaque onglet utilise une petite portion de RAM pendant qu'il est ouvert.",
   closeFb:"Vous avez fermé un onglet — cette RAM est libre maintenant pour autre chose.",
   qTrap:"Est-ce que le document que j'ai écrit disparaît aussi quand je ferme l'onglet ?",
   yesWrong:"Oui, il disparaît",noRight:"Non, si je l'ai enregistré",
   yesFb:"Ce n'est pas vrai ! Fermer un onglet ou une application efface juste ce qui était en RAM (mémoire temporaire). Un fichier que vous avez ENREGISTRÉ reste en sécurité dans le Stockage — ce sont deux choses différentes.",
   noFb:"Exact ! La RAM est temporaire — elle s'efface quand vous fermez quelque chose. Le Stockage est permanent — un fichier enregistré reste là même si vous fermez tout ou éteignez l'ordinateur.",
   welcome:"Cliquez « Ouvrir un Onglet » plusieurs fois pour voir votre RAM se remplir.",
   done:"Vous comprenez maintenant : la RAM est l'espace temporaire qui se remplit pendant le travail, le Stockage est où les fichiers ENREGISTRÉS restent pour toujours."},
 en:{lead:"RAM is the temporary working space a computer uses while it runs. Open tabs one by one to see what happens.",
   objs:["Open enough tabs to see RAM fill up","Learn the difference between RAM and Storage"],
   openTab:"Open a Browser Tab +",closeTab:"Close a Tab −",
   fullMsg:"Your RAM is full! You can feel the computer slow down now — too much work open at once.",
   tabFb:"Tab {n} opened. Each tab uses a small portion of RAM while it's open.",
   closeFb:"You closed a tab — that RAM is now free for other work.",
   qTrap:"Does the document I wrote also disappear when I close the tab?",
   yesWrong:"Yes, it disappears",noRight:"No, if I saved it",
   yesFb:"Not true! Closing a tab or app just clears it from RAM (temporary memory). A file you SAVED stays safe in Storage — those are two different things.",
   noFb:"Exactly! RAM is temporary — it clears when you close something. Storage is permanent — a saved file stays there even if you close everything or shut down the computer.",
   welcome:"Click \"Open a Tab\" several times to watch your RAM fill up.",
   done:"Now you understand: RAM is the temporary space that fills up during work, Storage is where SAVED files stay forever."}},

5:{ht:{lead:"Estokaj se kote fichye ou yo rete menm lè òdinatè a etenn. Si estokaj ou prèske plen, òdinatè a ka vin pi lan, ou ka pa kapab enstale oswa mizajou aplikasyon, e ou ka pa kapab anrejistre nouvo fichye ditou. Gade foto a, epi reponn kesyon inite a.",
   objs:["Gade foto estokaj la","Reponn kòrèkteman sou inite kapasite"],
   photoCap:"SSD (Estokaj)",
   q:"1 TB (Teraoktè) = konbyen GB (Gigaoktè), apeprè?",
   opts:["100 GB","~1000 GB","10 GB"],ansIdx:1,
   trapFb:"Pa egzat — ou konfonn eskal la. 1 TB se apeprè 1000 GB, se pa 100 GB. Sa enpòtan pou konprann konbyen espas ou reyèlman genyen.",

   welcome:"Gade foto SSD a, epi reponn kesyon inite kapasite a anba a.",
   done:"Ou konnen kounye a: SSD pi rapid pase HDD, epi 1 TB ≈ 1000 GB — enpòtan pou li yon lis espesifikasyon kòrèkteman."},
 fr:{lead:"Le stockage est là où vos fichiers restent même quand l'ordinateur est éteint. Si votre stockage est presque plein, l'ordinateur peut ralentir, vous pourriez ne plus pouvoir installer ou mettre à jour des applications, et vous pourriez ne plus pouvoir enregistrer de nouveaux fichiers du tout. Regardez la photo, puis répondez à la question sur les unités.",
   objs:["Regarder la photo du stockage","Répondre correctement sur les unités de capacité"],
   photoCap:"SSD (Stockage)",
   q:"1 To (Téraoctet) = combien de Go (Gigaoctets), environ ?",
   opts:["100 Go","~1000 Go","10 Go"],ansIdx:1,
   trapFb:"Pas exact — vous confondez l'échelle. 1 To fait environ 1000 Go, pas 100 Go. C'est important pour comprendre combien d'espace vous avez réellement.",
   badFb:"Pas ça. Réfléchissez encore à l'échelle entre Gigaoctet et Téraoctet.",
   okFb:"Exact ! 1 To ≈ 1000 Go. Le SSD est plus rapide qu'un HDD traditionnel pour la plupart des usages quotidiens.",
   welcome:"Regardez la photo du SSD, puis répondez à la question sur les unités de capacité ci-dessous.",
   done:"Vous savez maintenant : le SSD est plus rapide que le HDD, et 1 To ≈ 1000 Go — important pour bien lire une liste de spécifications."},
 en:{lead:"Storage is where your files stay even when the computer is off. If your storage is nearly full, the computer can slow down, you may not be able to install or update apps, and you may not be able to save new files at all. Look at the photo, then answer the units question.",

   photoCap:"SSD (Storage)",
   q:"1 TB (Terabyte) = how many GB (Gigabytes), approximately?",
   opts:["100 GB","~1000 GB","10 GB"],ansIdx:1,
   trapFb:"Not quite — you're mixing up the scale. 1 TB is about 1000 GB, not 100 GB. That matters for understanding how much space you actually have.",
   badFb:"Not that. Think again about the scale between Gigabyte and Terabyte.",
   okFb:"Exactly! 1 TB ≈ 1000 GB. SSD is faster than a traditional HDD for most everyday use.",
   welcome:"Look at the SSD photo, then answer the capacity units question below.",
   done:"Now you know: SSD is faster than HDD, and 1 TB ≈ 1000 GB — important for reading a specs list correctly."}},

 fr:{lead:"Ce sont les pièces qui vous font voir, entendre, et communiquer avec l'ordinateur. Cliquez sur chacune pour l'identifier.",

   yes:"Vre",no:"Fo",
   yesFb:"Sa se yon mit komen. An reyalite, kite yon aparèy branche tout tan ka fè batri a vyeyi pi vit. Pi bon pratik: debranch li lè li rive 100%, itilize chajè ki kòrèk pou aparèy la, epi pwoteje kont fliktyasyon kouran (Ayiti) ak yon pwotèktè sij oswa yon UPS si posib.",

function persistSim(){try{window.localStorage.setItem(SIM_KEY,JSON.stringify({done:S.done,cur:S.cur,st:S.st}));}catch(e){}}
function loadSim(){try{const raw=window.localStorage.getItem(SIM_KEY);if(!raw)return;const saved=JSON.parse(raw);
 if(Array.isArray(saved.done)&&saved.done.length===NL)S.done=saved.done;
 if(typeof saved.cur==="number"&&saved.cur>=0&&saved.cur<NL)S.cur=saved.cur;
 if(saved.st&&typeof saved.st==="object")S.st=saved.st;
}catch(e){}}
function markModuleComplete(){
 if(!S.done.every(Boolean))return;
 try{
  const raw=window.localStorage.getItem(PROGRESS_KEY);
  const parsed=raw?JSON.parse(raw):[];
  const list=Array.isArray(parsed)?parsed:[];
  let changed=false;
  MOD2_LESSON_SLUGS.forEach(slug=>{if(!list.includes(slug)){list.push(slug);changed=true;}});
  if(changed){
   window.localStorage.setItem(PROGRESS_KEY,JSON.stringify(list));
   window.parent.dispatchEvent(new CustomEvent(PROGRESS_EVENT,{detail:{storageKey:PROGRESS_KEY}}));
  }
 }catch(e){}
 injectContinueModule3();
}

  const tr=$("trapRow");if(tr)tr.addEventListener("click",()=>{st.trapSeen=true;ai(d.trapFb,"warn");tr.classList.add("on");setObj(2);});
 }
 render();
 ai(d.welcome,"neutral");}

/* ---------- lang / reset ---------- */
function applyLang(){document.documentElement.lang=S.lang;$("cs").textContent=UI[S.lang].cs;$("lblProg").textContent=UI[S.lang].prog;$("lblObj").textContent=UI[S.lang].obj;$("aiName").textContent=UI[S.lang].ai;
 renderSidebar();syncProg();load(S.cur);}
$("langs").querySelectorAll("button").forEach(b=>b.addEventListener("click",()=>{S.lang=b.dataset.l;$("langs").querySelectorAll("button").forEach(x=>x.classList.toggle("on",x.dataset.l===S.lang));applyLang();}));
$("resetBtn").addEventListener("click",()=>{S.done=Array(NL).fill(false);S.st={};persistSim();renderSidebar();syncProg();load(S.cur);});
/* init */
loadSim();
applyLang();
</script>
