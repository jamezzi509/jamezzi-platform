<style>
:root{--brand:#4f46e5;--brand2:#3f37c9;--brand-rgb:79,70,229;--ink-900:#0b0f17;--ink-800:#0f1420;--ink-700:#151b28;--ink-600:#1c2434;--ink-500:#273143;
 --edge:#232c3d;--edge2:#2a3346;--text:#e7edf6;--dim:#9aa6b8;--mute:#7c879a;--good:#22c55e;--warn:#e8a13a;--danger:#c42b1c;
 --w-accent:#005FB8;--w-mica:#f3f3f3;--w-content:#fbfbfb;--w-stroke:#e5e5e5;--w-t1:#1b1b1b;--w-t2:#5c5c5c;
 --font:'Inter',-apple-system,system-ui,'Segoe UI',sans-serif;--seg:'Segoe UI Variable Text','Segoe UI',system-ui,sans-serif;}
*{box-sizing:border-box;margin:0;padding:0}html,body{height:100%}
body{font-family:var(--font);color:var(--text);overflow:hidden;-webkit-font-smoothing:antialiased;background:radial-gradient(1100px 500px at 100% -10%,#12203a 0%,transparent 60%),var(--ink-900)}
.app{display:flex;height:100vh}
.side{width:246px;flex:none;background:var(--ink-800);border-right:1px solid #1d2536;display:flex;flex-direction:column}
.brand{display:flex;align-items:center;gap:10px;padding:15px 16px;border-bottom:1px solid #1d2536}
.brand svg{width:25px;height:25px}.brand b{font-size:16px;font-weight:800}.brand .cs{font-size:10.5px;color:var(--mute);text-transform:uppercase;letter-spacing:.04em}
.mods{flex:1;overflow:auto;padding:8px}.mods::-webkit-scrollbar{width:8px}.mods::-webkit-scrollbar-thumb{background:#26304a;border-radius:10px}
.mod .mh{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:9px;font-size:13.5px;color:var(--dim);cursor:pointer}
.mod .mh:hover{background:var(--ink-600)}.mod.active .mh{background:var(--ink-600);color:#fff;font-weight:600}
.mod .num{width:20px;height:20px;border-radius:6px;background:var(--ink-500);color:var(--dim);display:grid;place-items:center;font-size:10.5px;font-weight:700;flex:none}
.mod.active .num{background:var(--brand);color:#fff}.mod .les{display:none;padding:2px 0 6px 8px}.mod.active .les{display:block}
.li{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;font-size:14px;color:var(--mute);cursor:pointer}
.li:hover{background:var(--ink-600);color:var(--dim)}.li.cur{background:rgba(var(--brand-rgb),.12);color:#fff}
.li .dot{width:16px;height:16px;border-radius:50%;border:1.5px solid #46506a;flex:none;display:grid;place-items:center;font-size:9px;color:transparent}
.li.done .dot{background:var(--good);border-color:var(--good);color:#fff}.li .lx{margin-left:auto;font-size:10.5px;color:var(--mute)}
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.top{height:58px;flex:none;display:flex;align-items:center;gap:14px;padding:0 20px;border-bottom:1px solid #1a2231}
.top .mt{font-size:11.5px;color:var(--brand);font-weight:700;text-transform:uppercase;letter-spacing:.05em}.top h1{font-size:18px;font-weight:700}
.langs{margin-left:auto;display:flex;background:var(--ink-700);border:1px solid var(--edge2);border-radius:9px;padding:3px}
.langs button{border:none;background:none;color:var(--dim);font-weight:700;font-size:12.5px;padding:6px 13px;border-radius:6px;cursor:pointer}
.langs button.on{background:var(--brand);color:#fff}
.reset{margin-left:6px;width:32px;height:32px;border-radius:8px;border:1px solid var(--edge2);background:var(--ink-700);color:var(--dim);cursor:pointer}
.wsp{flex:1;min-height:0;display:flex}
.stagewrap{flex:1;min-width:0;padding:16px}
.stage{position:relative;height:100%;width:100%;border-radius:12px;overflow:hidden;box-shadow:0 20px 50px -12px rgba(0,0,0,.5)}
.stage.lab{background:var(--ink-800);border:1px solid var(--edge);overflow:auto;padding:26px 30px}
.stage.desk{background:linear-gradient(160deg,#e6f0fa 0%,#cfe1f3 30%,#a9cdec 62%,#7fb0e4 100%)}
.rail{width:312px;flex:none;border-left:1px solid #1a2231;display:flex;flex-direction:column}
.rs{padding:17px 18px;border-bottom:1px solid #1a2231}
.lbl{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--mute);margin-bottom:9px}
.pr{height:7px;border-radius:6px;background:var(--edge);overflow:hidden;margin-top:12px}.pr>span{display:block;height:100%;width:0;background:var(--good);transition:width .5s}
.prtext{font-size:11.5px;color:var(--mute);margin-top:8px}
.obj{display:flex;gap:10px;font-size:13.5px;margin:10px 0;color:var(--mute)}.obj.d{color:var(--text)}
.obj .bx{width:18px;height:18px;border-radius:50%;border:1px solid #566078;display:grid;place-items:center;font-size:11px;color:transparent;flex:none;margin-top:1px}
.obj.d .bx{background:var(--good);border-color:var(--good);color:#fff}.obj.d .tx{text-decoration:line-through;text-decoration-color:rgba(120,130,150,.55)}
.assist{margin-top:auto;padding:17px}.abox{background:var(--ink-700);border:1px solid var(--edge);border-radius:14px;padding:15px}
.ah{display:flex;align-items:center;gap:9px;margin-bottom:8px}.av{width:30px;height:30px;border-radius:50%;background:rgba(var(--brand-rgb),.18);display:grid;place-items:center;font-size:16px}
.an{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--mute)}.am{font-size:14px;line-height:1.6;color:#dbe2ee;min-height:60px}
/* lab common */
.labhead{max-width:680px}.labtag{display:inline-block;font-size:11.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--brand);background:rgba(var(--brand-rgb),.1);border-radius:999px;padding:5px 12px}
.labh2{font-size:24px;font-weight:800;letter-spacing:-.02em;margin:12px 0 8px}.lablead{color:var(--dim);font-size:15px;line-height:1.6;max-width:640px}
.nextwrap{margin-top:22px;display:flex;gap:12px;align-items:center}
.btn{border:none;border-radius:10px;padding:11px 20px;font-weight:700;font-size:14px;cursor:pointer}
.btn.p{background:var(--brand);color:#fff}.btn.p:hover{background:var(--brand2)}.btn.p:disabled{opacity:.4;cursor:not-allowed}
.btn.g{background:var(--ink-700);border:1px solid var(--edge2);color:var(--text)}
.chip{display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:12px;border:1px solid var(--edge2);background:var(--ink-700);cursor:pointer;font-size:14px;font-weight:600}
.partgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-top:22px}
.partcard{border:1px solid var(--edge2);background:var(--ink-700);border-radius:16px;padding:18px 14px;text-align:center;cursor:pointer;transition:.15s}
.partcard:hover{border-color:var(--brand)}.partcard.sel{outline:2px solid var(--brand);outline-offset:1px}
.partcard.done{border-color:var(--good)}
.partart{height:120px;display:grid;place-items:center;background:#fff;border-radius:12px}.partart svg{max-height:120px;max-width:100%}
.partart img{max-height:100px;max-width:90%;object-fit:contain}
.partn{font-weight:700;font-size:16px;margin-top:12px}.partcard.done .partn::after{content:" ✓";color:var(--good)}
.cats{display:flex;gap:12px;flex-wrap:wrap;margin-top:20px}
.cat{padding:13px 20px;border-radius:12px;border:1px solid var(--edge2);background:var(--ink-700);font-weight:700;font-size:16px;cursor:pointer}
.cat:hover{border-color:var(--brand)}.cat.dis{opacity:.4}
/* icon tiles */
.tileicon{width:24px;height:24px;flex:none}
.tileicon svg{width:24px;height:24px}
/* photo header */
.photohead{background:#fff;border-radius:12px;padding:10px;max-width:420px;margin-top:18px}.photohead img{width:100%;display:block;border-radius:8px}
/* mouse mini-stage (3.1) */
.mstage{position:relative;margin-top:20px;background:var(--ink-700);border:1px solid var(--edge2);border-radius:14px;padding:20px;min-height:220px}
.mtarget{width:120px;height:70px;border-radius:10px;background:var(--brand);color:#fff;display:grid;place-items:center;font-weight:700;font-size:13.5px;cursor:pointer;text-align:center;padding:6px;user-select:none}
.mtarget.done{background:var(--good)}
.mscroll{margin-top:16px;height:90px;overflow-y:auto;background:var(--ink-600);border-radius:10px;padding:8px}
.mscroll div{padding:6px 4px;font-size:13px;color:var(--dim);border-bottom:1px solid var(--edge2)}
.ctxmenu{position:absolute;background:#fff;color:#1b1b1b;border-radius:8px;box-shadow:0 12px 30px rgba(0,0,0,.4);padding:6px;min-width:150px;z-index:20;display:none}
.ctxmenu .ci{padding:9px 12px;font-size:13.5px;border-radius:6px;cursor:pointer}
.ctxmenu .ci:hover{background:#f0f0f0}
.dragrow{display:flex;gap:24px;margin-top:20px;flex-wrap:wrap}
.dragitem{width:90px;height:90px;border-radius:12px;background:var(--ink-700);border:1px solid var(--edge2);display:grid;place-items:center;cursor:pointer;font-size:30px;transition:.15s}
.dragitem.sel{outline:2px solid var(--brand)}.dragitem.moved{opacity:.3;pointer-events:none}
.dragfolder{width:150px;height:110px;border-radius:12px;background:var(--ink-600);border:2px dashed var(--edge2);display:grid;place-items:center;font-size:34px;cursor:pointer}
.dragfolder.over{border-color:var(--brand)}
/* toggle switch (3.11) */
.trow{display:flex;align-items:center;gap:14px;padding:13px 4px;border-bottom:1px solid #eee}
.trow:last-child{border-bottom:none}.trow .tk{flex:1;font-size:14.5px}
.toggle{width:42px;height:24px;border-radius:12px;background:#ccc;position:relative;cursor:pointer;flex:none}
.toggle.on{background:var(--w-accent)}
.toggle .knob{position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#fff;transition:.15s}
.toggle.on .knob{left:20px}
/* windows settings-style panel (inline, no full desktop) */
.winpanel{position:relative;width:min(700px,100%);border-radius:8px;overflow:hidden;background:var(--w-mica);border:1px solid rgba(0,0,0,.28);box-shadow:0 24px 60px -12px rgba(0,0,0,.5);margin-top:20px;font-family:var(--seg);color:var(--w-t1)}
.wtb{height:36px;display:flex;align-items:center;padding-left:14px;background:rgba(255,255,255,.4);font-size:13.5px;font-weight:600}
.wcontent{background:var(--w-content);overflow:auto;padding:20px 26px;max-height:420px}
.wh1{font-size:22px;font-weight:600;margin-bottom:12px}
.aboutcard{border:1px solid var(--w-stroke);border-radius:8px;background:#fff;padding:4px 16px;margin-bottom:14px}
.arow{display:flex;align-items:center;gap:14px;padding:13px 4px;border-bottom:1px solid #eee;cursor:pointer;border-radius:6px}
.arow:last-child{border-bottom:none}.arow:hover{background:#f3f3f3}
.arow .k{font-size:14.5px;flex:1}.arow .ch{color:#8a8a8a;font-size:18px}
.arow.on{background:#e4f0ff}.arow.on .k::after{content:" ✓";color:var(--good);font-weight:700}
/* dialog (3.7) */
.dialog{background:var(--w-mica);border-radius:8px;border:1px solid rgba(0,0,0,.28);box-shadow:0 24px 60px -12px rgba(0,0,0,.5);max-width:420px;margin-top:20px;color:var(--w-t1);font-family:var(--seg)}
.dialog .dtb{padding:14px 16px;font-weight:600;font-size:14.5px;border-bottom:1px solid var(--w-stroke)}
.dialog .dbody{padding:16px}
.dialog .drow{display:flex;align-items:center;gap:10px;font-size:14px;margin-bottom:10px}
.dialog .drow input{width:18px;height:18px}
.dialog .dft{display:flex;justify-content:flex-end;gap:10px;padding:12px 16px;border-top:1px solid var(--w-stroke)}
.dialog .db{padding:8px 16px;border-radius:6px;border:1px solid var(--w-stroke);background:#fff;font-size:13.5px;cursor:pointer;font-weight:600}
.dialog .db.primary{background:var(--w-accent);color:#fff;border-color:var(--w-accent)}
/* ===== windows desktop chrome (3.5 / 3.6) ===== */
.desk-ico{position:absolute;display:flex;flex-direction:column;gap:6px;align-items:center;width:92px;background:none;border:1px solid transparent;border-radius:6px;padding:8px 6px;cursor:pointer;color:#0b2a55}
.desk-ico:hover{background:rgba(255,255,255,.25)}.desk-ico span{font-size:14.5px;text-align:center;text-shadow:0 1px 2px rgba(255,255,255,.5)}
.taskbar{position:absolute;left:0;right:0;bottom:0;height:46px;background:rgba(240,243,247,.82);backdrop-filter:blur(30px);border-top:1px solid rgba(255,255,255,.6);display:flex;align-items:center;justify-content:center;gap:5px}
.tbi{width:38px;height:38px;border-radius:7px;display:grid;place-items:center;cursor:pointer;position:relative}.tbi:hover{background:rgba(0,0,0,.06)}.tbi svg{width:24px;height:24px}
.tbi.openwin::after{content:"";position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:5px;height:5px;border-radius:50%;background:var(--w-accent)}
.tbclock{position:absolute;right:14px;font-size:12.5px;color:#1b1b1b;text-align:right;line-height:1.35}
.hs{position:absolute;width:34px;height:34px;border-radius:50%;background:rgba(var(--brand-rgb),.9);color:#fff;border:2px solid #fff;font-weight:800;cursor:pointer;display:grid;place-items:center;font-size:14px;box-shadow:0 2px 8px rgba(0,0,0,.4)}
.hs.done{background:var(--good)}
.wdesk{position:absolute;border-radius:8px;overflow:hidden;background:var(--w-mica);border:1px solid rgba(0,0,0,.28);box-shadow:0 24px 60px -12px rgba(0,0,0,.5);font-family:var(--seg);color:var(--w-t1)}
.wdesk .wtb2{height:34px;display:flex;align-items:center;padding-left:12px;background:rgba(255,255,255,.5);font-size:13px;font-weight:600}
.wdesk .wtb2 .wc2{margin-left:auto;display:flex}.wdesk .wtb2 .wc2 span{width:38px;height:34px;display:grid;place-items:center;font-size:12px;color:#444;cursor:pointer}
.wdesk .wtb2 .wc2 .cl:hover{background:#c42b1c;color:#fff}
.wdesk .wbody2{padding:18px;font-size:13.5px;color:var(--w-t2)}
.fade{animation:fd .25s ease}@keyframes fd{from{opacity:0;transform:translateY(6px)}to{opacity:1}}
/* ===== Mobile / narrow-screen layout ===== */
@media (max-width:860px){
 body{overflow-y:auto}
 .app{flex-direction:column;height:auto;min-height:100vh}
 .side{width:100%;max-height:180px;border-right:none;border-bottom:1px solid #1d2536}
 .brand{padding:12px 14px}
 .mods{padding:6px}
 .top{height:auto;flex-wrap:wrap;padding:10px 14px;gap:8px}
 .top h1{font-size:16px}
 .langs{margin-left:0}
 .wsp{flex-direction:column}
 .stagewrap{padding:12px}
 .stage{height:min(78vh,620px)}
 .rail{width:100%;border-left:none;border-top:1px solid #1a2231}
 .partgrid{grid-template-columns:repeat(2,1fr)}
 #nextBtn{top:14px!important;bottom:auto!important;right:14px!important}
}
@media (max-width:480px){
 .partgrid{grid-template-columns:1fr 1fr;gap:12px}
 .cats{gap:8px}.cat{padding:11px 14px;font-size:14px}
 .dragrow{gap:14px}
}
</style>

function persistSim(){try{window.localStorage.setItem(SIM_KEY,JSON.stringify({done:S.done,cur:S.cur,st:S.st}));}catch(e){}}
function loadSim(){try{const raw=window.localStorage.getItem(SIM_KEY);if(!raw)return;const saved=JSON.parse(raw);
 if(Array.isArray(saved.done)&&saved.done.length===NL)S.done=saved.done;
 if(typeof saved.cur==="number"&&saved.cur>=0&&saved.cur<NL)S.cur=saved.cur;
 if(saved.st&&typeof saved.st==="object")S.st=saved.st;
}catch(e){}}
function markModuleComplete(){
 if(!S.done.every(Boolean))return;
 try{
  const raw=window.localStorage.getItem(PROGRESS_KEY);
  const parsed=raw?JSON.parse(raw):[];
  const list=Array.isArray(parsed)?parsed:[];
  let changed=false;
  MOD3_LESSON_SLUGS.forEach(slug=>{if(!list.includes(slug)){list.push(slug);changed=true;}});
  if(changed){
   window.localStorage.setItem(PROGRESS_KEY,JSON.stringify(list));
   window.parent.dispatchEvent(new CustomEvent(PROGRESS_EVENT,{detail:{storageKey:PROGRESS_KEY}}));
  }
 }catch(e){}
 injectContinueModule4();
}
function injectContinueModule4(){
 if($("continueModule4"))return;
 const a=document.createElement("a");a.id="continueModule4";a.className="btn p";a.textContent=UI[S.lang].nextModule;
 a.href="/academy/courses/computer-internet-essentials/learn/"+MODULE_FIRST_LESSON[3];a.target="_top";
 a.style.cssText="display:inline-block;margin-top:18px;text-decoration:none";
 $("stage").appendChild(a);
}
function renderSidebar(){const box=$("mods");box.innerHTML="";MODULES[S.lang].forEach((t,mi)=>{const active=mi===2;
 let les="";if(active){les='<div class="les">'+M3[S.lang].map((lt,li)=>'<div class="li'+(S.done[li]?" done":"")+(li===S.cur?" cur":"")+'" data-les="'+li+'"><span class="dot">✓</span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+lt+'</span><span class="lx">3.'+(li+1)+'</span></div>').join("")+'</div>';}
 const m=document.createElement("div");m.className="mod"+(active?" active":"");
 const label='<span class="num">'+(mi+1)+'</span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+t+'</span>';
 const mh=active?'<div class="mh">'+label+'</div>':'<a class="mh" href="/academy/courses/computer-internet-essentials/learn/'+MODULE_FIRST_LESSON[mi]+'" target="_top" style="text-decoration:none;color:inherit">'+label+'</a>';
 m.innerHTML=mh+les;box.appendChild(m);});
 box.querySelectorAll("[data-les]").forEach(el=>el.addEventListener("click",()=>load(+el.dataset.les)));}
function renderObj(){const defs=objsFor(S.cur),st=S.st[S.cur]||{};const box=$("objList");box.innerHTML="";
 defs.forEach((d,i)=>{const done=(st.obj||[])[i];const el=document.createElement("div");el.className="obj"+(done?" d":"");el.innerHTML='<span class="bx">✓</span><span class="tx">'+d+'</span>';box.appendChild(el);});}

 const defs=objsFor(S.cur);if(defs.length&&st.obj.filter(Boolean).length>=defs.length)finishLesson();}
function finishLesson(){if(!S.done[S.cur]){S.done[S.cur]=true;renderSidebar();syncProg();persistSim();}const b=$("nextBtn");if(b){b.disabled=false;}

function wireNext(){const n=$("nextBtn");if(n)n.addEventListener("click",()=>load(Math.min(NL-1,S.cur+1)));}

function injectNext(){const done=S.done[S.cur];const b=document.createElement("button");b.className="btn p";b.id="nextBtn";b.textContent=UI[S.lang].next;b.disabled=!done;

 function render(){

   (!st.open?'<div style="margin-top:18px"><button class="btn p" id="openBtn">'+d.openBtn+'</button></div>':
   '<div class="dialog"><div class="dtb">'+d.dtitle+'</div><div class="dbody"><p style="margin-bottom:12px">'+d.dtext+'</p>'+
    '<div class="drow"><input type="checkbox" id="bloatCheck" '+(st.checked?"checked":"")+'><label for="bloatCheck">'+d.dcheck+'</label></div>'+
    '</div><div class="dft"><button class="db" id="dCancel">'+d.dcancel+'</button><button class="db primary" id="dInstall">'+d.dinstall+'</button></div></div>')+nextBar();
  wireNext();

function L8(){const d=C[8][S.lang];const st=S.st[7];st.clip="";st.pasted="";st.cutDone=false;st.trapAnswered=false;
 const stage=$("stage");stage.className="stage lab";
 function render(){
  stage.innerHTML=labHead(7,d.lead)+
   '<div style="margin-top:18px;padding:14px;background:var(--ink-700);border-radius:10px;max-width:460px"><b>'+d.src+'</b></div>'+
   '<div style="display:flex;gap:10px;margin-top:12px"><button class="btn g" id="copyBtn">'+d.copyBtn+'</button><button class="btn g" id="cutBtn">'+d.cutBtn+'</button></div>'+
   '<div style="margin-top:18px;font-size:13px;color:var(--dim)">'+d.dst+'</div>'+
   '<div style="margin-top:6px;padding:14px;background:var(--ink-700);border-radius:10px;min-height:24px;max-width:460px">'+st.pasted+'</div>'+
   '<button class="btn p" id="pasteBtn" style="margin-top:12px" '+(st.clip?"":"disabled")+'>'+d.pasteBtn+'</button>'+
   '<div style="margin-top:22px;font-weight:700;font-size:15.5px">'+d.trapQ+'</div>'+
   '<div class="cats"><button class="cat" id="tqWrong">'+d.trapWrong+'</button><button class="cat" id="tqRight">'+d.trapRight+'</button></div>'+nextBar();
  wireNext();
  $("copyBtn").addEventListener("click",()=>{st.clip=d.src;ai(d.copyFb,"good");render();});
  $("cutBtn").addEventListener("click",()=>{st.clip=d.src;st.cutDone=true;ai(d.cutFb,"warn");render();});
  const pb=$("pasteBtn");if(!pb.disabled)pb.addEventListener("click",()=>{st.pasted=st.clip;setObj(0);ai(d.pasteFb,"good");render();});
  $("tqWrong").addEventListener("click",()=>{if(st.trapAnswered)return;st.trapAnswered=true;ai(d.trapWrongFb,"warn");setObj(1);});
  $("tqRight").addEventListener("click",()=>{if(st.trapAnswered)return;st.trapAnswered=true;ai(d.trapRightFb,"good");setObj(1);});
 }
 render();
 ai(d.welcome,"neutral");}

function L9(){const d=C[9][S.lang];const st=S.st[8];st.sel=false;st.moved=false;st.wrongMoved=false;
 const stage=$("stage");stage.className="stage lab";
 function render(){
  stage.innerHTML=labHead(8,d.lead)+
   '<div class="dragrow">'+
    (!st.moved&&!st.wrongMoved?'<div class="dragitem'+(st.sel?" sel":"")+'" id="fileItem" style="font-size:34px">'+d.file.split(" ")[0]+'</div>':'<div class="dragitem moved" style="font-size:34px">'+d.file.split(" ")[0]+'</div>')+
    '<div class="dragfolder" id="folderGood">'+d.folder+'</div>'+
    '<div class="dragfolder" id="folderWrong">'+d.wrongFolder+'</div>'+
   '</div>'+
   (st.wrongMoved?'<button class="btn g" id="undoBtn" style="margin-top:16px">'+d.undoBtn+'</button>':"")+
   nextBar();
  wireNext();
  const fi=$("fileItem");
  if(fi)fi.addEventListener("click",()=>{st.sel=!st.sel;render();});
  $("folderGood").addEventListener("click",()=>{if(!st.sel||st.moved)return;st.moved=true;st.sel=false;ai(d.moveFb,"good");setObj(0);render();});
  $("folderWrong").addEventListener("click",()=>{if(!st.sel||st.moved||st.wrongMoved)return;st.wrongMoved=true;st.sel=false;ai(d.wrongMoveFb,"warn");render();});
  const ub=$("undoBtn");if(ub)ub.addEventListener("click",()=>{st.wrongMoved=false;ai(d.undoFb,"good");setObj(1);render();});
 }
 render();
 ai(d.welcome,"neutral");}

function L10(){const d=C[10][S.lang];const st=S.st[9];st.answered=false;st.found=false;
 const stage=$("stage");stage.className="stage lab";
 stage.innerHTML=labHead(9,d.lead)+
  '<div style="margin-top:18px;max-width:420px"><input id="searchBox" placeholder="'+d.searchLbl+'" style="width:100%;padding:12px 16px;border-radius:10px;border:1px solid var(--edge2);background:var(--ink-700);color:var(--text);font-size:15px"/></div>'+
  '<div id="searchResult" style="margin-top:14px;font-size:14px;color:var(--dim)"></div>'+
  '<div style="margin-top:22px;font-weight:700;font-size:15.5px">'+d.trapQ+'</div>'+
  '<div class="cats"><button class="cat" id="tqWrong">'+d.trapWrong+'</button><button class="cat" id="tqRight">'+d.trapRight+'</button></div>'+nextBar();
 wireNext();
 $("searchBox").addEventListener("input",e=>{const v=e.target.value.trim().toLowerCase();
  const match=d.examples.find(ex=>v.length>1&&(ex[0].toLowerCase().includes(v)||v.includes(ex[0].toLowerCase())));
  if(match){$("searchResult").textContent="🔎 "+match[1];if(!st.found){st.found=true;setObj(0);ai(d.foundFb.replace("{app}",match[1]),"good");}}
  else{$("searchResult").textContent="";}});
 $("tqWrong").addEventListener("click",()=>{if(st.answered)return;st.answered=true;ai(d.trapWrongFb,"warn");setObj(1);});
 $("tqRight").addEventListener("click",()=>{if(st.answered)return;st.answered=true;ai(d.trapRightFb,"good");setObj(1);});
 ai(d.welcome,"neutral");}

function L11(){const d=C[11][S.lang];const st=S.st[10];st.open=false;st.toggled=st.toggled||{};st.trapSeen=false;
 const stage=$("stage");stage.className="stage lab";
 function render(){
  stage.innerHTML=labHead(10,d.lead)+
   (!st.open?'<div style="margin-top:18px"><button class="btn p" id="openBtn">'+d.openBtn+'</button></div>':
   '<div class="winpanel"><div class="wtb">⚙️ Paramèt</div><div class="wcontent">'+
    d.rows.map((r,k)=>'<div class="trow"><span class="tk">'+r+'</span><div class="toggle'+(st.toggled[k]?" on":"")+'" data-t="'+k+'"><div class="knob"></div></div></div>').join("")+
    '<div class="trow" style="border-top:2px dashed #ddd;margin-top:8px;padding-top:14px"><span class="tk">'+d.trapRow+'</span><div class="toggle'+(st.trapSeen?" on":"")+'" id="trapToggle"><div class="knob"></div></div></div>'+
   '</div></div>')+nextBar();
  wireNext();
  const ob=$("openBtn");if(ob)ob.addEventListener("click",()=>{st.open=true;setObj(0);render();});
  stage.querySelectorAll(".toggle[data-t]").forEach(t=>t.addEventListener("click",()=>{const k=+t.dataset.t;st.toggled[k]=!st.toggled[k];
   if(Object.keys(st.toggled).filter(x=>st.toggled[x]).length===1)ai(d.toggleFb,"good");
   if(Object.values(st.toggled).filter(Boolean).length>=3)setObj(1);render();}));
  const tt=$("trapToggle");if(tt)tt.addEventListener("click",()=>{st.trapSeen=true;ai(d.trapFb,"warn");setObj(2);render();});
 }
 render();
 ai(d.welcome,"neutral");}

function L14(){const d=C[14][S.lang];const st=S.st[13];st.done5=st.done5||{};
 const stage=$("stage");stage.className="stage lab";
 stage.innerHTML=labHead(13,d.lead)+'<div class="items">'+d.steps.map((s,k)=>'<div class="chip" data-s="'+k+'"'+(st.done5[k]?' style="opacity:.4"':"")+'>'+(st.done5[k]?"✓ ":"")+s+'</div>').join("")+'</div>'+nextBar();

 stage.querySelectorAll(".chip[data-s]").forEach(c=>c.addEventListener("click",()=>{const k=+c.dataset.s;if(st.done5[k])return;st.done5[k]=true;

/* ---------- lang / reset ---------- */
function applyLang(){document.documentElement.lang=S.lang;$("cs").textContent=UI[S.lang].cs;$("lblProg").textContent=UI[S.lang].prog;$("lblObj").textContent=UI[S.lang].obj;$("aiName").textContent=UI[S.lang].ai;
 renderSidebar();syncProg();load(S.cur);}
$("langs").querySelectorAll("button").forEach(b=>b.addEventListener("click",()=>{S.lang=b.dataset.l;$("langs").querySelectorAll("button").forEach(x=>x.classList.toggle("on",x.dataset.l===S.lang));applyLang();}));
$("resetBtn").addEventListener("click",()=>{S.done=Array(NL).fill(false);S.st={};persistSim();renderSidebar();syncProg();load(S.cur);});
/* init */
loadSim();
applyLang();
</script>
