const MODULE_FIRST_LESSON=["byenveni-ou-pa-pral-kraze-anyen","sa-ki-rive-le-ou-peze-bouton-pouvwa-a","konfyans-souri-ak-trackpad","kisa-yon-fichye-ye","kisa-yon-aplikasyon-ye","kisa-ki-se-entenet-la","navigate-mote-rechech-sit-web-ak-paj-web","kijan-imel-mache","","po-ak-konekte","kisa-ki-bezwen-pwoteje","anvan-ou-achte-kominse-ak-travay-la","panse-tankou-yon-moun-ki-rezoud-pwoblem","bati-yon-sistem-oganizasyon-dijital-senp"];
function persistSim(){try{window.localStorage.setItem(SIM_KEY,JSON.stringify({done:S.done,cur:S.cur,st:S.st}));}catch(e){}}
function loadSim(){try{const raw=window.localStorage.getItem(SIM_KEY);if(!raw)return;const saved=JSON.parse(raw);
 if(Array.isArray(saved.done)&&saved.done.length===NL)S.done=saved.done;
 if(typeof saved.cur==="number"&&saved.cur>=0&&saved.cur<NL)S.cur=saved.cur;
 if(saved.st&&typeof saved.st==="object")S.st=saved.st;
}catch(e){}}
function markModuleComplete(){
 if(!S.done.every(Boolean))return;
 try{
  const raw=window.localStorage.getItem(PROGRESS_KEY);
  const parsed=raw?JSON.parse(raw):[];
  const list=Array.isArray(parsed)?parsed:[];
  let changed=false;
  MOD9_LESSON_SLUGS.forEach(slug=>{if(!list.includes(slug)){list.push(slug);changed=true;}});
  if(changed){
   window.localStorage.setItem(PROGRESS_KEY,JSON.stringify(list));
   window.parent.dispatchEvent(new CustomEvent(PROGRESS_EVENT,{detail:{storageKey:PROGRESS_KEY}}));
  }
 }catch(e){}
 injectContinueModule10();
}
function injectContinueModule10(){
 if($("continueModule10"))return;
 const a=document.createElement("a");a.id="continueModule10";a.className="btn p";a.textContent=UI[S.lang].nextModule;
 a.href="/academy/courses/computer-internet-essentials/learn/"+MODULE_FIRST_LESSON[9];a.target="_top";
 a.style.cssText="display:inline-block;margin-top:18px;text-decoration:none";
 $("stage").appendChild(a);
}
function renderSidebar(){const box=$("mods");box.innerHTML="";MODULES[S.lang].forEach((t,mi)=>{const active=mi===8;
 let les="";if(active){les='<div class="les">'+M9[S.lang].map((lt,li)=>'<div class="li'+(S.done[li]?" done":"")+(li===S.cur?" cur":"")+'" data-les="'+li+'"><span class="dot">✓</span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+lt+'</span><span class="lx">9.'+(li+1)+'</span></div>').join("")+'</div>';}
 const m=document.createElement("div");m.className="mod"+(active?" active":"");
 const label='<span class="num">'+(mi+1)+'</span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+t+'</span>';
 const mh=active?'<div class="mh">'+label+'</div>':'<a class="mh" href="/academy/courses/computer-internet-essentials/learn/'+MODULE_FIRST_LESSON[mi]+'" target="_top" style="text-decoration:none;color:inherit">'+label+'</a>';
 m.innerHTML=mh+les;box.appendChild(m);});
 box.querySelectorAll("[data-les]").forEach(el=>el.addEventListener("click",()=>load(+el.dataset.les)));}
function renderObj(){const defs=objsFor(S.cur),st=S.st[S.cur]||{};const box=$("objList");box.innerHTML="";
 defs.forEach((d,i)=>{const done=(st.obj||[])[i];const el=document.createElement("div");el.className="obj"+(done?" d":"");el.innerHTML='<span class="bx">✓</span><span class="tx">'+d+'</span>';box.appendChild(el);});}
function setObj(i){const st=S.st[S.cur]||(S.st[S.cur]={});st.obj=st.obj||[];if(st.obj[i])return;st.obj[i]=true;renderObj();
 const defs=objsFor(S.cur);if(defs.length&&st.obj.filter(Boolean).length>=defs.length)finishLesson();}
function finishLesson(){if(!S.done[S.cur]){S.done[S.cur]=true;renderSidebar();syncProg();persistSim();}const b=$("nextBtn");if(b){b.disabled=false;}
 if(S.cur===NL-1)markModuleComplete();}
function syncProg(){const n=S.done.filter(Boolean).length;$("prog").style.width=Math.round(n/NL*100)+"%";$("progText").textContent=n+" / "+NL;}
function nextBar(){const done=S.done[S.cur];return '<div class="nextwrap"><button class="btn p" id="nextBtn" '+(done?"":"disabled")+'>'+UI[S.lang].next+'</button></div>';}
function wireNext(){const n=$("nextBtn");if(n)n.addEventListener("click",()=>load(Math.min(NL-1,S.cur+1)));}

function load(i){S.cur=i;renderSidebar();$("topTag").textContent="Modil 9 · 9."+(i+1);$("topTitle").textContent=M9[S.lang][i];renderObj();
 const st=S.st[i]||(S.st[i]={});st.obj=st.obj||[];
 const fn=[L1,L2,L3,L4,L5,L6,L7,L8,L9][i];fn();
 persistSim();
 if(i===NL-1&&S.done[NL-1])markModuleComplete();}

/* ---------- renderers ---------- */
function labHead(i,lead){return '<div class="labhead fade"><span class="labtag">Modil 9 · 9.'+(i+1)+'</span><div class="labh2">'+M9[S.lang][i]+'</div><p class="lablead">'+lead+'</p></div>';}

function L1(){const d=C[1][S.lang];const st=S.st[0];st.local=false;st.cloud=false;st.answered=false;
 const stage=$("stage");stage.className="stage lab";
 stage.innerHTML=labHead(0,d.lead)+'<div class="partgrid" style="grid-template-columns:repeat(2,200px)">'+
   '<div class="partcard" id="localCard"><div class="partart">'+d.local[0]+'</div><div class="partn">'+d.local[1]+'</div></div>'+
   '<div class="partcard" id="cloudCard"><div class="partart">'+d.cloud[0]+'</div><div class="partn">'+d.cloud[1]+'</div></div>'+
  '</div>'+
  '<div style="margin-top:22px;font-weight:700;font-size:15.5px">'+d.trapQ+'</div>'+
  '<div class="cats"><button class="cat" id="tqYes">'+d.yes+'</button><button class="cat" id="tqNo">'+d.no+'</button></div>'+nextBar();
 wireNext();
 function check(){if(st.local&&st.cloud)setObj(0);}
 $("localCard").addEventListener("click",()=>{if(st.local)return;st.local=true;$("localCard").classList.add("done");ai(d.local[2],"neutral");check();});
 $("cloudCard").addEventListener("click",()=>{if(st.cloud)return;st.cloud=true;$("cloudCard").classList.add("done");ai(d.cloud[2],"neutral");check();});
 $("tqYes").addEventListener("click",()=>{if(st.answered)return;st.answered=true;ai(d.yesFb,"warn");setObj(1);});
 $("tqNo").addEventListener("click",()=>{if(st.answered)return;st.answered=true;ai(d.noFb,"good");setObj(1);});
 ai(d.welcome,"neutral");}

function L2(){const d=C[2][S.lang];const st=S.st[1];st.deleted=false;st.answered=false;
 const stage=$("stage");stage.className="stage lab";
 function render(){
  stage.innerHTML=labHead(1,d.lead)+'<div class="panel"><div class="ptb">☁️ Sync</div><div class="pbody">'+
    (!st.deleted?'<div style="font-weight:600;margin-bottom:10px">📄 '+d.fileTitle+' <span style="color:var(--w-t2);font-weight:400;font-size:12px">(lokal + cloud)</span></div><button class="btn p" id="deleteBtn">'+d.deleteBtn+'</button>':
     '<div style="color:var(--danger);font-weight:600">✗ '+d.fileTitle+' — efase lokal EPI nan cloud</div>')+
   '</div></div>'+
   '<div style="margin-top:22px;font-weight:700;font-size:15.5px">'+d.trapQ+'</div>'+
   '<div class="cats"><button class="cat" id="tqWrong">'+d.trapWrong+'</button><button class="cat" id="tqRight">'+d.trapRight+'</button></div>'+nextBar();
  wireNext();
  const db=$("deleteBtn");if(db)db.addEventListener("click",()=>{st.deleted=true;ai(d.deleteFb,"warn");setObj(0);render();});
  $("tqWrong").addEventListener("click",()=>{if(st.answered)return;st.answered=true;ai(d.trapWrongFb,"warn");setObj(1);render();});
  $("tqRight").addEventListener("click",()=>{if(st.answered)return;st.answered=true;ai(d.trapRightFb,"good");setObj(1);render();});
 }
 render();
 ai(d.welcome,"neutral");}

function L3(){const d=C[3][S.lang];const st=S.st[2];st.uploaded=false;st.downloaded=false;st.answered=false;
 const stage=$("stage");stage.className="stage lab";
 stage.innerHTML=labHead(2,d.lead)+'<div style="display:flex;gap:10px;margin-top:18px"><button class="btn g" id="uploadBtn">'+d.uploadBtn+'</button><button class="btn g" id="downloadBtn">'+d.downloadBtn+'</button></div>'+
  '<div style="margin-top:22px;font-weight:700;font-size:15.5px">'+d.trapQ+'</div>'+
  '<div class="cats"><button class="cat" id="tqWrong">'+d.trapWrong+'</button><button class="cat" id="tqRight">'+d.trapRight+'</button></div>'+nextBar();
 wireNext();
 function check(){if(st.uploaded&&st.downloaded)setObj(0);}
 $("uploadBtn").addEventListener("click",()=>{if(!st.uploaded){st.uploaded=true;ai(d.uploadFb,"good");check();}});
 $("downloadBtn").addEventListener("click",()=>{if(!st.downloaded){st.downloaded=true;ai(d.downloadFb,"good");check();}});
 $("tqWrong").addEventListener("click",()=>{if(st.answered)return;st.answered=true;ai(d.trapWrongFb,"warn");setObj(1);});
 $("tqRight").addEventListener("click",()=>{if(st.answered)return;st.answered=true;ai(d.trapRightFb,"good");setObj(1);});
 ai(d.welcome,"neutral");}

function L4(){const d=C[4][S.lang];const st=S.st[3];st.viewer=false;st.editor=false;st.answered=false;
 const stage=$("stage");stage.className="stage lab";
 stage.innerHTML=labHead(3,d.lead)+'<div style="display:flex;gap:10px;margin-top:18px"><button class="btn g" id="viewerBtn">'+d.viewerBtn+'</button><button class="btn g" id="editorBtn">'+d.editorBtn+'</button></div>'+
  '<div class="panel" style="margin-top:16px"><div class="pbody" style="display:flex;align-items:center;justify-content:space-between"><span>'+d.publicToggle+'</span><div class="toggle" id="pubToggle"></div></div></div>'+
  '<div style="margin-top:22px;font-weight:700;font-size:15.5px">'+d.trapQ+'</div>'+
  '<div class="cats"><button class="cat" id="tqWrong">'+d.trapWrong+'</button><button class="cat" id="tqRight">'+d.trapRight+'</button></div>'+nextBar();
 wireNext();
 function check(){if(st.viewer&&st.editor)setObj(0);}
 $("viewerBtn").addEventListener("click",()=>{if(!st.viewer){st.viewer=true;ai(d.viewerFb,"neutral");check();}});
 $("editorBtn").addEventListener("click",()=>{if(!st.editor){st.editor=true;ai(d.editorFb,"neutral");check();}});
 $("pubToggle").addEventListener("click",()=>{$("pubToggle").classList.toggle("on");});
 $("tqWrong").addEventListener("click",()=>{if(st.answered)return;st.answered=true;ai(d.trapWrongFb,"warn");setObj(1);});
 $("tqRight").addEventListener("click",()=>{if(st.answered)return;st.answered=true;ai(d.trapRightFb,"good");setObj(1);});
 ai(d.welcome,"neutral");}

function L5(){const d=C[5][S.lang];const st=S.st[4];st.loc1=false;st.loc2=false;st.tested=false;st.answered=false;
 const stage=$("stage");stage.className="stage lab";
 stage.innerHTML=labHead(4,d.lead)+'<div class="partgrid" style="grid-template-columns:repeat(2,220px)">'+
   '<div class="partcard" id="loc1Card"><div class="partart">💻</div><div class="partn">'+d.loc1+'</div></div>'+
   '<div class="partcard" id="loc2Card"><div class="partart">💾</div><div class="partn">'+d.loc2+'</div></div>'+
  '</div>'+
  '<div style="margin-top:18px"><button class="btn g" id="testBtn">'+d.testBtn+'</button></div>'+
  '<div style="margin-top:22px;font-weight:700;font-size:15.5px">'+d.trapQ+'</div>'+
  '<div class="cats"><button class="cat" id="tqWrong">'+d.trapWrong+'</button><button class="cat" id="tqRight">'+d.trapRight+'</button></div>'+nextBar();
 wireNext();
 function check(){if(st.loc1&&st.loc2)setObj(0);}
 $("loc1Card").addEventListener("click",()=>{if(st.loc1)return;st.loc1=true;$("loc1Card").classList.add("done");ai(d.loc1Fb,"neutral");check();});
 $("loc2Card").addEventListener("click",()=>{if(st.loc2)return;st.loc2=true;$("loc2Card").classList.add("done");ai(d.loc2Fb,"neutral");check();});
 $("testBtn").addEventListener("click",()=>{if(st.tested)return;st.tested=true;ai(d.testFb,"good");setObj(1);});
 $("tqWrong").addEventListener("click",()=>{ai(d.trapWrongFb,"warn");});
 $("tqRight").addEventListener("click",()=>{ai(d.trapRightFb,"good");});
 ai(d.welcome,"neutral");}

function L6(){const d=C[6][S.lang];const st=S.st[5];st.seen=st.seen||{};st.answered=false;
 const stage=$("stage");stage.className="stage lab";
 stage.innerHTML=labHead(5,d.lead)+'<div class="partgrid" style="grid-template-columns:repeat(3,180px)">'+d.methods.map((m,k)=>'<div class="partcard" data-k="'+k+'"><div class="partart">'+m[0]+'</div><div class="partn">'+m[1]+'</div></div>').join("")+'</div>'+
  '<div style="margin-top:22px;font-weight:700;font-size:15.5px">'+d.trapQ+'</div>'+
  '<div class="cats"><button class="cat" id="tqWrong">'+d.trapWrong+'</button><button class="cat" id="tqRight">'+d.trapRight+'</button></div>'+nextBar();
 wireNext();
 stage.querySelectorAll(".partcard[data-k]").forEach(c=>c.addEventListener("click",()=>{const k=+c.dataset.k;
  if(!st.seen[k]){st.seen[k]=true;c.classList.add("done");ai(d.methods[k][2],"neutral");}
  if(Object.keys(st.seen).length>=3)setObj(0);}));
 $("tqWrong").addEventListener("click",()=>{if(st.answered)return;st.answered=true;ai(d.trapWrongFb,"warn");setObj(1);});
 $("tqRight").addEventListener("click",()=>{if(st.answered)return;st.answered=true;ai(d.trapRightFb,"good");setObj(1);});
 ai(d.welcome,"neutral");}

function L7(){const d=C[7][S.lang];const st=S.st[6];st.imported=false;st.albumed=false;st.answered=false;
 const stage=$("stage");stage.className="stage lab";
 stage.innerHTML=labHead(6,d.lead)+'<div style="display:flex;gap:10px;margin-top:18px;flex-wrap:wrap"><button class="btn g" id="importBtn">'+d.importBtn+'</button><button class="btn g" id="albumBtn">'+d.albumBtn+'</button></div>'+
  '<div style="margin-top:22px;font-weight:700;font-size:15.5px">'+d.trapQ+'</div>'+
  '<div class="cats"><button class="cat" id="tqWrong">'+d.trapWrong+'</button><button class="cat" id="tqRight">'+d.trapRight+'</button></div>'+nextBar();
 wireNext();
 function check(){if(st.imported&&st.albumed)setObj(0);}
 $("importBtn").addEventListener("click",()=>{if(!st.imported){st.imported=true;ai(d.importFb,"neutral");check();}});
 $("albumBtn").addEventListener("click",()=>{if(!st.albumed){st.albumed=true;ai(d.albumFb,"neutral");check();}});
 $("tqWrong").addEventListener("click",()=>{if(st.answered)return;st.answered=true;ai(d.trapWrongFb,"warn");setObj(1);});
 $("tqRight").addEventListener("click",()=>{if(st.answered)return;st.answered=true;ai(d.trapRightFb,"good");setObj(1);});
 ai(d.welcome,"neutral");}

function L8(){const d=C[8][S.lang];const st=S.st[7];st.cleaned=st.cleaned||{};st.trapSeen=false;
 const stage=$("stage");stage.className="stage lab";
 stage.innerHTML=labHead(7,d.lead)+'<div class="barchart">'+d.cats.map((c,k)=>'<div class="barrow" data-k="'+k+'"><span class="bl">'+c[0]+'</span><div class="btrack"><div class="bfill" style="width:'+(k===3?90:60)+'%;background:'+c[2]+'"></div></div><span>'+c[1]+'</span></div>').join("")+'</div>'+nextBar();
 wireNext();
 stage.querySelectorAll(".barrow[data-k]").forEach(r=>r.addEventListener("click",()=>{const k=+r.dataset.k;
  if(k===3){if(!st.trapSeen){st.trapSeen=true;ai(d.trapFb,"warn");setObj(1);}return;}
  if(!st.cleaned[k]){st.cleaned[k]=true;ai(d.cleanFb,"good");if(Object.keys(st.cleaned).length>=3)setObj(0);}
 }));
 ai(d.welcome,"neutral");}

function L9(){const d=C[9][S.lang];const st=S.st[8];st.done4=st.done4||{};
 const stage=$("stage");stage.className="stage lab";
 stage.innerHTML=labHead(8,d.lead)+'<div class="items" style="display:flex;flex-wrap:wrap;gap:10px;margin-top:18px">'+d.steps.map((s,k)=>'<div class="chip" data-s="'+k+'"'+(st.done4[k]?' style="opacity:.4"':"")+'>'+(st.done4[k]?"✓ ":"")+s+'</div>').join("")+'</div>'+nextBar();
 wireNext();
 stage.querySelectorAll(".chip[data-s]").forEach(c=>c.addEventListener("click",()=>{const k=+c.dataset.s;if(st.done4[k])return;st.done4[k]=true;
  ai(d.stepFb,"good");setObj(k);c.style.opacity=".4";c.innerHTML="✓ "+d.steps[k];}));
 ai(d.welcome,"neutral");}

/* ---------- lang / reset ---------- */
function applyLang(){document.documentElement.lang=S.lang;$("cs").textContent=UI[S.lang].cs;$("lblProg").textContent=UI[S.lang].prog;$("lblObj").textContent=UI[S.lang].obj;$("aiName").textContent=UI[S.lang].ai;
 renderSidebar();syncProg();load(S.cur);}
$("langs").querySelectorAll("button").forEach(b=>b.addEventListener("click",()=>{S.lang=b.dataset.l;$("langs").querySelectorAll("button").forEach(x=>x.classList.toggle("on",x.dataset.l===S.lang));applyLang();}));
$("resetBtn").addEventListener("click",()=>{S.done=Array(NL).fill(false);S.st={};persistSim();renderSidebar();syncProg();load(S.cur);});
/* init */
loadSim();
applyLang();
</script>
</body>
