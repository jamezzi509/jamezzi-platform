 fr:{lead:"Le bien-être numérique inclut les notifications, les pauses, et savoir que l'urgence émotionnelle est un signe de manipulation.",

   trapQ:"Is a message that makes you feel strong emotional urgency/fear always a sign you should react immediately?",

function persistSim(){try{window.localStorage.setItem(SIM_KEY,JSON.stringify({done:S.done,cur:S.cur,st:S.st}));}catch(e){}}
function loadSim(){try{const raw=window.localStorage.getItem(SIM_KEY);if(!raw)return;const saved=JSON.parse(raw);
 if(Array.isArray(saved.done)&&saved.done.length===NL)S.done=saved.done;
 if(typeof saved.cur==="number"&&saved.cur>=0&&saved.cur<NL)S.cur=saved.cur;
 if(saved.st&&typeof saved.st==="object")S.st=saved.st;
}catch(e){}}
function markModuleComplete(){
 if(!S.done.every(Boolean))return;
 try{
  const raw=window.localStorage.getItem(PROGRESS_KEY);
  const parsed=raw?JSON.parse(raw):[];
  const list=Array.isArray(parsed)?parsed:[];
  let changed=false;
  MOD14_LESSON_SLUGS.forEach(slug=>{if(!list.includes(slug)){list.push(slug);changed=true;}});
  if(changed){
   window.localStorage.setItem(PROGRESS_KEY,JSON.stringify(list));
   window.parent.dispatchEvent(new CustomEvent(PROGRESS_EVENT,{detail:{storageKey:PROGRESS_KEY}}));
  }
 }catch(e){}
 injectCourseComplete();
}
function injectCourseComplete(){
 if($("continueCheckpoint4"))return;
 const wrap=document.createElement("div");wrap.className="finale";
 wrap.innerHTML='<div class="big">🎓</div>';
 const a=document.createElement("a");a.id="continueCheckpoint4";a.className="btn p";a.textContent=UI[S.lang].courseDone;
 a.href="/academy/courses/computer-internet-essentials/learn/checkpoint-4";a.target="_top";

}
