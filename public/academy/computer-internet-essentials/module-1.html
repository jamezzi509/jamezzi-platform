<style>

.node .ni{font-size:26px}.node .nt{font-weight:700;margin-top:8px;font-size:16px}.node .nd{font-size:13px;color:var(--mute);margin-top:4px}

.partgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-top:22px}

.partart{height:170px;display:grid;place-items:center;background:#fff;border-radius:12px}.partart svg{max-height:170px;max-width:100%}
.partart img{max-height:148px;max-width:90%;object-fit:contain}
.partn{font-weight:700;font-size:18px;margin-top:14px}.partcard.done .partn::after{content:" ✓";color:var(--good)}
.chip .cico{display:inline-flex;vertical-align:middle}.chip .cico svg{width:24px;height:24px}

.devcard .pic svg{max-height:100px;max-width:100%;height:auto}
.devcard .pic img{max-height:140px;max-width:85%;object-fit:contain}
/* hotspots (label parts) */

.hs.done{background:var(--good)}
.cats{display:flex;gap:12px;flex-wrap:wrap;margin-top:20px}

.cat:hover{border-color:var(--brand)}.cat.dis{opacity:.4}

.devgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(195px,1fr));gap:18px;margin-top:22px}
.devcard{border:1px solid var(--edge);border-radius:18px;padding:22px;background:var(--ink-700);text-align:center}
.devcard .pic{display:grid;place-items:center;height:160px}
.devopts{display:flex;gap:8px;justify-content:center;margin-top:14px;flex-wrap:wrap}
.devopts button{font-size:14.5px;font-weight:600;padding:9px 15px;border-radius:10px;border:1px solid var(--edge2);background:var(--ink-600);color:var(--text);cursor:pointer}
.devopts button.good{background:var(--good);border-color:var(--good);color:#062611}.devopts button.bad{background:var(--danger);border-color:var(--danger);color:#fff}
.devopts.locked button:not(.good){opacity:.4}
/* mini OS desktops (1.7) */
.osgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:18px}
.osmini{border:2px solid transparent;border-radius:14px;overflow:hidden;cursor:pointer;background:#0f1420;position:relative;aspect-ratio:16/10}

.desk-ico:hover{background:rgba(255,255,255,.25)}.desk-ico span{font-size:14.5px;text-align:center;text-shadow:0 1px 2px rgba(255,255,255,.5)}
.taskbar{position:absolute;left:0;right:0;bottom:0;height:46px;background:rgba(240,243,247,.82);backdrop-filter:blur(30px);border-top:1px solid rgba(255,255,255,.6);display:flex;align-items:center;justify-content:center;gap:5px}
.tbi{width:38px;height:38px;border-radius:7px;display:grid;place-items:center;cursor:pointer}.tbi:hover{background:rgba(0,0,0,.06)}.tbi svg{width:24px;height:24px}
.tbclock{position:absolute;right:14px;font-size:12.5px;color:#1b1b1b;text-align:right;line-height:1.35}
.pulse{animation:pulse 1.6s infinite;border-radius:8px}@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(0,95,184,.5)}70%{box-shadow:0 0 0 11px rgba(0,95,184,0)}100%{box-shadow:0 0 0 0 rgba(0,95,184,0)}}
.startmenu{position:absolute;bottom:54px;left:50%;transform:translateX(-50%);width:410px;max-width:92%;border-radius:10px;padding:16px;display:none;background:rgba(238,242,247,.9);backdrop-filter:blur(40px);border:1px solid rgba(255,255,255,.55);box-shadow:0 26px 60px rgba(0,20,60,.4)}
.startmenu .ssearch{height:38px;border-radius:19px;background:#fff;border:1px solid rgba(0,0,0,.08);display:flex;align-items:center;gap:9px;padding:0 15px;color:#8a8f98;font-size:13.5px}
.sl{font-size:13px;font-weight:600;color:#3a3a3a;margin:16px 2px 10px}.sgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px}
.sapp{display:flex;flex-direction:column;align-items:center;gap:7px;padding:12px 4px;border-radius:8px;cursor:pointer;font-size:12px;color:#1b1b1b;border:none;background:none}.sapp:hover{background:rgba(0,0,0,.06)}.sapp svg{width:32px;height:32px}
.win{position:absolute;left:50%;top:48%;transform:translate(-50%,-50%);width:min(700px,92%);height:min(470px,86%);border-radius:8px;overflow:hidden;background:var(--w-mica);border:1px solid rgba(0,0,0,.28);box-shadow:0 24px 60px -12px rgba(0,0,0,.5);display:none;font-family:var(--seg);color:var(--w-t1)}
.wtb{height:36px;display:flex;align-items:center;padding-left:14px;background:rgba(255,255,255,.4);font-size:13.5px}

.wnav{width:196px;flex:none;padding:10px;overflow:auto}
.wnav .acct{display:flex;gap:10px;align-items:center;padding:9px}.wnav .acct .ava{width:34px;height:34px;border-radius:50%;background:conic-gradient(from 200deg,#6aa0ff,#8b5cf6,#22c55e,#6aa0ff);flex:none}

.wni{display:flex;align-items:center;gap:12px;padding:9px 11px;border-radius:6px;font-size:14px;color:var(--w-t1);cursor:pointer;position:relative}
.wni:hover{background:rgba(0,0,0,.045)}.wni.sel{background:rgba(0,0,0,.05)}.wni.sel::before{content:"";position:absolute;left:1px;top:9px;bottom:9px;width:3px;border-radius:3px;background:var(--w-accent)}

.wh1{font-size:28px;font-weight:600;margin-bottom:16px}
.srow{display:flex;align-items:center;gap:14px;padding:13px 12px;border-radius:6px;border:1px solid transparent;cursor:pointer}.srow:hover{background:#f3f3f3;border-color:#ededed}

.aboutcard{border:1px solid var(--w-stroke);border-radius:8px;background:#fff;padding:6px 16px;margin-bottom:16px}
.arow{display:flex;justify-content:space-between;gap:16px;padding:12px 0;border-bottom:1px solid #eee;font-size:14.5px}.arow:last-child{border-bottom:none}.arow .k{color:var(--w-t2)}.arow .v{font-weight:600;text-align:right}
.arow.hl{cursor:pointer;border-radius:6px;padding:12px 10px;margin:0 -10px}.arow.hl:hover{background:#eef5ff}.arow.hl.on{background:#e4f0ff;outline:2px solid var(--w-accent)}
.ahd{font-size:15.5px;font-weight:600;margin:8px 0 10px}

.notsure:hover{background:#fff}
.hsdesk{position:absolute;width:38px;height:38px;border-radius:50%;background:rgba(var(--brand-rgb),.92);color:#fff;border:2px solid #fff;font-weight:800;cursor:pointer;display:grid;place-items:center;font-size:14px;box-shadow:0 2px 10px rgba(0,0,0,.4);animation:pulse 1.6s infinite}

/* ===== Mobile / narrow-screen layout ===== */
@media (max-width:860px){
 body{overflow-y:auto}
 .app{flex-direction:column;height:auto;min-height:100vh}
 .side{width:100%;max-height:180px;border-right:none;border-bottom:1px solid #1d2536}
 .brand{padding:12px 14px}
 .mods{padding:6px}
 .top{height:auto;flex-wrap:wrap;padding:10px 14px;gap:8px}
 .top h1{font-size:16px}
 .langs{margin-left:0}
 .wsp{flex-direction:column}
 .stagewrap{padding:12px}
 .stage{height:min(78vh,620px)}
 .rail{width:100%;border-left:none;border-top:1px solid #1a2231}
 .partgrid{grid-template-columns:repeat(2,1fr)}
 .devgrid{grid-template-columns:repeat(auto-fit,minmax(150px,1fr))}
 .osgrid{grid-template-columns:1fr}
 /* bottom-anchored overlays (taskbar, Start menu, lead-instruction panel) all get tall/wide

 #nextBtn{top:14px!important;bottom:auto!important;right:14px!important}
}
@media (max-width:480px){
 .partgrid{grid-template-columns:1fr 1fr;gap:12px}
 .partart{height:130px}
 .cats{gap:8px}.cat{padding:11px 14px;font-size:14px}
}

3:{ht:{lead:"Yon òdinatè fè 4 bagay: li resevwa ANTRE, li fè TRÈTMAN, li bay SÒTI, epi li ka fè DEPO. Peze tòch la epi swiv chemen an, apre klike sou chak etap.",

   welcome:"An nou wè kijan yon òdinatè travay. Peze bouton « Peze yon tòch » a.",runFb:"Bèl! Ou wè enfòmasyon an vwayaje: Antre → Trètman → Sòti. Kounye a klike sou chak etap pou li sa l vle di.",

   done:"Ou konnen l kounye a: Antre, Trètman, Sòti, Depo. Se sa chak òdinatè fè."},
 fr:{lead:"Un ordinateur fait 4 choses : ENTRÉE, TRAITEMENT, SORTIE, et STOCKAGE. Appuyez sur une touche et suivez le chemin, puis cliquez chaque étape.",
   objs:["Appuyer sur une touche (lancer le flux)","Lire les 4 étapes"],press:"Appuyer sur une touche ⌨️",
   nodes:[["⌨️","Entrée","Vous tapez une lettre"],["🧠","Traitement","L’ordinateur la comprend"],["🖥️","Sortie","Elle apparaît à l’écran"],["💾","Stockage","On peut la sauvegarder"]],
   welcome:"Voyons comment un ordinateur fonctionne. Appuyez sur « Appuyer sur une touche ».",runFb:"Bien ! L’information voyage : Entrée → Traitement → Sortie. Cliquez maintenant chaque étape.",

   decoy:["🌐","Internet","Se connecte à d’autres ordinateurs"],decoyFb:"Bonne question, mais Internet n’est PAS une 5e étape. C’est un RÉSEAU qui connecte votre ordinateur à d’autres machines — les 4 étapes (Entrée, Traitement, Sortie, Stockage) se passent à l’intérieur de votre ordinateur, même sans Internet.",
   done:"Vous le savez : Entrée, Traitement, Sortie, Stockage. C’est ce que fait tout ordinateur."},
 en:{lead:"A computer does 4 things: INPUT, PROCESSING, OUTPUT, and STORAGE. Press a key and follow the path, then click each step.",
   objs:["Press a key (run the flow)","Read all 4 steps"],press:"Press a key ⌨️",
   nodes:[["⌨️","Input","You type a letter"],["🧠","Processing","The computer understands it"],["🖥️","Output","It appears on screen"],["💾","Storage","It can be saved for later"]],
   welcome:"Let’s see how a computer works. Press the “Press a key” button.",runFb:"Nice! The information travels: Input → Processing → Output. Now click each step.",
   nodeFb:["INPUT: where info comes in — keyboard, mouse.","PROCESSING: the CPU “thinks” and does the work.","OUTPUT: the result appears — screen, sound.","STORAGE: save it to find later — SSD."],
   decoy:["🌐","Internet","Connects to other computers"],decoyFb:"Good instinct, but Internet is NOT a 5th step. It’s a NETWORK that connects your computer to other machines — all 4 steps (Input, Processing, Output, Storage) happen inside your own computer even without Internet.",

function persistSim(){try{window.localStorage.setItem(SIM_KEY,JSON.stringify({done:S.done,cur:S.cur,st:S.st}));}catch(e){}}
function loadSim(){try{const raw=window.localStorage.getItem(SIM_KEY);if(!raw)return;const saved=JSON.parse(raw);
 if(Array.isArray(saved.done)&&saved.done.length===NL)S.done=saved.done;
 if(typeof saved.cur==="number"&&saved.cur>=0&&saved.cur<NL)S.cur=saved.cur;
 if(saved.st&&typeof saved.st==="object")S.st=saved.st;
}catch(e){}}
function markModuleOneComplete(){
 if(!S.done.every(Boolean))return;
 try{
  const raw=window.localStorage.getItem(PROGRESS_KEY);
  const parsed=raw?JSON.parse(raw):[];
  const list=Array.isArray(parsed)?parsed:[];
  let changed=false;
  MOD1_LESSON_SLUGS.forEach(slug=>{if(!list.includes(slug)){list.push(slug);changed=true;}});
  if(changed){
   window.localStorage.setItem(PROGRESS_KEY,JSON.stringify(list));
   window.parent.dispatchEvent(new CustomEvent(PROGRESS_EVENT,{detail:{storageKey:PROGRESS_KEY}}));
  }
 }catch(e){}
 injectContinueModule2();
}

 const win=$("win");
 function paneSys(){$("wcontent").innerHTML='<div class="wh1">System</div>'+
   [['Display'],['Sound'],['Notifications'],['Power'],['Storage'],['About']].map(([n])=>'<div class="srow'+(n==='About'?' target':'')+'" data-sys="'+n+'"><div class="si">⚙️</div><div><div class="sn">'+n+'</div></div><span class="ch">›</span></div>').join("");
   $("wcontent").querySelectorAll("[data-sys]").forEach(el=>el.addEventListener("click",()=>{if(el.dataset.sys==="About")paneAbout();else ai(d.wrong,"warn");}));}
 function paneAbout(){setObj(2);ai(d.fbAbout,"good");
   $("wcontent").innerHTML='<div class="wh1">About</div><div class="ahd">🖥️ Device specifications</div><div class="aboutcard"><div class="arow"><span class="k">Device name</span><span class="v">DESKTOP-ACADEMY</span></div><div class="arow"><span class="k">Processor</span><span class="v">Intel Core i5-1235U</span></div><div class="arow"><span class="k">Installed RAM</span><span class="v">8.00 GB</span></div></div><div class="ahd">⊞ Windows specifications</div><div class="aboutcard"><div class="arow hl" id="edrow"><span class="k">Edition</span><span class="v">Windows 11 Home</span></div><div class="arow"><span class="k">Version</span><span class="v">23H2</span></div></div>';
   $("edrow").addEventListener("click",()=>{if((S.st[1].obj||[])[3])return;$("edrow").classList.add("on");setObj(3);ai(d.fbConf,"good");setTimeout(()=>ai(d.done,"good"),1500);});}
 function openSet(){$("sm").style.display="none";win.style.display="block";paneSys();if(!(S.st[1].obj||[])[1]){setObj(1);ai(d.fbSet,"good");}}
 $("startBtn").addEventListener("click",e=>{e.stopPropagation();const m=$("sm");const o=m.style.display==="block";m.style.display=o?"none":"block";if(!o&&!(S.st[1].obj||[])[0]){setObj(0);ai(d.fbStart,"good");}});
 $("ssSet").addEventListener("click",openSet);$("tbSet").addEventListener("click",openSet);
 $("winClose").addEventListener("click",()=>win.style.display="none");
 $("notSure").addEventListener("click",()=>ai(d.notsure,"warn"));
 win.querySelectorAll("[data-nav]").forEach(n=>{if(n.dataset.nav==="4")n.addEventListener("click",()=>ai(d.trapNav,"warn"));
   else if(n.dataset.nav!=="0")n.addEventListener("click",()=>ai(d.wrong,"warn"));});
 ai(d.welcome,"neutral");injectNext();}

function L3(){const d=C[3][S.lang];const st=S.st[2];st.read=st.read||{};
 const stage=$("stage");stage.className="stage lab";
 const na=[PART.keyboard,PART.cpu,PART.monitor,PART.ssd];
 stage.innerHTML=labHead(2,d.lead)+'<div style="margin-top:16px"><button class="btn p" id="pressBtn">'+d.press+'</button></div>'+
  '<div class="flow" id="flow">'+d.nodes.map((n,k)=>'<div class="node" data-n="'+k+'"><div class="ni photo">'+na[k]+'</div><div class="nt">'+n[1]+'</div><div class="nd">'+n[2]+'</div></div>'+(k<3?'<span class="arrow">→</span>':'')).join("")+'</div>'+
  '<div class="node decoy" id="decoyNode"><div class="ni" style="font-size:26px">'+d.decoy[0]+'</div><div class="nt">'+d.decoy[1]+'</div><div class="nd">'+d.decoy[2]+'</div></div>'+nextBar();
 wireNext();
 $("pressBtn").addEventListener("click",()=>{if(st.ran)return;st.ran=true;const nodes=[...stage.querySelectorAll(".node[data-n]")];
   nodes.forEach((nd,k)=>setTimeout(()=>{nd.classList.add("lit");if(k===3){setObj(0);ai(d.runFb,"good");}},k*450));});
 $("decoyNode").addEventListener("click",()=>ai(d.decoyFb,"warn"));
 stage.querySelectorAll(".node[data-n]").forEach(nd=>nd.addEventListener("click",()=>{const k=+nd.dataset.n;nd.classList.add("read");
   if(!st.read[k]){st.read[k]=true;ai(d.nodeFb[k],"neutral");}
   if(Object.keys(st.read).length>=4){setObj(1);setTimeout(()=>ai(d.done,"good"),400);}}));
 ai(d.welcome,"neutral");}

function L4(){const d=C[4][S.lang];const st=S.st[3];st.ok=st.ok||{};st.sel=null;
 const stage=$("stage");stage.className="stage lab";
 stage.innerHTML=labHead(3,d.lead)+'<div class="partgrid">'+d.parts.map((pt,k)=>'<div class="partcard'+(st.ok[k]?' done':'')+'" data-p="'+k+'"><div class="partart">'+PART[pt.art]+'</div><div class="partn">'+pt.n+'</div></div>').join("")+'</div>'+
   '<div class="cats" id="cats">'+d.cats.map((c,k)=>'<button class="cat" data-c="'+k+'">'+c+'</button>').join("")+'</div>'+nextBar();
 wireNext();
 stage.querySelectorAll(".partcard").forEach(card=>card.addEventListener("click",()=>{if(card.classList.contains("done"))return;
   stage.querySelectorAll(".partcard").forEach(x=>x.classList.remove("sel"));card.classList.add("sel");st.sel=+card.dataset.p;ai(d.parts[st.sel].n+" ?","neutral");}));
 stage.querySelectorAll(".cat").forEach(c=>c.addEventListener("click",()=>{if(st.sel===null){ai(d.welcome,"warn");return;}const p=d.parts[st.sel];
   if(+c.dataset.c===p.ans){st.ok[st.sel]=true;const card=stage.querySelector('.partcard[data-p="'+st.sel+'"]');card.classList.remove("sel");card.classList.add("done");ai(d.ok[st.sel],"good");st.sel=null;
     if(Object.keys(st.ok).length>=4){setObj(0);setTimeout(()=>ai(d.done,"good"),400);}}
   else{const trapMsg=p.trap&&p.trap[+c.dataset.c];ai(trapMsg||d.bad,"warn");}}));
 ai(d.welcome,"neutral");}

function L5(){const d=C[5][S.lang];const st=S.st[4];st.sel=null;st.placed=st.placed||{};
 const stage=$("stage");stage.className="stage lab";
 const remaining=d.items.map((it,k)=>({it,k})).filter(o=>!st.placed[o.k]);
 const ia=[ICON.monitor,ICON.keyboard,ICON.cpu,ICON.browser,ICON.windows,ICON.photo];
 stage.innerHTML=labHead(4,d.lead)+'<div class="items" id="items">'+remaining.map(o=>'<div class="chip" data-i="'+o.k+'"><span class="cico">'+ia[o.k]+'</span>'+o.it.n+'</div>').join("")+'</div>'+
   '<div class="bins"><button class="bin hw" data-bin="hw"><h4>🔧 '+d.hw+'</h4><p>'+d.hwd+'</p><div class="drop" id="dhw"></div></button><button class="bin sw" data-bin="sw"><h4>💿 '+d.sw+'</h4><p>'+d.swd+'</p><div class="drop" id="dsw"></div></button></div>'+nextBar();
 wireNext();
 Object.keys(st.placed).forEach(k=>{const it=d.items[k];$(it.a==="hw"?"dhw":"dsw").insertAdjacentHTML("beforeend",'<span class="placed">'+it.n+'</span>');});
 stage.querySelectorAll(".chip").forEach(c=>c.addEventListener("click",()=>{stage.querySelectorAll(".chip").forEach(x=>x.style.outline="");c.style.outline="2px solid var(--brand)";st.sel=+c.dataset.i;}));
 stage.querySelectorAll(".bin").forEach(b=>b.addEventListener("click",()=>{if(st.sel===null)return;const it=d.items[st.sel];
   if(it.a===b.dataset.bin){st.placed[st.sel]=true;$(it.a==="hw"?"dhw":"dsw").insertAdjacentHTML("beforeend",'<span class="placed">'+it.n+'</span>');
     const chip=stage.querySelector('.chip[data-i="'+st.sel+'"]');if(chip)chip.classList.add("gone");ai(it.trap?d.trap:d.ok,it.trap?"good":"good");st.sel=null;
     if(Object.keys(st.placed).length>=d.items.length){setObj(0);setTimeout(()=>ai(d.done,"good"),400);}}
   else ai(d.bad,"warn");}));
 ai(d.welcome,"neutral");}

function L6(){const d=C[6][S.lang];const st=S.st[5];st.ok=st.ok||{};
 const stage=$("stage");stage.className="stage lab";
 stage.innerHTML=labHead(5,d.lead)+'<div class="devgrid">'+d.devs.map((dv,k)=>'<div class="devcard"><div class="pic">'+DEV[dv.t]+'</div><div class="devopts" data-d="'+k+'">'+shuffleOpts(d.opts,dv.ans).map(([label,idx])=>'<button data-o="'+idx+'">'+label+'</button>').join("")+'</div></div>').join("")+'</div>'+nextBar();
 wireNext();
 stage.querySelectorAll(".devopts").forEach(box=>{const k=+box.dataset.d;box.querySelectorAll("button").forEach(btn=>btn.addEventListener("click",()=>{
   if(box.classList.contains("locked"))return;if(+btn.dataset.o===d.devs[k].ans){btn.classList.add("good");box.classList.add("locked");st.ok[k]=true;ai(d.ok,"good");
     if(Object.keys(st.ok).length>=d.devs.length){setObj(0);setTimeout(()=>ai(d.done,"good"),400);}}
   else{btn.classList.add("bad");const dv=d.devs[k];const trapMsg=dv.trap&&dv.trap[+btn.dataset.o];ai(trapMsg||d.bad,"warn");}}));});
 ai(d.welcome,"neutral");}
function shuffleOpts(opts){const arr=opts.map((o,i)=>[o,i]);
 for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}
 return arr;}

function L7(){const d=C[7][S.lang];const st=S.st[6];st.seen=st.seen||{};
 const stage=$("stage");stage.className="stage lab";
 stage.innerHTML=labHead(6,d.lead)+'<div class="osgrid">'+d.os.map(o=>'<div class="osmini" data-k="'+o.k+'">'+miniOS(o.k)+'<div class="cap" style="display:none">'+o.cap+'</div></div>').join("")+'</div>'+nextBar();
 wireNext();
 stage.querySelectorAll(".osmini").forEach(m=>m.addEventListener("click",()=>{const k=m.dataset.k;
   if(k==="win"){if(!(S.st[6].obj||[])[0]){m.classList.add("good");m.querySelector(".cap").style.display="block";setObj(0);ai(d.winOk,"good");}}
   else{if(!(S.st[6].obj||[])[0]){ai(k==="mac"?d.winBadMac:d.winBadCros,"warn");return;}m.classList.add("good");m.querySelector(".cap").style.display="block";
     if(!st.seen[k]){st.seen[k]=true;ai(k==="mac"?d.macFb:d.crosFb,"neutral");}
     if(Object.keys(st.seen).length>=2){setObj(1);setTimeout(()=>ai(d.done,"good"),400);}}}));
 ai(d.welcome,"neutral");}

function L8(){const d=C8[S.lang];const st=S.st[7];st.spots=st.spots||{};
 const stage=$("stage");stage.className="stage desk";
 stage.innerHTML=bloom()+
  '<button class="desk-ico" id="courseIco" style="top:14px;left:14px"><div style="width:52px;height:52px;border-radius:11px;background:var(--brand);display:grid;place-items:center;color:#fff;font-size:26px">🎓</div><span>Kou a</span></button>'+
  '<button class="desk-ico" id="gameIco" style="top:108px;left:14px"><div style="width:52px;height:52px;border-radius:11px;background:#e0574a;display:grid;place-items:center;color:#fff;font-size:26px">🎮</div><span>Jwèt</span></button>'+
  '<div class="hsdesk" data-s="0" style="left:50%;top:40%;transform:translateX(-50%)">1</div>'+
  '<div class="taskbar"><button class="tbi">'+winLogo+'</button><div class="tbi">'+liIcon('search','stroke="#1b1b1b" stroke-width="2" fill="none"')+'</div><div class="tbi">'+tileIcon('#f6c445','folder','fill')+'</div>'+
    '<div class="hsdesk" data-s="1" style="position:relative">2</div>'+
    '<div class="hsdesk" data-s="2" style="position:relative">3</div>'+
    '<div class="tbclock"><div>4:12 PM</div><div>7/21/2026</div></div></div>'+
  '<div class="win" id="courseWin" style="display:none"><div class="wtb">🎓 Kou a — Academy<div class="wc"><span>—</span><span>▢</span><span class="cl" id="cwClose">✕</span></div></div><div style="padding:26px;text-align:center;color:#1b1b1b"><div style="font-size:40px">🎓</div><div style="font-size:18px;font-weight:600;margin-top:8px">Academy</div><div style="font-size:14px;color:#5c5c5c;margin-top:6px">'+d.openCourse+'</div></div></div>'+
  '<div class="lockscr" id="lock"><div style="text-align:center"><div class="cl">4:12</div><div class="hint">'+d.welcome+'</div></div></div>';
 $("lock").addEventListener("click",()=>{$("lock").style.display="none";setObj(0);ai(d.wake,"good");});
 stage.querySelectorAll(".hsdesk").forEach(h=>h.addEventListener("click",()=>{if(!(S.st[7].obj||[])[0])return;const s=+h.dataset.s;
   if(!st.spots[s]){st.spots[s]=true;h.classList.add("done");h.textContent="✓";ai(d.spots[s],"neutral");}
   if(Object.keys(st.spots).length>=3){setObj(1);ai(d.allspots,"good");}}));
 $("courseIco").addEventListener("click",()=>{if(!(S.st[7].obj||[])[1])return;$("courseWin").style.display="block";if(!(S.st[7].obj||[])[2]){setObj(2);ai(d.openCourse,"good");}});
 $("gameIco").addEventListener("click",()=>ai(d.trapGame,"warn"));
 $("cwClose").addEventListener("click",()=>{$("courseWin").style.display="none";if((S.st[7].obj||[])[2]&&!(S.st[7].obj||[])[3]){setObj(3);ai(d.done,"good");}});
}

function L9(){const d=C[9][S.lang];const st=S.st[8];st.expect=st.expect===undefined?0:st.expect;st.chosen=st.chosen||false;
 const stage=$("stage");stage.className="stage lab";
 function render(){
  stage.innerHTML=labHead(8,d.lead)+'<p style="margin-top:14px;color:var(--dim);font-size:13.5px">'+d.stepHint+'</p>'+
   '<div class="items" id="steps">'+st.order.map(k=>'<div class="chip" data-k="'+k+'"'+(k<st.expect?' style="opacity:.4"':"")+'>'+(k<st.expect?"✓ ":"")+d.steps[k]+'</div>').join("")+'</div>'+
   (st.expect>=4?'<div style="margin-top:26px;font-weight:700;font-size:15.5px">'+d.objs[1]+'</div><div class="cats" id="reasons">'+d.reasons.map((r,k)=>'<button class="cat" data-r="'+k+'">'+r+'</button>').join("")+'</div>':"")+
   nextBar();
  wireNext();
  stage.querySelectorAll(".chip[data-k]").forEach(c=>c.addEventListener("click",()=>{const k=+c.dataset.k;
   if(k<st.expect)return;
   if(k===st.expect){st.expect++;ai(d.stepOkFb,"good");if(st.expect>=4)setObj(0);render();}
   else{ai(d.stepBadFb,"warn");}}));
  const reasons=$("reasons");if(reasons)reasons.querySelectorAll(".cat[data-r]").forEach(b=>b.addEventListener("click",()=>{
   if(st.chosen)return;st.chosen=true;ai(d.reasonFb,"good");setObj(1);}));
 }
 if(!st.order)st.order=shuffleOpts(d.steps.map((_,k)=>k)).map(([,idx])=>idx);
 render();
 ai(d.welcome,"neutral");}
/* inject a floating Next button on desktop lessons */
function injectNext(){const done=S.done[S.cur];const b=document.createElement("button");b.className="btn p";b.id="nextBtn";b.textContent=UI[S.lang].next;b.disabled=!done;
 const clearTaskbar=$("stage").querySelector(".taskbar")?64:12;
 b.style.cssText="position:absolute;bottom:"+clearTaskbar+"px;right:14px;z-index:6";b.addEventListener("click",()=>load(Math.min(NL-1,S.cur+1)));$("stage").appendChild(b);}

/* ---------- lang / reset ---------- */
function applyLang(){document.documentElement.lang=S.lang;$("cs").textContent=UI[S.lang].cs;$("lblProg").textContent=UI[S.lang].prog;$("lblObj").textContent=UI[S.lang].obj;$("aiName").textContent=UI[S.lang].ai;
 renderSidebar();syncProg();load(S.cur);}
$("langs").querySelectorAll("button").forEach(b=>b.addEventListener("click",()=>{S.lang=b.dataset.l;$("langs").querySelectorAll("button").forEach(x=>x.classList.toggle("on",x.dataset.l===S.lang));applyLang();}));
$("resetBtn").addEventListener("click",()=>{S.done=Array(NL).fill(false);S.st={};persistSim();renderSidebar();syncProg();load(S.cur);});
/* registered once (not per-lesson-load) so it doesn't accumulate duplicate listeners on repeat visits to 1.2 */
document.addEventListener("click",e=>{if(!e.target.closest("#sm")&&!e.target.closest("#startBtn")){const m=$("sm");if(m)m.style.display="none";}});
/* init */
loadSim();
applyLang();
</script>
