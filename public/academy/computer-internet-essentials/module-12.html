 fr:{lead:"Intel et AMD sont deux entreprises qui font des processeurs — la marque seule ne détermine PAS la qualité d'un ordinateur. Comparez 2 scénarios.",

 en:{lead:"Intel and AMD are two companies that make processors — the brand alone does NOT determine a computer's quality. Compare 2 scenarios.",

   oldI7Fb:"An old processor, even an 'i7', can be SLOWER than a newer, even lower-tier processor — generation matters more than the number.",

4:{ht:{lead:"Yon fich travay pwosesè ede ou analize non konplè yon pwosesè anvan ou achte. Reponn 4 kesyon sou yon egzanp.",
   objs:["Reponn 4 kesyon nan fich travay la","Rekonèt yon nimewo modèl ki manke enfòmasyon esansyèl"],
   sample:"Egzanp: 'Intel Core i5-1335U'",

   q2:"Konbyen tan li genyen?",q2a:"Nimewo '13' nan '1335U' endike jenerasyon 13 — ou ka konpare ak dat aktyèl la.",
   q3:"Pou pouvwa ba, mitan, oswa pèfòmans?",q3a:"Sifiks 'U' vle di pouvwa ba (batri long, mwens chalè) — 'H'/'HX' ta vle di pi plis pèfòmans.",
   q4:"Rès òdinatè a ekilibre?",q4a:"Yon bon pwosesè avèk twò piti RAM oswa yon HDD lan ka toujou bay move pèfòmans jeneral.",
   trapQ:"Yon anons montre sèlman 'AMD' san lòt detay. Sa se yon bon siy?",
   trapWrong:"Wi, AMD sèl ase",trapRight:"Non, san fanmi/jenerasyon/modèl egzat (tankou 'Ryzen 5 5500U'), se yon siy avètisman",
   trapWrongFb:"Pa vre! San fanmi ak jenerasyon/modèl egzat, ou pa ka evalye pèfòmans reyèl pwosesè a ditou.",
   trapRightFb:"Egzat! Toujou mande non konplè — 'AMD' pou kont li pa ba ou ase enfòmasyon.",
   welcome:"Klike sou chak kesyon nan fich travay la pou analize egzanp lan.",
   done:"Ou konnen kounye a kijan pou itilize yon fich travay pwosesè, epi rekonèt yon anons ki manke enfòmasyon esansyèl."},
 fr:{lead:"Une fiche de travail processeur vous aide à analyser le nom complet d'un processeur avant d'acheter. Répondez à 4 questions sur un exemple.",
   objs:["Répondre à 4 questions dans la fiche de travail","Reconnaître un numéro de modèle qui manque d'informations essentielles"],
   sample:"Exemple : « Intel Core i5-1335U »",
   q1:"Quel est le nom complet ?",q1a:"Intel Core i5-1335U — marque, famille, numéro de modèle, et suffixe tous présents.",
   q2:"Depuis combien de temps existe-t-il ?",q2a:"Le numéro « 13 » dans « 1335U » indique la génération 13 — vous pouvez comparer avec la date actuelle.",
   q3:"Pour puissance basse, moyenne, ou performance ?",q3a:"Le suffixe « U » veut dire puissance basse (longue autonomie, moins de chaleur) — « H »/« HX » voudrait dire plus de performance.",
   q4:"Le reste de l'ordinateur est-il équilibré ?",q4a:"Un bon processeur avec trop peu de RAM ou un disque dur (HDD) peut quand même donner de mauvaises performances globales.",
   trapQ:"Une annonce montre seulement « AMD » sans autre détail. Est-ce un bon signe ?",
   trapWrong:"Oui, AMD seul suffit",trapRight:"Non, sans famille/génération/modèle exact (comme « Ryzen 5 5500U »), c'est un signe d'avertissement",
   trapWrongFb:"Pas vrai ! Sans famille et génération/modèle exact, vous ne pouvez pas du tout évaluer la performance réelle du processeur.",
   trapRightFb:"Exact ! Demandez toujours le nom complet — « AMD » seul ne vous donne pas assez d'information.",
   welcome:"Cliquez sur chaque question de la fiche de travail pour analyser l'exemple.",
   done:"Vous savez maintenant utiliser une fiche de travail processeur, et reconnaître une annonce qui manque d'informations essentielles."},
 en:{lead:"A processor-name worksheet helps you analyze a processor's full name before buying. Answer 4 questions about an example.",
   objs:["Answer 4 questions in the worksheet","Recognize a model number missing essential information"],
   sample:"Example: 'Intel Core i5-1335U'",
   q1:"What's the complete name?",q1a:"Intel Core i5-1335U — brand, family, model number, and suffix all present.",
   q2:"How old is it approximately?",q2a:"The '13' in '1335U' indicates generation 13 — you can compare it against the current date.",
   q3:"Low power, mainstream, or performance?",q3a:"The 'U' suffix means low power (long battery, less heat) — 'H'/'HX' would mean more performance.",
   q4:"Is the rest of the computer balanced?",q4a:"A good processor with too little RAM or an HDD can still give poor overall performance.",
   trapQ:"A listing shows only 'AMD' with no other detail. Is that a good sign?",
   trapWrong:"Yes, 'AMD' alone is enough",trapRight:"No, without an exact family/generation/model (like 'Ryzen 5 5500U'), it's a warning sign",
   trapWrongFb:"Not true! Without an exact family and generation/model, you can't evaluate the processor's real performance at all.",
   trapRightFb:"Exactly! Always ask for the full name — 'AMD' alone doesn't give you enough information.",
   welcome:"Click each question in the worksheet to analyze the example.",
   done:"Now you know how to use a processor-name worksheet, and to recognize a listing missing essential information."}},

function markModuleComplete(){
