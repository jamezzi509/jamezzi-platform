 fr:{lead:"Un bon nom de fichier vous aide à le retrouver facilement plus tard. Regardez cette chaîne de noms — elle montre un problème courant.",
   objs:["Regarder la chaîne de noms de fichiers","Comprendre pourquoi des noms clairs et des dates sont utiles"],

 en:{lead:"A good filename helps you find it easily later. Look at this name chain — it shows a common problem.",

const SIM_KEY="jamezzi:computer:essentials:module4-sim-state";
const PROGRESS_KEY="jamezzi:computer:essentials:completed";
const PROGRESS_EVENT="jamezzi:course-progress-changed";
const MOD4_LESSON_SLUGS=["kisa-yon-fichye-ye","kisa-yon-dosye-ye","file-explorer-sou-windows","kote-komen-tankou-desktop-documents-ak-downloads","non-fichye-ki-ede-ou-pita","save-save-as-ak-export","kreye-chanje-non-kopye-ak-deplase","efase-ak-restore","cheche-yon-fichye-ou-pedi","ekstansyon-fichye-ak-foma-komen","fichye-zip-ak-konpresyon","kle-usb-ak-estokaj-eksten","misyon-oganize-yon-vre-dosye"];
const MODULE_FIRST_LESSON=["byenveni-ou-pa-pral-kraze-anyen","sa-ki-rive-le-ou-peze-bouton-pouvwa-a","konfyans-souri-ak-trackpad","","kisa-yon-aplikasyon-ye","kisa-ki-se-entenet-la","navigate-mote-rechech-sit-web-ak-paj-web","kijan-imel-mache","estokaj-lokal-ak-estokaj-cloud","po-ak-konekte","kisa-ki-bezwen-pwoteje","anvan-ou-achte-kominse-ak-travay-la","panse-tankou-yon-moun-ki-rezoud-pwoblem","bati-yon-sistem-oganizasyon-dijital-senp"];
function persistSim(){try{window.localStorage.setItem(SIM_KEY,JSON.stringify({done:S.done,cur:S.cur,st:S.st}));}catch(e){}}
function loadSim(){try{const raw=window.localStorage.getItem(SIM_KEY);if(!raw)return;const saved=JSON.parse(raw);
 if(Array.isArray(saved.done)&&saved.done.length===NL)S.done=saved.done;
 if(typeof saved.cur==="number"&&saved.cur>=0&&saved.cur<NL)S.cur=saved.cur;
 if(saved.st&&typeof saved.st==="object")S.st=saved.st;
}catch(e){}}
function markModuleComplete(){
 if(!S.done.every(Boolean))return;
 try{
  const raw=window.localStorage.getItem(PROGRESS_KEY);
  const parsed=raw?JSON.parse(raw):[];
  const list=Array.isArray(parsed)?parsed:[];
  let changed=false;
  MOD4_LESSON_SLUGS.forEach(slug=>{if(!list.includes(slug)){list.push(slug);changed=true;}});
  if(changed){
   window.localStorage.setItem(PROGRESS_KEY,JSON.stringify(list));
   window.parent.dispatchEvent(new CustomEvent(PROGRESS_EVENT,{detail:{storageKey:PROGRESS_KEY}}));
  }
 }catch(e){}
 injectContinueModule5();
}
function injectContinueModule5(){
 if($("continueModule5"))return;
 const a=document.createElement("a");a.id="continueModule5";a.className="btn p";a.textContent=UI[S.lang].nextModule;
 a.href="/academy/courses/computer-internet-essentials/learn/"+MODULE_FIRST_LESSON[4];a.target="_top";
 a.style.cssText="display:inline-block;margin-top:18px;text-decoration:none";
 $("stage").appendChild(a);
}
function renderSidebar(){const box=$("mods");box.innerHTML="";MODULES[S.lang].forEach((t,mi)=>{const active=mi===3;
 let les="";if(active){les='<div class="les">'+M4[S.lang].map((lt,li)=>'<div class="li'+(S.done[li]?" done":"")+(li===S.cur?" cur":"")+'" data-les="'+li+'"><span class="dot">✓</span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+lt+'</span><span class="lx">4.'+(li+1)+'</span></div>').join("")+'</div>';}
 const m=document.createElement("div");m.className="mod"+(active?" active":"");
 const label='<span class="num">'+(mi+1)+'</span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+t+'</span>';
 const mh=active?'<div class="mh">'+label+'</div>':'<a class="mh" href="/academy/courses/computer-internet-essentials/learn/'+MODULE_FIRST_LESSON[mi]+'" target="_top" style="text-decoration:none;color:inherit">'+label+'</a>';
 m.innerHTML=mh+les;box.appendChild(m);});
 box.querySelectorAll("[data-les]").forEach(el=>el.addEventListener("click",()=>load(+el.dataset.les)));}
function renderObj(){const defs=objsFor(S.cur),st=S.st[S.cur]||{};const box=$("objList");box.innerHTML="";
 defs.forEach((d,i)=>{const done=(st.obj||[])[i];const el=document.createElement("div");el.className="obj"+(done?" d":"");el.innerHTML='<span class="bx">✓</span><span class="tx">'+d+'</span>';box.appendChild(el);});}
function setObj(i){const st=S.st[S.cur]||(S.st[S.cur]={});st.obj=st.obj||[];if(st.obj[i])return;st.obj[i]=true;renderObj();
 const defs=objsFor(S.cur);if(defs.length&&st.obj.filter(Boolean).length>=defs.length)finishLesson();}
function finishLesson(){if(!S.done[S.cur]){S.done[S.cur]=true;renderSidebar();syncProg();persistSim();}const b=$("nextBtn");if(b){b.disabled=false;}
 if(S.cur===NL-1)markModuleComplete();}
function syncProg(){const n=S.done.filter(Boolean).length;$("prog").style.width=Math.round(n/NL*100)+"%";$("progText").textContent=n+" / "+NL;}
function nextBar(){const done=S.done[S.cur];return '<div class="nextwrap"><button class="btn p" id="nextBtn" '+(done?"":"disabled")+'>'+UI[S.lang].next+'</button></div>';}
function wireNext(){const n=$("nextBtn");if(n)n.addEventListener("click",()=>load(Math.min(NL-1,S.cur+1)));}

function load(i){S.cur=i;renderSidebar();$("topTag").textContent="Modil 4 · 4."+(i+1);$("topTitle").textContent=M4[S.lang][i];renderObj();
 const st=S.st[i]||(S.st[i]={});st.obj=st.obj||[];
 const fn=[L1,L2,L3,L4,L5,L6,L7,L8,L9,L10,L11,L12,L13][i];fn();
 persistSim();
 if(i===NL-1&&S.done[NL-1])markModuleComplete();}

/* ---------- renderers ---------- */
function labHead(i,lead){return '<div class="labhead fade"><span class="labtag">Modil 4 · 4.'+(i+1)+'</span><div class="labh2">'+M4[S.lang][i]+'</div><p class="lablead">'+lead+'</p></div>';}

function L1(){const d=C[1][S.lang];const st=S.st[0];st.seen=st.seen||{};st.answered=false;
 const stage=$("stage");stage.className="stage lab";
 stage.innerHTML=labHead(0,d.lead)+'<div class="partgrid" style="grid-template-columns:repeat(3,150px)">'+d.files.map((f,k)=>'<div class="partcard" data-k="'+k+'"><div class="partart" style="font-size:40px">'+f[0]+'</div><div class="partn">'+f[1]+'</div></div>').join("")+'</div>'+
  '<div style="margin-top:22px;font-weight:700;font-size:15.5px">'+d.trapQ+'</div>'+
  '<div class="cats"><button class="cat" id="tqYes">'+d.yes+'</button><button class="cat" id="tqNo">'+d.no+'</button></div>'+nextBar();
 wireNext();
 stage.querySelectorAll(".partcard[data-k]").forEach(c=>c.addEventListener("click",()=>{const k=+c.dataset.k;
  if(!st.seen[k]){st.seen[k]=true;c.classList.add("done");ai(d.files[k][2],"neutral");}
  if(Object.keys(st.seen).length>=3)setObj(0);}));
 $("tqYes").addEventListener("click",()=>{if(st.answered)return;st.answered=true;ai(d.yesFb,"warn");setObj(1);});
 $("tqNo").addEventListener("click",()=>{if(st.answered)return;st.answered=true;ai(d.noFb,"good");setObj(1);});
 ai(d.welcome,"neutral");}

function L3(){const d=C[3][S.lang];const st=S.st[2];st.seen=st.seen||{};st.sel=0;st.answered=false;
 const stage=$("stage");stage.className="stage lab";
 function render(){
  stage.innerHTML=labHead(2,d.lead)+
   '<div class="winpanel"><div class="wtb">📁 File Explorer</div><div class="wbody"><div class="wnav">'+
    d.nav.map((n,k)=>'<div class="wni'+(k===st.sel?" sel":"")+'" data-n="'+k+'">'+n+'</div>').join("")+
   '</div><div class="wcontent"><div class="wpath">'+d.pathFor[st.sel]+'</div><div class="wsearch">🔎 Search</div></div></div></div>'+
   '<div style="margin-top:22px;font-weight:700;font-size:15.5px">'+d.trapQ+'</div>'+
   '<div class="cats"><button class="cat" id="tqYes">'+d.yes+'</button><button class="cat" id="tqNo">'+d.no+'</button></div>'+nextBar();
  wireNext();
  stage.querySelectorAll(".wni[data-n]").forEach(n=>n.addEventListener("click",()=>{st.sel=+n.dataset.n;
   if(!st.seen[st.sel]){st.seen[st.sel]=true;}
   if(Object.keys(st.seen).length>=3)setObj(0);render();}));
  const qy=$("tqYes"),qn=$("tqNo");
  qy.addEventListener("click",()=>{if(st.answered)return;st.answered=true;ai(d.yesFb,"warn");setObj(1);render();});
  qn.addEventListener("click",()=>{if(st.answered)return;st.answered=true;ai(d.noFb,"good");setObj(1);render();});
 }
 render();
 ai(d.welcome,"neutral");}

 const stage=$("stage");stage.className="stage lab";

  stage.innerHTML=labHead(7,d.lead)+'<div style="display:flex;gap:10px;margin-top:16px;flex-wrap:wrap">'+

function L10(){const d=C[10][S.lang];const st=S.st[9];st.sel=null;st.ok=st.ok||{};
 const stage=$("stage");stage.className="stage lab";
 const iconFor=["doc","sheet","img","audio","vid","zip"];
 stage.innerHTML=labHead(9,d.lead)+'<div class="items" id="items" style="display:flex;flex-wrap:wrap;gap:10px;margin-top:18px">'+d.items.map((it,k)=>st.ok[k]?"":'<div class="chip" data-i="'+k+'">'+it.n+'</div>').join("")+'</div>'+
  '<div class="cats" id="cats">'+d.cats.map((c,k)=>'<button class="cat" data-c="'+k+'">'+c+'</button>').join("")+'</div>'+nextBar();
 wireNext();
 stage.querySelectorAll(".chip").forEach(c=>c.addEventListener("click",()=>{stage.querySelectorAll(".chip").forEach(x=>x.style.outline="");c.style.outline="2px solid var(--brand)";st.sel=+c.dataset.i;}));
 stage.querySelectorAll(".cat").forEach(c=>c.addEventListener("click",()=>{if(st.sel===null){ai(d.welcome,"warn");return;}const it=d.items[st.sel];
   if(it.ans===-1){ai(d.trapFb,"warn");setObj(1);return;}
   if(+c.dataset.c===it.ans){st.ok[st.sel]=true;const chip=stage.querySelector('.chip[data-i="'+st.sel+'"]');if(chip)chip.remove();ai(d.ok,"good");st.sel=null;
     if(Object.keys(st.ok).length>=d.items.filter(x=>x.ans!==-1).length){setObj(0);setTimeout(()=>ai(d.done,"good"),400);}}
   else ai(d.bad,"warn");}));
 ai(d.welcome,"neutral");}

function L11(){const d=C[11][S.lang];const st=S.st[10];st.sel=st.sel||{};st.compressed=false;st.extracted=false;st.trapSeen=false;
 const stage=$("stage");stage.className="stage lab";
 function render(){
  stage.innerHTML=labHead(10,d.lead)+'<div class="items" style="display:flex;flex-wrap:wrap;gap:10px;margin-top:18px">'+
    (!st.compressed?d.files.map((f,k)=>'<div class="chip'+(st.sel[k]?"":"")+'" data-f="'+k+'" style="'+(st.sel[k]?"outline:2px solid var(--brand)":"")+'">📄 '+f+'</div>').join(""):'<div class="chip" style="cursor:default">🗜️ Pwojè.zip</div>')+
   '</div><div style="display:flex;gap:10px;margin-top:16px">'+
    (!st.compressed?'<button class="btn p" id="compressBtn">'+d.compressBtn+'</button>':'<button class="btn g" id="extractBtn">'+d.extractBtn+'</button>')+
   '</div>'+
   '<div style="margin-top:22px"><div class="chip" id="suspectItem" style="cursor:pointer;max-width:260px">'+d.suspectItem+'</div></div>'+
   nextBar();
  wireNext();
  stage.querySelectorAll(".chip[data-f]").forEach(c=>c.addEventListener("click",()=>{const k=+c.dataset.f;st.sel[k]=!st.sel[k];render();}));
  const cb=$("compressBtn");if(cb)cb.addEventListener("click",()=>{if(Object.values(st.sel).filter(Boolean).length<2)return;st.compressed=true;ai(d.compressFb,"good");render();});
  const eb=$("extractBtn");if(eb)eb.addEventListener("click",()=>{st.extracted=true;ai(d.extractFb,"good");setObj(0);render();});
  $("suspectItem").addEventListener("click",()=>{st.trapSeen=true;ai(d.trapFb,"warn");setObj(1);});
 }
 render();
 ai(d.welcome,"neutral");}

/* ---------- lang / reset ---------- */
function applyLang(){document.documentElement.lang=S.lang;$("cs").textContent=UI[S.lang].cs;$("lblProg").textContent=UI[S.lang].prog;$("lblObj").textContent=UI[S.lang].obj;$("aiName").textContent=UI[S.lang].ai;
 renderSidebar();syncProg();load(S.cur);}
$("langs").querySelectorAll("button").forEach(b=>b.addEventListener("click",()=>{S.lang=b.dataset.l;$("langs").querySelectorAll("button").forEach(x=>x.classList.toggle("on",x.dataset.l===S.lang));applyLang();}));
$("resetBtn").addEventListener("click",()=>{S.done=Array(NL).fill(false);S.st={};persistSim();renderSidebar();syncProg();load(S.cur);});
/* init */
loadSim();
applyLang();
