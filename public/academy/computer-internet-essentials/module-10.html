const PROGRESS_EVENT="jamezzi:course-progress-changed";
const MOD10_LESSON_SLUGS=["po-ak-konekte","kle-usb-ak-disk-eksten-revizyon","bluetooth","kamera-web-mikwofon-ak-opale","enprimant-sa-ki-rive-le-ou-enprime","enprime-yon-dokiman","eskane-yon-dokiman","le-yon-apare-konekte-pa-mache","misyon-konplete-yon-travay-papye-a-dijital"];
const MODULE_FIRST_LESSON=["byenveni-ou-pa-pral-kraze-anyen","sa-ki-rive-le-ou-peze-bouton-pouvwa-a","konfyans-souri-ak-trackpad","kisa-yon-fichye-ye","kisa-yon-aplikasyon-ye","kisa-ki-se-entenet-la","navigate-mote-rechech-sit-web-ak-paj-web","kijan-imel-mache","estokaj-lokal-ak-estokaj-cloud","","kisa-ki-bezwen-pwoteje","anvan-ou-achte-kominse-ak-travay-la","panse-tankou-yon-moun-ki-rezoud-pwoblem","bati-yon-sistem-oganizasyon-dijital-senp"];
function persistSim(){try{window.localStorage.setItem(SIM_KEY,JSON.stringify({done:S.done,cur:S.cur,st:S.st}));}catch(e){}}
function loadSim(){try{const raw=window.localStorage.getItem(SIM_KEY);if(!raw)return;const saved=JSON.parse(raw);
 if(Array.isArray(saved.done)&&saved.done.length===NL)S.done=saved.done;
 if(typeof saved.cur==="number"&&saved.cur>=0&&saved.cur<NL)S.cur=saved.cur;
 if(saved.st&&typeof saved.st==="object")S.st=saved.st;
}catch(e){}}
function markModuleComplete(){
 if(!S.done.every(Boolean))return;
 try{
  const raw=window.localStorage.getItem(PROGRESS_KEY);
  const parsed=raw?JSON.parse(raw):[];
  const list=Array.isArray(parsed)?parsed:[];
  let changed=false;
  MOD10_LESSON_SLUGS.forEach(slug=>{if(!list.includes(slug)){list.push(slug);changed=true;}});
  if(changed){
   window.localStorage.setItem(PROGRESS_KEY,JSON.stringify(list));
   window.parent.dispatchEvent(new CustomEvent(PROGRESS_EVENT,{detail:{storageKey:PROGRESS_KEY}}));
  }
 }catch(e){}
 injectContinueModule11();
}
function injectContinueModule11(){
 if($("continueModule11"))return;
 const a=document.createElement("a");a.id="continueModule11";a.className="btn p";a.textContent=UI[S.lang].nextModule;
 a.href="/academy/courses/computer-internet-essentials/learn/"+MODULE_FIRST_LESSON[10];a.target="_top";
 a.style.cssText="display:inline-block;margin-top:18px;text-decoration:none";
 $("stage").appendChild(a);
}
function renderSidebar(){const box=$("mods");box.innerHTML="";MODULES[S.lang].forEach((t,mi)=>{const active=mi===9;
 let les="";if(active){les='<div class="les">'+M10[S.lang].map((lt,li)=>'<div class="li'+(S.done[li]?" done":"")+(li===S.cur?" cur":"")+'" data-les="'+li+'"><span class="dot">✓</span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+lt+'</span><span class="lx">10.'+(li+1)+'</span></div>').join("")+'</div>';}
 const m=document.createElement("div");m.className="mod"+(active?" active":"");
 const label='<span class="num">'+(mi+1)+'</span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+t+'</span>';
 const mh=active?'<div class="mh">'+label+'</div>':'<a class="mh" href="/academy/courses/computer-internet-essentials/learn/'+MODULE_FIRST_LESSON[mi]+'" target="_top" style="text-decoration:none;color:inherit">'+label+'</a>';
 m.innerHTML=mh+les;box.appendChild(m);});
 box.querySelectorAll("[data-les]").forEach(el=>el.addEventListener("click",()=>load(+el.dataset.les)));}
function renderObj(){const defs=objsFor(S.cur),st=S.st[S.cur]||{};const box=$("objList");box.innerHTML="";
 defs.forEach((d,i)=>{const done=(st.obj||[])[i];const el=document.createElement("div");el.className="obj"+(done?" d":"");el.innerHTML='<span class="bx">✓</span><span class="tx">'+d+'</span>';box.appendChild(el);});}
function setObj(i){const st=S.st[S.cur]||(S.st[S.cur]={});st.obj=st.obj||[];if(st.obj[i])return;st.obj[i]=true;renderObj();
 const defs=objsFor(S.cur);if(defs.length&&st.obj.filter(Boolean).length>=defs.length)finishLesson();}
function finishLesson(){if(!S.done[S.cur]){S.done[S.cur]=true;renderSidebar();syncProg();persistSim();}const b=$("nextBtn");if(b){b.disabled=false;}
 if(S.cur===NL-1)markModuleComplete();}
function syncProg(){const n=S.done.filter(Boolean).length;$("prog").style.width=Math.round(n/NL*100)+"%";$("progText").textContent=n+" / "+NL;}
function nextBar(){const done=S.done[S.cur];return '<div class="nextwrap"><button class="btn p" id="nextBtn" '+(done?"":"disabled")+'>'+UI[S.lang].next+'</button></div>';}
function wireNext(){const n=$("nextBtn");if(n)n.addEventListener("click",()=>load(Math.min(NL-1,S.cur+1)));}

function load(i){S.cur=i;renderSidebar();$("topTag").textContent="Modil 10 · 10."+(i+1);$("topTitle").textContent=M10[S.lang][i];renderObj();
 const st=S.st[i]||(S.st[i]={});st.obj=st.obj||[];
 const fn=[L1,L2,L3,L4,L5,L6,L7,L8,L9][i];fn();
 persistSim();
 if(i===NL-1&&S.done[NL-1])markModuleComplete();}

/* ---------- renderers ---------- */
function labHead(i,lead){return '<div class="labhead fade"><span class="labtag">Modil 10 · 10.'+(i+1)+'</span><div class="labh2">'+M10[S.lang][i]+'</div><p class="lablead">'+lead+'</p></div>';}

function L1(){const d=C[1][S.lang];const st=S.st[0];st.seen=st.seen||{};st.answered=false;
 const stage=$("stage");stage.className="stage lab";
 stage.innerHTML=labHead(0,d.lead)+'<div class="partgrid">'+d.ports.map((it,k)=>'<div class="partcard" data-k="'+k+'"><div class="partart">'+it[0]+'</div><div class="partn">'+it[1]+'</div></div>').join("")+'</div>'+
  '<div style="margin-top:22px;font-weight:700;font-size:15.5px">'+d.trapQ+'</div>'+
  '<div class="cats"><button class="cat" id="tqYes">'+d.yes+'</button><button class="cat" id="tqNo">'+d.no+'</button></div>'+nextBar();
 wireNext();
 stage.querySelectorAll(".partcard[data-k]").forEach(c=>c.addEventListener("click",()=>{const k=+c.dataset.k;
  if(!st.seen[k]){st.seen[k]=true;c.classList.add("done");ai(d.ports[k][2],"neutral");}
  if(Object.keys(st.seen).length>=5)setObj(0);}));
 $("tqYes").addEventListener("click",()=>{if(st.answered)return;st.answered=true;ai(d.yesFb,"warn");setObj(1);});
 $("tqNo").addEventListener("click",()=>{if(st.answered)return;st.answered=true;ai(d.noFb,"good");setObj(1);});
 ai(d.welcome,"neutral");}

function L2(){const d=C[2][S.lang];const st=S.st[1];st.connected=false;st.copied=false;st.answered=false;
 const stage=$("stage");stage.className="stage lab";
 function render(){
  stage.innerHTML=labHead(1,d.lead)+'<div style="display:flex;gap:10px;margin-top:18px;flex-wrap:wrap">'+
    (!st.connected?'<button class="btn p" id="connectBtn">'+d.connectBtn+'</button>':(!st.copied?'<button class="btn g" id="copyBtn">'+d.copyBtn+'</button>':'<button class="btn g" id="ejectBtn">'+d.ejectBtn+'</button>'))+
   '</div>'+
   '<div style="margin-top:22px;font-weight:700;font-size:15.5px">'+d.trapQ+'</div>'+
   '<div class="cats"><button class="cat" id="tqWrong">'+d.trapWrong+'</button><button class="cat" id="tqRight">'+d.trapRight+'</button></div>'+nextBar();
  wireNext();
  const cb=$("connectBtn");if(cb)cb.addEventListener("click",()=>{st.connected=true;ai(d.connectFb,"good");setObj(0);render();});
  const cpb=$("copyBtn");if(cpb)cpb.addEventListener("click",()=>{st.copied=true;ai(d.copyFb,"good");render();});
  const ejb=$("ejectBtn");if(ejb)ejb.addEventListener("click",()=>{ai(d.trapRightFb,"good");});
  $("tqWrong").addEventListener("click",()=>{if(st.answered)return;st.answered=true;ai(d.trapWrongFb,"warn");setObj(1);render();});
  $("tqRight").addEventListener("click",()=>{if(st.answered)return;st.answered=true;ai(d.trapRightFb,"good");setObj(1);render();});
 }
 render();
 ai(d.welcome,"neutral");}

function L3(){const d=C[3][S.lang];const st=S.st[2];st.discovered=false;st.answered=false;st.paired=false;st.asking=false;
 const stage=$("stage");stage.className="stage lab";
 function render(){
  stage.innerHTML=labHead(2,d.lead)+
   (!st.discovered?'<div style="margin-top:18px"><button class="btn p" id="discoverBtn">'+d.discoverBtn+'</button></div>':
    '<div class="panel"><div class="ptb">📶 Bluetooth</div><div class="pbody">'+
     d.devices.map((dev,k)=>'<div class="arow" data-d="'+k+'"><span class="k">'+dev+'</span><span class="ch">›</span></div>').join("")+
    '</div></div>')+
   (st.asking?'<div style="margin-top:22px;font-weight:700;font-size:15.5px">'+d.trapQ+'</div><div class="cats"><button class="cat" id="tqWrong">'+d.trapWrong+'</button><button class="cat" id="tqRight">'+d.trapRight+'</button></div>':"")+
   nextBar();
  wireNext();
  const db=$("discoverBtn");if(db)db.addEventListener("click",()=>{st.discovered=true;ai(d.discoverFb,"neutral");render();});
  stage.querySelectorAll(".arow[data-d]").forEach(r=>r.addEventListener("click",()=>{const k=+r.dataset.d;
   if(k===0){if(!st.paired){st.paired=true;ai(d.pairGoodFb,"good");setObj(0);render();}}
   else{st.asking=true;render();}
  }));
  const tqw=$("tqWrong");if(tqw)tqw.addEventListener("click",()=>{if(st.answered)return;st.answered=true;ai(d.trapWrongFb,"warn");setObj(1);});
  const tqr=$("tqRight");if(tqr)tqr.addEventListener("click",()=>{if(st.answered)return;st.answered=true;ai(d.trapRightFb,"good");setObj(1);});
 }
 render();
 ai(d.welcome,"neutral");}

function L4(){const d=C[4][S.lang];const st=S.st[3];st.tested=false;st.answered=false;
 const stage=$("stage");stage.className="stage lab";
 stage.innerHTML=labHead(3,d.lead)+'<div class="panel"><div class="pbody">'+
   '<div class="selectbox"><span>'+d.camSel+'</span></div>'+
   '<div class="selectbox"><span>'+d.micSel+'</span></div>'+
   '<button class="btn g" id="testBtn">'+d.testBtn+'</button>'+
  '</div></div>'+
  '<div style="margin-top:22px;font-weight:700;font-size:15.5px">'+d.trapQ+'</div>'+
  '<div class="cats"><button class="cat" id="tqWrong">'+d.trapWrong+'</button><button class="cat" id="tqRight">'+d.trapRight+'</button></div>'+nextBar();
 wireNext();
 $("testBtn").addEventListener("click",()=>{if(st.tested)return;st.tested=true;ai(d.testFb,"good");setObj(0);});
 $("tqWrong").addEventListener("click",()=>{if(st.answered)return;st.answered=true;ai(d.trapWrongFb,"warn");setObj(1);});
 $("tqRight").addEventListener("click",()=>{if(st.answered)return;st.answered=true;ai(d.trapRightFb,"good");setObj(1);});
 ai(d.welcome,"neutral");}

function L5(){const d=C[5][S.lang];const st=S.st[4];st.seen=st.seen||{};st.answered=false;
 const stage=$("stage");stage.className="stage lab";
 stage.innerHTML=labHead(4,d.lead)+'<div class="flow">'+d.steps.map((s,k)=>'<div class="node" data-k="'+k+'"><div class="ni">'+s[0]+'</div><div class="nt">'+s[1]+'</div><div class="nd">'+s[2]+'</div></div>'+(k<4?'<span class="arrow">→</span>':'')).join("")+'</div>'+
  '<div style="margin-top:22px;font-weight:700;font-size:15.5px">'+d.trapQ+'</div>'+
  '<div class="cats"><button class="cat" id="tqWrong">'+d.trapWrong+'</button><button class="cat" id="tqRight">'+d.trapRight+'</button></div>'+nextBar();
 wireNext();
 stage.querySelectorAll(".node[data-k]").forEach(n=>n.addEventListener("click",()=>{const k=+n.dataset.k;
  if(!st.seen[k]){st.seen[k]=true;n.classList.add("read");}
  if(Object.keys(st.seen).length>=5)setObj(0);}));
 $("tqWrong").addEventListener("click",()=>{if(st.answered)return;st.answered=true;ai(d.trapWrongFb,"warn");setObj(1);});
 $("tqRight").addEventListener("click",()=>{if(st.answered)return;st.answered=true;ai(d.trapRightFb,"good");setObj(1);});
 ai(d.welcome,"neutral");}

function L6(){const d=C[6][S.lang];const st=S.st[5];st.seen=st.seen||{};st.previewed=false;st.answered=false;
 const stage=$("stage");stage.className="stage lab";
 stage.innerHTML=labHead(5,d.lead)+'<div class="panel"><div class="pbody">'+
   '<div class="selectbox"><span>'+d.printerLbl+'</span></div>'+
   '<div class="selectbox"><span>'+d.pagesLbl+'</span></div>'+
   '<div class="selectbox"><span>'+d.copiesLbl+'</span></div>'+
   '<div class="selectbox"><span>'+d.colorLbl+'</span></div>'+
  '</div></div>'+
  '<div style="margin-top:18px"><button class="btn g" id="previewBtn">'+d.previewBtn+'</button></div>'+
  '<div style="margin-top:22px;font-weight:700;font-size:15.5px">'+d.trapQ+'</div>'+
  '<div class="cats"><button class="cat" id="tqWrong">'+d.trapWrong+'</button><button class="cat" id="tqRight">'+d.trapRight+'</button></div>'+nextBar();
 wireNext();
 stage.querySelectorAll(".selectbox").forEach((box,k)=>box.addEventListener("click",()=>{
  if(!st.seen[k]){st.seen[k]=true;}
  if(Object.keys(st.seen).length>=4)setObj(0);}));
 $("previewBtn").addEventListener("click",()=>{if(st.previewed)return;st.previewed=true;ai(d.previewFb,"good");});
 $("tqWrong").addEventListener("click",()=>{if(st.answered)return;st.answered=true;ai(d.trapWrongFb,"warn");setObj(1);});
 $("tqRight").addEventListener("click",()=>{if(st.answered)return;st.answered=true;ai(d.trapRightFb,"good");setObj(1);});
 ai(d.welcome,"neutral");}

function L7(){const d=C[7][S.lang];const st=S.st[6];st.scanned=false;st.answered=false;
 const stage=$("stage");stage.className="stage lab";
 stage.innerHTML=labHead(6,d.lead)+'<div class="panel"><div class="pbody">'+
   '<div class="selectbox"><span>'+d.formatLbl+'</span></div>'+
   '<button class="btn p" id="scanBtn">'+d.scanBtn+'</button>'+
  '</div></div>'+
  '<div style="margin-top:22px;font-weight:700;font-size:15.5px">'+d.trapQ+'</div>'+
  '<div class="cats"><button class="cat" id="tqWrong">'+d.trapWrong+'</button><button class="cat" id="tqRight">'+d.trapRight+'</button></div>'+nextBar();
 wireNext();
 $("scanBtn").addEventListener("click",()=>{if(st.scanned)return;st.scanned=true;ai(d.scanFb,"good");setObj(0);});
 $("tqWrong").addEventListener("click",()=>{if(st.answered)return;st.answered=true;ai(d.trapWrongFb,"warn");setObj(1);});
 $("tqRight").addEventListener("click",()=>{if(st.answered)return;st.answered=true;ai(d.trapRightFb,"good");setObj(1);});
 ai(d.welcome,"neutral");}

function L8(){const d=C[8][S.lang];const st=S.st[7];st.seen=st.seen||{};st.answered=false;
 const stage=$("stage");stage.className="stage lab";
 stage.innerHTML=labHead(7,d.lead)+'<div class="partgrid" style="grid-template-columns:repeat(3,170px)">'+d.steps.map((s,k)=>'<div class="partcard" data-k="'+k+'"><div class="partn">'+s[0]+'</div></div>').join("")+'</div>'+
  '<div style="margin-top:22px;font-weight:700;font-size:15.5px">'+d.trapQ+'</div>'+
  '<div class="cats"><button class="cat" id="tqWrong">'+d.trapWrong+'</button><button class="cat" id="tqRight">'+d.trapRight+'</button></div>'+nextBar();
 wireNext();
 stage.querySelectorAll(".partcard[data-k]").forEach(c=>c.addEventListener("click",()=>{const k=+c.dataset.k;
  if(!st.seen[k]){st.seen[k]=true;c.classList.add("done");ai(d.steps[k][1],"neutral");}
  if(Object.keys(st.seen).length>=6)setObj(0);}));
 $("tqWrong").addEventListener("click",()=>{if(st.answered)return;st.answered=true;ai(d.trapWrongFb,"warn");setObj(1);});
 $("tqRight").addEventListener("click",()=>{if(st.answered)return;st.answered=true;ai(d.trapRightFb,"good");setObj(1);});
 ai(d.welcome,"neutral");}

function L9(){const d=C[9][S.lang];const st=S.st[8];st.done4=st.done4||{};
 const stage=$("stage");stage.className="stage lab";
 stage.innerHTML=labHead(8,d.lead)+'<div class="items" style="display:flex;flex-wrap:wrap;gap:10px;margin-top:18px">'+d.steps.map((s,k)=>'<div class="chip" data-s="'+k+'"'+(st.done4[k]?' style="opacity:.4"':"")+'>'+(st.done4[k]?"✓ ":"")+s+'</div>').join("")+'</div>'+nextBar();
 wireNext();
 stage.querySelectorAll(".chip[data-s]").forEach(c=>c.addEventListener("click",()=>{const k=+c.dataset.s;if(st.done4[k])return;st.done4[k]=true;
  ai(d.stepFb,"good");setObj(k);c.style.opacity=".4";c.innerHTML="✓ "+d.steps[k];}));
 ai(d.welcome,"neutral");}

/* ---------- lang / reset ---------- */
function applyLang(){document.documentElement.lang=S.lang;$("cs").textContent=UI[S.lang].cs;$("lblProg").textContent=UI[S.lang].prog;$("lblObj").textContent=UI[S.lang].obj;$("aiName").textContent=UI[S.lang].ai;
 renderSidebar();syncProg();load(S.cur);}
$("langs").querySelectorAll("button").forEach(b=>b.addEventListener("click",()=>{S.lang=b.dataset.l;$("langs").querySelectorAll("button").forEach(x=>x.classList.toggle("on",x.dataset.l===S.lang));applyLang();}));
$("resetBtn").addEventListener("click",()=>{S.done=Array(NL).fill(false);S.st={};persistSim();renderSidebar();syncProg();load(S.cur);});
/* init */
loadSim();
applyLang();
</script>
