 fr:{lead:"Vitesse et signal ne sont pas la même chose. Comparez-les ci-dessous, et voyez quelle activité utilise plus de données.",

   trapWrong:"Oui, signal plein veut toujours dire vitesse rapide",trapRight:"Non, d'autres facteurs (beaucoup de monde sur le réseau, etc.) peuvent le ralentir même avec un bon signal",
   trapWrongFb:"Pas toujours vrai ! Un signal fort veut dire que vous êtes PRÈS de l'appareil Wi-Fi, mais la vitesse réelle dépend aussi du nombre de personnes utilisant le réseau, et de la vitesse fournie par le fournisseur.",

 en:{lead:"Speed and signal aren't the same thing. Compare them below, and see which activity uses more data.",

   trapWrong:"Yes, full signal always means fast speed",trapRight:"No, other factors (many people on the network, etc.) can slow it down even with good signal",
   trapWrongFb:"Not always true! Strong signal means you're CLOSE to the Wi-Fi device, but real speed also depends on how many people are using the network, and the speed the provider gives.",
   trapRightFb:"Exactly! A good signal doesn't guarantee a fast connection — several devices on the same network at once can slow it down even with full signal.",

 en:{lead:"Wi-Fi says 'connected' but no site opens? Follow a calm sequence instead of panicking.",

   trapQ:"First thing to do if Wi-Fi says 'connected' but there's no internet: unplug the router's cable without thinking?",

/* ============ engine ============ */
const NL=9;
const S={lang:"ht",cur:0,done:Array(NL).fill(false),st:{}};
const $=id=>document.getElementById(id);
let aiT=null;
function ai(msg,mood){if(aiT){clearInterval(aiT);aiT=null;}$("aiAva").textContent=mood==="good"?"😄":mood==="bad"?"😬":mood==="warn"?"⚠️":"🤖";
 const b=$("aiMsg");b.textContent="";let i=0;aiT=setInterval(()=>{i+=2;b.textContent=msg.slice(0,i);if(i>=msg.length){b.textContent=msg;clearInterval(aiT);aiT=null;}},13);}
function objsFor(i){return (C[i+1]&&C[i+1][S.lang].objs)||[];}
const SIM_KEY="jamezzi:computer:essentials:module6-sim-state";
const PROGRESS_KEY="jamezzi:computer:essentials:completed";
const PROGRESS_EVENT="jamezzi:course-progress-changed";
const MOD6_LESSON_SLUGS=["kisa-ki-se-entenet-la","founise-entenet-modem-route-ak-wifi","konekte-sou-wifi-san-danje","wifi-done-selile-ak-hotspot","vites-konesyon-siyal-ak-itilizasyon-done","le-wifi-di-konekte-men-entenet-pa-mache","telechaje-ak-voye","kod-qr-lyen-ak-adres-web","misyon-konekte-epi-eksplike"];
const MODULE_FIRST_LESSON=["byenveni-ou-pa-pral-kraze-anyen","sa-ki-rive-le-ou-peze-bouton-pouvwa-a","konfyans-souri-ak-trackpad","kisa-yon-fichye-ye","kisa-yon-aplikasyon-ye","","navigate-mote-rechech-sit-web-ak-paj-web","kijan-imel-mache","estokaj-lokal-ak-estokaj-cloud","po-ak-konekte","kisa-ki-bezwen-pwoteje","anvan-ou-achte-kominse-ak-travay-la","panse-tankou-yon-moun-ki-rezoud-pwoblem","bati-yon-sistem-oganizasyon-dijital-senp"];
function persistSim(){try{window.localStorage.setItem(SIM_KEY,JSON.stringify({done:S.done,cur:S.cur,st:S.st}));}catch(e){}}
function loadSim(){try{const raw=window.localStorage.getItem(SIM_KEY);if(!raw)return;const saved=JSON.parse(raw);
 if(Array.isArray(saved.done)&&saved.done.length===NL)S.done=saved.done;
 if(typeof saved.cur==="number"&&saved.cur>=0&&saved.cur<NL)S.cur=saved.cur;
 if(saved.st&&typeof saved.st==="object")S.st=saved.st;
}catch(e){}}
function markModuleComplete(){
 if(!S.done.every(Boolean))return;
 try{
  const raw=window.localStorage.getItem(PROGRESS_KEY);
  const parsed=raw?JSON.parse(raw):[];
  const list=Array.isArray(parsed)?parsed:[];
  let changed=false;
  MOD6_LESSON_SLUGS.forEach(slug=>{if(!list.includes(slug)){list.push(slug);changed=true;}});
  if(changed){
   window.localStorage.setItem(PROGRESS_KEY,JSON.stringify(list));
   window.parent.dispatchEvent(new CustomEvent(PROGRESS_EVENT,{detail:{storageKey:PROGRESS_KEY}}));
  }
 }catch(e){}
 injectContinueModule7();
}
function injectContinueModule7(){
 if($("continueCheckpoint2"))return;
 const a=document.createElement("a");a.id="continueCheckpoint2";a.className="btn p";a.textContent=UI[S.lang].nextModule;
 a.href="/academy/courses/computer-internet-essentials/learn/checkpoint-2";a.target="_top";
 a.style.cssText="display:inline-block;margin-top:18px;text-decoration:none";
 $("stage").appendChild(a);
}
function renderSidebar(){const box=$("mods");box.innerHTML="";MODULES[S.lang].forEach((t,mi)=>{const active=mi===5;
 let les="";if(active){les='<div class="les">'+M6[S.lang].map((lt,li)=>'<div class="li'+(S.done[li]?" done":"")+(li===S.cur?" cur":"")+'" data-les="'+li+'"><span class="dot">✓</span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+lt+'</span><span class="lx">6.'+(li+1)+'</span></div>').join("")+'</div>';}
 const m=document.createElement("div");m.className="mod"+(active?" active":"");
 const label='<span class="num">'+(mi+1)+'</span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+t+'</span>';
 const mh=active?'<div class="mh">'+label+'</div>':'<a class="mh" href="/academy/courses/computer-internet-essentials/learn/'+MODULE_FIRST_LESSON[mi]+'" target="_top" style="text-decoration:none;color:inherit">'+label+'</a>';
 m.innerHTML=mh+les;box.appendChild(m);});
 box.querySelectorAll("[data-les]").forEach(el=>el.addEventListener("click",()=>load(+el.dataset.les)));}
function renderObj(){const defs=objsFor(S.cur),st=S.st[S.cur]||{};const box=$("objList");box.innerHTML="";
 defs.forEach((d,i)=>{const done=(st.obj||[])[i];const el=document.createElement("div");el.className="obj"+(done?" d":"");el.innerHTML='<span class="bx">✓</span><span class="tx">'+d+'</span>';box.appendChild(el);});}
function setObj(i){const st=S.st[S.cur]||(S.st[S.cur]={});st.obj=st.obj||[];if(st.obj[i])return;st.obj[i]=true;renderObj();
 const defs=objsFor(S.cur);if(defs.length&&st.obj.filter(Boolean).length>=defs.length)finishLesson();}
function finishLesson(){if(!S.done[S.cur]){S.done[S.cur]=true;renderSidebar();syncProg();persistSim();}const b=$("nextBtn");if(b){b.disabled=false;}
 if(S.cur===NL-1)markModuleComplete();}
function syncProg(){const n=S.done.filter(Boolean).length;$("prog").style.width=Math.round(n/NL*100)+"%";$("progText").textContent=n+" / "+NL;}
function nextBar(){const done=S.done[S.cur];return '<div class="nextwrap"><button class="btn p" id="nextBtn" '+(done?"":"disabled")+'>'+UI[S.lang].next+'</button></div>';}
function wireNext(){const n=$("nextBtn");if(n)n.addEventListener("click",()=>load(Math.min(NL-1,S.cur+1)));}

function load(i){S.cur=i;renderSidebar();$("topTag").textContent="Modil 6 · 6."+(i+1);$("topTitle").textContent=M6[S.lang][i];renderObj();
 const st=S.st[i]||(S.st[i]={});st.obj=st.obj||[];
 const fn=[L1,L2,L3,L4,L5,L6,L7,L8,L9][i];fn();
 persistSim();
 if(i===NL-1&&S.done[NL-1])markModuleComplete();}

/* ---------- renderers ---------- */
function labHead(i,lead){return '<div class="labhead fade"><span class="labtag">Modil 6 · 6.'+(i+1)+'</span><div class="labh2">'+M6[S.lang][i]+'</div><p class="lablead">'+lead+'</p></div>';}

function L1(){const d=C[1][S.lang];const st=S.st[0];st.seen=st.seen||{};st.answered=false;
 const stage=$("stage");stage.className="stage lab";
 stage.innerHTML=labHead(0,d.lead)+'<div class="partgrid" style="grid-template-columns:repeat(3,160px)">'+d.items.map((it,k)=>'<div class="partcard" data-k="'+k+'"><div class="partart">'+it[0]+'</div><div class="partn">'+it[1]+'</div></div>').join("")+'</div>'+
  '<div style="margin-top:22px;font-weight:700;font-size:15.5px">'+d.trapQ+'</div>'+
  '<div class="cats"><button class="cat" id="tqYes">'+d.yes+'</button><button class="cat" id="tqNo">'+d.no+'</button></div>'+nextBar();
 wireNext();
 stage.querySelectorAll(".partcard[data-k]").forEach(c=>c.addEventListener("click",()=>{const k=+c.dataset.k;
  if(!st.seen[k]){st.seen[k]=true;c.classList.add("done");ai(d.items[k][2],"neutral");}
  if(Object.keys(st.seen).length>=3)setObj(0);}));
 $("tqYes").addEventListener("click",()=>{if(st.answered)return;st.answered=true;ai(d.yesFb,"warn");setObj(1);});
 $("tqNo").addEventListener("click",()=>{if(st.answered)return;st.answered=true;ai(d.noFb,"good");setObj(1);});
 ai(d.welcome,"neutral");}

function L2(){const d=C[2][S.lang];const st=S.st[1];st.seen=st.seen||{};st.answered=false;
 const stage=$("stage");stage.className="stage lab";
 stage.innerHTML=labHead(1,d.lead)+'<div class="flow">'+d.chain.map((c,k)=>'<div class="node" data-k="'+k+'"><div class="ni">'+c[0]+'</div><div class="nt">'+c[1]+'</div><div class="nd">'+c[2]+'</div></div>'+(k<3?'<span class="arrow">→</span>':'')).join("")+'</div>'+
  '<div style="margin-top:22px;font-weight:700;font-size:15.5px">'+d.trapQ+'</div>'+
  '<div class="cats"><button class="cat" id="tqWrong">'+d.trapWrong+'</button><button class="cat" id="tqRight">'+d.trapRight+'</button></div>'+nextBar();
 wireNext();
 stage.querySelectorAll(".node[data-k]").forEach(n=>n.addEventListener("click",()=>{const k=+n.dataset.k;
  if(!st.seen[k]){st.seen[k]=true;n.classList.add("read");}
  if(Object.keys(st.seen).length>=4)setObj(0);}));
 $("tqWrong").addEventListener("click",()=>{if(st.answered)return;st.answered=true;ai(d.trapWrongFb,"warn");setObj(1);});
 $("tqRight").addEventListener("click",()=>{if(st.answered)return;st.answered=true;ai(d.trapRightFb,"good");setObj(1);});
 ai(d.welcome,"neutral");}

function L3(){const d=C[3][S.lang];const st=S.st[2];st.connected=false;
 const stage=$("stage");stage.className="stage lab";
 stage.innerHTML=labHead(2,d.lead)+'<div class="winpanel"><div class="wtb">📶 Wi-Fi</div><div class="wbody">'+
   d.networks.map((n,k)=>'<div class="arow" data-n="'+k+'"><span class="k">'+n[0]+'<div class="sub">'+n[1]+'</div></span><span class="ch">›</span></div>').join("")+
  '</div></div>'+nextBar();
 wireNext();
 stage.querySelectorAll(".arow[data-n]").forEach(r=>r.addEventListener("click",()=>{const k=+r.dataset.n;
  if(k===2){ai(d.openFb,"warn");setObj(1);}
  else{if(!st.connected){st.connected=true;ai(d.safeFb,"good");setObj(0);}}
 }));
 ai(d.welcome,"neutral");}

function L4(){const d=C[4][S.lang];const st=S.st[3];st.on=false;st.connected=false;st.answered=false;
 const stage=$("stage");stage.className="stage lab";
 function render(){
  stage.innerHTML=labHead(3,d.lead)+'<div class="winpanel"><div class="wtb">📱 '+d.toggleLbl+'</div><div class="wbody">'+
    (!st.on?'<button class="btn p" id="toggleBtn">'+d.toggleLbl+' — ON</button>':(!st.connected?'<button class="btn g" id="connectBtn">'+d.connectBtn+'</button>':'<div style="color:var(--good);font-weight:600">✓ '+d.connectFb+'</div>'))+
   '</div></div>'+
   '<div style="margin-top:22px;font-weight:700;font-size:15.5px">'+d.trapQ+'</div>'+
   '<div class="cats"><button class="cat" id="tqWrong">'+d.trapWrong+'</button><button class="cat" id="tqRight">'+d.trapRight+'</button></div>'+nextBar();
  wireNext();
  const tb=$("toggleBtn");if(tb)tb.addEventListener("click",()=>{st.on=true;ai(d.toggleFb,"good");render();});
  const cb=$("connectBtn");if(cb)cb.addEventListener("click",()=>{st.connected=true;ai(d.connectFb,"good");setObj(0);render();});
  $("tqWrong").addEventListener("click",()=>{if(st.answered)return;st.answered=true;ai(d.trapWrongFb,"warn");setObj(1);render();});
  $("tqRight").addEventListener("click",()=>{if(st.answered)return;st.answered=true;ai(d.trapRightFb,"good");setObj(1);render();});
 }
 render();
 ai(d.welcome,"neutral");}

function L5(){const d=C[5][S.lang];const st=S.st[4];st.seen=st.seen||{};st.answered=false;
 const stage=$("stage");stage.className="stage lab";
 stage.innerHTML=labHead(4,d.lead)+
  '<div style="display:flex;gap:40px;margin-top:20px;flex-wrap:wrap">'+
   '<div><div style="font-size:12.5px;color:var(--mute);margin-bottom:8px">'+d.signalLbl+'</div><div class="meter" id="sigMeter">'+[1,2,3,4,5].map(n=>'<i style="height:'+(n*7)+'px" class="on"></i>').join("")+'</div></div>'+
   '<div><div style="font-size:12.5px;color:var(--mute);margin-bottom:8px">'+d.speedLbl+'</div><div class="meter" id="spdMeter">'+[1,2,3].map(n=>'<i style="height:'+(n*7)+'px" class="on"></i>').join("")+[4,5].map(n=>'<i style="height:'+(n*7)+'px"></i>').join("")+'</div></div>'+
  '</div>'+
  '<div style="display:flex;gap:12px;margin-top:26px">'+
   '<button class="chip" id="textBtn">💬 '+d.textLbl+'</button>'+
   '<button class="chip" id="videoBtn">📹 '+d.videoLbl+'</button>'+
  '</div>'+
  '<div style="margin-top:22px;font-weight:700;font-size:15.5px">'+d.trapQ+'</div>'+
  '<div class="cats"><button class="cat" id="tqWrong">'+d.trapWrong+'</button><button class="cat" id="tqRight">'+d.trapRight+'</button></div>'+nextBar();
 wireNext();
 function seen(k,msg){if(!st.seen[k]){st.seen[k]=true;ai(msg,"neutral");}if(Object.keys(st.seen).length>=2)setObj(0);}
 $("textBtn").addEventListener("click",()=>seen("text",d.textFb));

 $("tqWrong").addEventListener("click",()=>{if(st.answered)return;st.answered=true;ai(d.trapWrongFb,"warn");setObj(1);});
 $("tqRight").addEventListener("click",()=>{if(st.answered)return;st.answered=true;ai(d.trapRightFb,"good");setObj(1);});
 ai(d.welcome,"neutral");}

 stage.innerHTML=labHead(5,d.lead)+'<div class="partgrid">'+d.steps.map((s,k)=>'<div class="partcard" data-k="'+k+'"><div class="partn">'+s[0]+'</div></div>').join("")+'</div>'+

 $("tqWrong").addEventListener("click",()=>{if(st.answered)return;st.answered=true;ai(d.trapWrongFb,"warn");setObj(1);});
 $("tqRight").addEventListener("click",()=>{if(st.answered)return;st.answered=true;ai(d.trapRightFb,"good");setObj(1);});

applyLang();
