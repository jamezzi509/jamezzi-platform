 files:'<path d="M6 22a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h8a2.4 2.4 0 0 1 1.704.706l3.588 3.588A2.4 2.4 0 0 1 20 8v12a2 2 0 0 1-2 2z"/><path d="M14 2v5a1 1 0 0 0 1 1h5"/>',
 bell:'<path d="M10.268 21a2 2 0 0 0 3.464 0"/><path d="M3.262 15.326A1 1 0 0 0 4 17h16a1 1 0 0 0 .74-1.673C19.41 13.956 18 12.499 18 8A6 6 0 0 0 6 8c0 4.499-1.411 5.956-2.738 7.326"/>'};
function liIcon(name){return '<svg class="ti" viewBox="0 0 24 24" fill="none" stroke="#5c5c5c" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">'+LI[name]+'</svg>';}

/* ============ engine ============ */
const NL=9;
const S={lang:"ht",cur:0,done:Array(NL).fill(false),st:{}};
const $=id=>document.getElementById(id);
let aiT=null;
function ai(msg,mood){if(aiT){clearInterval(aiT);aiT=null;}$("aiAva").textContent=mood==="good"?"😄":mood==="bad"?"😬":mood==="warn"?"⚠️":"🤖";
 const b=$("aiMsg");b.textContent="";let i=0;aiT=setInterval(()=>{i+=2;b.textContent=msg.slice(0,i);if(i>=msg.length){b.textContent=msg;clearInterval(aiT);aiT=null;}},13);}
function objsFor(i){return (C[i+1]&&C[i+1][S.lang].objs)||[];}
const SIM_KEY="jamezzi:computer:essentials:module5-sim-state";
const PROGRESS_KEY="jamezzi:computer:essentials:completed";
const PROGRESS_EVENT="jamezzi:course-progress-changed";
const MOD5_LESSON_SLUGS=["kisa-yon-aplikasyon-ye","kote-san-danje-pou-jwenn-aplikasyon","enstale-yon-aplikasyon","mete-ajou-ak-retire-yon-aplikasyon","louvri-modifye-sovgade-ak-feme-yon-dokiman","sa-ou-dwe-konnen-sou-pdf","aplikasyon-pa-defo","pemisyon-aplikasyon","misyon-prepare-yon-dokiman"];
const MODULE_FIRST_LESSON=["byenveni-ou-pa-pral-kraze-anyen","sa-ki-rive-le-ou-peze-bouton-pouvwa-a","konfyans-souri-ak-trackpad","kisa-yon-fichye-ye","","kisa-ki-se-entenet-la","navigate-mote-rechech-sit-web-ak-paj-web","kijan-imel-mache","estokaj-lokal-ak-estokaj-cloud","po-ak-konekte","kisa-ki-bezwen-pwoteje","anvan-ou-achte-kominse-ak-travay-la","panse-tankou-yon-moun-ki-rezoud-pwoblem","bati-yon-sistem-oganizasyon-dijital-senp"];
function persistSim(){try{window.localStorage.setItem(SIM_KEY,JSON.stringify({done:S.done,cur:S.cur,st:S.st}));}catch(e){}}
function loadSim(){try{const raw=window.localStorage.getItem(SIM_KEY);if(!raw)return;const saved=JSON.parse(raw);
 if(Array.isArray(saved.done)&&saved.done.length===NL)S.done=saved.done;
 if(typeof saved.cur==="number"&&saved.cur>=0&&saved.cur<NL)S.cur=saved.cur;
 if(saved.st&&typeof saved.st==="object")S.st=saved.st;
}catch(e){}}
function markModuleComplete(){
 if(!S.done.every(Boolean))return;
 try{
  const raw=window.localStorage.getItem(PROGRESS_KEY);
  const parsed=raw?JSON.parse(raw):[];
  const list=Array.isArray(parsed)?parsed:[];
  let changed=false;
  MOD5_LESSON_SLUGS.forEach(slug=>{if(!list.includes(slug)){list.push(slug);changed=true;}});
  if(changed){
   window.localStorage.setItem(PROGRESS_KEY,JSON.stringify(list));
   window.parent.dispatchEvent(new CustomEvent(PROGRESS_EVENT,{detail:{storageKey:PROGRESS_KEY}}));
  }
 }catch(e){}
 injectContinueModule6();
}
function injectContinueModule6(){
 if($("continueModule6"))return;
 const a=document.createElement("a");a.id="continueModule6";a.className="btn p";a.textContent=UI[S.lang].nextModule;
 a.href="/academy/courses/computer-internet-essentials/learn/"+MODULE_FIRST_LESSON[5];a.target="_top";
 a.style.cssText="display:inline-block;margin-top:18px;text-decoration:none";
 $("stage").appendChild(a);
}
function renderSidebar(){const box=$("mods");box.innerHTML="";MODULES[S.lang].forEach((t,mi)=>{const active=mi===4;
 let les="";if(active){les='<div class="les">'+M5[S.lang].map((lt,li)=>'<div class="li'+(S.done[li]?" done":"")+(li===S.cur?" cur":"")+'" data-les="'+li+'"><span class="dot">✓</span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+lt+'</span><span class="lx">5.'+(li+1)+'</span></div>').join("")+'</div>';}
 const m=document.createElement("div");m.className="mod"+(active?" active":"");
 const label='<span class="num">'+(mi+1)+'</span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+t+'</span>';
 const mh=active?'<div class="mh">'+label+'</div>':'<a class="mh" href="/academy/courses/computer-internet-essentials/learn/'+MODULE_FIRST_LESSON[mi]+'" target="_top" style="text-decoration:none;color:inherit">'+label+'</a>';
 m.innerHTML=mh+les;box.appendChild(m);});
 box.querySelectorAll("[data-les]").forEach(el=>el.addEventListener("click",()=>load(+el.dataset.les)));}
function renderObj(){const defs=objsFor(S.cur),st=S.st[S.cur]||{};const box=$("objList");box.innerHTML="";
 defs.forEach((d,i)=>{const done=(st.obj||[])[i];const el=document.createElement("div");el.className="obj"+(done?" d":"");el.innerHTML='<span class="bx">✓</span><span class="tx">'+d+'</span>';box.appendChild(el);});}
function setObj(i){const st=S.st[S.cur]||(S.st[S.cur]={});st.obj=st.obj||[];if(st.obj[i])return;st.obj[i]=true;renderObj();
 const defs=objsFor(S.cur);if(defs.length&&st.obj.filter(Boolean).length>=defs.length)finishLesson();}
function finishLesson(){if(!S.done[S.cur]){S.done[S.cur]=true;renderSidebar();syncProg();persistSim();}const b=$("nextBtn");if(b){b.disabled=false;}
 if(S.cur===NL-1)markModuleComplete();}
function syncProg(){const n=S.done.filter(Boolean).length;$("prog").style.width=Math.round(n/NL*100)+"%";$("progText").textContent=n+" / "+NL;}
function nextBar(){const done=S.done[S.cur];return '<div class="nextwrap"><button class="btn p" id="nextBtn" '+(done?"":"disabled")+'>'+UI[S.lang].next+'</button></div>';}
function wireNext(){const n=$("nextBtn");if(n)n.addEventListener("click",()=>load(Math.min(NL-1,S.cur+1)));}

function load(i){S.cur=i;renderSidebar();$("topTag").textContent="Modil 5 · 5."+(i+1);$("topTitle").textContent=M5[S.lang][i];renderObj();
 const st=S.st[i]||(S.st[i]={});st.obj=st.obj||[];
 const fn=[L1,L2,L3,L4,L5,L6,L7,L8,L9][i];fn();
 persistSim();
 if(i===NL-1&&S.done[NL-1])markModuleComplete();}

/* ---------- renderers ---------- */
function labHead(i,lead){return '<div class="labhead fade"><span class="labtag">Modil 5 · 5.'+(i+1)+'</span><div class="labh2">'+M5[S.lang][i]+'</div><p class="lablead">'+lead+'</p></div>';}

function L1(){const d=C[1][S.lang];const st=S.st[0];st.seen=st.seen||{};st.answered=false;
 const stage=$("stage");stage.className="stage lab";
 stage.innerHTML=labHead(0,d.lead)+'<div class="partgrid" style="grid-template-columns:repeat(3,160px)">'+d.items.map((it,k)=>'<div class="partcard" data-k="'+k+'"><div class="partart">'+it[0]+'</div><div class="partn">'+it[1]+'</div></div>').join("")+'</div>'+
  '<div style="margin-top:22px;font-weight:700;font-size:15.5px">'+d.trapQ+'</div>'+
  '<div class="cats"><button class="cat" id="tqYes">'+d.yes+'</button><button class="cat" id="tqNo">'+d.no+'</button></div>'+nextBar();
 wireNext();
 stage.querySelectorAll(".partcard[data-k]").forEach(c=>c.addEventListener("click",()=>{const k=+c.dataset.k;
  if(!st.seen[k]){st.seen[k]=true;c.classList.add("done");ai(d.items[k][2],"neutral");}
  if(Object.keys(st.seen).length>=3)setObj(0);}));
 $("tqYes").addEventListener("click",()=>{if(st.answered)return;st.answered=true;ai(d.yesFb,"warn");setObj(1);});
 $("tqNo").addEventListener("click",()=>{if(st.answered)return;st.answered=true;ai(d.noFb,"good");setObj(1);});
 ai(d.welcome,"neutral");}

function L2(){const d=C[2][S.lang];const st=S.st[1];st.store=false;st.official=false;st.answered=false;
 const stage=$("stage");stage.className="stage lab";
 stage.innerHTML=labHead(1,d.lead)+'<div class="partgrid" style="grid-template-columns:repeat(2,180px)">'+
   '<div class="partcard" id="storeCard"><div class="partart">'+d.store[0]+'</div><div class="partn">'+d.store[1]+'</div></div>'+
   '<div class="partcard" id="officialCard"><div class="partart">'+d.official[0]+'</div><div class="partn">'+d.official[1]+'</div></div>'+
  '</div>'+
  '<div style="margin-top:26px;display:flex;flex-direction:column;gap:10px;max-width:340px">'+
   '<button class="chip" id="fakeBtn" style="background:#2a7d2a;color:#fff;border-color:#2a7d2a;font-size:16px;justify-content:center">'+d.fakeBtn+'<span style="font-size:11px;opacity:.8;margin-left:6px">'+d.fakeSub+'</span></button>'+
   '<button class="chip" id="realBtn" style="justify-content:center">'+d.realBtn+'<span style="font-size:11px;color:var(--mute);margin-left:6px">'+d.realSub+'</span></button>'+
  '</div>'+nextBar();
 wireNext();
 function check(){if(st.store&&st.official)setObj(0);}
 $("storeCard").addEventListener("click",()=>{if(st.store)return;st.store=true;$("storeCard").classList.add("done");ai(d.storeFb,"good");check();});
 $("officialCard").addEventListener("click",()=>{if(st.official)return;st.official=true;$("officialCard").classList.add("done");ai(d.officialFb,"good");check();});
 $("fakeBtn").addEventListener("click",()=>{if(st.answered)return;st.answered=true;ai(d.fakeFb,"warn");setObj(1);});
 $("realBtn").addEventListener("click",()=>{if(st.answered)return;st.answered=true;ai(d.realFb,"good");setObj(1);});
 ai(d.welcome,"neutral");}

function L3(){const d=C[3][S.lang];const st=S.st[2];st.open=false;st.unchecked=false;st.done1=false;
 const stage=$("stage");stage.className="stage lab";
 function render(){
  stage.innerHTML=labHead(2,d.lead)+(!st.open?'<div style="margin-top:20px"><button class="btn p" id="installBtn">'+d.installBtn+'</button></div>':'')+
   (st.open&&!st.done1?'<div class="ovl"><div class="dialog"><div class="dtb">'+d.dTitle+'</div><div class="dbody">'+d.dBody+
     '<label class="dchk"><input type="checkbox" id="bundleChk" checked/> '+d.dChk+'</label></div>'+
     '<div class="dactions"><button class="dbtn sec" id="dCancel">'+d.dCancel+'</button><button class="dbtn pri" id="dContinue">'+d.dContinue+'</button></div></div></div>':"")+
   (st.done1?'<div style="margin-top:20px;font-weight:600;color:var(--good)">✓ '+d.installedFb+'</div>':"")+
   nextBar();
  wireNext();
  const ib=$("installBtn");if(ib)ib.addEventListener("click",()=>{st.open=true;render();});
  const dc=$("dContinue");if(dc)dc.addEventListener("click",()=>{
   const chk=$("bundleChk");
   if(chk.checked){ai(d.bundleFb,"warn");}
   else{st.unchecked=true;ai(d.goodFb,"good");setObj(1);st.done1=true;setObj(0);render();return;}
  });
  const dcancel=$("dCancel");if(dcancel)dcancel.addEventListener("click",()=>{st.open=false;render();});
 }
 render();
 ai(d.welcome,"neutral");}

function L4(){const d=C[4][S.lang];const st=S.st[3];st.updated=false;st.iconSeen=false;
 const stage=$("stage");stage.className="stage lab";
 function render(){
  stage.innerHTML=labHead(3,d.lead)+'<div class="winpanel"><div class="wtb">'+d.appName+(st.updated?' — ✓':' — mizajou disponib')+'</div><div class="wbody">'+
    (!st.updated?'<button class="btn p" id="updateBtn">'+d.updateBtn+'</button>':'<div style="display:flex;gap:10px"><button class="btn g" id="iconBtn">'+d.iconBtn+'</button><button class="btn g" id="uninstallBtn">'+d.uninstallBtn+'</button></div>')+
   '</div></div>'+nextBar();
  wireNext();
  const ub=$("updateBtn");if(ub)ub.addEventListener("click",()=>{st.updated=true;ai(d.updatedFb,"good");setObj(0);render();});
  const icb=$("iconBtn");if(icb)icb.addEventListener("click",()=>{st.iconSeen=true;ai(d.iconFb,"warn");setObj(1);});
  const unb=$("uninstallBtn");if(unb)unb.addEventListener("click",()=>{ai(d.uninstallFb,"good");setObj(1);});
 }
 render();
 ai(d.welcome,"neutral");}

function L5(){const d=C[5][S.lang];const st=S.st[4];st.edited=false;st.saved=false;st.editedAgain=false;
 const stage=$("stage");stage.className="stage lab";
 function render(){
  stage.innerHTML=labHead(4,d.lead)+'<div class="winpanel"><div class="wtb">'+d.docTitle+(st.saved&&!st.editedAgain?"":"*")+'</div><div class="wbody" style="font-family:Georgia,serif;font-size:14px;color:#333">'+
    (st.edited?d.editedText:"Lorem ipsum dolor sit amet...")+'</div></div>'+
   '<div style="display:flex;gap:10px;margin-top:16px">'+
    '<button class="btn g" id="editBtn">'+d.editBtn+'</button>'+
    '<button class="btn g" id="saveBtn">'+d.saveBtn+'</button>'+
    '<button class="btn p" id="closeBtn">'+d.closeBtn+'</button>'+
   '</div>'+nextBar();
  wireNext();
  $("editBtn").addEventListener("click",()=>{if(st.saved&&!st.edited){st.editedAgain=true;}st.edited=true;ai(d.editFb,"neutral");render();});
  $("saveBtn").addEventListener("click",()=>{if(!st.edited)return;st.saved=true;st.editedAgain=false;ai(d.saveFb,"good");setObj(0);render();});
  $("closeBtn").addEventListener("click",()=>{
   if(st.saved&&!st.editedAgain){ai(d.closeSafeFb,"good");setObj(1);}
   else{ai(d.closeTrapFb,"warn");setObj(1);}
  });
 }
 render();
 ai(d.welcome,"neutral");}

function L6(){const d=C[6][S.lang];const st=S.st[5];st.page=1;st.seen=st.seen||{};st.answered=false;
 const stage=$("stage");stage.className="stage lab";
 function render(){
  stage.innerHTML=labHead(5,d.lead)+'<div class="pdfshell"><div class="pdftb"><button id="navBtn" title="'+d.navBtn+'">▶</button><span class="pg">'+st.page+' / 3</span><button id="zoomBtn" title="'+d.zoomBtn+'">🔍</button><button id="searchBtn" title="'+d.searchBtn+'">🔎</button><button id="downloadBtn" title="'+d.downloadBtn+'">⬇</button><button id="printBtn" title="'+d.printBtn+'">🖨</button></div><div class="pdfpage">'+d.pageText+'</div></div>'+
   '<div style="margin-top:22px;font-weight:700;font-size:15.5px">'+d.trapQ+'</div>'+
   '<div class="cats"><button class="cat" id="tqYes">'+d.yes+'</button><button class="cat" id="tqNo">'+d.no+'</button></div>'+nextBar();
  wireNext();
  function seen(k,msg){if(!st.seen[k]){st.seen[k]=true;ai(msg,"neutral");}if(Object.keys(st.seen).length>=3)setObj(0);}
  $("navBtn").addEventListener("click",()=>{st.page=Math.min(3,st.page+1);seen("nav",d.navFb);render();});
  $("zoomBtn").addEventListener("click",()=>seen("zoom",d.zoomFb));
  $("searchBtn").addEventListener("click",()=>seen("search",d.searchFb));
  $("downloadBtn").addEventListener("click",()=>seen("dl",d.downloadFb));
  $("printBtn").addEventListener("click",()=>seen("pr",d.printFb));
  $("tqYes").addEventListener("click",()=>{if(st.answered)return;st.answered=true;ai(d.yesFb,"warn");setObj(1);});
  $("tqNo").addEventListener("click",()=>{if(st.answered)return;st.answered=true;ai(d.noFb,"good");setObj(1);});
 }
 render();
 ai(d.welcome,"neutral");}

function L7(){const d=C[7][S.lang];const st=S.st[6];st.open=false;st.opened=false;st.alwaysWarned=false;
 const stage=$("stage");stage.className="stage lab";
 function render(){
  stage.innerHTML=labHead(6,d.lead)+'<div class="winpanel"><div class="wtb">'+d.fileTitle+'</div><div class="wbody">'+
    (!st.open?'<button class="btn p" id="owBtn">'+d.openWithBtn+'</button>':
     '<div class="arow" data-a="1"><span class="k">'+d.app1+'</span><span class="ch">›</span></div>'+
     '<div class="arow" data-a="2"><span class="k">'+d.app2+'</span><span class="ch">›</span></div>'+
     '<label class="dchk" style="margin-top:14px"><input type="checkbox" id="alwaysChk"/> '+d.alwaysChk+'</label>')+
   '</div></div>'+nextBar();
  wireNext();
  const owb=$("owBtn");if(owb)owb.addEventListener("click",()=>{st.open=true;render();});
  stage.querySelectorAll(".arow[data-a]").forEach(r=>r.addEventListener("click",()=>{
   const chk=$("alwaysChk");
   if(chk&&chk.checked){if(!st.alwaysWarned){st.alwaysWarned=true;ai(d.alwaysFb,"warn");setObj(1);}}
   else{st.opened=true;ai(d.openOnceFb,"good");setObj(0);}
  }));
 }
 render();
 ai(d.welcome,"neutral");}

function L8(){const d=C[8][S.lang];const st=S.st[7];st.perm=st.perm||{};st.answered=false;
 const stage=$("stage");stage.className="stage lab";
 function render(){
  stage.innerHTML=labHead(7,d.lead)+'<div class="winpanel"><div class="wtb">'+d.appName+'</div><div class="wbody">'+
    d.perms.map(p=>'<div class="trow">'+liIcon(p[0])+'<span class="tn">'+p[1]+'</span><div class="toggle'+(st.perm[p[0]]?" on":"")+'" data-p="'+p[0]+'"></div></div>').join("")+
   '</div></div>'+
   '<div style="margin-top:22px;font-weight:700;font-size:15.5px">'+d.trapQ+'</div>'+
   '<div class="cats"><button class="cat" id="tqWrong">'+d.trapWrong+'</button><button class="cat" id="tqRight">'+d.trapRight+'</button></div>'+nextBar();
  wireNext();
  stage.querySelectorAll(".toggle[data-p]").forEach(t=>t.addEventListener("click",()=>{const p=t.dataset.p;st.perm[p]=!st.perm[p];
   if(Object.keys(st.perm).filter(k=>st.perm[k]!==undefined).length>=5)setObj(0);
   render();}));
  $("tqWrong").addEventListener("click",()=>{if(st.answered)return;st.answered=true;ai(d.trapWrongFb,"warn");setObj(1);render();});
  $("tqRight").addEventListener("click",()=>{if(st.answered)return;st.answered=true;ai(d.trapRightFb,"good");setObj(1);render();});
 }
 render();
 ai(d.welcome,"neutral");}

function L9(){const d=C[9][S.lang];const st=S.st[8];st.done5=st.done5||{};
 const stage=$("stage");stage.className="stage lab";
 stage.innerHTML=labHead(8,d.lead)+'<div class="items" style="display:flex;flex-wrap:wrap;gap:10px;margin-top:18px">'+d.steps.map((s,k)=>'<div class="chip" data-s="'+k+'"'+(st.done5[k]?' style="opacity:.4"':"")+'>'+(st.done5[k]?"✓ ":"")+s+'</div>').join("")+'</div>'+nextBar();
 wireNext();
 stage.querySelectorAll(".chip[data-s]").forEach(c=>c.addEventListener("click",()=>{const k=+c.dataset.s;if(st.done5[k])return;st.done5[k]=true;
  ai(d.stepFb,"good");setObj(k);c.style.opacity=".4";c.innerHTML="✓ "+d.steps[k];}));
 ai(d.welcome,"neutral");}

/* ---------- lang / reset ---------- */
function applyLang(){document.documentElement.lang=S.lang;$("cs").textContent=UI[S.lang].cs;$("lblProg").textContent=UI[S.lang].prog;$("lblObj").textContent=UI[S.lang].obj;$("aiName").textContent=UI[S.lang].ai;
 renderSidebar();syncProg();load(S.cur);}
$("langs").querySelectorAll("button").forEach(b=>b.addEventListener("click",()=>{S.lang=b.dataset.l;$("langs").querySelectorAll("button").forEach(x=>x.classList.toggle("on",x.dataset.l===S.lang));applyLang();}));
$("resetBtn").addEventListener("click",()=>{S.done=Array(NL).fill(false);S.st={};persistSim();renderSidebar();syncProg();load(S.cur);});
/* init */
loadSim();
applyLang();
</script>
